  {id:"p_4102_A", subject:"ptk", standard:"4.1.02", domain:"4", topic:"4.1", set:"A",
   prompt:"A teacher uses brief daily exit tickets: one question students answer on a notecard before leaving. She sorts the cards into three piles (got it, almost, not yet) before the next day's lesson and adjusts the opening activity based on the results. What monitoring function does this practice serve?",
   options:[
     "Exit tickets are a grading tool that adds to the summative assessment record.",
     "Exit tickets are useful only for managing student transitions at the end of class.",
     "This practice is only valid if every student's card contributes to their grade.",
     "The practice uses ongoing assessment to monitor student learning in real time and guide instruction — the next day's opening is shaped by evidence of where students actually are, not where the curriculum schedule assumes they should be."],
   answerIndex:3,
   explanation:"Ongoing assessment serves a monitoring and guidance function: it gives the teacher real-time data about student understanding so instruction can be adjusted before misunderstanding compounds. The three-pile sort is a rapid diagnostic: 'not yet' cards identify the students and concepts that need re-engagement in tomorrow's opening. This is formative assessment used as intended — to close the gap between current and target understanding before the unit ends."},

  {id:"p_4102_B", subject:"ptk", standard:"4.1.02", domain:"4", topic:"4.1", set:"B",
   prompt:"A teacher gives a major test at the end of every unit but collects no formative information during the unit. When students perform poorly on the test, she has no data about where or when the misunderstanding developed. What is the limitation of assessment-only-at-the-end practice?",
   options:[
     "Without ongoing assessment during the unit, the teacher has no mechanism to detect misunderstanding while there is still time to address it — poor test results arrive too late to guide the instruction that produced them.",
     "End-of-unit tests are too long; shorter tests produce more useful data.",
     "End-of-unit tests are valid assessment tools; the problem is the teacher's test design, not the timing.",
     "Formative assessment is only valuable in elementary school; secondary teachers should rely on summative data."],
   answerIndex:0,
   explanation:"The timing of assessment determines whether results can guide instruction. Ongoing (formative) assessment during a unit allows the teacher to detect and address misunderstanding while students are still in the learning process. Assessment only at the end arrives after all instruction has occurred — results can inform the next unit but cannot improve learning of the one just completed. The teacher has lost the window where intervention would have been most effective."},

  {id:"p_4102_C", subject:"ptk", standard:"4.1.02", domain:"4", topic:"4.1", set:"C",
   prompt:"During a two-week unit on the laws of exponents, a math teacher uses a two-question warm-up each day covering the previous day's content, reviews responses as a class, and adjusts her lesson based on which rules students consistently miss. By day 8, she has identified that nearly all students confuse the power rule with the product rule and re-teaches the distinction before moving on. What does this practice demonstrate?",
   options:[
     "The teacher is spending too much time reviewing; the warm-ups delay progress through the curriculum.",
     "The practice demonstrates using ongoing assessment to monitor and guide learning — the daily data identifies a specific, persistent misconception in time to address it before it becomes embedded, rather than discovering it on the end-of-unit test.",
     "Warm-ups are only valid as assessment tools if they are graded.",
     "The teacher should have identified this misconception from the unit pre-test, not during instruction."],
   answerIndex:1,
   explanation:"The teacher's daily warm-up data did exactly what ongoing assessment is designed to do: detected a specific misconception (power rule vs. product rule confusion) while instruction was still in progress, giving her the opportunity to address it before students built further understanding on a faulty foundation. Finding this on a post-unit test would be too late — students would have completed the unit with the misconception intact. The ongoing monitoring made the re-teaching possible and timely."},

  // ---- 4.1.03  Monitors procedures to check on student progress during different activity formats ----
  // A: format-specific monitoring | B: cooperative group monitoring | C(math): circulating during independent practice
  {id:"p_4103_A", subject:"ptk", standard:"4.1.03", domain:"4", topic:"4.1", set:"A",
   prompt:"A teacher uses different monitoring strategies depending on the activity format: during cooperative group work she circulates with a checklist tracking each group's progress; during independent work she circulates and briefly reviews individual student work; during teacher-directed instruction she asks verbal questions and scans for non-verbal response signals. What does using format-specific monitoring strategies accomplish?",
   options:[
     "Format-specific monitoring is unnecessarily complex; one monitoring approach should work for all activities.",
     "Different instructional formats generate different types of observable student behavior — format-specific monitoring ensures the teacher is gathering the kind of evidence of understanding that each format makes available, rather than using a one-size-fits-all approach that misses important signals.",
     "Format-specific monitoring is only necessary in classes with large numbers of students.",
     "Monitoring during teacher-directed instruction is unnecessary because the teacher is already in front of the class."],
   answerIndex:1,
   explanation:"Each instructional format makes different types of evidence visible. In cooperative groups, product completion and contribution patterns are key signals; in independent work, individual student accuracy is observable through circulating; in teacher-directed instruction, verbal responses and non-verbal cues (head-nodding, confused expressions) are the available signals. Using format-appropriate monitoring means the teacher maximizes the diagnostic information available in each context rather than trying to apply one strategy where it doesn't fit."},

  {id:"p_4103_B", subject:"ptk", standard:"4.1.03", domain:"4", topic:"4.1", set:"B",
   prompt:"A teacher sets up cooperative lab groups but sits at her desk during the activity, trusting that students are on task. At the end of class she discovers that two groups never got past step two of a five-step lab because they misunderstood the instructions, and one group's data was entirely incorrect due to a procedural error. What monitoring failure occurred?",
   options:[
     "The teacher should have designed a simpler lab that students could complete without monitoring.",
     "The teacher failed to use an appropriate monitoring procedure for cooperative group work — circulating with a checklist or observational tool during group activities is precisely how teachers catch procedural misunderstandings and errors before they compound, rather than discovering them after the work is complete.",
     "The problem is that students were not assigned defined roles within their groups.",
     "Cooperative lab activities require a teaching assistant; a single teacher cannot monitor groups adequately."],
   answerIndex:1,
   explanation:"Monitoring during cooperative group work is an active process — it requires the teacher to circulate and check progress, not trust that groups are on track. A checklist or structured observation during the lab would have caught the groups stuck at step two and the procedural error at the point when correction was still possible. Sitting at the desk eliminates the monitoring mechanism that makes cooperative work instructionally productive rather than just socially active."},

  {id:"p_4103_C", subject:"ptk", standard:"4.1.03", domain:"4", topic:"4.1", set:"C",
   prompt:"During independent practice in an algebra class, a math teacher circulates through the room, briefly scanning each student's work on the current problem set rather than waiting at the board for students to raise their hands. She notices that five students are applying the distributive property incorrectly before the error can compound across additional problems. What does this monitoring practice enable?",
   options:[
     "Circulating enables the teacher to proactively identify student errors as they occur — rather than waiting for students to self-identify confusion (which many won't do), the teacher catches the distributive property error early enough to correct it before students complete the entire set incorrectly.",
     "Circulating during independent practice is disruptive; students should raise their hands when they need help.",
     "This practice is only useful when students are working on new content; review practice doesn't require monitoring.",
     "The teacher should use circulating only during group work, not during independent practice."],
   answerIndex:0,
   explanation:"Proactive circulating during independent practice transforms the teacher's role from passive responder (waiting for hands) to active monitor (scanning for errors). Many students will not raise their hands when they are confused — they will simply proceed with incorrect work. By circulating, the teacher catches the distributive property error across five students simultaneously, allowing a brief intervention that prevents those students from completing an entire problem set incorrectly while reinforcing a misconception."},

  // ---- 4.1.04  Uses assessment information to evaluate progress and inform planning ----
  // A: using data to plan | B: identify error patterns | C(math): adjusting after assessment data
  {id:"p_4104_A", subject:"ptk", standard:"4.1.04", domain:"4", topic:"4.1", set:"A",
   prompt:"After a unit quiz, a teacher categorizes each question by learning objective and calculates what percentage of students answered correctly in each category. She finds that 90% mastered objective 1 but only 45% mastered objective 3. She uses this to plan re-teaching objective 3 in small group format while the rest of the class advances. What assessment practice is this?",
   options:[
     "This is using assessment data to evaluate what students have and haven't learned and to inform instructional planning — the disaggregated results identify the specific objective that needs re-teaching and allow differentiated planning rather than reteaching the entire unit.",
     "This is summative assessment used only for grading purposes.",
     "This practice is only appropriate for state standardized tests, not classroom quizzes.",
     "Re-teaching should only occur if every student failed an objective, not just 55%."],
   answerIndex:0,
   explanation:"This standard calls for using assessment information in two specific ways: to evaluate what was and wasn't learned (the 90%/45% breakdown does this) and to inform instructional planning (the small-group re-teach does this). Disaggregating by objective rather than just looking at overall scores is what makes the data actionable — the teacher knows exactly which skill to address and can target instruction accordingly, rather than re-teaching broadly or moving on despite the gap."},

  {id:"p_4104_B", subject:"ptk", standard:"4.1.04", domain:"4", topic:"4.1", set:"B",
   prompt:"A teacher reviews a class set of papers and notices that most students make the same type of error: they correctly identify the main idea of a passage but consistently confuse it with the topic sentence. She plans a lesson specifically addressing the distinction. What assessment-to-instruction practice does this represent?",
   options:[
     "Identifying error patterns in student work and using them to adjust instruction — rather than treating each student's mistake as isolated, the teacher sees the pattern that reveals a shared conceptual confusion, which can then be addressed efficiently through targeted instruction.",
     "This practice represents re-teaching the entire unit because student performance was inadequate.",
     "The teacher should have provided individual feedback to each student rather than a class lesson.",
     "Error pattern identification is only valid when done with standardized assessment data."],
   answerIndex:0,
   explanation:"Error pattern identification is a powerful use of assessment data: when the same mistake appears across many students, it is almost always a signal of a shared instructional gap rather than individual student failure. Recognizing the pattern (correct main idea identification, confusion with topic sentence) tells the teacher exactly what conceptual distinction needs direct attention. This is more efficient and precise than re-teaching the full lesson or addressing each student's error separately."},

  {id:"p_4104_C", subject:"ptk", standard:"4.1.04", domain:"4", topic:"4.1", set:"C",
   prompt:"A math teacher scores a set of tests on solving systems of equations and notices that 80% of students solved the substitution problems correctly but nearly all missed the elimination problems. Rather than moving to the next unit, she plans two additional lessons on elimination and designs practice that gradually builds from simple to complex elimination setups. How does this use of assessment data serve students?",
   options:[
     "The teacher is slowing down the class unnecessarily; students who missed elimination can get tutoring outside school.",
     "The teacher is using assessment results to evaluate what was and wasn't learned and to adjust instructional planning — the data reveals a method-specific gap that a simple 'move on' would leave unaddressed, and the graduated practice design addresses the gap systematically.",
     "The teacher should re-teach both methods since the data shows elimination was not fully mastered.",
     "Assessment data should only inform planning at the end of a quarter, not mid-unit."],
   answerIndex:1,
   explanation:"The assessment data gave the teacher precise, actionable information: substitution is solid, elimination is not. This allows targeted intervention — not broad re-teaching of the whole unit, not individual tutoring, but a planned sequence of instruction specifically addressing the identified gap. The graduated practice design reflects a further instructional decision informed by assessment: move from simple to complex to build the skill incrementally. This is assessment data being used as an instructional planning tool exactly as this standard intends."},

  // ---- 4.1.05  Informed by student voice to plan instruction ----
  // A: student voice as planning input | B: evaluate absence of student voice | C(math): student voice in math planning
  {id:"p_4105_A", subject:"ptk", standard:"4.1.05", domain:"4", topic:"4.1", set:"A",
   prompt:"At the start of a new unit, a teacher surveys students: Which topics from this unit are you most curious about? What about this subject feels relevant to your life? What format of learning works best for you (visual, discussion, writing, hands-on)? She uses responses to sequence content, select examples, and vary instructional formats. What function does student voice serve here?",
   options:[
     "Student surveys are a classroom management strategy that increases student compliance.",
     "Student voice here serves as planning input — students' academic interests, cultural contexts, social and emotional states, and learning preferences are data that allow the teacher to plan instruction that is more responsive and therefore more effective.",
     "Surveys replace formal needs assessments and should not be used for instructional planning.",
     "Student voice is only relevant for planning social activities, not academic instruction."],
   answerIndex:1,
   explanation:"Student voice data — about interests, relevance, preferred formats, emotional state, and cultural background — gives teachers information that assessment scores cannot provide. A student who finds the content irrelevant to their life, or whose preferred learning modality is never used, may underperform not due to lack of ability but due to disengagement from inaccessible instruction. Using student voice to plan instruction makes teaching more responsive to the actual students in the room."},

  {id:"p_4105_B", subject:"ptk", standard:"4.1.05", domain:"4", topic:"4.1", set:"B",
   prompt:"A teacher plans every lesson without ever asking students about their interests, concerns, or how they experience the class. Several students disengage mid-unit; others feel the examples used are irrelevant to their lives. When a colleague suggests using student feedback to inform planning, the teacher responds that the curriculum is the curriculum. What has this teacher failed to consider?",
   options:[
     "The teacher has confused curriculum content (what to teach) with instructional design (how to teach it) — student voice doesn't determine curriculum goals but informs how instruction is designed to reach the actual students in the class with their specific academic, social, emotional, and cultural needs.",
     "The teacher is correct — following the curriculum as written is the primary professional obligation.",
     "Student feedback is only appropriate at the end of the year, not mid-instruction.",
     "Curriculum documents already account for student diversity; additional student input is redundant."],
   answerIndex:0,
   explanation:"The distinction is between what is taught (determined by curriculum standards) and how it is taught (determined by instructional design). Student voice doesn't override curriculum goals — it informs how those goals are pursued. Examples that resonate with students' cultural contexts, sequencing that responds to students' expressed interests, and formats that match how students learn are all within the teacher's control and can make curriculum goals more accessible without changing what the curriculum requires."},

  {id:"p_4105_C", subject:"ptk", standard:"4.1.05", domain:"4", topic:"4.1", set:"C",
   prompt:"A math teacher is about to start a statistics unit. Before planning specific lessons, she asks students to share a question about the world they've always wanted to answer with data. The responses include questions about local crime rates, social media usage, and sports performance. She uses these as the contexts for teaching mean, median, standard deviation, and data displays. What does incorporating student voice accomplish here?",
   options:[
     "It allows students to choose what they learn, which may result in missing required standards.",
     "Using students' authentic data questions as the context for teaching statistical concepts makes the mathematics feel purposeful and connected to students' real interests — increasing engagement and making abstract concepts like standard deviation more tangible through contexts students care about.",
     "It is appropriate only if all students agree on the same data question.",
     "Student-generated contexts are less rigorous than textbook examples for learning statistics."],
   answerIndex:1,
   explanation:"The curriculum goal (teach mean, median, standard deviation, data displays) is unchanged — the teacher is meeting every required standard. What changes is the context: students' own questions give the statistics genuine purpose. Standard deviation calculated on social media usage data is the same mathematical operation as standard deviation calculated on a textbook data set, but the former is one the student generated and cares about. Student voice here informs the instructional design (the what-if applied to) without compromising the mathematical objectives."},

  // =====================================================================
  // PTK · Domain 4 · Topic 4.2 — Understands and Uses Formal Assessment
  // Standards 4.2.01–4.2.05 (5 standards × 3 sets = 15 questions)
  // =====================================================================

  // ---- 4.2.01  Understands the purpose and use of educational tests ----
  // A: distinguish test types | B: evaluate appropriate test selection | C(math): appropriate test for math learning
  {id:"p_4201_A", subject:"ptk", standard:"4.2.01", domain:"4", topic:"4.2", set:"A",
   prompt:"A district wants to know how its students compare to a national sample of same-grade students in reading comprehension. A teacher recommends using a norm-referenced test. A colleague suggests using the classroom reading rubric instead. Which recommendation is better suited to the district's stated purpose and why?",
   options:[
     "The classroom rubric, because teachers know their students best and can provide the most accurate assessment.",
     "The norm-referenced test, because its purpose is precisely to compare student performance to a national sample — norm-referenced tests are designed to spread scores and enable valid comparisons to a norming group, which criterion-referenced or local rubrics cannot do.",
     "Either test is appropriate; the choice is a matter of preference.",
     "The norm-referenced test is only appropriate for college entrance, not district-level assessment."],
   answerIndex:1,
   explanation:"Norm-referenced tests are designed specifically to compare student performance to a norming group — a large, representative sample used during test development to establish score distributions. When the question is 'how do our students compare to the national average?' a norm-referenced instrument is the appropriate tool because it is built for that purpose. A criterion-referenced rubric or classroom assessment answers a different question: 'Did students meet this specific learning target?'"},

  {id:"p_4201_B", subject:"ptk", standard:"4.2.01", domain:"4", topic:"4.2", set:"B",
   prompt:"A teacher wants to know whether each student has mastered the specific writing skills outlined in the grade-level standards. She is not interested in comparing students to each other or to a national sample — she wants to know who can and can't do what the standard requires. Which type of assessment is most appropriate?",
   options:[
     "A norm-referenced test, because it provides the most reliable score distribution.",
     "A portfolio, because portfolios are always more valid than standardized tests.",
     "A criterion-referenced assessment, because it is designed to evaluate whether each student has met a specific defined standard of performance — which is exactly the question the teacher is asking.",
     "A performance assessment is always preferred over criterion-referenced tests for writing."],
   answerIndex:2,
   explanation:"Criterion-referenced assessments measure student performance against a defined criterion or standard — 'did the student demonstrate X?' — rather than against other students. When the teacher's question is 'who has and hasn't mastered the grade-level writing standards?', a criterion-referenced tool gives her exactly that answer. A norm-referenced tool would tell her how students compare to each other but not whether any of them actually met the target."},

  {id:"p_4201_C", subject:"ptk", standard:"4.2.01", domain:"4", topic:"4.2", set:"C",
   prompt:"A math department wants to showcase student growth in mathematical reasoning over a semester. They want to show not just test scores but examples of student thinking, approaches to problems, and written explanations of solutions. A department head recommends portfolios rather than a standardized test. What is the strongest argument for this recommendation?",
   options:[
     "Portfolios are graded more quickly than standardized tests.",
     "Standardized tests are not valid for mathematics.",
     "Portfolios are designed to capture complex, multidimensional performance — including student thinking processes, problem-solving approaches, and growth over time — which standardized tests typically cannot document. For the stated goal of showcasing reasoning growth, portfolios are the appropriate tool.",
     "Portfolios are only appropriate for English classes, not mathematics."],
   answerIndex:2,
   explanation:"Each assessment type serves a different purpose. Portfolios excel at documenting complex performance over time — exactly what the department wants to show. A single standardized test score captures a point-in-time measure of selected skills but cannot show thinking processes, problem approaches, or growth narratives. The choice of assessment type should match the purpose: for showcasing the development of mathematical reasoning, a portfolio is the better-suited instrument."},

  // ---- 4.2.02  Understands purposes and uses of different item types ----
  // A: multiple-choice vs. constructed response | B: evaluate item type selection | C(math): item type for math assessment
  {id:"p_4202_A", subject:"ptk", standard:"4.2.02", domain:"4", topic:"4.2", set:"A",
   prompt:"A teacher wants to assess whether students can apply a complex multi-step reasoning process — not just identify a correct answer, but construct an argument. She chooses constructed-response items over multiple-choice. What is the primary reason this item type is better suited to her purpose?",
   options:[
     "Multiple-choice items can be guessed correctly without understanding; constructed-response items require students to produce evidence of thinking, making them better suited to assessing complex reasoning processes that cannot be captured by selecting among options.",
     "Constructed-response items are easier to grade than multiple-choice items.",
     "Multiple-choice items are only valid for factual knowledge; they cannot assess any higher-order thinking.",
     "Constructed-response items should be used exclusively; multiple-choice items have no legitimate place in assessment."],
   answerIndex:0,
   explanation:"Multiple-choice items are efficient and reliable for measuring recognition of correct answers across a broad range of content. Their limitation is that they allow for guessing and cannot reveal how a student arrived at an answer. Constructed-response items require students to generate and organize a response — making thinking visible in a way that multiple-choice cannot. For assessing complex reasoning processes, constructed-response is the better tool because the process itself becomes assessable, not just the outcome."},

  {id:"p_4202_B", subject:"ptk", standard:"4.2.02", domain:"4", topic:"4.2", set:"B",
   prompt:"A teacher wants to efficiently assess whether 30 students can identify the main idea of a passage across six different texts in a single class period. She uses multiple-choice items rather than constructed-response. What is the primary advantage of this item type choice for this purpose?",
   options:[
     "Multiple-choice items are always more valid than constructed-response items.",
     "Multiple-choice items can be scored quickly and cover a broad range of content in limited time — for the purpose of efficiently checking whether students can identify main ideas across multiple texts, this format maximizes content coverage within time constraints.",
     "Multiple-choice items eliminate guessing, which makes results more accurate.",
     "Multiple-choice items are better suited to complex reasoning than constructed-response items."],
   answerIndex:1,
   explanation:"Multiple-choice items have genuine advantages for specific purposes: they can cover more content in less time, scoring is quick and objective, and they work well when the goal is identifying correct answers across a broad range. For checking whether students can identify a main idea (a recognition task) across many texts in a single period, multiple-choice is well-suited. The item type choice should match the purpose — neither type is universally superior."},

  {id:"p_4202_C", subject:"ptk", standard:"4.2.02", domain:"4", topic:"4.2", set:"C",
   prompt:"A math teacher is designing an assessment for a proof-writing unit. She considers using multiple-choice items (select the correct next step in a proof) versus constructed-response items (write the full proof with justification). For the learning objective of this unit, which item type is more appropriate and why?",
   options:[
     "Multiple-choice is more appropriate because it is more objective and easier to grade.",
     "For assessing proof-writing specifically, constructed-response is more appropriate — selecting the next step in a pre-structured proof tests recognition of proof logic, but writing a full proof with justification tests the student's ability to construct the logical argument, which is the actual learning objective.",
     "Either item type is equally valid for assessing proof-writing ability.",
     "Proof-writing should only be assessed through oral examination, not written items."],
   answerIndex:1,
   explanation:"The choice of item type must match the learning objective. The objective here is writing proofs — a generative, constructive process. A multiple-choice item that asks students to select the correct next step tests recognition of proof logic, which is a different (and lower-order) skill than constructing the proof. If students are being assessed on their ability to write proofs, the assessment must require them to write proofs. Constructed-response is not just preferable here — it is necessary to validly assess the stated objective."},

  // ---- 4.2.03  Applies general testing concepts: reliability, validity, standard error of measurement ----
  // A: validity vs. reliability | B: evaluate a low-reliability scenario | C(math): SEM in math testing
  {id:"p_4203_A", subject:"ptk", standard:"4.2.03", domain:"4", topic:"4.2", set:"A",
   prompt:"A test consistently produces similar scores for the same students on different occasions — students who score high on Tuesday score high again on Friday when re-tested. However, the test measures students' general test-taking speed rather than their understanding of the content being taught. Which testing concept describes each finding?",
   options:[
     "The consistent scores indicate high reliability (the test produces stable results); the disconnect from content understanding indicates low validity (the test doesn't measure what it's supposed to measure). A test can be reliable without being valid.",
     "Both findings describe validity — a valid test is one that produces consistent results.",
     "The consistent scores indicate high validity; the disconnect indicates low reliability.",
     "Reliability and validity are the same concept described from different perspectives."],
   answerIndex:0,
   explanation:"Reliability and validity are distinct: reliability refers to consistency of measurement (would you get similar results if you measured again?); validity refers to whether the test measures what it is intended to measure. A test can be highly reliable (consistently measuring the same thing) but invalid (measuring the wrong thing). A test cannot be valid without also being reliable, but reliability alone does not guarantee validity. The scenario is a classic illustration: high reliability, low validity."},

  {id:"p_4203_B", subject:"ptk", standard:"4.2.03", domain:"4", topic:"4.2", set:"B",
   prompt:"Two different teachers score the same set of student essays using the same rubric. Their scores differ significantly for most essays — one teacher scores essay A as a 3/5 while the other scores it as a 5/5. This pattern continues across the set. What testing concept does this illustrate and what is the implication?",
   options:[
     "This illustrates low inter-rater reliability — when two scorers using the same tool produce different results, the measurement is inconsistent and therefore unreliable. Score differences between students may reflect scorer differences rather than differences in student performance.",
     "This illustrates validity — the rubric is not measuring what it was designed to measure.",
     "Scorer disagreement is normal and expected; the average of the two scores is the valid score.",
     "This illustrates standard error of measurement — all tests have some measurement error built in."],
   answerIndex:0,
   explanation:"Inter-rater reliability refers to the consistency of scores when the same work is evaluated by different raters using the same instrument. When scorers diverge significantly, scores reflect the rater as much as the student — making it impossible to know whether a given student's score represents their actual performance or the scorer's interpretation. Low inter-rater reliability undermines the fairness and usefulness of the assessment as a measure of student learning."},

  {id:"p_4203_C", subject:"ptk", standard:"4.2.03", domain:"4", topic:"4.2", set:"C",
   prompt:"A student scores 78 on a math test. The test's standard error of measurement (SEM) is 5 points. A teacher tells the student she is confident the student's 'true score' is exactly 78. A colleague corrects this interpretation. What should the teacher have said?",
   options:[
     "The teacher is correct — a test score is always the best estimate of the true score.",
     "The student's score should be reported as a range reflecting the SEM — approximately 73–83 — because measurement error means any single test score is an estimate of the student's true ability, not an exact measure. The SEM quantifies the uncertainty in that estimate.",
     "The SEM means the test is unreliable and the results should be discarded.",
     "The SEM only applies to standardized tests; classroom test scores are exact measures."],
   answerIndex:1,
   explanation:"Standard error of measurement (SEM) quantifies the uncertainty inherent in any test score. A student's observed score is an estimate of their true score — if they took multiple equivalent tests, their scores would vary around their true score, with the SEM indicating the typical size of that variation. With an SEM of 5, a score of 78 suggests the true score is likely somewhere in the range of 73–83. Treating 78 as an exact measure ignores the inherent imprecision in measurement."},

  // ---- 4.2.04  Understands and uses general statistical concepts ----
  // A: mean vs. median | B: standard deviation meaning | C(math): using statistics to interpret class performance
  {id:"p_4204_A", subject:"ptk", standard:"4.2.04", domain:"4", topic:"4.2", set:"A",
   prompt:"A class of 20 students takes a quiz. Nineteen students score between 70 and 80; one student scores 15. The teacher reports the class average as 67. A parent asks why the average seems low given that most students did well. What statistical concept explains the discrepancy?",
   options:[
     "The average is low because the quiz was too hard for most students.",
     "The parent is mistaken; an average of 67 accurately represents a class where most students scored 70–80.",
     "Standard deviation would give the parent a better sense of class performance than either mean or median.",
     "The mean is sensitive to outliers — the one very low score (15) pulls the average significantly below the range where most students scored, making the mean an unrepresentative measure of typical class performance in this case. The median (approximately 75) would better represent where most students landed."],
   answerIndex:3,
   explanation:"The mean is the sum of all scores divided by the number of scores, which makes it highly sensitive to extreme values (outliers). A single score of 15 among nineteen scores in the 70–80 range will substantially lower the mean. The median — the middle value when scores are ordered — is resistant to outliers and would be approximately 75 here, much more representative of typical performance. Understanding when to use mean versus median (and what each tells you) is a core statistical literacy skill for interpreting assessment data."},

  {id:"p_4204_B", subject:"ptk", standard:"4.2.04", domain:"4", topic:"4.2", set:"B",
   prompt:"Two classes take the same test. Class A has a mean of 80 with a standard deviation of 2; Class B has a mean of 80 with a standard deviation of 15. What does the difference in standard deviation tell the teacher about these two classes?",
   options:[
     "Class A performed better than Class B because a lower standard deviation indicates higher achievement.",
     "Class B performed better than Class A because a higher standard deviation indicates greater spread of high scores.",
     "The means are identical so the classes performed equivalently; standard deviation is irrelevant to achievement.",
     "Class A's scores are clustered closely around the mean (highly consistent performance), while Class B's scores are spread widely — indicating much more variability in how individual students performed, even though the average is the same."],
   answerIndex:3,
   explanation:"Standard deviation measures the spread or variability of scores around the mean. A small standard deviation (2) means most scores are very close to the mean of 80 — consistent class performance. A large standard deviation (15) means scores range widely around the mean of 80 — some students may have scored 55 while others scored 95. Both classes have the same average, but they are fundamentally different in terms of the distribution of individual student performance. This distinction matters enormously for instructional planning."},

  {id:"p_4204_C", subject:"ptk", standard:"4.2.04", domain:"4", topic:"4.2", set:"C",
   prompt:"A math teacher calculates that her class's median quiz score is 74 while the mean is 68. She reports both figures to parents. A parent asks why they're different and which one to pay attention to. What is the most accurate explanation?",
   options:[
     "They're different because of a calculation error; the mean and median should be the same.",
     "The mean is always more accurate than the median; the parent should focus on the mean.",
     "The median is always more accurate than the mean for assessment data; the parent should focus on the median.",
     "The mean and median are different measures of center that can diverge when the distribution is skewed. The mean (68) is pulled down by a few very low scores; the median (74) represents the score at the middle of the distribution and is less affected by outliers. Both are informative: the median shows where a typical student landed; the mean reflects the impact of all scores including the lowest."],
   answerIndex:3,
   explanation:"The mean and median are both measures of central tendency but sensitive to different things. When they diverge (mean lower than median), it typically signals left skew — a few very low scores are pulling the mean down without affecting the median. Neither is inherently more 'accurate'; they answer different questions. The median answers 'what is a typical student's score?'; the mean answers 'what is the average score for this group as a whole?'. Both are useful for understanding class performance."},

  // ---- 4.2.05  Understands and uses assessment terminology to interpret test results ----
  // A: percentile vs. percentage | B: norm-referenced vs. criterion-referenced scores | C(math): achievement vs. aptitude
  {id:"p_4205_A", subject:"ptk", standard:"4.2.05", domain:"4", topic:"4.2", set:"A",
   prompt:"A parent is told her child scored in the 72nd percentile on a reading test. The parent says, 'So he got 72% of the answers right?' The teacher needs to correct this misunderstanding. What is the accurate explanation?",
   options:[
     "The parent is correct — percentile and percentage correct mean the same thing.",
     "A percentile rank of 72 means the student scored higher than 72% of students in the norming group — it is a relative standing, not a measure of how many items were answered correctly. A student could answer only half the items correctly and still have a high percentile rank if others did worse.",
     "A percentile rank of 72 means the student got 72 out of 100 questions correct.",
     "Percentile rank is only meaningful for norm-referenced tests used in college admissions."],
   answerIndex:1,
   explanation:"Percentile rank and percentage correct are completely different metrics. Percentage correct is an absolute measure: what fraction of items did the student answer correctly? Percentile rank is a relative measure: how does this student's performance compare to the norming group? A 72nd percentile rank means the student performed better than 72% of the comparison group — this says nothing directly about how many items were correct. Confusing the two leads to significant misinterpretation of test results."},

  {id:"p_4205_B", subject:"ptk", standard:"4.2.05", domain:"4", topic:"4.2", set:"B",
   prompt:"A teacher is reviewing two reports: one shows a student's score as 'Grade Equivalent 6.2' from a norm-referenced test; another shows the same student 'Met Standard' on a criterion-referenced state assessment. A parent asks which report tells them whether their child has learned what was supposed to be taught this year. Which report answers that question and why?",
   options:[
     "The grade equivalent score, because it shows exactly where the student's learning level is.",
     "The criterion-referenced report ('Met Standard'), because it evaluates the student's performance against the specific standards that were taught — answering whether the student has learned the defined content, not just how they compare to other students.",
     "Neither report is adequate; a portfolio is the only way to determine whether content was learned.",
     "Both reports answer the same question from different angles; either is sufficient."],
   answerIndex:1,
   explanation:"Criterion-referenced scores answer 'did the student meet the standard?' — they are explicitly designed to evaluate performance against defined learning targets, which is what 'was taught this year' refers to. Norm-referenced scores (like grade equivalents) answer 'how does this student compare to other students?' — they tell you about relative standing, not whether specific content was mastered. The parent's question is criterion-referenced in nature, so the criterion-referenced report is the relevant one."},

  {id:"p_4205_C", subject:"ptk", standard:"4.2.05", domain:"4", topic:"4.2", set:"C",
   prompt:"A school reviews two math test results for a student: an achievement test and an aptitude test. The student scores very high on the aptitude test but average on the achievement test. A counselor notes this gap may be significant. What does each test measure, and why is the gap informative?",
   options:[
     "The achievement test measures what the student has learned in math; the aptitude test measures the student's potential or capacity for mathematical reasoning. A high aptitude score with an average achievement score suggests the student may be capable of more than current performance reflects — possibly indicating that instructional, motivational, or environmental factors are limiting achievement.",
     "Both tests measure the same thing; high scores on one should predict high scores on the other.",
     "Aptitude tests are more accurate than achievement tests; the aptitude score is the better measure.",
     "The gap is irrelevant; only achievement test scores should inform instructional decisions."],
   answerIndex:0,
   explanation:"Achievement tests measure acquired knowledge and skills — what has been learned. Aptitude tests measure potential or capacity — what the student is capable of learning. A gap where aptitude exceeds achievement is informative: it suggests that the student's current performance is not the ceiling of their capability, which is a signal worth investigating. Possible explanations include unaddressed learning gaps, motivational factors, language barriers, or inadequate instructional support — all of which are actionable. This is why assessment terminology that distinguishes achievement from aptitude matters for educational decision-making."},

  // =====================================================================
  // PTK · Domain 4 · Topic 4.3 — Provides for Special Student Needs
  // Standards 4.3.01–4.3.10 (10 standards × 3 sets = 30 questions)
  // =====================================================================

  // ---- 4.3.01  Develops plans to accommodate students' special needs ----
  // A: accommodation planning | B: evaluate reactive vs. proactive accommodation | C(math): math accommodation planning
  {id:"p_4301_A", subject:"ptk", standard:"4.3.01", domain:"4", topic:"4.3", set:"A",
   prompt:"Before a new student with documented learning challenges joins her class, a teacher reviews the student's records, consults with the prior teacher and support team, and prepares specific instructional materials and modified assignment formats. By the time the student arrives, the accommodations are already in place. What does this represent?",
   options:[
     "Proactive accommodation planning — using available information to develop a prepared plan before the student needs to struggle — rather than waiting for failure to identify what support is needed.",
     "The teacher is making assumptions about the student before observing their actual performance.",
     "This level of preparation is only required for students with IEPs, not for general learning challenges.",
     "The teacher should have waited for the student to arrive and then assessed their needs directly."],
   answerIndex:0,
   explanation:"Proactive accommodation planning is more effective than reactive intervention: preparing before a student struggles means the support is available from day one, preventing the failure experience that reactive approaches allow to occur first. Reviewing records, consulting with prior teachers, and preparing materials reflects professional responsibility to develop plans before the student needs to demonstrate need by failing — which is the intent of this standard."},

  {id:"p_4301_B", subject:"ptk", standard:"4.3.01", domain:"4", topic:"4.3", set:"B",
   prompt:"A student with processing difficulties consistently submits blank or minimally completed assignments. The teacher's response each time is to give the student a zero and move on. After a month, the student is failing. A support specialist suggests developing a specific accommodation plan. What has the teacher failed to do?",
   options:[
     "The teacher has failed to grade the student's work using a more lenient rubric.",
     "The teacher has failed to develop a plan to accommodate the student's special needs — repeatedly applying the same consequence (zero) for a persistent gap is not a plan; it is an absence of planning. Accommodation planning requires identifying the nature of the need and preparing specific adjustments to materials, processes, or expectations.",
     "The teacher should have reduced the amount of work assigned rather than developing an accommodation plan.",
     "Accommodation plans are the sole responsibility of special education staff; general education teachers are not responsible."],
   answerIndex:1,
   explanation:"When a student with documented processing difficulties consistently fails to complete work, the appropriate response is to develop a plan that addresses the underlying need — not to repeatedly apply a consequence that clearly isn't working. An accommodation plan identifies what specific adjustments (extended time, modified format, scaffolded prompts, check-ins) might allow the student to access and demonstrate learning. Failing to develop such a plan means allowing a preventable failure pattern to continue unchecked."},

  {id:"p_4301_C", subject:"ptk", standard:"4.3.01", domain:"4", topic:"4.3", set:"C",
   prompt:"A math teacher learns that an incoming student has dyscalculia — a learning difference that affects numerical processing and spatial reasoning. Before the student's first day, the teacher prepares: graph paper for all computation tasks, a multiplication table reference card, and step-by-step written procedure guides for each new algorithm. What does this preparation represent?",
   options:[
     "The teacher is developing a proactive accommodation plan specific to the nature of the student's documented need — each accommodation (graph paper, reference card, procedure guides) is matched to a specific aspect of dyscalculia, making the mathematics accessible without removing the mathematical challenge.",
     "The teacher is lowering academic expectations for the student.",
     "These accommodations are modifications that change the learning objectives and require IEP authorization.",
     "The teacher should have waited to observe the student's performance before preparing any accommodations."],
   answerIndex:0,
   explanation:"The teacher is doing exactly what accommodation planning requires: matching specific supports to the specific nature of the documented need. Graph paper helps with spatial organization, the reference card addresses numerical recall difficulties, and procedure guides support working memory limitations — all common in dyscalculia. Importantly, none of these remove the mathematical challenge; they remove the processing barriers that prevent the student from demonstrating mathematical understanding. This is the distinction between accommodations (how the student accesses content) and modifications (what content is expected)."},

  // ---- 4.3.02  Provides struggling students with extra time, instruction, and encouragement ----
  // A: what struggling students need | B: evaluate insufficient support | C(math): extra time and instruction in math
  {id:"p_4302_A", subject:"ptk", standard:"4.3.02", domain:"4", topic:"4.3", set:"A",
   prompt:"A student is consistently failing to demonstrate understanding of the current unit despite completing assignments. Rather than moving on with the class, the teacher arranges brief pull-aside instruction sessions twice a week, extends time on assessments, and follows each session with specific encouragement tied to observable progress. What three-part support does this represent?",
   options:[
     "The teacher is creating a separate curriculum for the student, which requires administrative approval.",
     "The teacher is providing tutoring, which is a separate service from classroom instruction.",
     "Pull-aside instruction is only appropriate for students with IEPs.",
     "Extra time (extended assessment time), extra instruction (pull-aside sessions), and encouragement (progress-tied positive feedback) — the three components this standard names for supporting struggling students."],
   answerIndex:3,
   explanation:"The standard explicitly names three supports for struggling students: extra time, extra instruction, and encouragement. The teacher's response provides all three: extended assessment time addresses pacing barriers; pull-aside sessions provide additional instructional opportunities beyond regular class; and encouragement tied to observable progress reinforces effort and acknowledges growth. This tripartite response is more effective than any single component because it addresses time, skill, and motivational dimensions of the struggle simultaneously."},

  {id:"p_4302_B", subject:"ptk", standard:"4.3.02", domain:"4", topic:"4.3", set:"B",
   prompt:"A struggling student asks a teacher for help after receiving a failing grade on a quiz. The teacher tells the student to 'study harder' and that the material will be retested at the end of the quarter. No additional instruction or support is offered. The student fails the retest. What is missing from this response?",
   options:[
     "The teacher should have allowed the student to retake the quiz immediately.",
     "The teacher should have reduced the content expectations for the struggling student.",
     "Struggling students should be referred to special education before any classroom support is provided.",
     "Telling a struggling student to 'study harder' without providing extra instruction, time, or encouragement does not address the learning gap — the student lacks the understanding needed to study effectively, and without additional instruction to build that understanding, more study time produces more of the same."],
   answerIndex:3,
   explanation:"'Study harder' is not a support strategy for a student who lacks understanding — it is advice that assumes the student knows how to learn the content and just hasn't tried hard enough. For a student who genuinely doesn't understand the material, effective support requires additional instruction (not just more time with the same misunderstanding), appropriately adjusted time expectations, and encouragement to sustain effort through difficulty. Without these, the gap between the struggling student and grade-level expectations compounds."},

  {id:"p_4302_C", subject:"ptk", standard:"4.3.02", domain:"4", topic:"4.3", set:"C",
   prompt:"A student in an algebra class consistently fails to solve linear equations correctly on quizzes despite class instruction. A math teacher pulls the student aside after school twice a week for 20-minute targeted sessions, provides extended time on assessments, and ends each session by noting specific improvement: 'Last week you couldn't set up the equation at all — today you got the setup right every time. That's real progress.' What makes this a complete support response?",
   options:[
     "This response combines extra instruction (targeted after-school sessions), extra time (extended assessment time), and encouragement (specific, progress-based acknowledgment) — the three components this standard identifies as necessary for supporting struggling students, each addressing a different dimension of the struggle.",
     "The extra sessions are the only component that matters; time extensions and encouragement are supplementary.",
     "The teacher should have used this time to assign additional practice problems rather than targeted instruction.",
     "After-school sessions require parental consent and administrative approval before being offered."],
   answerIndex:0,
   explanation:"The three components work together: extra instruction addresses the skill gap by providing teaching calibrated to exactly where the student is; extra time addresses the pacing barrier that may cause failure on timed assessments even when understanding is developing; encouragement tied to specific observable progress maintains the student's belief that their effort is producing results. Each addresses a different reason struggling students disengage — cognitive, temporal, and motivational — making the combined response more powerful than any single element."},

  // ---- 4.3.03  Seeks expertise and help from other professionals when needed ----
  // A: when to seek specialist help | B: evaluate failure to seek help | C(math): specialist consultation for math difficulty
  {id:"p_4303_A", subject:"ptk", standard:"4.3.03", domain:"4", topic:"4.3", set:"A",
   prompt:"A teacher has tried multiple instructional approaches with a student who has not made progress despite months of targeted support. She contacts the school's learning specialist to discuss the student, share her documentation of interventions, and ask for additional assessment and strategies. What professional practice does this represent?",
   options:[
     "The teacher is admitting failure and transferring responsibility to a specialist.",
     "Contacting a specialist requires a formal referral from an administrator before any discussion can occur.",
     "The teacher should have continued trying different approaches independently before involving other professionals.",
     "The teacher is appropriately seeking professional expertise when classroom interventions have not been sufficient — recognizing the limits of her own capacity and involving a specialist who has tools and expertise she does not, which serves the student's learning needs."],
   answerIndex:3,
   explanation:"Seeking professional expertise is a mark of professional competence, not a failure. When a student's needs exceed what classroom-level intervention can address, the ethical and effective response is to involve professionals with specialized tools, training, and assessment capacity. Documenting interventions before seeking help is important — it gives the specialist the information needed to determine what additional assessment or support is appropriate. This is the collaborative, professional approach this standard calls for."},

  {id:"p_4303_B", subject:"ptk", standard:"4.3.03", domain:"4", topic:"4.3", set:"B",
   prompt:"A student has a significant, persistent speech and language difficulty that is affecting her participation and comprehension in class. Her general education teacher continues working with her using standard classroom strategies rather than involving a speech-language pathologist, believing it is not her place to recommend specialist involvement. What is the problem with this approach?",
   options:[
     "The teacher is correct — classroom teachers are not qualified to involve specialists.",
     "When a student's needs require specialized expertise (such as speech-language pathology), the teacher has a professional responsibility to seek that help — not to provide it herself, but to recognize that the student's needs exceed classroom capacity and to involve the appropriate professional.",
     "A teacher can only involve a speech-language pathologist if the student has a formal diagnosis.",
     "The teacher should first obtain parent permission before considering specialist involvement."],
   answerIndex:1,
   explanation:"Recognizing the limits of one's own professional capacity and involving specialists who have the appropriate expertise is a professional responsibility, not a boundary violation. A speech-language difficulty significant enough to affect classroom participation and comprehension is precisely the kind of specialized need that warrants specialist involvement. Continuing with standard classroom strategies when they are clearly insufficient is not professional humility — it is a failure to advocate for the student's access to appropriate support."},

  {id:"p_4303_C", subject:"ptk", standard:"4.3.03", domain:"4", topic:"4.3", set:"C",
   prompt:"A math teacher suspects that a student's persistent difficulty with spatial reasoning — particularly with geometry and graphing — may be more than a skill gap. She documents the student's performance patterns, discusses her observations with the school psychologist, and asks whether a formal evaluation might be appropriate. What does this represent?",
   options:[
     "The teacher is overstating her role; student referrals for evaluation are initiated by parents, not teachers.",
     "The teacher should have continued working with the student independently for at least one full year before involving the psychologist.",
     "Math teachers are not qualified to identify learning difficulties; this concern should be dismissed.",
     "The teacher is appropriately seeking professional expertise — recognizing a pattern that exceeds what standard math instruction addresses, documenting her observations, and involving a professional with assessment expertise to determine whether the student's needs require specialized evaluation and support."],
   answerIndex:3,
   explanation:"Teachers are often the first to notice patterns that may indicate a learning difference — they have the most consistent, task-specific observation of how a student processes and performs. Documenting those observations and sharing them with a school psychologist or specialist is appropriate professional practice. The teacher is not diagnosing; she is sharing relevant observational data with someone who has the expertise to determine whether formal evaluation is warranted. This is exactly the collaborative, expertise-seeking behavior this standard describes."},

  // ---- 4.3.04  Uses inclusive classroom practices for students with disabilities ----
  // A: inclusive practice principles | B: evaluate exclusion | C(math): inclusive math instruction
  {id:"p_4304_A", subject:"ptk", standard:"4.3.04", domain:"4", topic:"4.3", set:"A",
   prompt:"A student with a physical disability joins a general education classroom. The teacher rearranges seating for physical access, uses varied response formats so the student can participate in discussions (verbal, written, typed), and includes the student in all class activities with support as needed. What principle does this practice reflect?",
   options:[
     "Inclusive classroom practice — designing the physical and instructional environment so students with disabilities can access and participate in the same learning experiences as their peers, using multiple means of access rather than separate or reduced expectations.",
     "The teacher is providing modifications that reduce the academic rigor of instruction for the student.",
     "These practices are only required for students whose IEPs specify them explicitly.",
     "Rearranging seating and offering varied response formats are general good teaching practices unrelated to disability inclusion."],
   answerIndex:0,
   explanation:"Inclusive classroom practices involve designing the environment and instruction to ensure students with disabilities can access and participate in the same learning as their peers. Physical access (rearranged seating) and instructional access (multiple response formats) are the two dimensions shown here. Neither changes what is learned — both change how the student can access and demonstrate learning. This is the core of inclusive practice: same rigor, different access pathways."},

  {id:"p_4304_B", subject:"ptk", standard:"4.3.04", domain:"4", topic:"4.3", set:"B",
   prompt:"A teacher with a student who has a documented disability routinely assigns that student to work alone in the hallway during group activities, saying it's 'easier' for the student to focus outside the classroom. The student misses collaborative learning opportunities and feels excluded. What is the problem with this practice?",
   options:[
     "The practice is appropriate if it produces better focus and academic outcomes for the student.",
     "Hallway work is an accommodation that must be included in the student's IEP to be valid.",
     "The student should choose whether to work in the hallway or in the classroom.",
     "Routinely excluding a student with a disability from the general classroom environment and collaborative activities is not an inclusive practice — it deprives the student of the social and academic experiences of the general education setting, which inclusive practice is designed to preserve."],
   answerIndex:3,
   explanation:"Inclusive practice means the student with a disability is included in the general education environment, not periodically removed from it as a default management strategy. 'Easier for the student to focus' in the hallway may reflect an environmental design problem in the classroom (insufficient accommodation) rather than an inherent need for removal. Routine exclusion from group activities deprives the student of both academic and social learning opportunities that are a fundamental purpose of general education placement."},

  {id:"p_4304_C", subject:"ptk", standard:"4.3.04", domain:"4", topic:"4.3", set:"C",
   prompt:"A math teacher has a student with ADHD in an inclusion setting. During problem-solving activities, the student struggles with sustained focus. The teacher designs the activity with built-in movement checkpoints (students check their work at a posted answer key midway, then return to their seat), provides a simplified step-by-step checklist, and seats the student near a positive peer model. What type of practice is this?",
   options:[
     "These are inclusive classroom practices that address the student's attention and executive function needs within the general education math setting — movement breaks, checklists, and strategic seating provide environmental and instructional supports that keep the student engaged in the same math work as peers.",
     "These are modifications that lower the mathematical expectations for the student.",
     "These practices require IEP authorization and cannot be implemented by the general education teacher independently.",
     "ADHD is not a disability that requires classroom accommodation."],
   answerIndex:0,
   explanation:"Each element of the teacher's design addresses a specific challenge associated with ADHD: movement breaks address the need for physical activity and provide natural task segmentation; checklists support executive function (task organization and monitoring); strategic seating provides a social model for on-task behavior. None of these change the mathematical content — the student is solving the same problems as peers. These are inclusive classroom practices: environmental and instructional supports that allow a student with a disability to access the general education curriculum."},

  // ---- 4.3.05  Uses motivational and instructional interventions for students with disabilities ----
  // A: motivational intervention | B: instructional intervention | C(math): both in math
  {id:"p_4305_A", subject:"ptk", standard:"4.3.05", domain:"4", topic:"4.3", set:"A",
   prompt:"A student with a learning disability has internalized the belief that she cannot succeed academically and refuses to attempt challenging tasks. The teacher uses a series of strategically designed early successes — tasks that are within reach but progressively more demanding — and explicitly connects each success to the student's effort ('You worked through that step by step — that's what got you there'). Motivation improves. What type of intervention is this?",
   options:[
     "A motivational intervention — the teacher addressed the student's internalized belief about her own capability by engineering success experiences and explicitly attributing them to effort, which rebuilds the academic self-efficacy that motivates engagement with challenging work.",
     "An instructional intervention — the teacher changed the content to make it easier.",
     "A behavioral modification plan — the teacher used positive reinforcement to increase task completion.",
     "This is not an appropriate intervention for a student with a learning disability; specialist involvement is required."],
   answerIndex:0,
   explanation:"Students with learning disabilities frequently develop low academic self-efficacy through repeated difficulty and failure experiences — they learn to expect failure before trying. Motivational interventions address this by rebuilding the student's belief that effort produces results. Engineering early successes (achievable but challenging tasks) and attributing them explicitly to effort (not luck or ease) are the mechanisms: each success becomes evidence against the student's failure expectation. This is a motivational intervention because it targets the belief that drives (or blocks) engagement, not the skill directly."},

  {id:"p_4305_B", subject:"ptk", standard:"4.3.05", domain:"4", topic:"4.3", set:"B",
   prompt:"A student with a reading disability struggles to decode multi-syllabic words, which slows reading to the point of frustration and prevents comprehension of grade-level text. The teacher implements explicit syllabification instruction, providing a structured routine for breaking words into syllable types before attempting pronunciation. Decoding improves. What type of intervention is this?",
   options:[
     "A motivational intervention — the teacher reduced the student's frustration, which increased motivation.",
     "A behavioral intervention — the teacher reinforced the student for attempting to read.",
     "An environmental intervention — the teacher modified the classroom to support reading success.",
     "An instructional intervention — the teacher provided explicit, structured teaching of a specific skill (syllabification) that the student needed but lacked, directly addressing the decoding barrier rather than managing its emotional consequences."],
   answerIndex:3,
   explanation:"An instructional intervention addresses a skill gap through direct, explicit teaching of the missing skill. Syllabification instruction is a targeted response to a specific, identified decoding weakness — it is not motivational (it doesn't address the student's beliefs about success), behavioral (it doesn't use reinforcement contingencies), or environmental (it doesn't modify the setting). It is instructional: the teacher identified what the student needed to know how to do and taught it explicitly."},

  {id:"p_4305_C", subject:"ptk", standard:"4.3.05", domain:"4", topic:"4.3", set:"C",
   prompt:"A student with a math learning disability avoids attempting algebra problems and says 'I just can't do math' before even trying. A math teacher uses two interventions simultaneously: she provides explicit instruction in the specific procedural step the student is missing (instructional), and she begins each session with a brief review of problems the student successfully completed previously, pointing out the pattern of progress (motivational). Why are both types of intervention necessary?",
   options:[
     "Only the instructional intervention is necessary; motivation follows from skill development automatically.",
     "Only the motivational intervention is necessary; once the student believes she can succeed, she will figure out the skill on her own.",
     "Both are necessary because the student has two interacting problems: a skill gap (the procedural step she is missing) and a motivational barrier (the belief that she can't do math). Addressing only the skill gap leaves the motivational barrier that prevents her from trying; addressing only the motivation leaves the skill gap that causes failure when she does try.",
     "The two interventions are contradictory and should not be used simultaneously."],
   answerIndex:2,
   explanation:"Skill gaps and motivational barriers in students with learning disabilities are often mutually reinforcing: the skill gap causes failures that feed the motivational barrier ('I can't do this'), and the motivational barrier prevents the student from attempting work that would allow the skill to develop. Addressing only one leaves the other intact: closing the skill gap without addressing the belief means the student won't try; rebuilding motivation without closing the gap means the student tries and fails again, reinforcing the original belief. Both interventions together break the cycle."},

  // ---- 4.3.06  Serves as a behavioral management resource for students with disabilities ----
  // A: role in managing behavior for students with disabilities | B: evaluate reactive-only approach | C(math): behavioral support in math
  {id:"p_4306_A", subject:"ptk", standard:"4.3.06", domain:"4", topic:"4.3", set:"A",
   prompt:"A student with an emotional and behavioral disability is included in a general education class. The teacher works proactively with the special education team to understand the student's behavioral triggers, learns what signals indicate escalating distress, and has a prepared de-escalation protocol for use in the classroom. When a behavioral incident begins to develop, the teacher intervenes early using the agreed protocol. What role is the teacher filling?",
   options:[
     "The teacher is serving as a behavioral management resource within the general education classroom — she has prepared understanding of the student's behavioral profile, established a proactive protocol, and intervenes early rather than waiting for full escalation or relying solely on removal.",
     "The teacher is taking over the special education team's responsibilities.",
     "Only a special education teacher can implement behavioral protocols for a student with an emotional disability.",
     "Behavioral management in the general education classroom is the sole responsibility of the school psychologist."],
   answerIndex:0,
   explanation:"In an inclusive setting, the general education teacher is the primary adult present for most of the student's school day. Serving as a behavioral management resource means the teacher is informed about the student's behavioral profile, equipped with a proactive response plan, and able to intervene early and effectively — not waiting for crises or passing all behavioral responsibility to specialists who aren't present. This requires collaboration with the special education team but execution by the general education teacher."},

  {id:"p_4306_B", subject:"ptk", standard:"4.3.06", domain:"4", topic:"4.3", set:"B",
   prompt:"A general education teacher with an included student with behavioral challenges responds to every behavioral incident by sending the student to the office. The teacher has not consulted with the special education team about behavioral strategies and has no de-escalation plan in place. Behavioral incidents continue to increase in frequency. What is the teacher failing to do?",
   options:[
     "The teacher is correct to send the student to the office — behavioral management for students with disabilities is not a general education responsibility.",
     "The teacher is failing to serve as a behavioral management resource: by not learning the student's behavioral profile, not collaborating on a proactive plan, and using removal as the only response, the teacher is addressing symptoms rather than preventing escalation, and is not providing the in-classroom support that an inclusive placement requires.",
     "The teacher should increase academic demands to reduce the behavioral incidents.",
     "The teacher cannot be expected to manage behavioral challenges without a full-time aide."],
   answerIndex:1,
   explanation:"Reactive removal (sending to the office) addresses behavior after it escalates but does nothing to prevent escalation and does not constitute a behavioral management strategy. Serving as a behavioral management resource means the teacher has a proactive role: knows the student's triggers, has an agreed de-escalation approach, and can intervene early. The pattern of increasing behavioral incidents is a signal that the reactive approach is not working and that a proactive, collaborative plan is needed."},

  {id:"p_4306_C", subject:"ptk", standard:"4.3.06", domain:"4", topic:"4.3", set:"C",
   prompt:"A student with an anxiety-related disability exhibits behavioral patterns in math class specifically — she refuses tasks when asked to work at the board, becomes visibly distressed during timed activities, and shuts down before tests. A math teacher, informed by the special education team, proactively eliminates public board work for this student, uses untimed practice, and implements a pre-test calming routine. Behavioral incidents decrease. What is the teacher doing?",
   options:[
     "The teacher is lowering expectations for the student by removing challenging activities.",
     "The teacher is serving as a behavioral management resource by proactively addressing the specific triggers in the math classroom — using knowledge of the student's disability and its behavioral manifestations to redesign classroom activities in ways that prevent behavioral incidents rather than responding to them after they occur.",
     "These adjustments require IEP approval and cannot be made by the classroom teacher independently.",
     "Anxiety is not a disability that requires behavioral management consideration in an academic setting."],
   answerIndex:1,
   explanation:"The teacher identified the specific in-class triggers (public board work, timed activities, test anticipation) and redesigned those elements proactively — not as a reaction to incidents, but as a prevention strategy informed by understanding of the student's disability. This is behavioral management as a resource role: the teacher uses knowledge (from the special education team) and classroom authority (to modify activities) to prevent the behavioral incidents that the anxiety-related disability creates in this specific context. The math objectives are unchanged; the access pathway is modified."},

  // ---- 4.3.07  Provides specialized instruction and curriculum modification for students with disabilities ----
  // A: distinction between accommodation and modification | B: evaluate appropriate modification | C(math): curriculum modification in math
  {id:"p_4307_A", subject:"ptk", standard:"4.3.07", domain:"4", topic:"4.3", set:"A",
   prompt:"A student with a significant intellectual disability in an inclusive class has IEP goals that are below grade-level content. The teacher works with the special education team to identify which grade-level themes and activities the student can meaningfully engage with at their level — for example, while the class writes a persuasive essay, the student organizes sentences into a three-sentence opinion statement. What does this represent?",
   options:[
     "Curriculum modification — the content and complexity of the expected outcome has been adjusted to match the student's IEP goals, while maintaining thematic inclusion and participation in the same learning context as peers.",
     "The student is being excluded from the lesson; separate activities should not occur in an inclusive classroom.",
     "This is an accommodation — the teacher has modified the format but not the content expectations.",
     "Curriculum modifications of this type require administrative approval for each individual lesson."],
   answerIndex:0,
   explanation:"Curriculum modification differs from accommodation in a key way: modification changes what the student is expected to learn (the content, complexity, or breadth of the curriculum outcome), while accommodation changes how the student accesses or demonstrates the same expected outcome. Here, the student's task (three-sentence opinion statement) is a genuinely modified product aligned to IEP goals — the complexity and scope of the expected output is different from the grade-level essay. This is curriculum modification, and it is appropriate when a student's IEP goals are below grade-level expectations."},

  {id:"p_4307_B", subject:"ptk", standard:"4.3.07", domain:"4", topic:"4.3", set:"B",
   prompt:"A student with a reading disability has an IEP that specifies accommodations (extended time, text-to-speech for reading passages) but not curriculum modifications — the student is expected to meet the same content standards as peers, just with different access tools. The teacher decides independently to reduce the content expectations for this student without IEP authorization. What has the teacher done wrong?",
   options:[
     "The teacher has appropriately differentiated instruction to meet the student's needs.",
     "The teacher should have waited for the student to fail before reducing expectations.",
     "Reducing content expectations is always appropriate for students with learning disabilities.",
