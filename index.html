     "The teacher should simply avoid creating rules that would require consistent enforcement."],
   answerIndex:0,
   explanation:"Consistency in enforcement does two things simultaneously: it maintains the integrity of the expectation (students can't predict or engineer exceptions based on their status) and it establishes the classroom as a fair environment where the same standard applies to all. When enforcement is selective — even with good intentions — students who observe the inconsistency lose confidence in the rule and in the teacher's authority to enforce it."},

  {id:"p_3106_B", subject:"ptk", standard:"3.1.06", domain:"3", topic:"3.1", set:"B",
   prompt:"A teacher enforces the 'phones away during instruction' rule firmly with students she finds difficult to manage, but overlooks violations by students who are generally compliant and well-liked. Over time, most students are aware of this pattern. What is the primary consequence of this selective enforcement?",
   options:[
     "Only the students whose phones are confiscated are affected; the others continue learning normally.",
     "Selective enforcement effectively differentiates management by student need, which is a recommended practice.",
     "Students who observe differential enforcement lose faith in the rule's legitimacy; the expectation becomes perceived as a power tool rather than a shared standard, undermining the entire management system.",
     "The pattern will self-correct over time as students forget who is being treated differently."],
   answerIndex:2,
   explanation:"Selective enforcement is one of the most corrosive patterns in classroom management because students are exquisitely sensitive to fairness. When they observe that the same behavior is treated differently depending on who does it, they correctly conclude the rule is not a genuine shared standard — it's an instrument of power applied selectively. This perception delegitimizes the rule and the teacher's authority simultaneously."},

  {id:"p_3106_C", subject:"ptk", standard:"3.1.06", domain:"3", topic:"3.1", set:"C",
   prompt:"In a precalculus class, the teacher has a clear expectation: all students show their algebraic work, not just the final answer. She enforces this on tests and homework for nearly everyone, but consistently accepts answer-only work from two students who are exceptionally strong at the subject. When a mid-year audit of work samples shows inconsistent enforcement, a mentor raises the issue. What is the mentor's most accurate concern?",
   options:[
     "Strong students have earned the right to skip steps; the expectation should not apply to them.",
     "The expectation of showing work is about the teacher's grading convenience, not student learning, so enforcement doesn't matter.",
     "The mentor is overreacting; minor inconsistency in enforcement has no measurable effect on classroom climate.",
     "Even well-intentioned exceptions undermine the expectation: other students notice, begin to question the rule's purpose, and lose confidence in its fair application — which erodes both the expectation and classroom trust."],
   answerIndex:3,
   explanation:"The 'show your work' expectation exists because it makes student thinking visible, which serves diagnostic and learning purposes — not just because the teacher wants to check answers. Allowing exceptions for strong students sends the message that the expectation is about performance level rather than process and learning. Other students notice, and the norm erodes. Consistent enforcement of academically meaningful expectations is as important in a math context as behavioral expectations."},

  // ---- 3.1.07  Begins each class promptly and purposefully ----
  // A: what prompt/purposeful looks like | B: cost of slow starts | C(math): math warm-up routine
  {id:"p_3107_A", subject:"ptk", standard:"3.1.07", domain:"3", topic:"3.1", set:"A",
   prompt:"A teacher has a routine where, as soon as the bell rings, a 'do now' task is displayed on the board and students begin immediately while she takes attendance on her tablet. The task is directly connected to that day's lesson objective. Which aspect of this routine most directly reflects the principle of beginning class promptly and purposefully?",
   options:[
     "The task begins at the bell (promptly) and is connected to the day's learning objective (purposefully), so every minute from the start of class is on-task time rather than transitional dead air.",
     "Taking attendance digitally rather than by calling names, which saves approximately 90 seconds.",
     "The fact that students can see the board from their seats.",
     "The teacher multitasks, which demonstrates efficiency even if the students' task is disconnected from the lesson."],
   answerIndex:0,
   explanation:"Prompt means class begins at the designated time — not five minutes later while the teacher gets organized. Purposeful means the start activity is connected to learning, not filler. The 'do now' routine achieves both: students engage with lesson-relevant content the moment class begins, and the teacher handles administrative tasks simultaneously. This is a high-leverage routine because it recaptures minutes lost to slow starts across every class period of the year."},

  {id:"p_3107_B", subject:"ptk", standard:"3.1.07", domain:"3", topic:"3.1", set:"B",
   prompt:"A teacher typically spends the first 8–10 minutes of a 50-minute class period chatting with students, handing out papers, waiting for latecomers, and reviewing the previous day's homework before beginning new instruction. Assuming this pattern holds across a 180-day year, what is the most significant instructional consequence?",
   options:[
     "Across a 180-day year, 8–10 minutes of dead time per class compounds into 24–30 hours of lost instructional time — equivalent to weeks of class — a cost that cannot be recovered.",
     "Students appreciate the relaxed start and are more engaged once instruction begins, so the tradeoff is favorable.",
     "The consequence is negligible because transitions are unavoidable and all teachers face this challenge equally.",
     "The consequence is only significant for students who are already struggling; strong students are unaffected."],
   answerIndex:0,
   explanation:"The math here is straightforward and sobering: 9 minutes × 180 days = 1,620 minutes = 27 hours of lost instructional time per year, per class period. For a teacher with five sections, this multiplies further. Slow starts are not minor inefficiencies — they are a structural drain on learning time that accumulates invisibly. Beginning promptly and purposefully is the single highest-leverage daily habit for protecting instructional time."},

  {id:"p_3107_C", subject:"ptk", standard:"3.1.07", domain:"3", topic:"3.1", set:"C",
   prompt:"A math teacher projects a problem set of two warm-up problems the moment students walk in — one reviewing a previously learned skill and one previewing a concept from today's lesson. Students know to begin immediately because this is the established routine. The teacher uses this time to circulate and check homework. When the bell rings, she is ready to launch instruction without delay. What two properties make this start both prompt and purposeful?",
   options:[
     "It is prompt because she circulates, and purposeful because the problems are projected on a screen.",
     "It is prompt because students begin before the bell, and purposeful because both problems come from the textbook.",
     "It is prompt because learning activity starts immediately as students enter, and purposeful because the warm-up is directly tied to lesson content — both review and preview serve that day's instructional goals.",
     "It is prompt only if all students arrive on time, and purposeful only if all students find the problems interesting."],
   answerIndex:2,
   explanation:"Prompt means on-task learning begins immediately — not when the bell rings and the teacher calls for attention, but when students walk in. Purposeful means the activity is intentionally connected to the lesson's goals: the review problem consolidates prior learning and the preview primes students for new content. Both conditions are met simultaneously, making this a textbook example of beginning class promptly and purposefully."},

  // ---- 3.1.08  Avoids unnecessary delays and pauses during lessons ----
  // A: preparation prevents pauses | B: technology failure mid-lesson | C(math): handling board errors efficiently
  {id:"p_3108_A", subject:"ptk", standard:"3.1.08", domain:"3", topic:"3.1", set:"A",
   prompt:"A teacher consistently prepares materials the night before — printing handouts, queuing the projector slides, and placing manipulatives on tables before students arrive. During lessons, she rarely needs to stop to find something or set up equipment. A student teacher observing her asks what's behind this habit. What is the most accurate explanation?",
   options:[
     "Preparation is primarily for reducing teacher anxiety, not for student learning.",
     "Preparation eliminates the risk of any lesson ever going poorly.",
     "Administrative policy requires that all materials be prepared in advance regardless of instructional impact.",
     "Unnecessary pauses — stopping mid-lesson to locate materials, consult a manual, or set up displays — disrupt lesson flow and lose student attention. Front-loading logistics prevents those pauses from occurring during instruction when they are most costly."],
   answerIndex:3,
   explanation:"The instructional cost of a mid-lesson pause is not just the seconds it takes — it is the disruption to student attention and momentum. Students who were tracking an explanation must restart; the cognitive thread of the lesson is broken. Preparing materials in advance prevents these pauses at their source. This is distinct from pauses that are intentional and productive (think-time, wait-time); the standard targets unnecessary delays caused by logistical unpreparedness."},

  {id:"p_3108_B", subject:"ptk", standard:"3.1.08", domain:"3", topic:"3.1", set:"B",
   prompt:"In the middle of explaining a concept, a teacher realizes the video clip she planned to show isn't loaded and begins searching her files, pausing instruction for several minutes. Students start side conversations. When the teacher resumes, she has to re-orient the class. What single change would have prevented this cascade?",
   options:[
     "Cutting the video clip from the lesson entirely — multimedia is an unnecessary complication.",
     "Pre-loading and testing the video before class so the transition to the clip is seamless, eliminating the mid-lesson delay and preserving lesson momentum.",
     "Appointing a student to manage technology so the teacher is not responsible for setup.",
     "Reducing lesson complexity so there are fewer things that can go wrong."],
   answerIndex:1,
   explanation:"The solution is straightforward: the problem is a logistics failure caused by not checking readiness before class. The cascade — pause, side conversations, re-orientation — is entirely predictable when lesson flow is broken by a search for materials. The standard calls for avoiding unnecessary delays, which means handling logistical preparation before students arrive, not during instruction. The content of what's being shown is less important than whether it's ready when needed."},

  {id:"p_3108_C", subject:"ptk", standard:"3.1.08", domain:"3", topic:"3.1", set:"C",
   prompt:"A math teacher is mid-way through demonstrating a multi-step equation on the board and realizes she made an arithmetic error four lines back. She stops, says 'hold on,' erases multiple lines, reworks from the mistake, and takes three minutes to correct and re-explain — losing the attention of half the class in the process. A mentor suggests a different approach. What would preserve lesson momentum better?",
   options:[
     "Never make errors on the board — only teach topics where errors are impossible.",
     "Erase the entire board and start from scratch each time an error occurs.",
     "Acknowledge the error briefly, fix it efficiently, and use it as a teaching moment about error-checking — without letting the correction become a full stop in lesson flow.",
     "Leave errors uncorrected to prevent disruption."],
   answerIndex:2,
   explanation:"Errors during board demonstrations are inevitable; the question is how to handle them without creating an unnecessary pause. A brief acknowledgment and efficient correction treats the error as a teaching moment (error-detection is a genuine math skill) while maintaining momentum. The three-minute halt is what this standard targets — not the error itself, but the unplanned, prolonged disruption of lesson flow. Anticipating that errors may occur and having a recovery strategy is part of avoiding unnecessary pauses."},

  // ---- 3.1.09  Teaches students procedures for recurring instructional activities ----
  // A: whole-class discourse procedures | B: pairs/groups procedures | C(math): equipment + getting help procedures
  {id:"p_3109_A", subject:"ptk", standard:"3.1.09", domain:"3", topic:"3.1", set:"A",
   prompt:"A teacher spends time in the first week explicitly teaching students how to participate in whole-class discussion: how to add to a peer's idea, how to respectfully disagree, how to signal that they want to contribute without calling out. She has students rehearse these moves with low-stakes content. A colleague calls this 'wasted time.' What is the strongest rebuttal?",
   options:[
     "Discussion procedures are required by curriculum standards, not by instructional choice.",
     "These procedures exist primarily for the teacher's comfort, not for student learning.",
     "Teaching discussion procedures is an upfront investment that makes every subsequent discussion more productive — students know how to engage without constantly being managed, freeing the teacher to focus on the ideas being discussed rather than the mechanics of the conversation.",
     "Rehearsing procedures only works if the content is interesting; with boring content, procedures break down."],
   answerIndex:2,
   explanation:"Whole-class discussion is a recurring instructional format that requires specific learner behaviors to function. Students who know how to add to a peer's idea, signal contributions, and respectfully disagree can focus their attention on the ideas being discussed. Without these procedural skills, the teacher spends discussion time managing the process rather than the content. Teaching the procedure up front is exactly the investment this standard calls for: it makes every future discussion run more smoothly."},

  {id:"p_3109_B", subject:"ptk", standard:"3.1.09", domain:"3", topic:"3.1", set:"B",
   prompt:"A teacher assigns students to work in pairs for the first time in the semester without teaching any procedures for how pairs should operate. Ten minutes in, she observes that most pairs have one dominant speaker and one passive listener, work is not being completed, and students are unclear about when pair work ends and whole-class discussion begins. What should she have done before assigning pair work?",
   options:[
     "Pairs naturally self-organize; the teacher should simply wait longer for them to find their rhythm.",
     "She should have avoided pair work entirely — the format is inherently less manageable than whole-class instruction.",
     "She should have chosen stronger pairs and accepted that some will not work productively.",
     "She should have explicitly taught pair procedures: how to take turns, what each partner is responsible for, how to signal completion, and how to transition back to whole-class discussion — before students attempted the format."],
   answerIndex:3,
   explanation:"Pair and group work are recurring instructional formats that require explicit procedural instruction, just like whole-class discussion. Students don't automatically know how to take turns, share responsibility, or transition between formats. Teaching these procedures before the first use of the format establishes the structure students need to engage productively. The passive-listener problem is a predictable consequence of leaving role expectations unaddressed."},

  {id:"p_3109_C", subject:"ptk", standard:"3.1.09", domain:"3", topic:"3.1", set:"C",
   prompt:"At the start of the year, a math teacher explicitly teaches students: (1) how to request a graphing calculator from the storage bin and return it — each student is assigned a numbered unit; (2) what to do when stuck on a problem — try a simpler case, draw a diagram, then ask a neighbor before raising a hand; and (3) how to signal they've completed a problem and are ready to discuss. Why is teaching these specific procedures worth class time at the start of the year?",
   options:[
     "These are administrative tasks unrelated to mathematics, so teaching them belongs outside class time.",
     "These procedures address specific recurring moments in math instruction — equipment transitions, productive struggle behavior, and readiness signaling — and teaching them early prevents those moments from becoming repeated disruptions that fragment lessons all year.",
     "The procedures matter only for equipment management; the other two are student judgment calls that cannot be taught.",
     "Teaching procedures is only worthwhile if the teacher plans to use those formats more than ten times per year."],
   answerIndex:1,
   explanation:"Each procedure addresses a recurring event in math class that, without a taught protocol, becomes a logistical interruption. Calculator distribution without a system creates chaos and delays. Students without a strategy for being stuck either give up or immediately ask for help, short-circuiting productive struggle. No readiness signal means transitions to discussion drag on. Each is a small moment, but each recurs every class period — teaching the procedure once prevents the disruption indefinitely."},

  // ---- 3.1.10  Provides explicit instruction on listening, sharing, and handling disagreements ----
  // A: what explicit social instruction looks like | B: model + practice for disagreement | C(math): productive mathematical disagreement
  {id:"p_3110_A", subject:"ptk", standard:"3.1.10", domain:"3", topic:"3.1", set:"A",
   prompt:"A teacher observes that her students struggle to engage with one another's ideas in discussion — they ignore peers' contributions and treat conversation as a turn-taking exercise rather than a genuine exchange. She devotes two class segments to explicitly teaching three skills: paraphrasing before responding, asking clarifying questions, and distinguishing disagreement with an idea from disagreement with a person. What category of instruction is this?",
   options:[
     "Social-emotional learning that is unrelated to academic instruction.",
     "An administrative procedure for managing transitions.",
     "Explicit instruction on how to listen to, share, and integrate others' ideas — interpersonal communication skills that enable productive academic discourse.",
     "A content-area lesson in communication arts unrelated to the teacher's subject."],
   answerIndex:2,
   explanation:"The skills the teacher is targeting — paraphrasing before responding, asking clarifying questions, separating idea-disagreement from person-disagreement — are the communicative prerequisites for productive academic discussion. They fall squarely under this standard's category of explicit instruction about listening, sharing, and integrating others' ideas. This is not peripheral to instruction; it is the procedural infrastructure that makes discussion a viable learning format."},

  {id:"p_3110_B", subject:"ptk", standard:"3.1.10", domain:"3", topic:"3.1", set:"B",
   prompt:"A teacher wants students to handle disagreements constructively during group work, but simply telling students to 'be respectful' has not worked. A mentor suggests a different approach: first model a constructive disagreement ('I'm not sure I agree — can you explain how you got that?'), then have students practice the same move with a scripted scenario, then debrief what worked. Why is this approach more likely to succeed than the directive alone?",
   options:[
     "Modeling and practice take too long and should be reserved for academic content, not communication skills.",
     "Telling students to be respectful is sufficient; the problem is student motivation, not instruction.",
     "Scripted scenarios are too artificial; students should practice in authentic disagreements only.",
     "Modeling makes the target behavior concrete and observable; practice gives students a chance to internalize the move before using it in high-stakes real discussions; debrief consolidates the learning. Together, these are what explicit instruction looks like — it's the same sequence used for academic skills."],
   answerIndex:3,
   explanation:"The model-practice-debrief sequence is the same instructional sequence used for any skill: demonstrate it, have learners do it in a supported context, reflect on the doing. Applying this to communication moves like constructive disagreement treats it as a learnable skill (which it is) rather than a personality trait. The directive to 'be respectful' fails because it names the target but provides no instruction on how to get there — exactly the gap that explicit instruction addresses."},

  {id:"p_3110_C", subject:"ptk", standard:"3.1.10", domain:"3", topic:"3.1", set:"C",
   prompt:"During group problem-solving in a math class, two students reach different answers for the same problem and the exchange escalates: 'You're doing it wrong.' 'No, you are.' The teacher stops the class and uses the moment to model a different move: 'Try this — instead of saying someone is wrong, say: I got a different answer. Can you walk me through your steps?' She has both students try the move and debriefs what made it more productive. What is she explicitly teaching?",
   options:[
     "She is correcting a behavioral violation, not teaching a skill.",
     "She is teaching the mathematical content of the problem by having students compare solutions.",
     "She is providing explicit instruction on handling disagreements constructively — modeling the specific language move, giving students immediate practice, and debriefing — in a context where the skill is directly needed.",
     "She is modeling emotional regulation, which is outside the scope of academic instruction."],
   answerIndex:2,
   explanation:"The teacher is doing something specific and deliberate: she identifies a recurring breakdown in productive discourse (personal attacks masquerading as mathematical disagreement), provides a concrete language move to replace it, has students practice it immediately, and debriefs why it works better. This is explicit instruction on handling disagreements constructively — using a live moment rather than a contrived scenario, which makes it highly transferable."},

  // ---- 3.1.11  Encourages student effort by focusing on the positive aspects of performance ----
  // A: specific positive feedback for effort | B: effort-praise vs. ability-praise | C(math): encourage persistence in math
  {id:"p_3111_A", subject:"ptk", standard:"3.1.11", domain:"3", topic:"3.1", set:"A",
   prompt:"After a student turns in an assignment with several errors, a teacher responds: 'I can see you worked through all five problems and showed your thinking on each one — that's exactly the kind of effort that builds skill. Here's where the reasoning broke down in problem three...' What principle does this response illustrate?",
   options:[
     "The teacher is avoiding giving accurate feedback to spare the student's feelings.",
     "Praise should always come before criticism as a matter of politeness, regardless of instructional purpose.",
     "The teacher is using the 'sandwich' method, which research consistently shows to be ineffective.",
     "By naming a specific, genuine positive aspect of the student's effort before identifying the error, the teacher encourages continued effort while delivering accurate corrective feedback."],
   answerIndex:3,
   explanation:"The teacher acknowledges something real and specific about the student's effort (attempted all problems, showed thinking) before providing corrective feedback. This is not empty praise — it names an actual positive aspect of performance. The effect is to signal that effort itself is valued and noticed, which encourages the student to continue engaging even when outcomes are imperfect. This is distinct from flattery: the teacher still delivers the corrective information."},

  {id:"p_3111_B", subject:"ptk", standard:"3.1.11", domain:"3", topic:"3.1", set:"B",
   prompt:"Two teachers respond to a student who produces a mediocre but earnest attempt at a difficult task. Teacher A says: 'Great job! You're so smart!' Teacher B says: 'You tackled a hard problem and didn't give up — I noticed you tried three different approaches before writing your answer. That persistence is what gets you better.' Which response better encourages student effort and why?",
   options:[
     "Teacher A, because positive emotion always increases student motivation.",
     "Teacher B, because describing specific effort behaviors gives the student a replicable model for success and links the praise to something the student controls, rather than to a fixed trait like intelligence.",
     "Both are equally effective; the content of encouragement matters less than its warmth.",
     "Teacher A, because naming intelligence sets high expectations that motivate students to live up to them."],
   answerIndex:1,
   explanation:"Teacher B's response is stronger for two reasons: it names specific, observable effort behaviors (tried three approaches, didn't give up), and it attributes success to those controllable behaviors rather than to a fixed trait. Research on motivation consistently shows that effort-and-strategy praise is more effective at building persistence than ability-praise, because students can replicate effort but cannot will themselves to be smarter. Teacher A's 'you're so smart' framing can also backfire — students praised for intelligence avoid challenge to protect that label."},

  {id:"p_3111_C", subject:"ptk", standard:"3.1.11", domain:"3", topic:"3.1", set:"C",
   prompt:"A student in a precalculus class is frustrated after struggling through a limit problem and says, 'I'm just bad at this.' The teacher responds: 'Look at what you actually did here — you correctly set up the expression, you identified that direct substitution produced an indeterminate form, and you started factoring. That's three hard steps done right. The place where it broke down was the factoring — that's the one thing to fix, not everything.' What is the teacher accomplishing with this response?",
   options:[
     "The teacher is providing false encouragement to avoid damaging the student's confidence.",
     "The teacher is focusing the student on the positive aspects of her actual performance — making specific, accurate observations about what she did correctly — to counter a global negative self-assessment and preserve her motivation to continue.",
     "The teacher is avoiding corrective feedback by focusing only on what went right.",
     "The teacher is using a general motivational phrase rather than content-specific feedback."],
   answerIndex:1,
   explanation:"The teacher's response is content-specific and accurate: she identifies three concrete things the student did correctly (set up the expression, recognized the indeterminate form, began factoring). This is not false encouragement — it's a precise inventory of genuine strengths, which directly counters the student's overgeneralized self-assessment. By narrowing the problem to one fixable step, the teacher preserves the student's sense of competence and motivation to persist. Effort encouragement works best when it is specific and honest."},,
// =====================================================================
  // PTK · Domain 3 · Topic 3.2 — Sets Clear Standards for Classroom Conduct
  // Standards 3.2.01–3.2.08 (8 standards × 3 sets = 24 questions)
  // A/B subject-neutral; C secondary-math context
  // =====================================================================

  // ---- 3.2.01  Establishes clear standards of conduct ----
  // A: what makes conduct standards clear | B: absence of standards | C(math): math conduct standard
  {id:"p_3201_A", subject:"ptk", standard:"3.2.01", domain:"3", topic:"3.2", set:"A",
   prompt:"A teacher posts and explains three conduct standards on the first day: 'Arrive ready to work,' 'Contribute to others' learning — don't detract from it,' and 'Resolve conflicts through conversation, not confrontation.' She explains the reasoning behind each and gives examples of what each looks like in practice. What distinguishes these as effective conduct standards?",
   options:["They are phrased positively, explain the rationale, and are specific enough for students to recognize whether they are meeting them — features that make conduct standards actionable rather than decorative.",
     "There are exactly three standards, and three is the research-recommended number.",
     "They are posted on the wall, which is the only requirement for a conduct standard to be effective.",
     "Conduct standards are only effective if students help create them; teacher-authored standards don't count."],
   answerIndex:0,
   explanation:"Effective conduct standards share three features: they describe observable or recognizable behaviors (not just abstract values), they communicate why the standard matters, and they are stated clearly enough that students can self-monitor compliance. Posting alone doesn't create shared understanding — explanation and examples are what give the standard operational meaning for students."},

  {id:"p_3201_B", subject:"ptk", standard:"3.2.01", domain:"3", topic:"3.2", set:"B",
   prompt:"A teacher relies on in-the-moment correction to manage conduct, addressing violations as they arise without having pre-established any conduct standards. Students behave differently in different situations because they have no shared reference point for what is expected. What is the primary instructional cost of this approach?",
   options:["Without pre-established standards, students cannot self-regulate — each correction feels arbitrary rather than a reminder of a known expectation, generating confusion and resentment rather than compliance.",
     "In-the-moment correction is more effective than pre-established standards because it addresses real behavior rather than hypothetical situations.",
     "The cost is only significant in elementary school; secondary students don't need explicit conduct standards.",
     "The real cost is that the teacher must spend time posting standards instead of teaching content."],
   answerIndex:0,
   explanation:"Conduct standards serve two functions: they guide behavior proactively (students know what's expected before a situation arises) and they make corrective responses feel legitimate rather than arbitrary. Without them, students can't self-regulate because they have no internalized target to reference. Each correction becomes a surprise rather than a reminder, which is why it generates resentment — the student has no agreed-upon standard being invoked."},

  {id:"p_3201_C", subject:"ptk", standard:"3.2.01", domain:"3", topic:"3.2", set:"C",
   prompt:"A math teacher establishes two conduct standards specific to her class: 'When a classmate is explaining their solution, your pencil is down and your attention is on them' and 'Errors are treated as information, not as failures — no mockery, no sighing, no eye rolls.' She explains why each standard matters for a productive math learning environment. What makes these conduct standards well-suited to a mathematics classroom?",
   options:[
     "They are stated in the negative, which is the clearest form for conduct standards.",
     "They apply only during group work, which is the only format that requires conduct standards.",
     "They are content-neutral and therefore appropriate for any subject.",
     "They target the specific conduct situations that arise in math instruction — student presentations and error-making — and explain why those behaviors matter in that context, making the standards meaningful rather than generic."],
   answerIndex:3,
   explanation:"Generic conduct standards ('be respectful') often don't translate into specific behaviors for specific instructional contexts. These standards name concrete situations that recur in math class (peer solution presentations, making errors) and describe observable conduct for each. By anchoring the standard to the actual teaching and learning context, the teacher makes it both specific enough to act on and meaningful because students understand why it matters in math."},

  // ---- 3.2.02  Arranges classroom so teacher can gain proximity to all students ----
  // A: purpose of proximity access | B: evaluate a blocking arrangement | C(math): proximity during practice
  {id:"p_3202_A", subject:"ptk", standard:"3.2.02", domain:"3", topic:"3.2", set:"A",
   prompt:"A teacher arranges desks in a U-shape rather than traditional rows, ensuring she can walk to any student within a few steps without asking anyone to move. During instruction she regularly circulates through the open center. What conduct management advantage does this arrangement provide?",
   options:["The U-shape ensures all students can see each other, which is primarily a social benefit rather than a management tool.",
     "The arrangement only matters for group work; during direct instruction any arrangement is equivalent.",
     "Physical proximity to students is a legal requirement in most states.",
     "Proximity is one of the quietest and most effective early-stage corrective tools — being physically near a student who is off-task often redirects behavior without any verbal intervention, preserving lesson flow and avoiding public confrontation."],
   answerIndex:3,
   explanation:"Proximity works as a management tool because physical nearness signals awareness and accountability without requiring the teacher to name, call out, or interrupt instruction. A student who is beginning to drift often self-corrects simply because the teacher is standing nearby. The room arrangement determines whether proximity is even possible — if the teacher cannot physically reach all students, this tool is unavailable."},

  {id:"p_3202_B", subject:"ptk", standard:"3.2.02", domain:"3", topic:"3.2", set:"B",
   prompt:"A teacher places large storage cabinets down the center of the classroom, effectively dividing it into two zones. Students in the back zone are essentially invisible during direct instruction and the teacher rarely moves there. Over the semester, off-task behavior is concentrated in the back zone. What is the most direct explanation for this pattern?",
   options:[
     "Students in the back are less academically motivated by nature.",
     "The back-zone students have more friends who distract them.",
     "The physical arrangement prevents the teacher from gaining proximity to back-zone students, removing a key behavioral management tool and creating a low-accountability zone that students read and respond to.",
     "The cabinets absorb sound, making the teacher's voice less audible in the back zone."],
   answerIndex:2,
   explanation:"The room arrangement created a structural management gap: the teacher cannot physically reach back-zone students without significant disruption. Students — especially adolescents — are acutely aware of who is and isn't monitored. Low-proximity zones quickly become low-accountability zones. The cabinets didn't cause the behavior; they prevented the corrective tool (proximity) that would address it early."},

  {id:"p_3202_C", subject:"ptk", standard:"3.2.02", domain:"3", topic:"3.2", set:"C",
   prompt:"A math teacher typically works problems on the board from the front while students practice independently at their seats. She notices that students in corner seats rarely get individual attention and frequently go off-task. She redesigns the room so she can easily circulate during both board demonstrations and independent practice. Why is this redesign a management decision as much as an instructional one?",
   options:[
     "Circulating during board work is distracting for students and should be avoided.",
     "The redesign is purely about equity of attention, not conduct management.",
     "When the teacher can reach any student easily, proximity becomes available as a low-disruption conduct tool during both instructional formats — preventing the isolated dead zones where off-task behavior concentrates because monitoring is absent.",
     "Room arrangement only matters during group activities; for individual practice any layout is equivalent."],
   answerIndex:2,
   explanation:"Room arrangement is a management decision because it determines whether proximity-based conduct management is physically possible during any instructional format. During board work, a teacher who can circulate can use proximity to redirect students at the margins of the room; during independent practice, she can catch disengagement before it spreads. Redesigning to eliminate dead zones restores this management tool across all instructional contexts."},

  // ---- 3.2.03  Provides positive feedback that is specific, descriptive, accurate, meaningful ----
  // A: four qualities of good positive feedback | B: empty vs. substantive praise | C(math): specific math praise
  {id:"p_3203_A", subject:"ptk", standard:"3.2.03", domain:"3", topic:"3.2", set:"A",
   prompt:"After a student gives a thoughtful response during class discussion, a teacher says: 'That's exactly right — you connected the new concept to what we learned last week and used a specific example to support your point. That kind of thinking is what moves the class forward.' What four qualities does this feedback demonstrate?",
   options:["It is long, formal, public, and written — the four qualities of effective positive feedback.",
     "It is enthusiastic, emotional, surprising, and individualized.",
     "Positive feedback only needs to be accurate; the other qualities are stylistic preferences.",
     "It is specific (names what the student did), descriptive (explains the thinking move), accurate (the connection is real), and meaningful (links the behavior to class progress) — the four qualities that make positive feedback instructionally useful."],
   answerIndex:3,
   explanation:"The standard names four qualities: specific (what exactly did the student do?), descriptive (describe the behavior, not just label it), accurate (true, not inflated), and meaningful (connected to something that matters). Generic praise like 'great job' fails on specificity and description. This feedback names the thinking move (connected concepts, used an example) and explains why it matters — all four qualities in one response."},

  {id:"p_3203_B", subject:"ptk", standard:"3.2.03", domain:"3", topic:"3.2", set:"B",
   prompt:"Teacher A responds to correct student work with 'Awesome, you're a rockstar!' Teacher B responds with 'You set up the equation correctly and kept track of units all the way through — that's the discipline that prevents most errors on this type of problem.' Which feedback better serves conduct and learning management, and why?",
   options:["Teacher B, because describing what the student did correctly and why it matters is specific, accurate, and meaningful — it tells the student what to replicate and signals that the teacher is paying genuine attention to their work.",
     "Teacher A, because enthusiastic praise increases student motivation regardless of content.",
     "Both are equally effective; the form of praise matters less than its frequency.",
     "Teacher A, because brief feedback is always preferable to extended feedback in a classroom setting."],
   answerIndex:0,
   explanation:"Teacher B's feedback is effective because it names the specific behaviors (set up equation, tracked units) and explains their value (prevents errors). This gives the student a replicable model: do this again in the future. Teacher A's response is emotionally warm but informationally empty — the student can't extract from 'rockstar' what they did well or why it mattered. For conduct management, specific praise also signals that the teacher genuinely observes student work, which motivates continued on-task behavior."},

  {id:"p_3203_C", subject:"ptk", standard:"3.2.03", domain:"3", topic:"3.2", set:"C",
   prompt:"During a calculus class, a student correctly identifies that a function is not differentiable at a point because of a sharp corner. The teacher responds: 'Yes — you spotted the geometric feature (the corner) and connected it to the analytic condition (the derivative can't exist where the slope changes instantaneously). That precise reasoning is exactly what this concept requires.' Why is this positive feedback more effective than saying 'Perfect!'?",
   options:[
     "It is longer, which always makes feedback more effective.",
     "It avoids mathematical vocabulary, making it more accessible.",
     "'Perfect!' is equally effective because it confirms the student is correct.",
     "It is specific (names what the student identified), descriptive (explains the reasoning chain), accurate (the mathematical connection is correct), and meaningful (links the reasoning to the concept's requirements) — giving the student a clear model of what correct mathematical thinking looks like here."],
   answerIndex:3,
   explanation:"'Perfect!' confirms correctness but says nothing about what was correct or why it mattered. The detailed response names the specific observation (geometric corner), the specific connection (analytic non-differentiability), and affirms that this level of reasoning is what the concept demands. This is the difference between confirming an answer and reinforcing a thinking process — the latter is what this standard's four qualities (specific, descriptive, accurate, meaningful) are designed to produce."},

  // ---- 3.2.04  Selects from repertoire of early-stage correction techniques ----
  // A: match technique to early-stage behavior | B: evaluate technique choices | C(math): proximity during independent practice
  {id:"p_3204_A", subject:"ptk", standard:"3.2.04", domain:"3", topic:"3.2", set:"A",
   prompt:"A student is starting to whisper to a neighbor during a lesson — a first, non-chronic occurrence. Without pausing instruction, the teacher gradually moves to stand near the student's desk. The whispering stops. The teacher makes no verbal comment and continues teaching. Why is this technique well-matched to the situation?",
   options:["Proximity is only effective for physical altercations; it has no impact on minor verbal disruptions.",
     "The teacher should have immediately sent the student to the principal to prevent future violations.",
     "Non-verbal techniques are legally required before any verbal correction can be given.",
     "The technique avoids escalation: proximity signals awareness and accountability without interrupting the lesson, naming the student publicly, or treating a minor first offense as a serious disciplinary event."],
   answerIndex:3,
   explanation:"The principle governing early-stage correction is proportionality: the intervention should match the severity of the behavior. Whispering for the first time is a minor, non-chronic issue — it calls for the least disruptive effective technique. Proximity redirects without naming, pausing, or escalating, which preserves lesson flow and avoids turning a minor incident into a confrontation that disrupts everyone. Escalating to a major consequence would be disproportionate and counterproductive."},

  {id:"p_3204_B", subject:"ptk", standard:"3.2.04", domain:"3", topic:"3.2", set:"B",
   prompt:"A teacher has a student who is clearly daydreaming — staring out the window, not tracking the lesson, but not disturbing anyone else. This is the first time it has happened in this class. Which response is most appropriate from the repertoire of early-stage correction techniques?",
   options:[
     "Refer the student to the counselor immediately — daydreaming signals an underlying emotional problem.",
     "Deliver a formal written reprimand so the behavior is on record.",
     "Use a brief, low-key technique such as making eye contact, moving closer, or posing a question directed to the student — matched to the minor, non-chronic nature of the behavior.",
     "Ignore it entirely; daydreaming is a student's right and does not affect learning."],
   answerIndex:2,
   explanation:"Early-stage correction techniques are designed for exactly this situation: non-chronic, non-disruptive misbehavior that needs a gentle redirect. Eye contact, proximity, or a directed question each accomplish the same goal — bringing the student back to the lesson — without public confrontation, escalation, or formal documentation. The key principle is that the response is calibrated to the severity and stage of the behavior, not to the maximum available consequence."},

  {id:"p_3204_C", subject:"ptk", standard:"3.2.04", domain:"3", topic:"3.2", set:"C",
   prompt:"During independent practice in a math class, a teacher notices one student making exaggerated frustrated gestures (slamming eraser, slumping) but not disturbing others. The behavior is new, not a pattern. Without interrupting the class, the teacher crouches beside the student and quietly says, 'I can see this one is frustrating — let's look at it together for a second.' What makes this a good early-stage corrective response?",
   options:[
     "The teacher is using restitution, which requires the student to make amends for disruptive behavior.",
     "The teacher uses proximity and a quiet private check-in proportionate to a non-chronic, early-stage behavioral signal — addressing the conduct without escalation or public attention, while also addressing the likely underlying cause.",
     "The teacher should have used humor to diffuse the frustration instead.",
     "The teacher should have ignored the behavior since it was not disturbing others."],
   answerIndex:1,
   explanation:"The combination of physical proximity and a quiet, private check-in is a proportionate early-stage technique for a non-chronic behavioral signal. The teacher reads the behavior as frustration (a potential instructional cause, not pure defiance) and responds in a way that addresses both the conduct signal and its likely root — a hallmark of skilled early-stage management. Public correction or major consequences would be wildly disproportionate to a first-instance frustration reaction."},

  // ---- 3.2.05  Implements corrective techniques for common rule violations ----
  // A: match technique to common violation | B: debrief technique | C(math): penalty technique
  {id:"p_3205_A", subject:"ptk", standard:"3.2.05", domain:"3", topic:"3.2", set:"A",
   prompt:"A class has a recurring problem with three students talking during independent work time. The teacher implements a simple counting system: the class starts each period with five points; each disruption costs a point; points remaining at the end of the week translate to a small class reward. Behavior improves significantly. What category of corrective technique is this?",
   options:[
     "A proximity technique — the teacher's physical movement is what changes behavior.",
     "A restitution technique — students are repairing harm done to the class.",
     "A chart/counting system — a common corrective technique that makes the consequences of rule violations visible and predictable, creating a group accountability structure.",
     "A time-out technique — individuals are removed from the learning environment."],
   answerIndex:2,
   explanation:"Counting and chart-based systems are named corrective techniques for common rule violations. They work by making consequences visible, predictable, and tied to a concrete outcome — the class can track progress and anticipate consequences, which gives the system deterrent value. The group accountability structure also creates peer pressure toward compliance, which individual corrections cannot achieve. This is distinct from proximity (physical), restitution (repair), or time-out (removal)."},

  {id:"p_3205_B", subject:"ptk", standard:"3.2.05", domain:"3", topic:"3.2", set:"B",
   prompt:"A teacher has a student who repeatedly submits incomplete work despite multiple verbal reminders. The teacher decides to implement a debriefing session: after class, she and the student discuss why the incomplete submissions keep happening, what the student says the barriers are, and what they'll do differently. The student identifies that she doesn't understand how long assignments take and always starts them at 11 PM. Together they make a plan. What corrective technique is this?",
   options:[
     "Time out — the student is removed from the class environment for the debrief.",
     "Restitution — the student is making up for the harm caused by not completing work.",
     "Debriefing — a corrective technique that involves a structured reflective conversation to understand the pattern and co-create a solution, rather than simply applying a penalty.",
     "Parental contact — the student's guardian is involved in the corrective process."],
   answerIndex:2,
   explanation:"Debriefing is one of the named corrective techniques for common rule violations. It differs from punishment in that it treats the behavior as a problem to be understood and solved rather than merely penalized. The teacher's debriefing here reveals an actionable cause (late starts, time miscalculation) and produces a concrete plan — exactly the goal of the technique. This approach is particularly effective when the violation is habitual and amenable to a behavioral change rather than a motivational fix."},

  {id:"p_3205_C", subject:"ptk", standard:"3.2.05", domain:"3", topic:"3.2", set:"C",
   prompt:"In a math class, several students consistently leave their calculators uncharged, which interrupts lab activities. The teacher introduces a consequence: any student whose calculator is dead during a lab owes five minutes of catch-up time after class. After two weeks, the problem is nearly eliminated. What corrective technique does this represent?",
   options:[
     "Restitution — the student is repairing the harm by completing missed work.",
     "Debriefing — the teacher has a reflective conversation with each student about why the calculator was uncharged.",
     "Proximity — the teacher stands near students to remind them to charge.",
     "Applying a penalty tied to the violation — a named corrective technique for common rule violations that makes the consequence concrete, predictable, and proportionate to the disruption caused."],
   answerIndex:3,
   explanation:"A time penalty tied to a specific, recurring violation is a penalty technique — one of the named tools in the corrective repertoire for common rule violations. Its effectiveness comes from predictability (students know in advance what the consequence is) and proportionality (five minutes is annoying but not punishing). The near-elimination of the problem after two weeks confirms the technique was calibrated correctly — it changed behavior without requiring escalation."},

  // ---- 3.2.06  Determines educational reasons for chronic student misbehavior ----
  // A: what educational reasons means | B: evaluate non-educational interpretation | C(math): diagnose math avoidance
  {id:"p_3206_A", subject:"ptk", standard:"3.2.06", domain:"3", topic:"3.2", set:"A",
   prompt:"A student chronically disrupts class by making jokes and distracting peers. Instead of escalating consequences, the teacher investigates: she reviews the student's work, talks with a counselor, and notices the disruptions peak right before assignments are due or during difficult new content. She concludes the behavior may be serving an avoidance function — the student would rather be funny than be seen as incompetent. What is the teacher doing?",
   options:["Psychoanalyzing the student, which is outside a teacher's professional scope.",
     "Writing an IEP for the student without the required professional team.",
     "Excusing the behavior because the student has a good reason for it.",
     "Diagnosing an educational reason for chronic misbehavior — understanding what function the behavior serves in the student's learning environment, rather than treating it as pure defiance."],
   answerIndex:3,
   explanation:"Educational reasons for chronic misbehavior refers to the function the behavior serves in relation to learning. Avoidance of academic difficulty or risk of exposure as incompetent is one of the most common educational functions of disruption. Identifying this explains why standard punishments don't work (they don't address the underlying academic anxiety) and points toward a different solution: addressing the academic gap that's driving the avoidance."},

  {id:"p_3206_B", subject:"ptk", standard:"3.2.06", domain:"3", topic:"3.2", set:"B",
   prompt:"A student is chronically late to class. The teacher's assumption is that the student is disrespectful. She adds detention for each late arrival, but the tardiness continues. A colleague suggests investigating whether there might be an educational reason. What might an educational reason for chronic tardiness look like?",
   options:[
     "An educational reason would only apply if the student is academically gifted.",
     "There are no educational reasons for tardiness — it is purely a motivational and character issue.",
     "An educational reason might include that the student is meeting with a support teacher, navigating a schedule conflict, or using the extra time to avoid an anxiety-provoking class opening activity — understanding this explains why adding detention doesn't solve it.",
     "Detention is always the appropriate response to tardiness regardless of cause."],
   answerIndex:2,
   explanation:"An educational reason is anything about the student's learning environment, needs, or situation that helps explain a persistent behavioral pattern. Chronic tardiness driven by schedule conflicts, support services, or anxiety about a specific class routine has an educational cause that detention won't address — because detention targets defiance, not the actual driver. Investigating the function of the behavior is the first step toward an effective response."},

  {id:"p_3206_C", subject:"ptk", standard:"3.2.06", domain:"3", topic:"3.2", set:"C",
   prompt:"A student in a pre-calculus class consistently acts out during warm-up problems — makes noise, bothers neighbors, asks to use the bathroom. The behavior is chronic and predictable: it happens specifically during warm-ups, not during direct instruction or group work. A math teacher investigates and finds the student cannot do the prerequisite algebra that the warm-ups assume. What educational reason does this reveal?",
   options:[
     "The student is bored because warm-ups are too easy.",
     "The behavior is triggered by the warm-up format, not by any academic factor.",
     "The chronic disruption during warm-up is avoidance behavior driven by a skill gap — the student acts out rather than publicly fail at a task they cannot yet do, an educational reason that points toward addressing the prerequisite gap rather than escalating behavioral consequences.",
     "The student dislikes the teacher personally, which is the primary driver of the behavior."],
   answerIndex:2,
   explanation:"Behavior that occurs consistently in one specific context (warm-ups) but not others (instruction, group work) is a strong signal that the behavior is function-specific. Here, the function is avoidance of a task the student cannot perform — a classic educational reason for chronic misbehavior. The appropriate response is to address the prerequisite gap, which removes the academic trigger, not to escalate consequences that leave the underlying cause intact."},

  // ---- 3.2.07  Designs plan to meet students' needs in positive ways once cause is known ----
  // A: plan responding to educational cause | B: positive-need-meeting vs. punishment | C(math): plan for academically driven disruption
  {id:"p_3207_A", subject:"ptk", standard:"3.2.07", domain:"3", topic:"3.2", set:"A",
   prompt:"A teacher determines that a chronically disruptive student seeks attention and status from peers. Rather than simply suppressing the disruptions, she redesigns how she uses the student: she assigns her as a small-group discussion facilitator and gives her structured leadership roles in class activities. Disruptions drop sharply. What principle does this intervention illustrate?",
   options:["Rewarding misbehavior reinforces it; the teacher made the problem worse even if disruptions temporarily decreased.",
     "Giving students leadership roles is a general classroom management strategy unrelated to behavioral needs.",
     "This approach only works for students with diagnosed behavioral disorders.",
     "Once the educational need driving a behavior is identified, designing legitimate ways for the student to meet that need in the learning environment often reduces the behavior more effectively than punishment — because it addresses the cause rather than suppressing the symptom."],
   answerIndex:3,
   explanation:"The student's need for peer attention and status was real — the disruption was just a maladaptive way of meeting it. By offering a legitimate outlet (facilitator role), the teacher eliminates the function the disruption was serving. This is qualitatively different from punishment: punishment suppresses the behavior without addressing the need, which is why chronic behavior tends to persist or shift forms under punishment alone. Meeting the need positively removes the behavioral motivation."},

  {id:"p_3207_B", subject:"ptk", standard:"3.2.07", domain:"3", topic:"3.2", set:"B",
   prompt:"A teacher discovers that a student who chronically refuses independent work feels overwhelmed by not knowing where to start on open-ended tasks. The student isn't defiant — she's paralyzed. The teacher's new plan: provide a brief structured starter (first two steps already laid out) for independent work tasks, and gradually fade the scaffold as confidence grows. What makes this plan a positive response to an identified educational need?",
   options:["It directly addresses the identified cause (paralysis from ambiguity) with a targeted instructional support (scaffolded entry), rather than treating the refusal as defiance requiring punishment.",
     "It reduces the workload for the student, which is always appropriate for struggling learners.",
     "It is a positive behavior support plan (PBSP) that must be written by a special education team.",
     "The plan is only appropriate if the student has an IEP requiring modified assignments."],
   answerIndex:0,
   explanation:"The plan is a positive response because it addresses the diagnosed cause (paralysis in the face of open-ended tasks) with an instructional solution (scaffolded starts) rather than a consequence for the symptom (refusal). The gradual fading is important — it preserves the goal of full independence while building the student's confidence and capacity. This is the core logic of this standard: match the intervention to the cause, not just to the behavioral surface."},

  {id:"p_3207_C", subject:"ptk", standard:"3.2.07", domain:"3", topic:"3.2", set:"C",
   prompt:"A math teacher identifies that a student's chronic off-task behavior during problem-solving is driven by foundational algebra gaps — the student disengages because the work is inaccessible. The teacher's plan: pull the student for a 10-minute pre-teaching session before each unit to close the prerequisite gap, and offer tiered entry problems that begin within the student's current reach. What makes this an appropriate response to the identified cause?",
   options:[
     "It modifies the curriculum in ways that require administrative approval before implementation.",
     "The plan addresses the educational root of the disengagement (inaccessibility due to skill gaps) by creating access to the content — which removes the cause of the behavior rather than penalizing the behavior itself.",
     "It is appropriate only if the student is classified as learning disabled.",
     "Pre-teaching and tiered problems lower expectations, which is inappropriate for secondary mathematics."],
   answerIndex:1,
   explanation:"The plan is appropriate because it precisely matches the identified cause: the student isn't off-task out of defiance but because the work is inaccessible. Pre-teaching closes the gap that makes the current lesson inaccessible; tiered problems create an entry point the student can reach. Both are positive, instructional responses that address the educational cause. Penalizing the off-task behavior while leaving the accessibility gap intact would predictably fail to change anything."},

  // ---- 3.2.08  Implements chronic-misbehavior corrections calmly, consistently, immediately, respectfully ----
  // A: four qualities of chronic-misbehavior response | B: evaluate a reactive response | C(math): calm correction in math class
  {id:"p_3208_A", subject:"ptk", standard:"3.2.08", domain:"3", topic:"3.2", set:"A",
   prompt:"A student with a chronic pattern of calling out without raising her hand does so again. The teacher calmly states, 'That's a call-out — please raise your hand,' and continues instruction immediately. The response is the same every time the behavior occurs and is delivered without sarcasm or visible frustration. What qualities of this response make it effective for chronic misbehavior?",
   options:["The response is effective because it publicly names the student, which creates social accountability.",
     "The teacher should vary the response each time to keep the student from predicting it.",
     "For chronic misbehavior, the only effective technique is removal from the classroom.",
     "Calm (no escalation), consistent (same response every time), immediate (addressed at the point of occurrence), and respectful (no sarcasm or shaming) — these four qualities are what make a corrective technique functional for chronic rather than episodic misbehavior."],
   answerIndex:3,
   explanation:"Chronic misbehavior requires a qualitatively different corrective approach than first-instance behavior. The four qualities are each important: calm prevents escalation and models self-regulation; consistent means the student cannot predict exceptions or engineer responses; immediate closes the gap between behavior and consequence; respectful maintains the student's dignity and the teacher-student relationship. Inconsistent or emotionally reactive responses feed chronic patterns rather than extinguishing them."},

  {id:"p_3208_B", subject:"ptk", standard:"3.2.08", domain:"3", topic:"3.2", set:"B",
   prompt:"A teacher's response to a student's chronic disruptions varies by her mood: sometimes she ignores it, sometimes she gives a warning, sometimes she sends the student out — all for the same behavior. When she does correct the behavior, she often does so with visible frustration and sarcasm ('Oh great, here we go again'). The behavior is not improving. What does this pattern predict about the outcome?",
   options:[
     "Variable responses keep the student guessing, which should reduce the behavior over time.",
     "Sarcasm signals to the student that the teacher cares about the behavior, which is motivating.",
     "Inconsistent, emotionally reactive, and sometimes delayed responses are exactly the conditions under which chronic behaviors persist — the student learns that consequences are unpredictable and that emotional reactions from the teacher are a reliable secondary outcome.",
     "The teacher should simply increase the severity of consequences until the behavior stops."],
   answerIndex:2,
   explanation:"Behavioral research consistently shows that intermittent reinforcement — the unpredictability of whether a consequence will occur — is actually the strongest sustainer of persistent behavior. When the student doesn't know if today's disruption will be ignored or punished, they continue testing. The sarcasm adds a secondary reward (visible emotional reaction from the teacher) that can itself reinforce the behavior. Calm, consistent, immediate, and respectful correction removes both sustaining conditions."},

  {id:"p_3208_C", subject:"ptk", standard:"3.2.08", domain:"3", topic:"3.2", set:"C",
   prompt:"A student in a math class has a long-standing pattern of announcing that a problem is 'stupid' or 'pointless' whenever he doesn't immediately understand it. Each time, the teacher responds the same way: she pauses, says quietly, 'That's the frustration talking — let's find the entry point,' and redirects to a question he can answer. She never raises her voice or shows exasperation. After several weeks, the outbursts become less frequent. What explains the improvement?",
   options:[
     "The student began to enjoy math, which eliminated the frustration.",
     "The teacher's response is too gentle for chronic behavior; stricter consequences would have worked faster.",
     "Naming the frustration is a therapeutic technique outside a teacher's scope.",
     "The teacher's calm, consistent, immediate, and respectful response removed the escalation that was reinforcing the outburst pattern, while offering an academically supportive alternative that addressed the underlying frustration."],
   answerIndex:3,
   explanation:"The pattern improved because the teacher's response consistently denied the behavior its secondary payoffs (escalation, attention, avoidance) while simultaneously offering a productive alternative (a reachable entry point). Calm prevents escalation from becoming a reward. Consistent means the student can predict the response and learns it won't change. Respectful keeps the relationship intact. The combination extinguishes the behavioral pattern gradually — which is realistic for chronic behavior, not a sign the approach is too gentle."},

  // =====================================================================
  // PTK · Domain 3 · Topic 3.3 — Routinely Provides Feedback and Reinforcement
  // Standards 3.3.01–3.3.09 (9 standards × 3 sets = 27 questions)
  // A/B subject-neutral; C secondary-math context
  // =====================================================================

  // ---- 3.3.01  Indicates approval for correct responses ----
  // A: why approval signaling matters | B: contrast with non-response | C(math): approval during math recitation
  {id:"p_3301_A", subject:"ptk", standard:"3.3.01", domain:"3", topic:"3.3", set:"A",
   prompt:"During whole-class questioning, a teacher follows each correct student response with a brief, clear confirmation: 'Yes, exactly right' or 'That's correct.' A visiting administrator asks why she doesn't just move on to the next question. What is the teacher's strongest rationale?",
   options:["Confirming correct answers wastes time that could be used for additional questions.",
     "Approval signals are required by district policy during formal observation periods.",
     "Students can tell from context whether their answer was correct; explicit confirmation is redundant.",
     "Signaling approval for correct responses closes the feedback loop — it tells students their answer is confirmed, not just that the teacher heard it, which is essential for learning and prevents students from second-guessing correct thinking."],
   answerIndex:3,
   explanation:"Approval indication serves a distinct instructional function: it confirms not just that the teacher heard the answer, but that it was correct. Students — especially uncertain ones — benefit enormously from explicit confirmation rather than having to infer correctness from context. Without it, even correct answers can leave students doubting their understanding. The confirmation also reinforces the thinking process that produced the correct answer, increasing the likelihood of replication."},

  {id:"p_3301_B", subject:"ptk", standard:"3.3.01", domain:"3", topic:"3.3", set:"B",
   prompt:"A teacher regularly responds to correct student answers by immediately posing the next question without any acknowledgment. Several students stop volunteering because they aren't sure if their previous answers were right or wrong. What does this pattern illustrate?",
   options:[
     "Immediate follow-up questioning is always the best use of correct-response time.",
     "Students who stop volunteering lack confidence and need motivational support, not different teaching practices.",
     "The absence of approval indication for correct responses leaves students unable to confirm their understanding, which erodes participation — students disengage when they receive no signal that their thinking is on track.",
     "The teacher is following a Socratic method, which deliberately withholds approval to promote deeper inquiry."],
   answerIndex:2,
   explanation:"Approval indication is not praise — it is informational feedback. When it's absent, students who answered correctly but are uncertain can't distinguish 'the teacher moved on because I was right' from 'the teacher moved on despite my wrong answer.' The rational response to that ambiguity is to stop volunteering. The pattern described — declining participation following un-confirmed responses — is a predictable consequence of removing this piece of the feedback loop."},

  {id:"p_3301_C", subject:"ptk", standard:"3.3.01", domain:"3", topic:"3.3", set:"C",
   prompt:"During a math lesson on solving absolute value equations, a student offers the correct solution. The teacher responds, 'That's right — you correctly set up both cases and solved each one.' She then poses the next problem. Why is this feedback sequence better than immediately posing the next problem without acknowledgment?",
   options:[
     "It slows down the lesson, giving other students more time to copy the correct work.",
     "It is better because it takes more time, and longer responses always signal more engagement.",
     "The explicit approval confirms that the student's method was correct — not just the final answer — reinforcing the two-case setup strategy so the student knows to use it again, rather than leaving them uncertain about whether their approach worked.",
     "It is equivalent; experienced math students don't need approval confirmation."],
   answerIndex:2,
   explanation:"In math instruction, indicating approval is especially important because correct answers can sometimes result from incorrect methods. By confirming 'you set up both cases and solved each one,' the teacher confirms the process, not just the number — which is what needs to be reinforced. Skipping to the next problem leaves the student without confirmation that their strategy was sound, which is precisely the uncertainty that approval indication resolves."},

  // ---- 3.3.02  Follows correct answers with new questions to maintain momentum ----
  // A: purpose of follow-on questioning | B: brief confirmation vs. extended praise | C(math): extend correct math answer
  {id:"p_3302_A", subject:"ptk", standard:"3.3.02", domain:"3", topic:"3.3", set:"A",
   prompt:"After a student correctly answers a factual question, the teacher confirms the answer and immediately poses a follow-up: 'Right — and given that, what would happen if we changed one of the conditions?' Other students lean forward. What is the instructional purpose of this sequence?",
   options:[
     "The follow-on question penalizes the student for answering correctly by giving them more work.",
     "Correct answers naturally end a line of inquiry; follow-on questions artificially extend it.",
     "Following correct answers with new questions maintains instructional momentum — it transforms a confirmation into a platform for extended thinking and keeps the whole class engaged in the reasoning chain rather than treating each answer as a stopping point.",
     "The follow-on question signals to the student that their answer wasn't complete."],
   answerIndex:2,
   explanation:"This standard addresses the common pattern where correct answers end discussion rather than launch it. Following a correct answer with a new question does two things: it signals that correct answers are entry points to deeper thinking (not exit points from discussion), and it maintains the class's cognitive momentum. The sequence — confirm, extend — is a high-yield instructional habit that keeps the intellectual temperature of the room elevated rather than cooling after each exchange."},

  {id:"p_3302_B", subject:"ptk", standard:"3.3.02", domain:"3", topic:"3.3", set:"B",
   prompt:"A teacher celebrates correct answers with extended verbal praise ('Fantastic! That's wonderful! What a great answer!') before eventually moving to the next question. Another teacher confirms correct answers briefly and immediately poses a related follow-on question. Which approach better maintains lesson momentum and why?",
   options:[
     "The first teacher, because extended praise is more motivating for students.",
     "Both are equally effective; the choice is a matter of personal teaching style.",
     "The second teacher, because brief confirmation followed by a substantive follow-on question keeps the intellectual flow moving — extended praise creates a social pause that interrupts momentum even while affirming the student.",
     "The first teacher, because students need emotional reinforcement before they can engage with deeper questions."],
   answerIndex:2,
   explanation:"Momentum is about cognitive flow — keeping students' thinking actively engaged with the subject. Extended praise, however warm, creates a social pause that breaks that flow: everyone waits while the teacher effuses, and the thread of the lesson must be re-established afterward. Brief confirmation plus immediate follow-on question is more efficient for momentum precisely because it closes the approval loop and immediately reopens the intellectual inquiry without a break in tempo."},

  {id:"p_3302_C", subject:"ptk", standard:"3.3.02", domain:"3", topic:"3.3", set:"C",
   prompt:"A student in a statistics class correctly identifies that a distribution is skewed right because the mean is greater than the median. The teacher says, 'Correct — now, if we removed the two largest outliers, what would you predict would happen to the relationship between mean and median?' Three other students immediately reach for their pencils. What is the teacher accomplishing with this sequence?",
   options:["The follow-on question signals that the student's original answer was only partially correct.",
     "The teacher is testing whether the student can answer a second question in a row, which measures depth of knowledge.",
     "This technique is only useful in statistics; other math topics don't benefit from follow-on questioning.",
     "The follow-on question maintains lesson momentum by using the correct answer as a platform for a new line of mathematical reasoning — keeping the class in active thinking mode rather than treating the correct answer as a discussion endpoint."],
   answerIndex:3,
   explanation:"The student's correct answer about skewness becomes the platform for a richer question: what happens to the mean-median relationship under a specific change? This question requires the student (and the class, since others reach for pencils) to apply the concept dynamically rather than just identify a static feature. The momentum is maintained because the transition from confirmation to new question is seamless — the correct answer is not an endpoint but a launch point."},

  // ---- 3.3.03  When correct but uncertain, asks clarifying questions to ensure understanding ----
  // A: distinguish confident vs. uncertain correct answers | B: why clarify if already correct | C(math): uncertain correct math reasoning
  {id:"p_3303_A", subject:"ptk", standard:"3.3.03", domain:"3", topic:"3.3", set:"A",
   prompt:"A student answers a question correctly but her voice is hesitant and she looks to the teacher for reassurance before finishing her sentence. The teacher confirms the answer is right and then asks: 'Can you tell me how you got there?' The student's explanation reveals she arrived at the right answer through flawed reasoning that happened to produce a correct result. What does this scenario illustrate about the teacher's practice?",
   options:[
     "The teacher wasted time — if the answer is correct, the reasoning doesn't matter.",
     "The teacher should have simply praised the student and moved on to avoid embarrassing her.",
     "Asking clarifying questions when a student is correct but uncertain surfaces whether the correct answer reflects genuine understanding or a lucky guess — crucial information because students who reach correct answers via shaky reasoning are vulnerable to errors when conditions change slightly.",
     "Hesitancy always indicates a student is using a different but equally valid reasoning approach."],
   answerIndex:2,
   explanation:"Correct-but-uncertain answers are a diagnostic signal that the correctness may be fragile. A student who got the right answer through shaky reasoning — or by guessing — is not in the same learning position as one who arrived there through solid understanding. Asking 'how did you get there?' is the fastest way to distinguish between these cases. When faulty reasoning is revealed, the teacher can address the conceptual gap before it causes problems on more complex problems."},

  {id:"p_3303_B", subject:"ptk", standard:"3.3.03", domain:"3", topic:"3.3", set:"B",
   prompt:"Two teachers both receive a tentative, uncertain-sounding correct answer from a student. Teacher A says 'Yes, that's right' and moves on. Teacher B says 'Yes, correct — walk me through why.' Which approach better ensures the student's understanding is solid?",
   options:[
     "Teacher A, because confirming the correct answer is all that is required at this stage.",
     "Teacher B, because asking the student to explain their reasoning distinguishes between an answer that reflects understanding and one that reflects uncertainty or guessing — and addresses any gap before it compounds.",
     "Both are equivalent; the answer is either correct or it isn't, and reasoning is irrelevant.",
     "Teacher A, because asking a student who was uncertain to explain further will embarrass them."],
   answerIndex:1,
   explanation:"The standard specifically targets the case of correct-but-uncertain answers because these are the ones most likely to conceal fragile understanding. Teacher B's request to explain why transforms a surface-level correct answer into a window on the student's reasoning. If the reasoning is sound, the exchange reinforces it; if it's shaky, the teacher can address the gap immediately. Teacher A's approach treats correctness as binary when it is actually a spectrum from solid to lucky."},

  {id:"p_3303_C", subject:"ptk", standard:"3.3.03", domain:"3", topic:"3.3", set:"C",
