// 4.1.01
{id:"m_41001_A", subject:"math", standard:"4.1.01", domain:"4", topic:"4.1", set:"A",
 prompt:"In a right triangle, the leg adjacent to a $35°$ angle has length $8$ and the hypotenuse has length $h$. Which expression gives $h$?",
 options:["$h = \\dfrac{8}{\\cos 35°}$","$h = 8\\cos 35°$","$h = \\dfrac{8}{\\sin 35°}$","$h = 8\\tan 35°$"],
 answerIndex:0,
 explanation:"The cosine of an angle equals adjacent/hypotenuse, so $\\cos 35° = 8/h$, giving $h = 8/\\cos 35°$."},

{id:"m_41001_B", subject:"math", standard:"4.1.01", domain:"4", topic:"4.1", set:"B",
 prompt:"A right triangle has legs of length $1$ and $\\sqrt{3}$. Without a calculator, what are the two acute angles?",
 options:["$45°$ and $45°$","$30°$ and $60°$","$36°$ and $54°$","$20°$ and $70°$"],
 answerIndex:1,
 explanation:"The sides $1, \\sqrt{3}, 2$ match the $30°$-$60°$-$90°$ pattern. The angle opposite the shorter leg ($1$) is $30°$; the angle opposite $\\sqrt{3}$ is $60°$."},

{id:"m_41001_C", subject:"math", standard:"4.1.01", domain:"4", topic:"4.1", set:"C",
 prompt:"A student claims that in a $45°$-$45°$-$90°$ triangle with legs of length $s$, the hypotenuse equals $s\\sqrt{3}$. What is the error, and what is the correct hypotenuse?",
 options:["No error; $s\\sqrt{3}$ is correct","The hypotenuse equals $2s$; $\\sqrt{3}$ belongs to the 30-60-90 triangle","The hypotenuse equals $s\\sqrt{2}$; $\\sqrt{3}$ belongs to the 30-60-90 triangle","The hypotenuse equals $s/\\sqrt{2}$; the student inverted the ratio"],
 answerIndex:2,
 explanation:"By the Pythagorean theorem, $s^2+s^2=h^2$, so $h=s\\sqrt{2}$. The factor $\\sqrt{3}$ belongs to the $30°$-$60°$-$90°$ triangle (the side opposite $60°$ is $\\sqrt{3}$ times the shorter leg)."},

// 4.1.02
{id:"m_41002_A", subject:"math", standard:"4.1.02", domain:"4", topic:"4.1", set:"A",
 prompt:"Convert $\\dfrac{5\\pi}{6}$ radians to degrees.",
 options:["$120°$", "$135°$", "$150°$", "$100°$"],
 answerIndex:2,
 explanation:"Multiply by $\\frac{180°}{\\pi}$: $\\frac{5\\pi}{6}\\cdot\\frac{180}{\\pi}=\\frac{5\\cdot 180}{6}=150°$."},

{id:"m_41002_B", subject:"math", standard:"4.1.02", domain:"4", topic:"4.1", set:"B",
 prompt:"An angle measures $240°$. What is its radian measure?",
 options:["$\\dfrac{3\\pi}{4}$", "$\\dfrac{2\\pi}{3}$", "$\\dfrac{5\\pi}{3}$", "$\\dfrac{4\\pi}{3}$"],
 answerIndex:3,
 explanation:"Multiply by $\\frac{\\pi}{180}$: $240\\cdot\\frac{\\pi}{180}=\\frac{240\\pi}{180}=\\frac{4\\pi}{3}$."},

{id:"m_41002_C", subject:"math", standard:"4.1.02", domain:"4", topic:"4.1", set:"C",
 prompt:"A student says $\\pi$ radians equals $360°$ because one full rotation is $\\pi$. How would you correct this?",
 options:["The student is right; $\\pi$ rad $= 360°$","One full rotation is $2\\pi$ radians, so $\\pi$ rad $= 180°$, not $360°$","One full rotation is $\\pi/2$ radians, so the student overcounted by a factor of 2","The student confused degrees and gradians; $\\pi$ rad $\\approx 180$ gradians"],
 answerIndex:1,
 explanation:"A full rotation equals $2\\pi$ radians $= 360°$, so $\\pi$ rad $= 180°$. The student halved the full circle but kept $360°$."},

// 4.1.03
{id:"m_41003_A", subject:"math", standard:"4.1.03", domain:"4", topic:"4.1", set:"A",
 prompt:"In triangle $ABC$, side $a = 7$, side $b = 9$, and included angle $C = 60°$. Which expression gives side $c$?",
 options:["$c = \\sqrt{7^2+9^2}$","$c = \\sqrt{49+81-63}$","$c = \\sqrt{49+81-2(7)(9)\\cos 60°}$","$c = \\dfrac{7}{\\sin 60°}$"],
 answerIndex:2,
 explanation:"The law of cosines: $c^2 = a^2+b^2-2ab\\cos C$. With the given values, $c=\\sqrt{130-63}=\\sqrt{67}\\approx 8.19$."},

{id:"m_41003_B", subject:"math", standard:"4.1.03", domain:"4", topic:"4.1", set:"B",
 prompt:"In triangle $ABC$, $a = 5$, angle $A = 30°$, and angle $B = 45°$. Using the law of sines, what is side $b$?",
 options:["$5\\sqrt{2}$","$\\dfrac{5}{\\sqrt{2}}$","$5\\sqrt{3}$","$\\dfrac{5\\sqrt{3}}{2}$"],
 answerIndex:0,
 explanation:"$\\frac{b}{\\sin B}=\\frac{a}{\\sin A}$ gives $b=\\frac{5\\sin 45°}{\\sin 30°}=\\frac{5(\\sqrt{2}/2)}{1/2}=5\\sqrt{2}$."},

{id:"m_41003_C", subject:"math", standard:"4.1.03", domain:"4", topic:"4.1", set:"C",
 prompt:"A student knows two sides and the included angle of a triangle and wants to find the third side. Which law applies, and why is the other law not immediately usable?",
 options:["Law of sines; the law of cosines requires three sides","Law of cosines; the law of sines needs an angle paired with its opposite side, unavailable here","Either law works equally well with two sides and an included angle","Law of cosines only applies to right triangles; use sines for oblique triangles"],
 answerIndex:1,
 explanation:"The law of cosines $c^2=a^2+b^2-2ab\\cos C$ uses two sides and their included angle directly. The law of sines $a/\\sin A=b/\\sin B$ requires a side paired with its opposite angle, which is not available until after solving."},

// 4.1.04
{id:"m_41004_A", subject:"math", standard:"4.1.04", domain:"4", topic:"4.1", set:"A",
 prompt:"A point $P$ on the unit circle corresponds to angle $\\theta$. Which statement correctly defines $\\sin\\theta$ and $\\cos\\theta$?",
 options:["$\\sin\\theta$ is the $x$-coordinate; $\\cos\\theta$ is the $y$-coordinate", "Both equal the distance from $P$ to the origin", "$\\sin\\theta$ is the $y$-coordinate; $\\cos\\theta$ is the $x$-coordinate", "$\\sin\\theta = y/x$ and $\\cos\\theta = x/y$ for $x,y\\neq 0$"],
 answerIndex:2,
 explanation:"On the unit circle, the point at angle $\\theta$ is $(\\cos\\theta,\\sin\\theta)$: $x$-coordinate is cosine, $y$-coordinate is sine."},

{id:"m_41004_B", subject:"math", standard:"4.1.04", domain:"4", topic:"4.1", set:"B",
 prompt:"Using the unit-circle definition, what are $\\cos\\left(\\dfrac{2\\pi}{3}\\right)$ and $\\sin\\left(\\dfrac{2\\pi}{3}\\right)$?",
 options:["$\\cos=\\dfrac{\\sqrt{3}}{2},\\; \\sin=\\dfrac{1}{2}$","$\\cos=-\\dfrac{1}{2},\\; \\sin=\\dfrac{\\sqrt{3}}{2}$","$\\cos=\\dfrac{1}{2},\\; \\sin=\\dfrac{\\sqrt{3}}{2}$","$\\cos=-\\dfrac{\\sqrt{3}}{2},\\; \\sin=\\dfrac{1}{2}$"],
 answerIndex:1,
 explanation:"$\\frac{2\\pi}{3}=120°$ is in Quadrant II. Reference angle $60°$: $\\cos 120°=-\\cos 60°=-\\frac{1}{2}$ and $\\sin 120°=\\sin 60°=\\frac{\\sqrt{3}}{2}$."},

{id:"m_41004_C", subject:"math", standard:"4.1.04", domain:"4", topic:"4.1", set:"C",
 prompt:"A student evaluates $\\sin(270°)$ using a right-triangle diagram and gets undefined. Why is the right-triangle definition insufficient here, and what does the unit circle give?",
 options:["Right-triangle definitions do work at $270°$; the answer is $0$", "The student is correct; $\\sin(270°)$ is undefined", "Right-triangle sine is always positive, so the answer is $+1$ by convention", "Right triangles require acute angles; the unit-circle point at $270°$ is $(0,-1)$, so $\\sin(270°)=-1$"],
 answerIndex:3,
 explanation:"Right-triangle trig is restricted to $0°$-$90°$. The unit circle extends the definitions: the point at $270°$ is $(0,-1)$, giving $\\cos(270°)=0$ and $\\sin(270°)=-1$."},

// 4.1.05
{id:"m_41005_A", subject:"math", standard:"4.1.05", domain:"4", topic:"4.1", set:"A",
 prompt:"On the unit circle, the point at angle $\\theta$ is $(\\cos\\theta, \\sin\\theta)$. Which single step most directly produces the identity $\\cos^2\\theta + \\sin^2\\theta = 1$?",
 options:["Apply the distance formula between the point and the origin, then square", "Substitute specific angle values and verify both sides are equal", "Apply the Pythagorean theorem to the right triangle with hypotenuse 1 formed by the point", "Divide both sides of $\\sin^2\\theta + \\cos^2\\theta = \\tan^2\\theta + 1$ by $\\sec^2\\theta$"],
 answerIndex:2,
 explanation:"In the right triangle inside the unit circle, the legs are $\\cos\\theta$ and $\\sin\\theta$, and the hypotenuse is $1$. The Pythagorean theorem gives $\\cos^2\\theta+\\sin^2\\theta=1$ immediately."},

{id:"m_41005_B", subject:"math", standard:"4.1.05", domain:"4", topic:"4.1", set:"B",
 prompt:"Given $\\sin\\theta = \\dfrac{3}{5}$ with $\\theta$ in the second quadrant, find $\\cos\\theta$.",
 options:["$\\dfrac{4}{5}$","$-\\dfrac{4}{5}$","$\\dfrac{3}{4}$","$-\\dfrac{3}{4}$"],
 answerIndex:1,
 explanation:"$\\cos^2\\theta=1-\\frac{9}{25}=\\frac{16}{25}$, so $|\\cos\\theta|=\\frac{4}{5}$. Cosine is negative in QII, so $\\cos\\theta=-\\frac{4}{5}$."},

{id:"m_41005_C", subject:"math", standard:"4.1.05", domain:"4", topic:"4.1", set:"C",
 prompt:"A student wants to derive $1+\\tan^2\\theta = \\sec^2\\theta$ starting from $\\cos^2\\theta+\\sin^2\\theta=1$. What is the correct next step?",
 options:["Substitute $\\tan\\theta$ for $\\sin\\theta/\\cos\\theta$ without further algebra", "Square both sides to get $\\cos^4\\theta+\\sin^4\\theta=1$", "Multiply every term by $\\tan^2\\theta$ and simplify", "Divide every term by $\\cos^2\\theta$, then rewrite using $\\tan\\theta=\\sin\\theta/\\cos\\theta$ and $\\sec\\theta=1/\\cos\\theta$"],
 answerIndex:3,
 explanation:"Dividing $\\cos^2\\theta+\\sin^2\\theta=1$ by $\\cos^2\\theta$ gives $1+\\tan^2\\theta=\\sec^2\\theta$."},

// 4.1.06
{id:"m_41006_A", subject:"math", standard:"4.1.06", domain:"4", topic:"4.1", set:"A",
 prompt:"Simplify $\\dfrac{1-\\cos^2\\theta}{\\sin\\theta}$ to a single trig function.",
 options:["$\\cos\\theta$","$\\sin\\theta$","$\\tan\\theta$","$\\csc\\theta$"],
 answerIndex:1,
 explanation:"$1-\\cos^2\\theta=\\sin^2\\theta$, so $\\frac{\\sin^2\\theta}{\\sin\\theta}=\\sin\\theta$."},

{id:"m_41006_B", subject:"math", standard:"4.1.06", domain:"4", topic:"4.1", set:"B",
 prompt:"Verify $\\sin\\theta\\cdot\\csc\\theta - \\cos^2\\theta = \\sin^2\\theta$. Which substitution correctly starts the proof on the left side?",
 options:["Replace $\\csc\\theta$ with $\\cos\\theta/\\sin\\theta$", "Replace $\\sin\\theta$ with $\\sqrt{1-\\cos^2\\theta}$", "Replace $\\cos^2\\theta$ with $\\tan^2\\theta\\cdot\\sin^2\\theta$", "Replace $\\csc\\theta$ with $1/\\sin\\theta$, so the first term simplifies to $1$, giving $1-\\cos^2\\theta$"],
 answerIndex:3,
 explanation:"$\\csc\\theta=1/\\sin\\theta$, so $\\sin\\theta\\cdot\\csc\\theta=1$. The left side becomes $1-\\cos^2\\theta=\\sin^2\\theta$."},

{id:"m_41006_C", subject:"math", standard:"4.1.06", domain:"4", topic:"4.1", set:"C",
 prompt:"A student tries to prove $\\tan^2\\theta+1=\\sec^2\\theta$ by plugging in $\\theta=45°$ and finding both sides equal $2$. Why is this not a valid proof?",
 options:["The student used the wrong angle; $\\theta=30°$ is the standard test case for identities","Verifying at one value shows agreement only at that point; a proof must use algebra valid for all $\\theta$ in the domain","The student should check both sides separately before setting them equal","The calculation is wrong; both sides at $\\theta=45°$ are not $2$"],
 answerIndex:1,
 explanation:"Verifying an identity at a single value is not a proof. A proof requires algebraic manipulation — such as dividing $\\cos^2\\theta+\\sin^2\\theta=1$ by $\\cos^2\\theta$ — valid for all $\\theta$ in the domain."},

// 4.1.07
{id:"m_41007_A", subject:"math", standard:"4.1.07", domain:"4", topic:"4.1", set:"A",
 prompt:"What are the amplitude and period of $f(t) = 3\\sin(2t + \\pi/4)$?",
 options:["Amplitude $3$, Period $\\pi$","Amplitude $3$, Period $2\\pi$","Amplitude $6$, Period $\\pi$","Amplitude $3$, Period $4\\pi$"],
 answerIndex:0,
 explanation:"Amplitude $=|A|=3$. Period $=2\\pi/|B|=2\\pi/2=\\pi$."},

{id:"m_41007_B", subject:"math", standard:"4.1.07", domain:"4", topic:"4.1", set:"B",
 prompt:"Express $f(t) = \\cos t + \\sqrt{3}\\sin t$ in the form $R\\sin(t + \\phi)$.",
 options:["$2\\sin\\left(t+\\dfrac{\\pi}{6}\\right)$","$2\\sin\\left(t+\\dfrac{\\pi}{3}\\right)$","$\\sqrt{2}\\sin\\left(t+\\dfrac{\\pi}{4}\\right)$","$2\\cos\\left(t+\\dfrac{\\pi}{3}\\right)$"],
 answerIndex:0,
 explanation:"$R=\\sqrt{a^2+b^2}=\\sqrt{1+3}=2$. With $a\\cos t+b\\sin t=R\\sin(t+\\phi)$, $\\tan\\phi=a/b=1/\\sqrt{3}$ gives $\\phi=\\pi/6$. Result: $2\\sin(t+\\pi/6)$."},

{id:"m_41007_C", subject:"math", standard:"4.1.07", domain:"4", topic:"4.1", set:"C",
 prompt:"A student graphs $y=\\sin(2x)$ and claims its period is $2\\pi$ because multiplying inside the argument by $2$ doubles the period. What is the actual effect, and what is the correct period?",
 options:["The student is right; multiplying the argument by $2$ doubles the period to $2\\pi$", "Multiplying inside by $2$ stretches the graph vertically, leaving the period unchanged at $2\\pi$", "Multiplying inside by $2$ compresses the graph horizontally, halving the period to $\\pi$", "The period becomes $4\\pi$; the factor of $2$ inside multiplies the standard period"],
 answerIndex:2,
 explanation:"Period $=2\\pi/B$. With $B=2$, period $=\\pi$. A larger $B$ compresses the horizontal scale (more cycles per unit), shortening — not lengthening — the period."},

// 4.1.08
{id:"m_41008_A", subject:"math", standard:"4.1.08", domain:"4", topic:"4.1", set:"A",
 prompt:"Which of the following correctly defines $\\csc\\theta$?",
 options:["$\\csc\\theta = \\dfrac{\\cos\\theta}{\\sin\\theta}$","$\\csc\\theta = \\dfrac{1}{\\sin\\theta}$","$\\csc\\theta = \\dfrac{\\sin\\theta}{\\cos\\theta}$","$\\csc\\theta = \\dfrac{1}{\\cos\\theta}$"],
 answerIndex:1,
 explanation:"$\\csc\\theta = 1/\\sin\\theta$ (reciprocal of sine). $1/\\cos\\theta$ is secant; $\\cos/\\sin$ is cotangent."},

{id:"m_41008_B", subject:"math", standard:"4.1.08", domain:"4", topic:"4.1", set:"B",
 prompt:"The function $y = \\arcsin(x)$ requires a restricted domain to be a proper inverse function. What is that domain and its corresponding range?",
 options:["Domain $[-1,1]$, Range $[-\\pi/2,\\pi/2]$","Domain $[-\\pi/2,\\pi/2]$, Range $[-1,1]$","Domain $[0,\\pi]$, Range $[-1,1]$","Domain $[-1,1]$, Range $[0,\\pi]$"],
 answerIndex:0,
 explanation:"$\\arcsin$ is defined on $[-1,1]$ (the range of sine) and outputs angles in $[-\\pi/2,\\pi/2]$ — the interval on which sine is one-to-one."},

{id:"m_41008_C", subject:"math", standard:"4.1.08", domain:"4", topic:"4.1", set:"C",
 prompt:"A student draws $y=\\tan x$ and sees vertical asymptotes. Which feature of cosine explains why those asymptotes fall at $x = \\pi/2 + n\\pi$?",
 options:["Cosine equals $1$ at those points, causing division by a maximum value", "Sine equals $0$ at those points, so the tangent ratio is $0$ at the asymptotes", "Cosine equals $0$ at those points, making $\\sin x/\\cos x$ undefined", "The period of tangent is $2\\pi$, placing asymptotes every $\\pi$ starting from $\\pi/2$"],
 answerIndex:2,
 explanation:"$\\tan x = \\sin x / \\cos x$ is undefined wherever $\\cos x = 0$, which occurs at $x = \\pi/2+n\\pi$. Those are exactly the vertical asymptotes."},

// 4.1.09
{id:"m_41009_A", subject:"math", standard:"4.1.09", domain:"4", topic:"4.1", set:"A",
 prompt:"A line makes a $60°$ angle with the positive $x$-axis. What is its slope?",
 options:["$\\dfrac{1}{2}$","$\\dfrac{\\sqrt{2}}{2}$","$\\sqrt{3}$","$2$"],
 answerIndex:2,
 explanation:"Slope $= \\tan(60°) = \\sqrt{3}$."},

{id:"m_41009_B", subject:"math", standard:"4.1.09", domain:"4", topic:"4.1", set:"B",
 prompt:"A line has slope $m = -1$. What angle does it make with the positive $x$-axis, measured counterclockwise between $0°$ and $180°$?",
 options:["$45°$","$135°$","$-45°$","$225°$"],
 answerIndex:1,
 explanation:"$\\tan\\theta = -1$ with $\\theta\\in(0°,180°)$ gives $\\theta=135°$, since $\\tan(135°)=-1$."},

{id:"m_41009_C", subject:"math", standard:"4.1.09", domain:"4", topic:"4.1", set:"C",
 prompt:"Lines with inclination angles $\\alpha$ and $\\beta$ have slopes $m_1=\\tan\\alpha$ and $m_2=\\tan\\beta$. A student asks why the angle $\\phi$ between them satisfies $\\tan\\phi = \\dfrac{m_1-m_2}{1+m_1 m_2}$. What is the key connection?",
 options:["Subtracting slopes gives a direct angle measurement in degrees", "Parallel lines have equal slopes, making the numerator $0$ — but that is a special case unrelated to the general formula", "The two slopes are always reciprocals, making the formula simplify to $1$", "Each slope equals the tangent of its inclination angle, so the difference of inclinations gives the angle between the lines, and the tangent difference formula applies"],
 answerIndex:3,
 explanation:"Since slope $= \\tan$(inclination), the angle between lines equals $\\alpha-\\beta$. Applying the tangent difference formula gives $\\tan(\\alpha-\\beta)=\\frac{\\tan\\alpha-\\tan\\beta}{1+\\tan\\alpha\\tan\\beta}=\\frac{m_1-m_2}{1+m_1 m_2}$."},

// 4.1.10
{id:"m_41010_A", subject:"math", standard:"4.1.10", domain:"4", topic:"4.1", set:"A",
 prompt:"Evaluate $\\cos\\left(\\dfrac{5\\pi}{6}\\right)$ without a calculator.",
 options:["$\\dfrac{\\sqrt{3}}{2}$", "$\\dfrac{1}{2}$", "$-\\dfrac{\\sqrt{3}}{2}$", "$-\\dfrac{1}{2}$"],
 answerIndex:2,
 explanation:"$\\frac{5\\pi}{6}=150°$ is in QII, reference angle $30°$. $\\cos 30°=\\frac{\\sqrt{3}}{2}$; cosine is negative in QII, so $\\cos 150°=-\\frac{\\sqrt{3}}{2}$."},

{id:"m_41010_B", subject:"math", standard:"4.1.10", domain:"4", topic:"4.1", set:"B",
 prompt:"Evaluate $\\arctan(1)$ and $\\arctan(-\\sqrt{3})$ exactly.",
 options:["$\\pi/4$ and $-\\pi/3$","$\\pi/4$ and $2\\pi/3$","$\\pi/3$ and $-\\pi/4$","$\\pi/6$ and $-\\pi/3$"],
 answerIndex:0,
 explanation:"$\\tan(\\pi/4)=1$ so $\\arctan(1)=\\pi/4$. Since $\\tan(\\pi/3)=\\sqrt{3}$ and $\\arctan$ outputs in $(-\\pi/2,\\pi/2)$, $\\arctan(-\\sqrt{3})=-\\pi/3$."},

{id:"m_41010_C", subject:"math", standard:"4.1.10", domain:"4", topic:"4.1", set:"C",
 prompt:"A student enters $\\arcsin\\left(\\sin\\left(\\frac{5\\pi}{4}\\right)\\right)$ on a calculator and gets $-\\pi/4$. The student is surprised because $\\frac{5\\pi}{4}\\neq -\\frac{\\pi}{4}$. Why is $-\\pi/4$ the correct output?",
 options:["The calculator has a bug; the answer should be $5\\pi/4$","$\\arcsin$ outputs values only in $[-\\pi/2,\\pi/2]$; since $\\sin(5\\pi/4)=-\\sqrt{2}/2=\\sin(-\\pi/4)$, the function returns $-\\pi/4$","$\\arcsin$ always returns the supplementary angle, so $\\pi - 5\\pi/4 = -\\pi/4$","The student should get $3\\pi/4$; inverse sine returns QII values for negative inputs"],
 answerIndex:1,
 explanation:"$\\arcsin$ is the inverse on the restricted range $[-\\pi/2,\\pi/2]$. $\\sin(5\\pi/4)=-\\sqrt{2}/2$, and the unique angle in that range with that sine is $-\\pi/4$."},

// 4.1.11
{id:"m_41011_A", subject:"math", standard:"4.1.11", domain:"4", topic:"4.1", set:"A",
 prompt:"Use the sine addition formula to evaluate $\\sin(75°)$ exactly.",
 options:["$\\dfrac{\\sqrt{6}+\\sqrt{2}}{4}$","$\\dfrac{\\sqrt{6}-\\sqrt{2}}{4}$","$\\dfrac{\\sqrt{3}+1}{2}$","$\\dfrac{\\sqrt{2}}{2}$"],
 answerIndex:0,
 explanation:"$\\sin(45°+30°)=\\sin 45°\\cos 30°+\\cos 45°\\sin 30°=\\frac{\\sqrt{2}}{2}\\cdot\\frac{\\sqrt{3}}{2}+\\frac{\\sqrt{2}}{2}\\cdot\\frac{1}{2}=\\frac{\\sqrt{6}+\\sqrt{2}}{4}$."},

{id:"m_41011_B", subject:"math", standard:"4.1.11", domain:"4", topic:"4.1", set:"B",
 prompt:"Which expression correctly states $\\cos(\\alpha+\\beta)$?",
 options:["$\\cos\\alpha\\cos\\beta + \\sin\\alpha\\sin\\beta$","$\\cos\\alpha\\cos\\beta - \\sin\\alpha\\sin\\beta$","$\\cos\\alpha\\sin\\beta + \\sin\\alpha\\cos\\beta$","$\\sin\\alpha\\cos\\beta - \\cos\\alpha\\sin\\beta$"],
 answerIndex:1,
 explanation:"$\\cos(\\alpha+\\beta)=\\cos\\alpha\\cos\\beta-\\sin\\alpha\\sin\\beta$. A common error is using a plus sign instead of minus."},

{id:"m_41011_C", subject:"math", standard:"4.1.11", domain:"4", topic:"4.1", set:"C",
 prompt:"A student wants to prove $\\cos(\\alpha-\\beta)=\\cos\\alpha\\cos\\beta+\\sin\\alpha\\sin\\beta$ from the addition formula. What substitution achieves this?",
 options:["The subtraction formula must be proved separately from a unit-circle diagram; the substitution approach fails", "Replace $\\alpha$ with $-\\alpha$ and apply the same even/odd identities", "Use the double-angle formula with $\\alpha=\\beta$ and solve for the cross term", "Replace $\\beta$ with $-\\beta$ and use $\\cos(-\\beta)=\\cos\\beta$ and $\\sin(-\\beta)=-\\sin\\beta$"],
 answerIndex:3,
 explanation:"Substituting $-\\beta$: $\\cos(\\alpha-\\beta)=\\cos\\alpha\\cos(-\\beta)-\\sin\\alpha\\sin(-\\beta)=\\cos\\alpha\\cos\\beta+\\sin\\alpha\\sin\\beta$."},

// 4.1.12
{id:"m_41012_A", subject:"math", standard:"4.1.12", domain:"4", topic:"4.1", set:"A",
 prompt:"Using the double-angle formula, evaluate $\\sin(120°)$ from $\\sin 60°$ and $\\cos 60°$.",
 options:["$\\dfrac{\\sqrt{3}}{2}$","$\\dfrac{1}{2}$","$1$","$-\\dfrac{\\sqrt{3}}{2}$"],
 answerIndex:0,
 explanation:"$\\sin(2\\cdot 60°)=2\\sin 60°\\cos 60°=2\\cdot\\frac{\\sqrt{3}}{2}\\cdot\\frac{1}{2}=\\frac{\\sqrt{3}}{2}$."},

{id:"m_41012_B", subject:"math", standard:"4.1.12", domain:"4", topic:"4.1", set:"B",
 prompt:"Which expression gives $\\cos(2\\theta)$ written using $\\cos\\theta$ alone?",
 options:["$2\\sin\\theta\\cos\\theta$","$\\cos^2\\theta - \\sin^2\\theta$","$2\\cos^2\\theta - 1$","$1 - 2\\sin^2\\theta$"],
 answerIndex:2,
 explanation:"Starting from $\\cos 2\\theta=\\cos^2\\theta-\\sin^2\\theta$ and replacing $\\sin^2\\theta$ with $1-\\cos^2\\theta$ gives $2\\cos^2\\theta-1$. Option D is the sine-only form; option B still contains $\\sin$."},

{id:"m_41012_C", subject:"math", standard:"4.1.12", domain:"4", topic:"4.1", set:"C",
 prompt:"A student derives the half-angle formula $\\sin^2(\\theta/2)=\\dfrac{1-\\cos\\theta}{2}$ and verifies it at $\\theta=90°$. What does each side evaluate to?",
 options:["Left $= 0$, Right $= 1/2$ — a discrepancy indicating an error", "Left $= 1$, Right $= 1/2$ — a discrepancy indicating an error", "Left $= 1/2$, Right $= 1$ — a discrepancy indicating an error", "Left $= 1/2$, Right $= 1/2$ — identity checks out"],
 answerIndex:3,
 explanation:"Left: $\\sin^2(45°)=(\\sqrt{2}/2)^2=1/2$. Right: $(1-\\cos 90°)/2=(1-0)/2=1/2$. Both sides equal $1/2$; the identity holds."},

// 4.1.13
{id:"m_41013_A", subject:"math", standard:"4.1.13", domain:"4", topic:"4.1", set:"A",
 prompt:"Convert the polar point $\\left(2,\\dfrac{\\pi}{3}\\right)$ to rectangular coordinates.",
 options:["$(\\sqrt{3},\;1)$", "$(\\sqrt{2},\;\\sqrt{2})$", "$(1,\;\\sqrt{3})$", "$(2,\;2)$"],
 answerIndex:2,
 explanation:"$x=2\\cos(\\pi/3)=2\\cdot\\frac{1}{2}=1$ and $y=2\\sin(\\pi/3)=2\\cdot\\frac{\\sqrt{3}}{2}=\\sqrt{3}$."},

{id:"m_41013_B", subject:"math", standard:"4.1.13", domain:"4", topic:"4.1", set:"B",
 prompt:"What is the polar form of the rectangular equation $x^2+y^2=9$?",
 options:["$\\theta = 3$","$r^2 = 9$","$r = 3$","$r = 9$"],
 answerIndex:2,
 explanation:"Since $r^2=x^2+y^2$, the equation becomes $r^2=9$, giving $r=3$ for the full circle (positive radius)."},

{id:"m_41013_C", subject:"math", standard:"4.1.13", domain:"4", topic:"4.1", set:"C",
 prompt:"A student converts the point $(-3,-3)$ to polar form and reports $r=3\\sqrt{2}$, $\\theta=45°$. What error was made?",
 options:["$r$ should be $3$, not $3\\sqrt{2}$", "There is no error; $(3\\sqrt{2},45°)$ is a valid polar representation of $(-3,-3)$", "$r$ should be negative; polar coordinates require $r<0$ in Quadrant III", "$r$ is correct, but $(-3,-3)$ is in Quadrant III; the correct angle is $\\theta=225°$"],
 answerIndex:3,
 explanation:"$r=\\sqrt{9+9}=3\\sqrt{2}$ is correct. The reference angle is $\\arctan(3/3)=45°$, but both coordinates are negative (QIII), so $\\theta=180°+45°=225°$."},

// 4.1.14
{id:"m_41014_A", subject:"math", standard:"4.1.14", domain:"4", topic:"4.1", set:"A",
 prompt:"Write $z = 1 + i$ in polar form $r(\\cos\\theta + i\\sin\\theta)$.",
 options:["$\\sqrt{2}(\\cos 45° + i\\sin 45°)$","$2(\\cos 45° + i\\sin 45°)$","$\\sqrt{2}(\\cos 90° + i\\sin 90°)$","$(\\cos 45° + i\\sin 45°)$"],
 answerIndex:0,
 explanation:"$|1+i|=\\sqrt{1^2+1^2}=\\sqrt{2}$; $\\arg(1+i)=\\arctan(1/1)=45°$. Polar form: $\\sqrt{2}(\\cos 45°+i\\sin 45°)$."},

{id:"m_41014_B", subject:"math", standard:"4.1.14", domain:"4", topic:"4.1", set:"B",
 prompt:"Multiply $z_1 = 2(\\cos 40°+i\\sin 40°)$ and $z_2 = 3(\\cos 80°+i\\sin 80°)$ using polar multiplication.",
 options:["$6(\\cos 40° + i\\sin 40°)$","$5(\\cos 120° + i\\sin 120°)$","$6(\\cos 120° + i\\sin 120°)$","$6(\\cos 3200° + i\\sin 3200°)$"],
 answerIndex:2,
 explanation:"Multiply moduli, add arguments: $r_1 r_2=6$; $\\theta_1+\\theta_2=120°$. Result: $6(\\cos 120°+i\\sin 120°)$."},

{id:"m_41014_C", subject:"math", standard:"4.1.14", domain:"4", topic:"4.1", set:"C",
 prompt:"Why is polar form particularly convenient for multiplying complex numbers compared to rectangular form?",
 options:["Polar form avoids imaginary numbers entirely, making multiplication ordinary real arithmetic","In polar form, multiplication means multiplying magnitudes and adding angles — a simple geometric operation — whereas rectangular form requires FOIL and the rule $i^2=-1$","Polar form only works for numbers on the unit circle where $|z|=1$, so products stay on the circle","Polar form converts multiplication into subtraction of angles, which is simpler than addition"],
 answerIndex:1,
 explanation:"In polar form, $z_1 z_2 = r_1 r_2 e^{i(\\theta_1+\\theta_2)}$ — just multiply magnitudes and add angles. Rectangular multiplication requires distributing $(a+bi)(c+di)$ and applying $i^2=-1$."},

// 4.1.15
{id:"m_41015_A", subject:"math", standard:"4.1.15", domain:"4", topic:"4.1", set:"A",
 prompt:"Using De Moivre's theorem, compute $(1+i)^4$.",
 options:["$4$", "$4i$", "$-4$", "$2+2i$"],
 answerIndex:2,
 explanation:"$1+i=\\sqrt{2}(\\cos 45°+i\\sin 45°)$. De Moivre: $(\\sqrt{2})^4(\\cos 180°+i\\sin 180°)=4\\cdot(-1)=-4$."},

{id:"m_41015_B", subject:"math", standard:"4.1.15", domain:"4", topic:"4.1", set:"B",
 prompt:"The number $8$ has one real cube root ($2$). How many cube roots does it have in $\\mathbb{C}$, and what are the non-real ones?",
 options:["Only $2$ exists; real numbers have exactly one cube root","Two roots: $2$ and $-2$","Three roots; the non-real ones are $-1+i\\sqrt{3}$ and $-1-i\\sqrt{3}$","Four roots, one per quadrant of the complex plane"],
 answerIndex:2,
 explanation:"Every nonzero complex number has exactly $n$ distinct $n$th roots. The three cube roots of $8$ have modulus $2$ and arguments $0°, 120°, 240°$. The non-real ones are $2(\\cos 120°+i\\sin 120°)=-1+i\\sqrt{3}$ and $-1-i\\sqrt{3}$."},

{id:"m_41015_C", subject:"math", standard:"4.1.15", domain:"4", topic:"4.1", set:"C",
 prompt:"A student notices that expanding $(\\cos\\theta+i\\sin\\theta)^2$ as a binomial and applying De Moivre's theorem both yield $\\cos 2\\theta+i\\sin 2\\theta$. Why does this happen?",
 options:["It is a coincidence; De Moivre's theorem and binomial expansion are unrelated","De Moivre gives $(\\cos\\theta+i\\sin\\theta)^2=\\cos 2\\theta+i\\sin 2\\theta$; matching real and imaginary parts of the binomial expansion directly produces the double-angle identities","Binomial expansion works only for $n=2$; for higher powers the connection breaks down","Both methods use the Pythagorean identity internally, so their agreement is automatic"],
 answerIndex:1,
 explanation:"$(\\cos\\theta+i\\sin\\theta)^2=\\cos^2\\theta-\\sin^2\\theta+2i\\sin\\theta\\cos\\theta$. De Moivre says this equals $\\cos 2\\theta+i\\sin 2\\theta$. Matching real parts gives $\\cos 2\\theta=\\cos^2\\theta-\\sin^2\\theta$ and imaginary parts give $\\sin 2\\theta=2\\sin\\theta\\cos\\theta$."},
,

// ── Domain 5 · Topic 5.1 — Probability, Statistics, and Data Analysis ──────

  // 5.1.01 — Probability as likelihood; values 0–1; complement rule
  {id:"m_51001_A", subject:"math", standard:"5.1.01", domain:"5", topic:"5.1", set:"A",
   prompt:"A weather forecast states that the probability of rain tomorrow is $0.65$. What is the probability that it does NOT rain tomorrow?",
   options:["$0.35$","$0.65$","$1.65$","$0.45$"],
   answerIndex:0,
   explanation:"If the probability of an event is $p$, the probability of its complement is $1 - p$. Here $1 - 0.65 = 0.35$."},

  {id:"m_51001_B", subject:"math", standard:"5.1.01", domain:"5", topic:"5.1", set:"B",
   prompt:"A student claims that the probability of drawing a red card from a standard deck is $\\frac{1}{2}$, so the probability of NOT drawing a red card must also be $\\frac{1}{2}$. Which statement best describes this reasoning?",
   options:["It is incorrect; the two probabilities must sum to more than 1 for a valid sample space.","It is correct only if the sample space contains equally likely outcomes.","It is incorrect; the complement rule only applies when the events are independent.","It is correct; the complement of an event with probability $p$ has probability $1 - p$, and $1 - \\frac{1}{2} = \\frac{1}{2}$ here."],
   answerIndex:3,
   explanation:"The complement rule states $P(\\text{not } A) = 1 - P(A)$ always. Since $P(\\text{red}) = \\frac{26}{52} = \\frac{1}{2}$, $P(\\text{not red}) = \\frac{1}{2}$ as well. The reasoning is valid."},

  {id:"m_51001_C", subject:"math", standard:"5.1.01", domain:"5", topic:"5.1", set:"C",
   prompt:"In a probability unit, a student says an event with probability $1.2$ is 'very likely.' What is the most important correction to make?",
   options:["The value $1.2$ is acceptable since it just means the event is certain.","Probability values can exceed 1 when the sample space is large.","The probability should be expressed as a percentage, so $1.2$ should be written as $120\\%$.","Probability values must be between 0 and 1 inclusive; a value of $1.2$ is impossible and indicates a calculation error."],
   answerIndex:3,
   explanation:"Probability is defined on the interval $[0, 1]$. A value of 1.2 is outside this range and cannot represent a valid probability — it signals an error in the student's reasoning or calculation."},

  // 5.1.02 — Finding probability in simple situations (coins, cards, dice)
  {id:"m_51002_A", subject:"math", standard:"5.1.02", domain:"5", topic:"5.1", set:"A",
   prompt:"A fair six-sided die is rolled. What is the probability of rolling a number greater than 4?",
   options:["$\\frac{1}{3}$","$\\frac{1}{2}$","$\\frac{2}{3}$","$\\frac{1}{6}$"],
   answerIndex:0,
   explanation:"Numbers greater than 4 on a standard die are 5 and 6 — two outcomes out of six equally likely outcomes. $P = \\frac{2}{6} = \\frac{1}{3}$."},

  {id:"m_51002_B", subject:"math", standard:"5.1.02", domain:"5", topic:"5.1", set:"B",
   prompt:"A card is drawn at random from a standard 52-card deck. What is the probability it is a king or a heart?",
   options:["$\\frac{4}{13}$","$\\frac{17}{52}$","$\\frac{1}{4}$","$\\frac{16}{52}$"],
   answerIndex:3,
   explanation:"There are 4 kings and 13 hearts, but the king of hearts is counted in both. By inclusion-exclusion: $4 + 13 - 1 = 16$ favorable outcomes, so $P = \\frac{16}{52} = \\frac{4}{13}$."},

  {id:"m_51002_C", subject:"math", standard:"5.1.02", domain:"5", topic:"5.1", set:"C",
   prompt:"A fair coin is tossed three times. What is the probability of getting exactly two heads?",
   options:["$\\frac{1}{4}$","$\\frac{1}{2}$","$\\frac{3}{8}$","$\\frac{1}{8}$"],
   answerIndex:2,
   explanation:"The sample space has $2^3 = 8$ equally likely outcomes. The favorable outcomes are HHT, HTH, and THH — exactly 3. So $P = \\frac{3}{8}$."},

  // 5.1.03 — Fundamental counting principle; combinations and permutations
  {id:"m_51003_A", subject:"math", standard:"5.1.03", domain:"5", topic:"5.1", set:"A",
   prompt:"How many different 3-letter arrangements can be formed from the letters A, B, C, D, E if no letter is repeated?",
   options:["$60$","$10$","$120$","$15$"],
   answerIndex:0,
   explanation:"This is a permutation: the number of ways to arrange 3 items chosen from 5 without repetition is $P(5,3) = 5 \\times 4 \\times 3 = 60$."},

  {id:"m_51003_B", subject:"math", standard:"5.1.03", domain:"5", topic:"5.1", set:"B",
   prompt:"A committee of 3 people is to be chosen from a group of 10. How many different committees are possible?",
   options:["$720$","$30$","$120$","$360$"],
   answerIndex:2,
   explanation:"Order does not matter for a committee, so this is a combination: $C(10,3) = \\frac{10!}{3! \\cdot 7!} = \\frac{10 \\times 9 \\times 8}{6} = 120$."},

  {id:"m_51003_C", subject:"math", standard:"5.1.03", domain:"5", topic:"5.1", set:"C",
   prompt:"A student says $C(8, 3)$ and $P(8, 3)$ give the same count because 'you're still choosing 3 things from 8.' What is the key distinction?",
   options:["The student is correct; combinations and permutations always give the same result when the sample size is the same.","Permutations count ordered arrangements while combinations do not, so $P(8,3) = C(8,3) \\times 3! = 336$ while $C(8,3) = 56$.","Combinations apply only when items are identical; permutations apply when they are distinct.","$P(8,3)$ is always smaller than $C(8,3)$ because permutations restrict the choices more."],
   answerIndex:1,
   explanation:"Permutations count ordered sequences; combinations count unordered subsets. $C(8,3) = 56$ and $P(8,3) = 56 \\times 6 = 336$. The ratio is always $k!$ where $k$ is the number chosen."},

  // 5.1.04 — Using combinations/permutations to compute probabilities
  {id:"m_51004_A", subject:"math", standard:"5.1.04", domain:"5", topic:"5.1", set:"A",
   prompt:"A bag contains 5 red and 4 blue marbles. If 2 marbles are drawn at random without replacement, what is the probability both are red?",
   options:["$\\frac{5}{18}$","$\\frac{25}{81}$","$\\frac{2}{9}$","$\\frac{5}{9}$"],
   answerIndex:0,
   explanation:"Total ways to choose 2 from 9: $C(9,2) = 36$. Ways to choose 2 red from 5: $C(5,2) = 10$. $P = \\frac{10}{36} = \\frac{5}{18}$."},

  {id:"m_51004_B", subject:"math", standard:"5.1.04", domain:"5", topic:"5.1", set:"B",
   prompt:"From a group of 7 women and 5 men, a committee of 3 is selected at random. What is the probability the committee contains exactly 2 women?",
   options:["$\\frac{21}{44}$","$\\frac{3}{11}$","$\\frac{7}{22}$","$\\frac{105}{220}$"],
   answerIndex:3,
   explanation:"$C(7,2) \\times C(5,1) = 21 \\times 5 = 105$ favorable outcomes. Total: $C(12,3) = 220$. $P = \\frac{105}{220} = \\frac{21}{44}$."},

  {id:"m_51004_C", subject:"math", standard:"5.1.04", domain:"5", topic:"5.1", set:"C",
   prompt:"In a lottery, 5 numbers are drawn without replacement from integers 1 through 40. A player picks 5 numbers. What expression gives the probability of matching all 5?",
   options:["$\\frac{1}{P(40,5)}$","$\\frac{C(5,5)}{P(40,5)}$","$\\frac{5!}{40^5}$","$\\frac{1}{C(40,5)}$"],
   answerIndex:3,
   explanation:"Since the lottery result is an unordered set of 5 numbers, the total number of equally likely outcomes is $C(40,5)$, and there is exactly 1 favorable outcome. Using $P(40,5)$ would overcount by treating different orderings of the winning numbers as distinct."},

  // 5.1.05 — Addition, multiplication, complementation rules; independence
  {id:"m_51005_A", subject:"math", standard:"5.1.05", domain:"5", topic:"5.1", set:"A",
   prompt:"Events $A$ and $B$ satisfy $P(A) = 0.4$, $P(B) = 0.3$, and $P(A \\cap B) = 0.1$. What is $P(A \\cup B)$?",
   options:["$0.6$","$0.7$","$0.04$","$0.5$"],
   answerIndex:0,
   explanation:"The general addition rule: $P(A \\cup B) = P(A) + P(B) - P(A \\cap B) = 0.4 + 0.3 - 0.1 = 0.6$."},

  {id:"m_51005_B", subject:"math", standard:"5.1.05", domain:"5", topic:"5.1", set:"B",
   prompt:"Events $A$ and $B$ are mutually exclusive with $P(A) = 0.25$ and $P(B) = 0.35$. Which value equals $P(A \\cup B)$?",
   options:["$0.0875$","$0.40$","$0.60$","$0.525$"],
   answerIndex:2,
   explanation:"Mutually exclusive events cannot both occur, so $P(A \\cap B) = 0$. By the addition rule: $P(A \\cup B) = 0.25 + 0.35 = 0.60$."},

  {id:"m_51005_C", subject:"math", standard:"5.1.05", domain:"5", topic:"5.1", set:"C",
   prompt:"A student calculates that $P(A) = 0.6$ and $P(B) = 0.5$, and because 'they seem unrelated,' concludes $P(A \\cap B) = 0.3$. What assumption is the student making, and how should it be verified?",
   options:["The student is assuming $A$ and $B$ are mutually exclusive; this can be verified by checking whether the sample space has equally likely outcomes.","The student is assuming $A$ and $B$ are complements; this holds whenever $P(A) + P(B) = 1.1 > 1$.","The student is using the addition rule correctly; no further verification is needed.","The student is assuming $A$ and $B$ are independent; this must be verified empirically or given — it cannot be assumed from the problem narrative alone."],
   answerIndex:3,
   explanation:"$P(A \\cap B) = P(A) \\cdot P(B)$ only holds when $A$ and $B$ are independent. Independence must be established by the problem conditions or empirical evidence — 'seeming unrelated' is not a valid justification."},

  // 5.1.06 — Conditional probability; finite sample spaces
  {id:"m_51006_A", subject:"math", standard:"5.1.06", domain:"5", topic:"5.1", set:"A",
   prompt:"In a class, $60\\%$ of students passed the final exam, and $30\\%$ both attended every review session AND passed. Given that a student attended every review session (which $50\\%$ did), what is the probability that student passed?",
   options:["$0.30$","$0.50$","$0.60$","$0.60 \\div 0.50$"],
   answerIndex:2,
   explanation:"$P(\\text{pass} \\mid \\text{attended}) = \\frac{P(\\text{pass} \\cap \\text{attended})}{P(\\text{attended})} = \\frac{0.30}{0.50} = 0.60$."},

  {id:"m_51006_B", subject:"math", standard:"5.1.06", domain:"5", topic:"5.1", set:"B",
   prompt:"Two fair dice are rolled. Given that the sum is at least 10, what is the probability the sum is exactly 12?",
   options:["$\\frac{1}{36}$","$\\frac{1}{6}$","$\\frac{1}{4}$","$\\frac{1}{3}$"],
   answerIndex:1,
   explanation:"Outcomes with sum $\\geq 10$: $(4,6),(5,5),(5,6),(6,4),(6,5),(6,6)$ — 6 outcomes. Outcomes with sum $= 12$: $(6,6)$ — 1 outcome. $P(12 \\mid \\geq 10) = \\frac{1}{6}$."},

  {id:"m_51006_C", subject:"math", standard:"5.1.06", domain:"5", topic:"5.1", set:"C",
   prompt:"A student insists that $P(A \\mid B) = P(A)$ always, saying 'knowing $B$ happened cannot change the probability of $A$.' When is this student correct?",
   options:["Always; conditional probability equals unconditional probability by the definition of the sample space.","Only when $A$ and $B$ are mutually exclusive, because then $P(A \\cap B) = 0$.","Only when $A$ and $B$ are independent, because independence means $P(A \\mid B) = P(A)$ by definition.","Only when $P(B) = 0.5$."],
   answerIndex:2,
   explanation:"By definition, $P(A \\mid B) = \\frac{P(A \\cap B)}{P(B)}$. This equals $P(A)$ exactly when $P(A \\cap B) = P(A) \\cdot P(B)$, which is the definition of independence."},

  // 5.1.07 — Mean, median, mode
  {id:"m_51007_A", subject:"math", standard:"5.1.07", domain:"5", topic:"5.1", set:"A",
   prompt:"The quiz scores for six students are: $3, 7, 7, 8, 10, 12$. What are the mean, median, and mode respectively?",
   options:["$7.5,\\ 7.5,\\ 7$","$7.83,\\ 7.5,\\ 7$","$7.5,\\ 7,\\ 7.83$","$7.83,\\ 7,\\ 7.5$"],
   answerIndex:1,
   explanation:"Mean: $\\frac{3+7+7+8+10+12}{6} = \\frac{47}{6} \\approx 7.83$. Median (average of 3rd and 4th values): $\\frac{7+8}{2} = 7.5$. Mode (most frequent): $7$."},

  {id:"m_51007_B", subject:"math", standard:"5.1.07", domain:"5", topic:"5.1", set:"B",
   prompt:"A data set has an extreme high outlier. Which measure of center is MOST affected by this outlier?",
   options:["Median","Mode","Mean","All three are equally affected."],
   answerIndex:2,
   explanation:"The mean uses every value in its calculation, so extreme values pull it toward them. The median depends only on rank order and is resistant to outliers. The mode reflects only the most frequent value and is unaffected."},

  {id:"m_51007_C", subject:"math", standard:"5.1.07", domain:"5", topic:"5.1", set:"C",
   prompt:"A data set has seven values. After sorting, the values are $4, 6, 8, 11, 13, 13, 20$. A student computes the median as $\\frac{11+13}{2} = 12$. What error did the student make?",
   options:["The student should have averaged all seven values.","There is no error; averaging the two middle values is the correct procedure for any data set.","The median of an odd number of values is the single middle value, which is the 4th value: $11$.","The median should be computed only after removing the outlier $20$."],
   answerIndex:2,
   explanation:"For an odd-sized data set, the median is the exact middle value — here the 4th of 7 values, which is $11$. Averaging two middle values applies only to data sets with an even number of values."},

  // 5.1.08 — Variance and standard deviation
  {id:"m_51008_A", subject:"math", standard:"5.1.08", domain:"5", topic:"5.1", set:"A",
   prompt:"The data set $\\{2, 4, 4, 4, 5, 5, 7, 9\\}$ has mean $5$. What is the population standard deviation?",
   options:["$2$","$4$","$\\sqrt{4.57}$","$2.14$"],
   answerIndex:0,
   explanation:"Population variance $= \\frac{\\sum(x_i - \\bar{x})^2}{n} = \\frac{(9+1+1+1+0+0+4+16)}{8} = \\frac{32}{8} = 4$. Standard deviation $= \\sqrt{4} = 2$."},

  {id:"m_51008_B", subject:"math", standard:"5.1.08", domain:"5", topic:"5.1", set:"B",
   prompt:"Two classes took the same test. Class A has scores with mean $75$ and standard deviation $3$; Class B has mean $75$ and standard deviation $12$. What does the difference in standard deviations tell you?",
   options:["Class B performed better on average.","Standard deviation cannot be compared across different classes.","Class B's mean is less reliable because it was computed on fewer data points.","Class A's scores are more tightly clustered around the mean; Class B's scores are more spread out."],
   answerIndex:3,
   explanation:"Standard deviation measures spread around the mean. Both classes have the same mean, but Class A's smaller standard deviation means most scores are close to 75, while Class B's larger value indicates much greater variability in performance."},

  {id:"m_51008_C", subject:"math", standard:"5.1.08", domain:"5", topic:"5.1", set:"C",
   prompt:"When computing the variance of a sample (rather than a population), the sum of squared deviations is divided by $n - 1$ instead of $n$. What is the reason for this adjustment?",
   options:["It avoids negative values in the variance formula.","It corrects for bias, since using $n$ in the denominator tends to underestimate the true population variance when working from a sample.","It makes the sample variance equal to the population variance by definition.","It accounts for the possibility that the sample mean differs from the true mean by more than one standard deviation."],
   answerIndex:1,
   explanation:"Dividing by $n - 1$ (Bessel's correction) produces an unbiased estimator of the population variance. Using $n$ instead systematically underestimates the population spread because the sample tends to be less variable than the full population."},

  // 5.1.09 — Five-number summary
  {id:"m_51009_A", subject:"math", standard:"5.1.09", domain:"5", topic:"5.1", set:"A",
   prompt:"For the data set $\\{4, 7, 10, 12, 14, 16, 18, 22, 25\\}$, what is the five-number summary?",
   options:["Min$=4$, $Q_1=8.5$, Median$=14$, $Q_3=20$, Max$=25$","Min$=4$, $Q_1=7$, Median$=14$, $Q_3=22$, Max$=25$","Min$=4$, $Q_1=10$, Median$=14$, $Q_3=18$, Max$=25$","Min$=4$, $Q_1=9$, Median$=13$, $Q_3=19$, Max$=25$"],
   answerIndex:0,
   explanation:"The sorted data has 9 values. Median $= 14$ (5th value). Lower half: $\\{4,7,10,12\\}$, $Q_1 = \\frac{7+10}{2} = 8.5$. Upper half: $\\{16,18,22,25\\}$, $Q_3 = \\frac{18+22}{2} = 20$."},

  {id:"m_51009_B", subject:"math", standard:"5.1.09", domain:"5", topic:"5.1", set:"B",
   prompt:"The interquartile range (IQR) of a data set is $14$. A value of $52$ is reported as a potential outlier. If $Q_3 = 40$, is $52$ an outlier by the standard 1.5 × IQR rule?",
   options:["No, because $52 < Q_3 + 1.5 \\times IQR = 40 + 21 = 61$.","Yes, because $52 > Q_3 + 1.5 \\times IQR = 40 + 21 = 61$.","Yes, because $52 > Q_3 = 40$.","No, because the IQR rule applies only to values below $Q_1$."],
   answerIndex:0,
   explanation:"The upper fence is $Q_3 + 1.5 \\times IQR = 40 + 1.5(14) = 40 + 21 = 61$. Since $52 < 61$, the value is NOT flagged as an outlier by this rule."},

  {id:"m_51009_C", subject:"math", standard:"5.1.09", domain:"5", topic:"5.1", set:"C",
   prompt:"A box-and-whisker plot shows: Min$=10$, $Q_1=20$, Median$=30$, $Q_3=45$, Max$=60$. A student says 'the data is symmetric because the median is halfway between Min and Max.' Is this reasoning valid?",
   options:["Yes; whenever the median equals $\\frac{\\text{Min}+\\text{Max}}{2}$, the distribution is symmetric.","No; symmetry is assessed from the quartile spacing. Here $Q_1 - \\text{Min} = 10$ but $Q_3 - \\text{Median} = 15$, suggesting right skew in the upper half.","No; symmetry requires the mean to equal the median.","Yes; the relationship between $Q_1$ and $Q_3$ is irrelevant to symmetry."],
   answerIndex:1,
   explanation:"The midpoint of Min and Max being equal to the median is insufficient to establish symmetry. A box plot reveals symmetry through balanced spacing: $Q_1 - \\text{Min}$ vs. $\\text{Max} - Q_3$, and $\\text{Median} - Q_1$ vs. $Q_3 - \\text{Median}$. Here the spacings are unequal, indicating skew."},

  // 5.1.10 — Organizing and displaying data
  {id:"m_51010_A", subject:"math", standard:"5.1.10", domain:"5", topic:"5.1", set:"A",
   prompt:"A teacher wants to display the relationship between hours studied and test score for 30 students. Which display is most appropriate?",
   options:["Bar graph","Stem-and-leaf plot","Scatterplot","Frequency table"],
   answerIndex:2,
   explanation:"A scatterplot is designed to show the relationship (or correlation) between two quantitative variables — in this case, study hours and test score. The other displays show distributions of a single variable."},

  {id:"m_51010_B", subject:"math", standard:"5.1.10", domain:"5", topic:"5.1", set:"B",
   prompt:"A student wants to compare the test score distributions of two classes side by side while preserving individual data values. Which display is BEST suited?",
   options:["Two separate histograms","A back-to-back stem-and-leaf plot","A double bar graph","Two box-and-whisker plots"],
   answerIndex:1,
   explanation:"A back-to-back stem-and-leaf plot places both distributions on a shared stem, preserving every individual data value and enabling direct visual comparison — unlike histograms or bar graphs, which group values into bins or categories."},

  {id:"m_51010_C", subject:"math", standard:"5.1.10", domain:"5", topic:"5.1", set:"C",
   prompt:"A frequency table for quiz scores shows classes 60–69, 70–79, 80–89, 90–99 with frequencies 5, 12, 10, 3. Which histogram accurately represents these data?",
   options:["A histogram with bars of equal height since each class has the same width.","A histogram with bars of heights 5, 12, 10, 3 and equal-width intervals on the horizontal axis.","A histogram where the tallest bar corresponds to the 60–69 class because it is listed first.","A histogram where each bar height equals the class midpoint divided by frequency."],
   answerIndex:1,
   explanation:"In a frequency histogram, each bar's height represents the frequency for that class interval. The four equal-width intervals (each spanning 10 points) produce bars of heights 5, 12, 10, and 3 respectively."},

  // 5.1.11 — Normal distribution; estimating probabilities
  {id:"m_51011_A", subject:"math", standard:"5.1.11", domain:"5", topic:"5.1", set:"A",
   prompt:"Heights in a population are normally distributed with mean $65$ inches and standard deviation $5$ inches. Approximately what percentage of people are taller than $70$ inches?",
   options:["$84\\%$","$34\\%$","$16\\%$","$68\\%$"],
   answerIndex:2,
   explanation:"$70$ inches is exactly one standard deviation above the mean ($z = 1$). About $68\\%$ of data falls within one SD of the mean, leaving $32\\%$ in the two tails. Half of that ($16\\%$) is above $70$ inches."},

  {id:"m_51011_B", subject:"math", standard:"5.1.11", domain:"5", topic:"5.1", set:"B",
   prompt:"In a normal distribution, approximately what percentage of values fall within two standard deviations of the mean?",
   options:["$68\\%$","$99.7\\%$","$50\\%$","$95\\%$"],
   answerIndex:3,
   explanation:"The empirical rule for normal distributions states approximately $68\\%$ within $\\pm 1\\sigma$, $95\\%$ within $\\pm 2\\sigma$, and $99.7\\%$ within $\\pm 3\\sigma$."},

  {id:"m_51011_C", subject:"math", standard:"5.1.11", domain:"5", topic:"5.1", set:"C",
   prompt:"A standardized test has scores normally distributed with mean $500$ and standard deviation $100$. A student scores $700$. What is this student's $z$-score, and approximately what percentile does it represent?",
   options:["$z = 2$; approximately the 97.5th percentile","$z = 1.4$; approximately the 92nd percentile","$z = 2$; approximately the 68th percentile","$z = 200$; the percentile cannot be determined without a table"],
   answerIndex:0,
   explanation:"$z = \\frac{700 - 500}{100} = 2$. By the empirical rule, $95\\%$ of scores fall within $\\pm 2\\sigma$, so $5\\%$ lie outside. Half of that ($2.5\\%$) is above $z = 2$, placing this score at approximately the 97.5th percentile."},

  // 5.1.12 — Least squares regression line
  {id:"m_51012_A", subject:"math", standard:"5.1.12", domain:"5", topic:"5.1", set:"A",
   prompt:"For the data points $(1, 2),\\ (2, 4),\\ (3, 5),\\ (4, 4),\\ (5, 5)$, the least squares regression line is $\\hat{y} = 0.6x + 2.2$. What does the slope $0.6$ represent?",
   options:["The $y$-intercept of the data","For each additional unit increase in $x$, the predicted $y$ increases by $0.6$","The mean of the $y$-values","The correlation coefficient between $x$ and $y$"],
   answerIndex:1,
   explanation:"The slope of the regression line gives the average change in the predicted $y$ per one-unit increase in $x$. Here, predicted $y$ increases by $0.6$ for each one-unit increase in $x$."},

  {id:"m_51012_B", subject:"math", standard:"5.1.12", domain:"5", topic:"5.1", set:"B",
   prompt:"The least squares regression line minimizes which quantity?",
   options:["The sum of the absolute values of the residuals","The sum of the squared residuals","The maximum residual in the data set","The mean of the $y$-values"],
   answerIndex:1,
   explanation:"'Least squares' refers specifically to minimizing $\\sum(y_i - \\hat{y}_i)^2$ — the sum of the squared vertical distances (residuals) between the observed values and the fitted line. Squaring prevents positive and negative residuals from canceling."},

  {id:"m_51012_C", subject:"math", standard:"5.1.12", domain:"5", topic:"5.1", set:"C",
   prompt:"A regression line $\\hat{y} = 3x + 1$ is fit to data. A student uses it to predict $y$ when $x = 200$, well outside the range of the data (which spanned $x = 1$ to $x = 15$). What concern applies here?",
   options:["The formula is invalid because the slope is positive.","No concern applies; regression lines are valid for any input value.","The regression line should be recalculated using only the $x = 200$ region.","Extrapolation beyond the range of the data can produce unreliable predictions since the linear trend may not hold outside the observed range."],
   answerIndex:3,
   explanation:"Using a regression model beyond the range of the data used to build it is called extrapolation. The linear relationship observed in the data may not extend outside that range, making such predictions potentially misleading or meaningless."},

  // ── Domain 6 · Topic 6.1 — Linear Algebra ──────────────────────────────

  // 6.1.01 — Solve linear equations in any number of variables
  {id:"m_61001_A", subject:"math", standard:"6.1.01", domain:"6", topic:"6.1", set:"A",
   prompt:"The system $2x + y = 5$ and $x + 3y = 10$ is solved by elimination. Which ordered pair is the unique solution?",
   options:["$(1, 3)$","$(3, 1)$","$(2, 1)$","$(1, 2)$"],
   answerIndex:0,
   explanation:"From the first equation, $y = 5 - 2x$. Substituting into the second: $x + 3(5-2x) = 10 \\Rightarrow x + 15 - 6x = 10 \\Rightarrow -5x = -5 \\Rightarrow x = 1$, so $y = 3$. Solution: $(1, 3)$."},

  {id:"m_61001_B", subject:"math", standard:"6.1.01", domain:"6", topic:"6.1", set:"B",
   prompt:"Consider the system: $x + y + z = 6$, $2x - y + z = 3$, $x + 2y - z = 2$. Using back-substitution after row reduction, what is the solution $(x, y, z)$?",
   options:["$(2, 3, 1)$","$(1, 3, 2)$","$(3, 1, 2)$","$(1, 2, 3)$"],
   answerIndex:3,
   explanation:"Row-reducing the augmented matrix leads to $x = 1, y = 2, z = 3$. Verify: $1+2+3=6$ ✓, $2-2+3=3$ ✓, $1+4-3=2$ ✓."},

  {id:"m_61001_C", subject:"math", standard:"6.1.01", domain:"6", topic:"6.1", set:"C",
   prompt:"A student writes the augmented matrix for a three-variable system and reduces it to $\\begin{bmatrix}1&0&0&|&4\\\\0&1&0&|&-1\\\\0&0&1&|&2\\end{bmatrix}$. What does this tell us about the system?",
   options:["The system is inconsistent and has no solution.","The system has infinitely many solutions depending on a free variable.","The system has the unique solution $x=4,\\, y=-1,\\, z=2$.","The system is dependent and any scalar multiple is also a solution."],
   answerIndex:2,
   explanation:"A fully reduced identity-block augmented matrix (one in each pivot position, zeros elsewhere) indicates a unique solution read directly from the last column: $x=4, y=-1, z=2$."},

  // 6.1.02 — Coefficient matrices and Gauss-Jordan as row operations
  {id:"m_61002_A", subject:"math", standard:"6.1.02", domain:"6", topic:"6.1", set:"A",
   prompt:"The system $3x + y = 7$ and $x - 2y = 0$ is written in matrix form $Ax = b$. Which is the coefficient matrix $A$?",
   options:["$\\begin{bmatrix}3&1\\\\1&-2\\end{bmatrix}$","$\\begin{bmatrix}3&1&7\\\\1&-2&0\\end{bmatrix}$","$\\begin{bmatrix}7\\\\0\\end{bmatrix}$","$\\begin{bmatrix}3&7\\\\1&0\\end{bmatrix}$"],
   answerIndex:0,
   explanation:"The coefficient matrix $A$ contains only the coefficients of the variables, arranged by equation (rows) and variable (columns): $\\begin{bmatrix}3&1\\\\1&-2\\end{bmatrix}$. The augmented matrix $[A|b]$ would include the right-hand side column."},

  {id:"m_61002_B", subject:"math", standard:"6.1.02", domain:"6", topic:"6.1", set:"B",
   prompt:"During Gauss-Jordan elimination a student multiplies the first row of the augmented matrix by $\\frac{1}{2}$ and subtracts it from the second row. This operation is best described as:",
   options:["Swapping two rows to change the order of equations.","Transposing the matrix to switch rows and columns.","Multiplying the entire matrix by a scalar to simplify.","An elementary row operation that does not change the solution set."],
   answerIndex:3,
   explanation:"Gauss-Jordan (and Gaussian) elimination uses three types of elementary row operations—row swap, scalar multiple of a row, and adding a multiple of one row to another—all of which preserve the solution set of the linear system."},

  {id:"m_61002_C", subject:"math", standard:"6.1.02", domain:"6", topic:"6.1", set:"C",
   prompt:"A teacher asks students to interpret the matrix equation $\\begin{bmatrix}1&3\\\\2&-1\\end{bmatrix}\\begin{bmatrix}x\\\\y\\end{bmatrix}=\\begin{bmatrix}5\\\\1\\end{bmatrix}$. A student claims this represents two linear equations. What are those equations?",
   options:["$x + 2y = 5$ and $3x - y = 1$","$x + 3y = 5$ and $2x - y = 1$","$x + 3y = 1$ and $2x - y = 5$","$x + 2y = 1$ and $3x - y = 5$"],
   answerIndex:1,
   explanation:"Matrix multiplication gives the first equation as $1\\cdot x + 3\\cdot y = 5$ and the second as $2\\cdot x + (-1)\\cdot y = 1$. Each row of the coefficient matrix contributes one equation."},

  // 6.1.03 — Row echelon forms
  {id:"m_61003_A", subject:"math", standard:"6.1.03", domain:"6", topic:"6.1", set:"A",
   prompt:"Which of the following matrices is in row echelon form (REF)?",
   options:["$\\begin{bmatrix}1&2&3\\\\0&1&4\\\\0&0&1\\end{bmatrix}$","$\\begin{bmatrix}0&1&2\\\\1&0&3\\\\0&0&1\\end{bmatrix}$","$\\begin{bmatrix}1&2&3\\\\0&0&0\\\\0&1&4\\end{bmatrix}$","$\\begin{bmatrix}2&0&1\\\\0&3&2\\\\1&0&4\\end{bmatrix}$"],
   answerIndex:0,
   explanation:"A matrix is in REF when all nonzero rows are above any zero rows, and the leading (pivot) entry of each nonzero row is strictly to the right of the pivot in the row above. Option A satisfies both conditions with pivots at positions (1,1), (2,2), and (3,3)."},

  {id:"m_61003_B", subject:"math", standard:"6.1.03", domain:"6", topic:"6.1", set:"B",
   prompt:"After reducing the augmented matrix $\\begin{bmatrix}2&4&6&|&8\\\\1&3&5&|&7\\\\3&5&7&|&9\\end{bmatrix}$ to RREF, the result is $\\begin{bmatrix}1&0&-1&|&-2\\\\0&1&2&|&3\\\\0&0&0&|&0\\end{bmatrix}$. How many free variables does the system have?",
   options:["None — the system has a unique solution.","Three — all variables are free.","Two — $y$ and $z$ are free variables.","One — $z$ is a free variable."],
   answerIndex:3,
   explanation:"There are 2 pivot columns (columns 1 and 2) and 3 variables, so $3 - 2 = 1$ free variable. The third variable $z$ is free; $x$ and $y$ are expressed in terms of $z$ as $x = -2 + z$ and $y = 3 - 2z$."},

  {id:"m_61003_C", subject:"math", standard:"6.1.03", domain:"6", topic:"6.1", set:"C",
   prompt:"A student reduces a $3 \\times 4$ augmented matrix and arrives at a row of the form $\\begin{bmatrix}0&0&0&|&5\\end{bmatrix}$. What is the correct interpretation?",
   options:["There is a free variable, giving infinitely many solutions.","The system is consistent and has a unique solution.","The system is inconsistent and has no solution.","The pivot in this row corresponds to the fourth variable."],
   answerIndex:2,
   explanation:"A row $[0 \\; 0 \\; 0 \\;|\\; 5]$ translates to the equation $0x + 0y + 0z = 5$, i.e. $0 = 5$, which is a contradiction. The system is therefore inconsistent and has no solution."},

  // 6.1.04 — Addition of matrices and vectors
  {id:"m_61004_A", subject:"math", standard:"6.1.04", domain:"6", topic:"6.1", set:"A",
   prompt:"If $A = \\begin{bmatrix}1&2\\\\3&4\\end{bmatrix}$ and $B = \\begin{bmatrix}5&6\\\\7&8\\end{bmatrix}$, what is $A + B$?",
   options:["$\\begin{bmatrix}6&8\\\\10&12\\end{bmatrix}$","$\\begin{bmatrix}5&12\\\\21&32\\end{bmatrix}$","$\\begin{bmatrix}6&8\\\\10&10\\end{bmatrix}$","$\\begin{bmatrix}4&4\\\\4&4\\end{bmatrix}$"],
   answerIndex:0,
   explanation:"Matrix addition is performed entry-by-entry: $A+B = \\begin{bmatrix}1+5&2+6\\\\3+7&4+8\\end{bmatrix} = \\begin{bmatrix}6&8\\\\10&12\\end{bmatrix}$."},

  {id:"m_61004_B", subject:"math", standard:"6.1.04", domain:"6", topic:"6.1", set:"B",
   prompt:"Vectors $\\mathbf{u} = \\langle 2, -1, 4 \\rangle$ and $\\mathbf{v} = \\langle -3, 5, 1 \\rangle$ are added. Which vector is $\\mathbf{u} + \\mathbf{v}$?",
   options:["$\\langle -1, 4, 5 \\rangle$","$\\langle 1, -6, 3 \\rangle$","$\\langle 5, -6, 5 \\rangle$","$\\langle -1, -4, 5 \\rangle$"],
   answerIndex:0,
   explanation:"Vector addition is component-wise: $(2 + (-3),\\; -1 + 5,\\; 4 + 1) = (-1, 4, 5)$."},

  {id:"m_61004_C", subject:"math", standard:"6.1.04", domain:"6", topic:"6.1", set:"C",
   prompt:"A student claims that for any matrices $A$ and $B$ of the same size, $A + B = B + A$. A second student says this is only sometimes true. Which student is correct, and why?",
   options:["The second student — commutativity of matrix addition fails when the matrices have negative entries.","The first student — but only because matrix addition is the same as matrix multiplication in this case.","The second student — commutativity requires both matrices to be square.","The first student — matrix addition inherits commutativity from the commutativity of real-number addition, applied entry-by-entry."],
   answerIndex:3,
   explanation:"Since $(A+B)_{ij} = a_{ij} + b_{ij} = b_{ij} + a_{ij} = (B+A)_{ij}$ for every entry (real-number addition is commutative), matrix addition is always commutative for matrices of the same dimensions."},

  // 6.1.05 — Matrix multiplication, scalar multiplication
  {id:"m_61005_A", subject:"math", standard:"6.1.05", domain:"6", topic:"6.1", set:"A",
   prompt:"Let $A = \\begin{bmatrix}1&2\\\\3&4\\end{bmatrix}$ and $B = \\begin{bmatrix}2&0\\\\1&3\\end{bmatrix}$. Compute $AB$.",
   options:["$\\begin{bmatrix}4&6\\\\10&12\\end{bmatrix}$","$\\begin{bmatrix}2&6\\\\10&14\\end{bmatrix}$","$\\begin{bmatrix}2&0\\\\3&12\\end{bmatrix}$","$\\begin{bmatrix}4&6\\\\14&10\\end{bmatrix}$"],
   answerIndex:0,
   explanation:"$(AB)_{11} = 1\\cdot2+2\\cdot1=4$, $(AB)_{12} = 1\\cdot0+2\\cdot3=6$, $(AB)_{21} = 3\\cdot2+4\\cdot1=10$, $(AB)_{22} = 3\\cdot0+4\\cdot3=12$. So $AB = \\begin{bmatrix}4&6\\\\10&12\\end{bmatrix}$."},

  {id:"m_61005_B", subject:"math", standard:"6.1.05", domain:"6", topic:"6.1", set:"B",
   prompt:"Using the same matrices $A = \\begin{bmatrix}1&2\\\\3&4\\end{bmatrix}$ and $B = \\begin{bmatrix}2&0\\\\1&3\\end{bmatrix}$, a student computes $BA$ and gets the same result as $AB$. Is this correct?",
   options:["Yes — matrix multiplication is always commutative.","No — $BA = \\begin{bmatrix}2&4\\\\10&14\\end{bmatrix}$, which differs from $AB$.","No — $BA$ is undefined because $B$ has more columns than rows.","Yes — commutativity holds whenever both matrices are $2\\times 2$."],
   answerIndex:1,
   explanation:"$BA$: $(2\\cdot1+0\\cdot3,\\; 2\\cdot2+0\\cdot4) = (2,4)$ in row 1; $(1\\cdot1+3\\cdot3,\\; 1\\cdot2+3\\cdot4) = (10,14)$ in row 2. So $BA = \\begin{bmatrix}2&4\\\\10&14\\end{bmatrix} \\neq AB$, confirming that matrix multiplication is generally non-commutative."},

  {id:"m_61005_C", subject:"math", standard:"6.1.05", domain:"6", topic:"6.1", set:"C",
   prompt:"Multiplying a vector $\\mathbf{v} = \\langle 1, -2, 3 \\rangle$ by the scalar $-4$ gives:",
   options:["$\langle -4, -8, -12 \rangle$","$\langle -1, 2, -3 \rangle$","$\langle 4, 2, -3 \rangle$","$\langle -4, 8, -12 \rangle$"],
   answerIndex:3,
   explanation:"Scalar multiplication distributes to each component: $-4\\cdot\\langle 1, -2, 3\\rangle = \\langle -4, (-4)(-2), (-4)(3)\\rangle = \\langle -4, 8, -12\\rangle$."},

  // 6.1.06 — Inconsistent, unique, or infinitely many solutions
  {id:"m_61006_A", subject:"math", standard:"6.1.06", domain:"6", topic:"6.1", set:"A",
   prompt:"The RREF of an augmented matrix is $\\begin{bmatrix}1&0&|&3\\\\0&1&|&-2\\\\0&0&|&0\\end{bmatrix}$. How many solutions does the system have?",
   options:["No solutions — the system is inconsistent.","Exactly one solution: $(3, -2)$.","Infinitely many solutions parameterized by a free variable.","Exactly two solutions."],
   answerIndex:1,
   explanation:"Two pivot columns match two variables, the last row is all zeros (no contradiction), and no free variable exists. This RREF reads directly as $x=3, y=-2$: a unique solution."},

  {id:"m_61006_B", subject:"math", standard:"6.1.06", domain:"6", topic:"6.1", set:"B",
   prompt:"A student solves a $3 \\times 3$ linear system and finds that one equation is a linear combination of the other two. What can be concluded about the number of solutions?",
   options:["The system is inconsistent and has no solutions.","The system has exactly one solution.","The system has infinitely many solutions.","The system has exactly two solutions."],
   answerIndex:2,
   explanation:"When one equation is redundant (linearly dependent on the others), there is at least one free variable. This produces infinitely many solutions — the solution set forms a line or plane. A linear system can only be inconsistent, uniquely solvable, or have infinitely many solutions; no other count is possible."},

  {id:"m_61006_C", subject:"math", standard:"6.1.06", domain:"6", topic:"6.1", set:"C",
   prompt:"Which of the following correctly states ALL possible outcomes for the number of solutions to a linear system?",
   options:["Zero, one, two, or infinitely many.","Zero or infinitely many.","One or infinitely many.","Zero, one, or infinitely many."],
   answerIndex:3,
   explanation:"The Consistency Theorem for linear systems guarantees exactly three possibilities: no solution (inconsistent), exactly one solution (unique), or infinitely many solutions. Having exactly two or any other finite number greater than one is impossible."},

  // 6.1.07 — Geometric interpretation of vectors and vector addition
  {id:"m_61007_A", subject:"math", standard:"6.1.07", domain:"6", topic:"6.1", set:"A",
   prompt:"The vector $\\mathbf{v} = \\langle 3, 4 \\rangle$ is drawn as an arrow from the origin. What is its magnitude?",
   options:["$7$","$3.5$","$5$","$\\sqrt{7}$"],
   answerIndex:2,
   explanation:"The magnitude (length) of a vector is $|\\mathbf{v}| = \\sqrt{3^2 + 4^2} = \\sqrt{9+16} = \\sqrt{25} = 5$."},

  {id:"m_61007_B", subject:"math", standard:"6.1.07", domain:"6", topic:"6.1", set:"B",
   prompt:"Geometrically, which construction represents $\\mathbf{u} + \\mathbf{v}$ when both vectors are drawn with tails at the origin?",
   options:["The vector from the tip of $\mathbf{u}$ to the tip of $\mathbf{v}$.","The average of the endpoints of $\mathbf{u}$ and $\mathbf{v}$.","The vector perpendicular to both $\mathbf{u}$ and $\mathbf{v}$.","The diagonal of the parallelogram formed by $\mathbf{u}$ and $\mathbf{v}$."],
   answerIndex:3,
   explanation:"The parallelogram law of vector addition: place both vectors from the same point; the sum $\\mathbf{u}+\\mathbf{v}$ is the diagonal of the parallelogram they define. Equivalently, placing $\\mathbf{v}$'s tail at $\\mathbf{u}$'s tip gives the tip-to-tail (triangle) construction with the same result."},

  {id:"m_61007_C", subject:"math", standard:"6.1.07", domain:"6", topic:"6.1", set:"C",
   prompt:"A student argues that a vector in 3D space can be thought of as a directed displacement and that $\\langle 0, 0, 0 \\rangle$ represents a special case. What is geometrically distinct about $\\langle 0, 0, 0 \\rangle$?",
   options:["It is the only vector with magnitude $1$.","It points in the direction of the $z$-axis.","It is equivalent to the unit vector $\hat{k}$.","It has zero magnitude and no defined direction."],
   answerIndex:3,
   explanation:"The zero vector $\\mathbf{0} = \\langle 0,0,0 \\rangle$ is the unique vector with magnitude $0$. Because it has no length, it has no defined direction — it is the additive identity for vector addition, satisfying $\\mathbf{v} + \\mathbf{0} = \\mathbf{v}$ for all $\\mathbf{v}$."},

  // 6.1.08 — Geometric interpretation of solution sets
  {id:"m_61008_A", subject:"math", standard:"6.1.08", domain:"6", topic:"6.1", set:"A",
   prompt:"Two linear equations in $\\mathbb{R}^2$ each represent a line. If the system has a unique solution, what is the geometric relationship between the two lines?",
   options:["They are parallel and distinct.","They are the same line.","They intersect at exactly one point.","One line is perpendicular to the other but they do not cross."],
   answerIndex:2,
   explanation:"A unique solution to a $2\\times 2$ system means the two lines meet at exactly one point. Parallel distinct lines give no solution; coincident lines give infinitely many. Two non-parallel, non-coincident lines in the plane always intersect at exactly one point."},

  {id:"m_61008_B", subject:"math", standard:"6.1.08", domain:"6", topic:"6.1", set:"B",
   prompt:"Three planes in $\\mathbb{R}^3$ defined by a consistent linear system with one free variable intersect in:",
   options:["A single point.","A line.","Two parallel lines.","A plane."],
   answerIndex:3,
   explanation:"One free variable means the solution set is one-dimensional in $\\mathbb{R}^3$, which geometrically corresponds to a line. The three planes all share this line as their common intersection."},

  {id:"m_61008_C", subject:"math", standard:"6.1.08", domain:"6", topic:"6.1", set:"C",
   prompt:"A $3 \\times 3$ system is consistent with two free variables. Which geometric object describes its solution set in $\\mathbb{R}^3$?",
   options:["A single point.","A line through the origin.","A plane.","Three separate lines."],
   answerIndex:2,
   explanation:"Two free variables produce a two-dimensional solution set. In $\\mathbb{R}^3$, a two-dimensional affine subspace is a plane. One free variable gives a line; no free variables give a point; three free variables (trivial system) give all of $\\mathbb{R}^3$."},

  // 6.1.09 — Parametrize lines; intersections of lines and planes
  {id:"m_61009_A", subject:"math", standard:"6.1.09", domain:"6", topic:"6.1", set:"A",
   prompt:"A line in $\\mathbb{R}^3$ passes through the point $(1, 2, 3)$ with direction vector $\\langle 2, -1, 4 \\rangle$. What is its parametric form?",
   options:["$(x,y,z) = (1+2t,\\; 2-t,\\; 3+4t)$","$(x,y,z) = (2t,\\; -t,\\; 4t)$","$(x,y,z) = (1+t,\\; 2+t,\\; 3+t)$","$(x,y,z) = (2+t,\\; -1+t,\\; 4+t)$"],
   answerIndex:0,
   explanation:"A parametric line through point $P_0 = (1,2,3)$ with direction $\\mathbf{d} = \\langle 2,-1,4\\rangle$ is written as $\\mathbf{r}(t) = P_0 + t\\mathbf{d}$, giving $(x,y,z) = (1+2t,\\; 2-t,\\; 3+4t)$."},

  {id:"m_61009_B", subject:"math", standard:"6.1.09", domain:"6", topic:"6.1", set:"B",
   prompt:"The line $\\mathbf{r}(t) = (t, t, t)$ passes through the plane $x + y + z = 6$. At what point do they intersect?",
   options:["$(1, 1, 1)$","$(3, 3, 3)$","$(2, 2, 2)$","$(6, 6, 6)$"],
   answerIndex:2,
   explanation:"Substitute the parametric equations into the plane equation: $t + t + t = 6 \\Rightarrow 3t = 6 \\Rightarrow t = 2$. The intersection point is $(2, 2, 2)$."},

  {id:"m_61009_C", subject:"math", standard:"6.1.09", domain:"6", topic:"6.1", set:"C",
   prompt:"Two lines in $\\mathbb{R}^2$ are $\\ell_1: (x,y) = (1+t, 2+t)$ and $\\ell_2: (x,y) = (3-s, 4-s)$. Do they intersect, and if so where?",
   options:["They are parallel and never intersect.","They intersect at $(2, 3)$.","They intersect at $(3, 4)$.","They are the same line."],
   answerIndex:1,
   explanation:"Set equal: $1+t = 3-s$ and $2+t = 4-s$. Subtracting the first from the second gives $1 = 1$ (consistent), so $t = 2-s$. Substituting back: $1+(2-s) = 3-s \\Rightarrow 3-s = 3-s$ ✓. Use $t=1$: point $(1+1, 2+1) = (2, 3)$. Check with $s=1$: $(3-1, 4-1)=(2,3)$ ✓."},

  // 6.1.10 — Inverse of a square matrix; use to solve linear systems
  {id:"m_61010_A", subject:"math", standard:"6.1.10", domain:"6", topic:"6.1", set:"A",
   prompt:"The inverse of $A = \\begin{bmatrix}2&1\\\\5&3\\end{bmatrix}$ is:",
   options:["$\\begin{bmatrix}3&-1\\\\-5&2\\end{bmatrix}$","$\\begin{bmatrix}3&1\\\\5&2\\end{bmatrix}$","$\\begin{bmatrix}-3&1\\\\5&-2\\end{bmatrix}$","$\\begin{bmatrix}2&-1\\\\-5&3\\end{bmatrix}$"],
   answerIndex:0,
   explanation:"For a $2\\times 2$ matrix $\\begin{bmatrix}a&b\\\\c&d\\end{bmatrix}$, the inverse is $\\frac{1}{ad-bc}\\begin{bmatrix}d&-b\\\\-c&a\\end{bmatrix}$. Here $\\det = 2\\cdot3 - 1\\cdot5 = 1$, so $A^{-1} = \\begin{bmatrix}3&-1\\\\-5&2\\end{bmatrix}$."},

  {id:"m_61010_B", subject:"math", standard:"6.1.10", domain:"6", topic:"6.1", set:"B",
   prompt:"Given $A^{-1} = \\begin{bmatrix}3&-1\\\\-5&2\\end{bmatrix}$ and the system $A\\mathbf{x} = \\begin{bmatrix}4\\\\11\\end{bmatrix}$, what is $\\mathbf{x}$?",

   answerIndex:0,
   explanation:"$\\mathbf{x} = A^{-1}\\mathbf{b} = \\begin{bmatrix}3&-1\\\\-5&2\\end{bmatrix}\\begin{bmatrix}4\\\\11\\end{bmatrix} = \\begin{bmatrix}12-11\\\\-20+22\\end{bmatrix} = \\begin{bmatrix}1\\\\2\\end{bmatrix}$."},

  {id:"m_61010_C", subject:"math", standard:"6.1.10", domain:"6", topic:"6.1", set:"C",
   prompt:"When is it NOT possible to find the inverse of a square matrix $A$?",

   answerIndex:2,

  // 6.1.11 — Determinants of 2×2 and 3×3; geometric interpretation
  {id:"m_61011_A", subject:"math", standard:"6.1.11", domain:"6", topic:"6.1", set:"A",

  {id:"m_61011_B", subject:"math", standard:"6.1.11", domain:"6", topic:"6.1", set:"B",
   prompt:"Compute $\\det\\begin{bmatrix}2&1&0\\\\1&3&1\\\\0&1&2\\end{bmatrix}$ by cofactor expansion along the first row.",

  {id:"m_61011_C", subject:"math", standard:"6.1.11", domain:"6", topic:"6.1", set:"C",
   prompt:"Two vectors $\\mathbf{u} = \\langle 3, 0 \\rangle$ and $\\mathbf{v} = \\langle 0, 4 \\rangle$ form adjacent sides of a parallelogram. The area of that parallelogram equals the absolute value of:",
   options:["The dot product $\\mathbf{u} \\cdot \\mathbf{v}$.","The determinant of the matrix whose rows are $\\mathbf{u}$ and $\\mathbf{v}$.","The sum of the magnitudes $|\\mathbf{u}| + |\\mathbf{v}|$.","The magnitude of $\\mathbf{u} + \\mathbf{v}$."],
   answerIndex:1,
   explanation:"$\\left|\\det\\begin{bmatrix}3&0\\\\0&4\\end{bmatrix}\\right| = |12 - 0| = 12$, which equals the area of the $3\\times 4$ rectangle (a special parallelogram). In general, the absolute value of the $2\\times 2$ determinant formed by two vectors gives the area of the parallelogram they span."},

  // 6.1.12 — Invertibility iff determinant nonzero; inverses of 2×2 and 3×3
  {id:"m_61012_A", subject:"math", standard:"6.1.12", domain:"6", topic:"6.1", set:"A",
   prompt:"The matrix $M = \\begin{bmatrix}1&0&2\\\\3&1&4\\\\5&2&6\\end{bmatrix}$ has $\\det(M) = 0$. What does this tell you?",
   options:["$M$ is invertible and the system $M\\mathbf{x} = \\mathbf{b}$ always has a unique solution.","$M$ is not invertible; some systems $M\\mathbf{x} = \\mathbf{b}$ have no solution or infinitely many.","$M$ has no eigenvalues.","$M$ must be the zero matrix."],
   answerIndex:1,
   explanation:"$\\det(M) = 0$ is equivalent to $M$ being singular (non-invertible). Without an inverse, the system $M\\mathbf{x}=\\mathbf{b}$ may be inconsistent or underdetermined — it cannot be solved by $\\mathbf{x} = M^{-1}\\mathbf{b}$."},

  {id:"m_61012_B", subject:"math", standard:"6.1.12", domain:"6", topic:"6.1", set:"B",
   prompt:"For which value of $k$ is the matrix $\\begin{bmatrix}2&k\\\\3&6\\end{bmatrix}$ NOT invertible?",

  {id:"m_61012_C", subject:"math", standard:"6.1.12", domain:"6", topic:"6.1", set:"C",
   prompt:"Using the formula for the inverse of a $2\\times 2$ matrix, find $A^{-1}$ where $A = \\begin{bmatrix}4&3\\\\3&2\\end{bmatrix}$.",
   options:["$\\begin{bmatrix}-2&3\\\\3&-4\\end{bmatrix}$","$\\begin{bmatrix}2&-3\\\\-3&4\\end{bmatrix}$","$\\begin{bmatrix}2&3\\\\3&4\\end{bmatrix}$","$\\begin{bmatrix}-4&3\\\\3&-2\\end{bmatrix}$"],
   answerIndex:0,
   explanation:"$\\det(A) = 4\\cdot2 - 3\\cdot3 = 8-9 = -1$. Then $A^{-1} = \\frac{1}{-1}\\begin{bmatrix}2&-3\\\\-3&4\\end{bmatrix} = \\begin{bmatrix}-2&3\\\\3&-4\\end{bmatrix}$. Verify: $A\\cdot A^{-1} = I$ ✓."},

  // 6.1.13 — Dot product; geometric interpretation; law of cosines
  {id:"m_61013_A", subject:"math", standard:"6.1.13", domain:"6", topic:"6.1", set:"A",
   prompt:"The dot product $\\mathbf{u} \\cdot \\mathbf{v}$ of $\\mathbf{u} = \\langle 3, 4 \\rangle$ and $\\mathbf{v} = \\langle 4, -3 \\rangle$ equals:",

   answerIndex:2,

  {id:"m_61013_B", subject:"math", standard:"6.1.13", domain:"6", topic:"6.1", set:"B",
   prompt:"The dot product formula $\\mathbf{u}\\cdot\\mathbf{v} = |\\mathbf{u}||\\mathbf{v}|\\cos\\theta$ can be rearranged to find the angle between vectors. If $\\mathbf{u} = \\langle 1, 2, -2 \\rangle$ and $\\mathbf{v} = \\langle 2, 1, 2 \\rangle$, what is the angle between them?",
   options:["$0°$","$45°$","$90°$","$60°$"],
   answerIndex:2,
   explanation:"$\\mathbf{u}\\cdot\\mathbf{v} = 2+2-4 = 0$, so $\\cos\\theta = 0$ and $\\theta = 90°$. These vectors are orthogonal, even in $\\mathbb{R}^3$."},

  {id:"m_61013_C", subject:"math", standard:"6.1.13", domain:"6", topic:"6.1", set:"C",
   prompt:"The Law of Cosines states $c^2 = a^2 + b^2 - 2ab\\cos C$. Which identity involving the dot product is the vector algebra version of this same relationship?",
   options:["$|\mathbf{u}|^2 + |\mathbf{v}|^2 = 2\,\mathbf{u}\cdot\mathbf{v}$","$|\mathbf{u}+\mathbf{v}|^2 = |\mathbf{u}|^2 - |\mathbf{v}|^2$","$\mathbf{u}\cdot\mathbf{v} = |\mathbf{u}-\mathbf{v}|$","$|\mathbf{u}-\mathbf{v}|^2 = |\mathbf{u}|^2 + |\mathbf{v}|^2 - 2\,\mathbf{u}\cdot\mathbf{v}$"],
   answerIndex:3,
   explanation:"Expanding $|\\mathbf{u}-\\mathbf{v}|^2 = (\\mathbf{u}-\\mathbf{v})\\cdot(\\mathbf{u}-\\mathbf{v}) = |\\mathbf{u}|^2 - 2\\,\\mathbf{u}\\cdot\\mathbf{v} + |\\mathbf{v}|^2$. Since $\\mathbf{u}\\cdot\\mathbf{v} = |\\mathbf{u}||\\mathbf{v}|\\cos\\theta$, this is exactly the Law of Cosines with $|\\mathbf{u}-\\mathbf{v}|$ as side $c$ and $\\theta$ as the included angle."},

  {id:"m_61014_A", subject:"math", standard:"6.1.14", domain:"6", topic:"6.1", set:"A",

  {id:"m_61014_B", subject:"math", standard:"6.1.14", domain:"6", topic:"6.1", set:"B",
