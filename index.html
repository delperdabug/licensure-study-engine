     "The teacher has changed what the student is expected to learn without IEP authorization — curriculum modifications require the IEP team's determination, not unilateral teacher decision. A student who is expected to meet grade-level standards with accommodations is not a candidate for content modification without an IEP team decision to that effect."],
   answerIndex:3,
   explanation:"Accommodations and modifications are legally and educationally distinct. An IEP that specifies accommodations but not modifications means the team has determined the student can and should meet grade-level content standards with appropriate access supports. A teacher who unilaterally reduces content expectations is overriding the IEP team's determination — and potentially reducing the student's opportunity to access the standard education program they are entitled to. Curriculum modifications require IEP team decision-making, not individual teacher discretion."},

  {id:"p_4307_C", subject:"ptk", standard:"4.3.07", domain:"4", topic:"4.3", set:"C",
   prompt:"A student with significant mathematical learning disabilities has IEP goals focused on functional numeracy (making change, reading a schedule, calculating tips) rather than grade-level algebra. While the class works on solving systems of equations, the special education co-teacher works with this student on applying percentage calculations in real-world scenarios. What does this represent and is it appropriate?",
   options:[
     "This represents curriculum modification appropriate to the student's IEP goals — the student is receiving specialized instruction aligned to their documented learning objectives (functional numeracy) in the same classroom setting as peers, rather than receiving watered-down algebra instruction that doesn't serve their IEP outcomes.",
     "This is inappropriate exclusion from grade-level mathematics instruction.",
     "This is an accommodation — the teacher has changed the delivery method but not the content.",
     "Curriculum modification in mathematics requires a separate classroom placement; it cannot occur in an inclusion setting."],
   answerIndex:0,
   explanation:"When a student's IEP specifies goals significantly below grade-level (functional numeracy vs. algebra), the appropriate instruction is aligned to those IEP goals — not to the grade-level curriculum the student is not expected to meet. This is curriculum modification: the content itself is different from what peers are learning, reflecting the IEP team's determination of what this student should be learning. Providing the same algebra instruction as a modification to functional-numeracy level would not serve the student's documented learning goals."},

  // ---- 4.3.08  Collaborates to develop and implement IEPs, transition plans, and behavior intervention plans ----
  // A: IEP collaboration role | B: transition plan collaboration | C(math): BIP collaboration in math
  {id:"p_4308_A", subject:"ptk", standard:"4.3.08", domain:"4", topic:"4.3", set:"A",
   prompt:"A general education teacher is invited to participate in an IEP meeting for a student in her class. She comes prepared with documentation of the student's current classroom performance, observations about the student's strengths and challenges, and specific questions about accommodations she hasn't found effective. What is her role in this meeting?",
   options:[
     "The general education teacher is present for compliance purposes only; the special education team makes all IEP decisions.",
     "As a member of the IEP team, the general education teacher provides critical information about the student's performance in the general education setting and implementation experience with current accommodations — her input directly informs the development of an IEP that will actually work in practice.",
     "The general education teacher should only attend IEP meetings if the student's disability is academic, not behavioral.",
     "Sharing observations about challenges may bias the IEP team against the student."],
   answerIndex:1,
   explanation:"General education teachers are required members of the IEP team for good reason: they have direct, ongoing observation of how the student performs in the general education environment — information specialists who see the student for shorter or more targeted times cannot provide. Their documentation of current performance, observations of strengths and challenges, and feedback on what accommodations are or aren't working are essential inputs for designing an IEP that will function in the actual setting where the student spends most of their day."},

  {id:"p_4308_B", subject:"ptk", standard:"4.3.08", domain:"4", topic:"4.3", set:"B",
   prompt:"A 16-year-old student with a disability is approaching the age when transition planning must begin. The IEP team is developing a post-secondary transition plan, and the student's content-area teachers are asked to contribute. What relevant information should a content-area teacher bring to this process?",
   options:[
     "Content-area teachers have no relevant input for transition planning; this is the school counselor's domain.",
     "Content-area teachers can contribute information about the student's academic skills relevant to post-secondary goals, performance in career-relevant subjects, areas of strength or interest observed in their class, and which types of supports have helped the student succeed — all of which inform transition goal-setting.",
     "Transition planning only requires the special education teacher and parents; general education input is optional.",
     "The student's preference should be the sole input for transition planning."],
   answerIndex:1,
   explanation:"Transition plans are designed to prepare a student for life after secondary school (post-secondary education, employment, independent living). Content-area teachers observe relevant skills daily: a math teacher sees a student's quantitative reasoning; a science teacher sees their lab procedure skills; a tech teacher sees their practical application abilities. This real-world performance data is directly relevant to setting transition goals and identifying needed supports. General education teachers are genuine contributors to this process, not just compliance attendees."},

  {id:"p_4308_C", subject:"ptk", standard:"4.3.08", domain:"4", topic:"4.3", set:"C",
   prompt:"A student with a behavior intervention plan (BIP) is included in a math class. The math teacher is provided with the BIP but hasn't read it and isn't sure how to implement the behavioral strategies during math-specific situations. A behavioral incident occurs that the BIP specifically addresses, but the teacher doesn't use the agreed protocol. What has the teacher failed to do?",
   options:[
     "The teacher is not responsible for implementing the BIP; that is the behavior specialist's role.",
     "BIP implementation in a math class is not required if the behavior is not math-related.",
     "The teacher should have modified the BIP independently to fit the math classroom context.",
     "The teacher has failed to implement the collaborative plan she is a party to — a BIP requires implementation by all adults who work with the student, including general education teachers in whose class the student is placed. Not reading or implementing the BIP represents a failure of the collaborative obligation this standard requires."],
   answerIndex:3,
   explanation:"A behavior intervention plan is a collaborative document developed by a team — its effectiveness depends on consistent implementation across settings and by all adults who interact with the student. When a general education teacher is included as someone who works with the student, they are part of the implementation team. Not reading or using the BIP is not a neutral act — it means the student is in a setting where the agreed behavioral support is absent, undermining the consistency that makes BIPs effective."},

  // ---- 4.3.09  Collaborates to monitor progress and revise plans as needed ----
  // A: ongoing monitoring and revision | B: evaluate static plan problem | C(math): progress monitoring in math
  {id:"p_4309_A", subject:"ptk", standard:"4.3.09", domain:"4", topic:"4.3", set:"A",
   prompt:"A student's IEP has been in place for five months. The general education teacher has noticed that one of the designated accommodations is not improving the student's performance — in fact, the student seems to be relying on it in a way that may be limiting development. She documents her observations and brings them to the special education team for discussion. What collaborative practice does this represent?",
   options:[
     "The teacher is overstepping by questioning a legally developed IEP.",
     "The teacher is fulfilling her collaborative role in monitoring student progress and providing feedback that may prompt plan revision — IEPs are not static documents; they are revised when progress monitoring indicates current goals or strategies need adjustment.",
     "IEP accommodations cannot be changed once the IEP is written for the year.",
     "The special education team should have identified this issue independently without input from the general education teacher."],
   answerIndex:1,
   explanation:"IEPs include goals and accommodations based on the best available information at the time of writing — but student response to those plans is not always predictable. Monitoring student progress and bringing observations to the team for discussion is exactly how plans get revised to better serve students. The general education teacher's ongoing classroom observation is a critical data source for this monitoring function. IEPs can be revised at any time when data indicates a change is warranted — they are living documents, not fixed annual contracts."},

  {id:"p_4309_B", subject:"ptk", standard:"4.3.09", domain:"4", topic:"4.3", set:"B",
   prompt:"A student's behavior intervention plan was written six months ago and has not been reviewed since. The student's behaviors have changed significantly — some addressed behaviors have resolved, while new challenging behaviors have emerged. The team continues implementing the original BIP without revision. What is the problem?",
   options:[
     "Behavior intervention plans cannot be revised more than once per academic year.",
     "A BIP that isn't revised in response to changes in the student's behavioral profile is no longer an accurate or effective plan — it addresses behaviors that may no longer be present and ignores new ones that are. Collaborative monitoring should trigger plan revision when student behavior changes significantly.",
     "The team should wait until the annual IEP review to revise the BIP.",
     "BIP revision requires a new psychological evaluation before any changes can be made."],
   answerIndex:1,
   explanation:"The value of a behavior intervention plan depends on its current accuracy and relevance. A BIP developed for a specific behavioral profile that has since changed is not serving the student — it's responding to a student who no longer exists in exactly the same way. Ongoing monitoring is precisely the mechanism that should detect this drift and trigger revision. The collaborative obligation includes bringing new behavioral data to the team and revising the plan to reflect the student's current needs."},

  {id:"p_4309_C", subject:"ptk", standard:"4.3.09", domain:"4", topic:"4.3", set:"C",
   prompt:"A math teacher notices that a student's IEP goal of solving two-step equations has been met consistently for six weeks — the student performs at or above the benchmark on every check. She documents this and brings it to the IEP team with a recommendation that the goal be updated to a more challenging target. What collaborative practice is this?",
   options:[
     "The teacher should not recommend goal changes; that is the special education teacher's role.",
     "IEP goals cannot be changed until the annual review, regardless of student progress.",
     "Recommending a more challenging goal may discourage the student who has worked hard to meet the current one.",
     "The teacher is contributing to collaborative progress monitoring and plan revision — her systematic documentation of the student meeting the goal is exactly the evidence-based input that should drive upward revision of IEP goals when students master targets, ensuring the plan continues to promote growth rather than maintenance."],
   answerIndex:3,
   explanation:"When a student consistently meets an IEP goal, the plan should be updated to reflect new, appropriately challenging targets — otherwise the IEP becomes a maintenance plan rather than a growth plan. The math teacher's systematic documentation (six weeks of data) is the evidence base for this recommendation. Her collaborative role includes bringing this data to the team and participating in the discussion about what the next appropriate goal should be. This is progress monitoring leading to plan revision, which is exactly the ongoing collaborative process this standard describes."},

  // ---- 4.3.10  Understands and applies laws governing confidentiality of disability-related records ----
  // A: FERPA/IDEA confidentiality | B: evaluate a confidentiality breach | C(math): classroom application of confidentiality
  {id:"p_4310_A", subject:"ptk", standard:"4.3.10", domain:"4", topic:"4.3", set:"A",
   prompt:"A teacher is asked by a parent of another student whether a student with a visible disability in the class has a formal diagnosis or an IEP. The teacher declines to provide any information and explains that student records are confidential. The parent is frustrated. What legal and ethical principle is the teacher applying?",
   options:[
     "The teacher is being unnecessarily secretive; parents have a right to know about disabilities of students who interact with their children.",
     "The teacher is correctly applying federal confidentiality law — disability-related records, including IEPs and diagnoses, are protected under FERPA and IDEA. One parent does not have the legal right to access information about another student's disability status or records.",
     "The teacher should have consulted the principal before declining to share the information.",
     "The teacher should have confirmed or denied whether an IEP exists without disclosing its contents."],
   answerIndex:1,
   explanation:"Federal law (FERPA and IDEA) protects the confidentiality of student disability-related records with significant specificity. Parents of one student do not have any legal right to information about another student's disability, diagnosis, or IEP. Confirming or denying the existence of an IEP, sharing a diagnosis, or providing any information from disability-related records to unauthorized individuals is a legal and ethical violation. The teacher's refusal is not secretiveness — it is legally mandated protection."},

  {id:"p_4310_B", subject:"ptk", standard:"4.3.10", domain:"4", topic:"4.3", set:"B",
   prompt:"A teacher mentions to colleagues in the faculty lounge that a particular student has ADHD and an IEP, using the student's name. Several teachers who don't work with this student hear the conversation. What law has the teacher potentially violated and why?",
   options:[
     "No law has been violated because the disclosure was to educational professionals in a school building.",
     "The teacher may have violated FERPA and IDEA confidentiality provisions — disability-related information (including diagnoses and IEP status) should only be shared with school staff on a 'need to know' basis. Disclosing identifiable disability information to colleagues who don't work with the student is a confidentiality breach regardless of the setting.",
     "The violation only occurs if the information leaves the school building.",
     "Confidentiality only applies to written records; verbal disclosures are not covered by FERPA."],
   answerIndex:1,
   explanation:"FERPA and IDEA protect student disability-related information — including verbal disclosures — and the standard for sharing within a school is 'legitimate educational interest,' meaning only staff who need the information to fulfill their professional responsibilities with that student. Disclosing a student's ADHD diagnosis and IEP status to colleagues who don't work with that student, in a social setting, is a breach of confidentiality even though it occurred within the school building. The venue does not determine whether a disclosure is permissible; the recipient's legitimate educational interest does."},

  {id:"p_4310_C", subject:"ptk", standard:"4.3.10", domain:"4", topic:"4.3", set:"C",
   prompt:"A math teacher receives a student's IEP from the special education coordinator. The IEP contains disability-related information, testing records, and the student's diagnosis. The teacher keeps the document in an unlocked classroom drawer accessible to students and parent volunteers. What confidentiality obligation has the teacher failed to meet?",
   options:[
     "IEP documents do not need to be secured; they are educational documents, not medical records.",
     "The teacher has failed to maintain the security of confidential student records — FERPA and IDEA require that disability-related records, including IEPs, be stored securely and accessible only to authorized personnel. Keeping an IEP in an unlocked, publicly accessible location violates this obligation.",
     "The confidentiality obligation only applies to digital records, not physical documents.",
     "The teacher is responsible for the content of the IEP, not its physical storage."],
   answerIndex:1,
   explanation:"Confidentiality obligations extend to the physical security of records. An IEP contains sensitive disability-related information protected by FERPA and IDEA — its storage must ensure that only authorized personnel have access. An unlocked drawer accessible to students and parent volunteers is not a secure location. If a student, parent volunteer, or other unauthorized person accesses the IEP, a confidentiality breach has occurred regardless of the teacher's intent. Physical security of student records is part of the confidentiality obligation."},

// ── Domain 2 · Topic 2.1 — Algebra and Functions ──────────────────────────
// Standards 2.1.01–2.1.31 · 93 questions

// ── 2.1.01 ──
{id:"m_21001_A", subject:"math", standard:"2.1.01", domain:"2", topic:"2.1", set:"A",
 prompt:"Which of the following best describes the difference between a relation and a function?",
 options:[
   "A function allows repeated output values; a relation does not.",
   "A relation must be expressed as an equation, while a function is expressed as a graph.",
   "A function can have multiple inputs mapping to different outputs, while a relation cannot.",
   "A relation is any set of ordered pairs, while a function is a relation where each input has exactly one output."
 ],
 answerIndex:3,
 explanation:"A relation is simply any set of ordered pairs (input-output pairs). A function is a special kind of relation with the restriction that every input (domain element) maps to exactly one output (range element). Functions allow repeated outputs — e.g., f(1)=4 and f(3)=4 is fine — but not repeated inputs with different outputs."},

{id:"m_21001_B", subject:"math", standard:"2.1.01", domain:"2", topic:"2.1", set:"B",
 prompt:"The set $\\{(1,3),(2,5),(3,3),(4,7)\\}$ — which statement is correct?",
 options:[
   "It is both a relation and a function.",
   "It is a relation but not a function because an output repeats.",
   "It is not a relation because 3 appears twice as an output.",
   "It is neither a relation nor a function."
 ],
 answerIndex:2,
 explanation:"Every set of ordered pairs is a relation by definition. This set is also a function: each input (1, 2, 3, 4) maps to exactly one output. The fact that the output 3 appears twice (for inputs 1 and 3) is perfectly legal — repeated outputs do not violate the function rule. Only repeated inputs with different outputs would fail."},

{id:"m_21001_C", subject:"math", standard:"2.1.01", domain:"2", topic:"2.1", set:"C",
 prompt:"A vending machine maps button codes to snack prices. Button A1 gives chips for $1.50, A2 gives crackers for $1.25, A3 gives chips for $1.50. Which concept does this scenario best illustrate?",
 options:[
   "A relation that is not a function, because two buttons give chips.",
   "A function only if no two buttons share the same price.",
   "Not a relation, because prices repeat.",
   "A function, because each button code maps to exactly one price."
 ],
 answerIndex:3,
 explanation:"The mapping from button codes to prices is a function: A1→$1.50, A2→$1.25, A3→$1.50. Each input (button code) has exactly one output (price). Multiple inputs sharing the same output is allowed. A relation that is not a function would require one input to map to two or more different outputs simultaneously."},

// ── 2.1.02 ──
{id:"m_21002_A", subject:"math", standard:"2.1.02", domain:"2", topic:"2.1", set:"A",
 prompt:"A function $f$ is described verbally as 'triple the input then subtract 4.' Which symbolic rule and table of values are consistent with this description?",
 options:[
   "$f(x)=4-3x$; table: $x=0\to4,\;x=2\to-2,\;x=5\to-11$",
   "$f(x)=3(x-4)$; table: $x=0\to-12,\;x=2\to-6,\;x=5\to3$",
   "$f(x)=3x-4$; table: $x=0\to-4,\;x=2\to2,\;x=5\to11$",
   "$f(x)=3x+4$; table: $x=0\to4,\;x=2\to10,\;x=5\to19$"
 ],
 answerIndex:2,
 explanation:"'Triple the input then subtract 4' translates to $f(x)=3x-4$. Checking: $f(0)=−4$, $f(2)=6−4=2$, $f(5)=15−4=11$. The other options either mis-order operations or change the sign."},

{id:"m_21002_B", subject:"math", standard:"2.1.02", domain:"2", topic:"2.1", set:"B",
 prompt:"Which representation is NOT a valid way to define a function?",
 options:[
   "A verbal rule: 'output is the square of the input'",
   "A graph where every vertical line crosses the curve at most once",
   "A table where one input value appears in two rows with different outputs",
   "A symbolic rule: $g(t)=t^2+1$"
 ],
 answerIndex:2,
 explanation:"A table where a single input appears with two different outputs violates the definition of a function. For example, input 3 mapping to both 7 and 9 means 3 has two images, which is not allowed. The other three representations (verbal rule, graph passing the vertical-line test, symbolic formula) are all legitimate function representations."},

{id:"m_21002_C", subject:"math", standard:"2.1.02", domain:"2", topic:"2.1", set:"C",
 prompt:"A function is given by the table: $x:\\;1,2,3,4$ and $y:\\;5,8,11,14$. Which symbolic rule matches?",
 options:[
   "$y=2x+3$",
   "$y=3x-2$",
   "$y=4x+1$",
   "$y=3x+2$"
 ],
 answerIndex:3,
 explanation:"Check the pattern: from $x=1$ to $x=2$, $y$ increases by 3, so slope $m=3$. Using point $(1,5)$: $5=3(1)+b\\Rightarrow b=2$. So $y=3x+2$. Verify: $3(2)+2=8$, $3(3)+2=11$, $3(4)+2=14$. ✓"},

// ── 2.1.03 ──
{id:"m_21003_A", subject:"math", standard:"2.1.03", domain:"2", topic:"2.1", set:"A",
 prompt:"The function $f(x)=\\dfrac{1}{x-3}$ is written without a stated domain. What is its natural (default) domain?",
 options:[
   "All real numbers",
   "All positive real numbers",
   "All real numbers greater than 3",
   "All real numbers except $x=3$"
 ],
 answerIndex:3,
 explanation:"When no domain is specified, the default domain is all real numbers for which the expression is defined. Here the denominator $x-3=0$ when $x=3$, making the expression undefined. So the natural domain is $\\mathbb{R}\\setminus\\{3\\}$, i.e., all reals except 3."},

{id:"m_21003_B", subject:"math", standard:"2.1.03", domain:"2", topic:"2.1", set:"B",
 prompt:"For $g(x)=\\sqrt{2x-6}$, what is the natural domain, and which variable is dependent?",
 options:[
   "Domain: all reals; $x$ is dependent",
   "Domain: $x\geq0$; $g$ is dependent",
   "Domain: $x>3$; $x$ is dependent",
   "Domain: $x\geq3$; $g$ (or $y$) is dependent"
 ],
 answerIndex:3,
 explanation:"The square root requires $2x-6\\geq0\\Rightarrow x\\geq3$. The output $g(x)$ depends on the choice of $x$, so $g$ (equivalently $y$) is the dependent variable and $x$ is the independent variable."},

{id:"m_21003_C", subject:"math", standard:"2.1.03", domain:"2", topic:"2.1", set:"C",
 prompt:"Why does the convention of a 'default domain' exist for functions defined by formulas?",
 options:[
   "To restrict functions to positive outputs only",
   "To automatically limit functions to integer inputs",
   "To use the largest set of real inputs for which the formula produces a real output, avoiding the need to state it explicitly every time",
   "To ensure every function has a finite domain"
 ],
 answerIndex:2,
 explanation:"The default (natural or implied) domain convention saves having to specify the domain every time: unless otherwise stated, assume the domain is all real numbers for which the formula is defined and produces a real value. This avoids division by zero, even roots of negatives, logarithms of non-positives, etc."},

// ── 2.1.04 ──
{id:"m_21004_A", subject:"math", standard:"2.1.04", domain:"2", topic:"2.1", set:"A",
 prompt:"Which of the following sets of ordered pairs does NOT represent a function?",
 options:[
   "$\\{(0,0),(1,1),(2,4),(3,9)\\}$",
   "$\\{(1,2),(2,2),(3,2)\\}$",
   "$\\{(1,3),(2,5),(1,7)\\}$",
   "$\\{(-1,1),(0,0),(1,1)\\}$"
 ],
 answerIndex:2,
 explanation:"$\\{(1,3),(2,5),(1,7)\\}$ has the input 1 paired with two different outputs (3 and 7), violating the function rule. The other sets each have unique inputs. Note that repeated outputs (as in B and D) are fine."},

{id:"m_21004_B", subject:"math", standard:"2.1.04", domain:"2", topic:"2.1", set:"B",
 prompt:"A graph passes the vertical line test if and only if every vertical line intersects it at most once. Which conclusion follows?",
 options:[
   "The graph represents a one-to-one function.",
   "The graph has no repeated $y$-values.",
   "The graph represents an invertible function.",
   "The graph represents a function (but not necessarily one-to-one)."
 ],
 answerIndex:3,
 explanation:"The vertical line test determines whether a graph represents a function (each input has at most one output). It does NOT guarantee one-to-one (that would require the horizontal line test too). A function can have repeated $y$-values (e.g., a parabola) and still pass the vertical line test."},

{id:"m_21004_C", subject:"math", standard:"2.1.04", domain:"2", topic:"2.1", set:"C",
 prompt:"Is $x=y^2$ a function of $x$? Justify.",
 options:[
   "Yes, because for each $x\geq0$ there is a unique $y$.",
   "No, because $x$ cannot equal $y^2$ for negative values.",
   "Yes, because the equation defines a parabola.",
   "No — solving for $y$ gives $y=\pm\sqrt{x}$, so each positive $x$ produces two $y$-values, meaning $y$ is not a function of $x$."
 ],
 answerIndex:3,
 explanation:"If we ask whether $y$ is a function of $x$ via the relation $x=y^2$, we solve to get $y=\\pm\\sqrt{x}$. For any $x>0$ there are two values of $y$, so the relation does not define $y$ as a function of $x$. Graphically, the sideways parabola fails the vertical line test."},

// ── 2.1.05 ──
{id:"m_21005_A", subject:"math", standard:"2.1.05", domain:"2", topic:"2.1", set:"A",
 prompt:"Find the sum of the first 20 terms of the arithmetic series with first term $a_1=3$ and common difference $d=4$.",
 options:[
   "840",
   "800",
   "820",
   "780"
 ],
 answerIndex:2,
 explanation:"For an arithmetic series: $S_n=\\dfrac{n}{2}(2a_1+(n-1)d)$. With $n=20,\\,a_1=3,\\,d=4$: $S_{20}=\\dfrac{20}{2}(6+76)=10\\cdot82=820$."},

{id:"m_21005_B", subject:"math", standard:"2.1.05", domain:"2", topic:"2.1", set:"B",
 prompt:"A geometric series has first term 8 and common ratio $\\frac{1}{2}$. What is the sum of the infinite series?",
 options:[
   "12",
   "The series diverges.",
   "24",
   "16"
 ],
 answerIndex:3,
 explanation:"An infinite geometric series converges when $|r|<1$: $S=\\dfrac{a_1}{1-r}=\\dfrac{8}{1-\\frac{1}{2}}=\\dfrac{8}{\\frac{1}{2}}=16$."},

{id:"m_21005_C", subject:"math", standard:"2.1.05", domain:"2", topic:"2.1", set:"C",
 prompt:"The $n$th term of an arithmetic sequence is given by $a_n=5+3(n-1)$. What is the sum of the first 10 terms?",
 options:[
   "185",
   "195",
   "170",
   "200"
 ],
 answerIndex:0,
 explanation:"$a_1=5,\\;a_{10}=5+3(9)=32$. Sum formula: $S_{10}=\\dfrac{10}{2}(a_1+a_{10})=5(5+32)=5\\cdot37=185$."},

// ── 2.1.06 ──
{id:"m_21006_A", subject:"math", standard:"2.1.06", domain:"2", topic:"2.1", set:"A",
 prompt:"To derive the formula for the sum of a finite arithmetic series $S_n=a_1+a_2+\\cdots+a_n$, a student writes $S_n$ twice — once forward and once reversed — then adds them. What result does this give, and why?",
 options:[
   "$2S_n=n(a_1+a_n)$, because each of the $n$ pairs sums to $a_1+a_n$.",
   "$2S_n=n\\cdot a_1$, because all terms equal $a_1$.",
   "$S_n=n\\cdot a_n$, because the last term dominates.",
   "$2S_n=(a_1+a_n)$, because only the first and last terms matter."
 ],
 answerIndex:0,
 explanation:"Writing $S_n$ forward and backward and adding column by column: each of the $n$ pairs $(a_k + a_{n+1-k})$ equals $a_1+a_n$ (constant in an arithmetic sequence). So $2S_n=n(a_1+a_n)$, giving $S_n=\\dfrac{n(a_1+a_n)}{2}$."},

{id:"m_21006_B", subject:"math", standard:"2.1.06", domain:"2", topic:"2.1", set:"B",
 prompt:"To derive the sum formula for a finite geometric series $S=a+ar+ar^2+\\cdots+ar^{n-1}$, a student computes $S-rS$. What is the result?",
 options:[
   "$S(1-r)=a(1-r^n)$, so $S=\\dfrac{a(1-r^n)}{1-r}$ for $r\\neq1$.",
   "$S(1+r)=a(1+r^n)$, so $S=\\dfrac{a(1+r^n)}{1+r}$.",
   "$S-rS=a-ar^{n-1}$, so $S=\\dfrac{a}{1-r^{n-1}}$.",
   "$S(1-r)=a$, so $S=\\dfrac{a}{1-r}$ for any $r$."
 ],
 answerIndex:0,
 explanation:"$S=a+ar+\\cdots+ar^{n-1}$ and $rS=ar+ar^2+\\cdots+ar^n$. Subtracting: $S-rS=a-ar^n$, so $S(1-r)=a(1-r^n)$, giving $S=\\dfrac{a(1-r^n)}{1-r}$. As $n\\to\\infty$ with $|r|<1$, $r^n\\to0$ and $S\\to\\dfrac{a}{1-r}$."},

{id:"m_21006_C", subject:"math", standard:"2.1.06", domain:"2", topic:"2.1", set:"C",
 prompt:"Why does the infinite geometric series formula $S=\\dfrac{a}{1-r}$ only apply when $|r|<1$?",
 options:[
   "Because $a$ must be positive for the series to converge.",
   "Because you need at least 100 terms to apply it.",
   "Because the formula was derived only for positive $r$.",
   "Because when $|r|\geq1$ the terms do not approach zero, so partial sums grow without bound and the series diverges."
 ],
 answerIndex:3,
 explanation:"For a series to converge, its terms must approach zero. In a geometric series, the general term is $ar^{n-1}$. If $|r|\\geq1$, the terms do not shrink to zero (they stay the same size or grow), so the partial sums diverge. Only when $|r|<1$ do the terms vanish and the formula $S=\\dfrac{a}{1-r}$ is valid."},

// ── 2.1.07 ──
{id:"m_21007_A", subject:"math", standard:"2.1.07", domain:"2", topic:"2.1", set:"A",
 prompt:"The formula $A=P(1+r)^t$ models compound interest, where $P$ is principal, $r$ is annual rate, and $t$ is years. If $P=\\$1000$, $r=0.05$, what does the formula predict after $t=3$ years?",
 options:[
   "\$1150.00",
   "\$1162.50",
   "\$1125.00",
   "\$1157.63"
 ],
 answerIndex:3,
 explanation:"$A=1000(1.05)^3=1000\\times1.157625=\\$1157.63$. The formula shows exponential growth, not simple (linear) interest. Option A ($1150) would result from simple interest over 3 years."},

{id:"m_21007_B", subject:"math", standard:"2.1.07", domain:"2", topic:"2.1", set:"B",
 prompt:"The distance formula for free fall is $d=\\frac{1}{2}gt^2$ where $g\\approx9.8$ m/s². How far does an object fall in 3 seconds, and how does doubling the time affect the distance?",
 options:[
   "$d=44.1$ m; doubling $t$ doubles $d$.",
   "$d=88.2$ m; doubling $t$ doubles $d$.",
   "$d=29.4$ m; doubling $t$ quadruples $d$.",
   "$d=44.1$ m; doubling $t$ quadruples $d$."
 ],
 answerIndex:3,
 explanation:"$d=\\frac{1}{2}(9.8)(9)=44.1$ m. Since $d\\propto t^2$, doubling $t$ multiplies $d$ by $2^2=4$. This is a key interpretation skill: the exponent determines how output scales with input changes."},

{id:"m_21007_C", subject:"math", standard:"2.1.07", domain:"2", topic:"2.1", set:"C",
 prompt:"A formula gives the $n$th triangular number as $T_n=\\dfrac{n(n+1)}{2}$. What is the 8th triangular number, and what is the relationship between consecutive triangular numbers?",
 options:[
   "$T_8=36$; each successive triangular number exceeds the previous by $n$.",
   "$T_8=36$; consecutive triangular numbers differ by a constant.",
   "$T_8=40$; each term increases by 8.",
   "$T_8=28$; consecutive differences decrease."
 ],
 answerIndex:0,
 explanation:"$T_8=\\frac{8\\cdot9}{2}=36$. The difference $T_n-T_{n-1}=\\frac{n(n+1)}{2}-\\frac{(n-1)n}{2}=\\frac{n(n+1-n+1)}{2}=n$. So each new triangular number exceeds the previous by exactly $n$, not a constant — the differences grow, making the sequence quadratic."},

// ── 2.1.08 ──
{id:"m_21008_A", subject:"math", standard:"2.1.08", domain:"2", topic:"2.1", set:"A",
 prompt:"Let $f(x)=2x+1$ and $g(x)=x^2$. Find $(f\\circ g)(3)$.",
 options:[
   "49",
   "13",
   "37",
   "19"
 ],
 answerIndex:3,
 explanation:"$(f\\circ g)(3)=f(g(3))=f(9)=2(9)+1=19$. Note the order: first apply $g$, then $f$. $(g\\circ f)(3)=g(7)=49$ — composition is not commutative."},

{id:"m_21008_B", subject:"math", standard:"2.1.08", domain:"2", topic:"2.1", set:"B",
 prompt:"Find the inverse of $f(x)=3x-5$.",
 options:[
   "$f^{-1}(x)=\\dfrac{x+5}{3}$",
   "$f^{-1}(x)=\\dfrac{x-5}{3}$",
   "$f^{-1}(x)=3x+5$",
   "$f^{-1}(x)=\\dfrac{1}{3x-5}$"
 ],
 answerIndex:0,
 explanation:"Swap $x$ and $y$ in $y=3x-5$: $x=3y-5$. Solve for $y$: $y=\\dfrac{x+5}{3}$. So $f^{-1}(x)=\\dfrac{x+5}{3}$. Verify: $f(f^{-1}(x))=3\\cdot\\dfrac{x+5}{3}-5=x+5-5=x$. ✓"},

{id:"m_21008_C", subject:"math", standard:"2.1.08", domain:"2", topic:"2.1", set:"C",
 prompt:"Let $f(x)=x+4$ and $g(x)=2x$. Find $(f+g)(x)$ and $(f\\cdot g)(x)$.",
 options:[
   "$(f+g)(x)=3x+4$; $(f\\cdot g)(x)=2x^2+8x$",
   "$(f+g)(x)=2x+4$; $(f\\cdot g)(x)=2x+8$",
   "$(f+g)(x)=3x+4$; $(f\\cdot g)(x)=2x+4$",
   "$(f+g)(x)=x^2+4$; $(f\\cdot g)(x)=2x^2$"
 ],
 answerIndex:0,
 explanation:"$(f+g)(x)=f(x)+g(x)=(x+4)+2x=3x+4$. $(f\\cdot g)(x)=f(x)\\cdot g(x)=(x+4)(2x)=2x^2+8x$. Algebraic combinations treat functions like algebraic expressions applied to the same input."},

// ── 2.1.09 ──
{id:"m_21009_A", subject:"math", standard:"2.1.09", domain:"2", topic:"2.1", set:"A",
 prompt:"Solve for $x$: $\\;4(x-3)+5=2x+7$.",
 options:[
   "$x=4$",
   "$x=5$",
   "$x=7$",
   "$x=9$"
 ],
 answerIndex:2,
 explanation:"Expand the left side: $4x-12+5=4x-7$. Set equal to the right side: $4x-7=2x+7$. Subtract $2x$: $2x-7=7$. Add 7: $2x=14$, so $x=7$. Check: $4(7-3)+5=4(4)+5=21$ and $2(7)+7=21$. ✓"},

{id:"m_21009_B", subject:"math", standard:"2.1.09", domain:"2", topic:"2.1", set:"B",
 prompt:"A student solves $3(2x+1)=5x+8$ and gets $x=5$. Is the student correct, and what procedure did they follow?",
 options:[
   "Correct. Distribute: $6x+3=5x+8$; subtract $5x$: $x+3=8$; subtract 3: $x=5$.",
   "Incorrect. The correct answer is $x=3$.",
   "Correct. Factor both sides first, then cancel.",
   "Incorrect. You cannot distribute across a sum."
 ],
 answerIndex:0,
 explanation:"Distribute: $6x+3=5x+8$. Subtract $5x$ from both sides: $x+3=8$. Subtract 3: $x=5$. Check: $3(11)=33$ and $5(5)+8=33$. ✓ The procedure — distribute, collect variable terms, isolate — is the standard linear equation algorithm."},

{id:"m_21009_C", subject:"math", standard:"2.1.09", domain:"2", topic:"2.1", set:"C",
 prompt:"The equation $\\dfrac{x}{3}+2=5$ has exactly one solution. What is it, and why does the procedure of subtracting 2 then multiplying by 3 succeed?",
 options:[
   "$x=1$; the procedure reverses the operations in reverse order.",
   "$x=7$; division by 3 becomes multiplication by 3.",
   "$x=9$; you must first multiply by 3, then subtract 2.",
   "$x=9$; the procedure applies inverse operations in reverse order of the function's operations."
 ],
 answerIndex:3,
 explanation:"The function applied to $x$ is: divide by 3, then add 2. To undo it: subtract 2 first, then multiply by 3 — inverse operations in reverse order. $\\frac{x}{3}+2=5\\Rightarrow\\frac{x}{3}=3\\Rightarrow x=9$. Check: $\\frac{9}{3}+2=3+2=5$. ✓ This explains why the procedure works, not just that it does."},

// ── 2.1.10 ──
{id:"m_21010_A", subject:"math", standard:"2.1.10", domain:"2", topic:"2.1", set:"A",

 ],

{id:"m_21010_B", subject:"math", standard:"2.1.10", domain:"2", topic:"2.1", set:"B",

 ],
 answerIndex:1,

{id:"m_21010_C", subject:"math", standard:"2.1.10", domain:"2", topic:"2.1", set:"C",
 prompt:"A line has equation $y=5x-3$. For which input $x$ does the output equal 7?",

 ],

// ── 2.1.11 ──
{id:"m_21011_A", subject:"math", standard:"2.1.11", domain:"2", topic:"2.1", set:"A",
 prompt:"For the line $3x-2y=6$, find the $x$-intercept, $y$-intercept, and slope.",
 options:[
   "$x$-int: $(3,0)$, $y$-int: $(0,-3)$, slope: $\dfrac{3}{2}$",
   "$x$-int: $(2,0)$, $y$-int: $(0,3)$, slope: $\dfrac{2}{3}$",
   "$x$-int: $(3,0)$, $y$-int: $(0,3)$, slope: $-\dfrac{3}{2}$",
   "$x$-int: $(2,0)$, $y$-int: $(0,-3)$, slope: $\dfrac{3}{2}$"
 ],
 answerIndex:3,
 explanation:"$x$-int: set $y=0$: $3x=6\\Rightarrow x=2$, so $(2,0)$. $y$-int: set $x=0$: $-2y=6\\Rightarrow y=-3$, so $(0,-3)$. Rewrite as $y=\\frac{3}{2}x-3$, so slope $=\\frac{3}{2}$. Answer A has the correct slope and $y$-int but wrong $x$-int."},

{id:"m_21011_B", subject:"math", standard:"2.1.11", domain:"2", topic:"2.1", set:"B",
 prompt:"How does the graph of $y=3x+5$ change if the coefficient of $x$ is changed from 3 to 6?",
 options:[
   "The line shifts upward by 3 units.",

 ],
 answerIndex:3,
 explanation:"The slope coefficient controls steepness. Changing slope from 3 to 6 doubles it — the line rotates about the $y$-intercept $(0,5)$, becoming steeper. The $y$-intercept is unchanged since the constant term is still 5. Shifting requires changing the constant, not the coefficient."},

{id:"m_21011_C", subject:"math", standard:"2.1.11", domain:"2", topic:"2.1", set:"C",
 prompt:"A line passes through $(0,4)$ and has slope $-2$. Which equation describes it, and what is its $x$-intercept?",
 options:[

 ],
 answerIndex:0,

// ── 2.1.12 ──
{id:"m_21012_A", subject:"math", standard:"2.1.12", domain:"2", topic:"2.1", set:"A",
 prompt:"Which region is the solution set of $2x+3y<6$?",
 options:[
   "The region above the line $2x+3y=6$ (not including the line)",
   "The entire coordinate plane",
   "The line $2x+3y=6$ itself",
   "The region below the line $2x+3y=6$ (not including the line)"
 ],
 answerIndex:3,
 explanation:"Rewrite as $y<\\frac{6-2x}{3}=2-\\frac{2}{3}x$, meaning $y$ is less than the line — points below the boundary. Test the origin: $2(0)+3(0)=0<6$ ✓, and the origin is below the line. The boundary is dashed (not included) since the inequality is strict."},

{id:"m_21012_B", subject:"math", standard:"2.1.12", domain:"2", topic:"2.1", set:"B",
 prompt:"The solution set of the system $\\begin{cases}x+y\\leq4\\\\x-y\\geq0\\end{cases}$ is the intersection of two half-planes. Which point is in the solution set?",
 options:[
   "$(3,2)$",
   "$(0,5)$",
   "$(1,4)$",
   "$(2,1)$"
 ],
 answerIndex:3,
 explanation:"Test $(2,1)$: $2+1=3\\leq4$ ✓ and $2-1=1\\geq0$ ✓. Both inequalities satisfied. Test $(3,2)$: $3+2=5>4$ ✗. Test $(1,4)$: $1+4=5>4$ ✗. Test $(0,5)$: $0+5=5>4$ ✗."},

{id:"m_21012_C", subject:"math", standard:"2.1.12", domain:"2", topic:"2.1", set:"C",
 prompt:"When sketching the solution region for $y>2x-1$, should the boundary line be solid or dashed, and which side is shaded?",
 options:[
   "Solid; shade below the line.",
   "Dashed; shade above the line.",
   "Solid; shade above the line.",
   "Dashed; shade below the line."
 ],
 answerIndex:1,
 explanation:"The strict inequality $y>2x-1$ excludes the boundary ($y=2x-1$), so the line is dashed. Since $y$ must be greater than the line's value, the solution region is above the line. Test a point above: $(0,2)$: $2>-1$ ✓."},

// ── 2.1.13 ──
{id:"m_21013_A", subject:"math", standard:"2.1.13", domain:"2", topic:"2.1", set:"A",
 prompt:"Find an equation of the line through $(2,3)$ and $(6,7)$.",
 options:[
   "$y=2x-1$",
   "$y=x-1$",
   "$y=\dfrac{1}{2}x+2$",
   "$y=x+1$"
 ],
 answerIndex:3,
 explanation:"Slope: $m=\\dfrac{7-3}{6-2}=\\dfrac{4}{4}=1$. Use point-slope with $(2,3)$: $y-3=1(x-2)\\Rightarrow y=x+1$. Check: $(6,7)$: $6+1=7$. ✓"},

{id:"m_21013_B", subject:"math", standard:"2.1.13", domain:"2", topic:"2.1", set:"B",
 prompt:"A line has slope $\\dfrac{2}{3}$ and passes through $(-3,1)$. Find its equation in slope-intercept form.",
 options:[
   "$y=\dfrac{2}{3}x+1$",
   "$y=\dfrac{3}{2}x+1$",
   "$y=\dfrac{2}{3}x-1$",
   "$y=\dfrac{2}{3}x+3$"
 ],
 answerIndex:3,
 explanation:"Point-slope: $y-1=\\frac{2}{3}(x-(-3))=\\frac{2}{3}(x+3)=\\frac{2}{3}x+2$. So $y=\\frac{2}{3}x+2+1=\\frac{2}{3}x+3$. Check $(-3,1)$: $\\frac{2}{3}(-3)+3=-2+3=1$. ✓"},

{id:"m_21013_C", subject:"math", standard:"2.1.13", domain:"2", topic:"2.1", set:"C",
 prompt:"Find the equation of the horizontal line through $(5,-4)$ and the vertical line through $(5,-4)$.",
 options:[
   "Horizontal: $y=5$; vertical: $x=-4$",
   "Horizontal: $y=-4$; vertical: $x=5$",
   "Horizontal: $x=5$; vertical: $y=-4$",
   "Both are $y=-4$."
 ],
 answerIndex:1,
 explanation:"A horizontal line has constant $y$: through $(5,-4)$ it is $y=-4$. A vertical line has constant $x$: through $(5,-4)$ it is $x=5$. Vertical lines cannot be written in slope-intercept form because their slope is undefined."},

// ── 2.1.14 ──
{id:"m_21014_A", subject:"math", standard:"2.1.14", domain:"2", topic:"2.1", set:"A",
 prompt:"Two lines are perpendicular. One has slope $2$. What is the slope of the other, and why?",
 options:[
   "$-2$; perpendicular lines have opposite slopes.",
   "$\\dfrac{1}{2}$; perpendicular lines have reciprocal slopes.",
   "$-\\dfrac{1}{2}$; perpendicular lines have slopes whose product is $-1$.",
   "$2$; perpendicular lines have equal slopes."
 ],
 answerIndex:2,
 explanation:"Perpendicular lines have slopes $m_1$ and $m_2$ satisfying $m_1\\cdot m_2=-1$, i.e., $m_2=-\\frac{1}{m_1}$ (negative reciprocal). With $m_1=2$: $m_2=-\\frac{1}{2}$. This arises geometrically because rotating a direction vector 90° negates one component, flipping the slope sign and reciprocating its magnitude."},

{id:"m_21014_B", subject:"math", standard:"2.1.14", domain:"2", topic:"2.1", set:"B",
 prompt:"Are the lines $y=3x+2$ and $y=3x-5$ parallel, perpendicular, or neither?",
 options:[
   "Perpendicular, because their slopes differ by 1.",
   "Parallel, because they have the same $y$-intercept.",
   "Neither; they intersect at the origin.",
   "Parallel, because they have the same slope (3) but different $y$-intercepts."
 ],
 answerIndex:3,
 explanation:"Both lines have slope 3. Parallel lines have equal slopes and different $y$-intercepts — they never intersect. Here $y$-intercepts are 2 and $-5$, confirming they are distinct parallel lines. Equal slopes with the same $y$-intercept would mean the same line."},

{id:"m_21014_C", subject:"math", standard:"2.1.14", domain:"2", topic:"2.1", set:"C",
 prompt:"Line $\\ell_1$ passes through $(0,0)$ and $(4,2)$. Line $\\ell_2$ is perpendicular to $\\ell_1$ and passes through $(4,2)$. Find the equation of $\\ell_2$.",
 options:[
   "$y=-2x+10$",
   "$y=2x-6$",
   "$y=-\\dfrac{1}{2}x+4$",
   "$y=\\dfrac{1}{2}x$"
 ],
 answerIndex:0,
 explanation:"Slope of $\\ell_1$: $\\frac{2-0}{4-0}=\\frac{1}{2}$. Perpendicular slope: $-2$. Line through $(4,2)$ with slope $-2$: $y-2=-2(x-4)=−2x+8$, so $y=-2x+10$. Check: at $x=4$: $-8+10=2$. ✓"},

// ── 2.1.15 ──
{id:"m_21015_A", subject:"math", standard:"2.1.15", domain:"2", topic:"2.1", set:"A",
 prompt:"Solve $|2x-5|=9$.",
 options:[
   "$x=7$ or $x=-2$",
   "$x=-2$ only",
   "$x=7$ only",
   "$x=2$ or $x=-7$"
 ],
 answerIndex:2,
 explanation:"$|2x-5|=9$ means $2x-5=9$ or $2x-5=-9$. Case 1: $2x=14\\Rightarrow x=7$. Case 2: $2x=-4\\Rightarrow x=-2$. Check: $|2(7)-5|=|9|=9$ ✓; $|2(-2)-5|=|-9|=9$ ✓."},

{id:"m_21015_B", subject:"math", standard:"2.1.15", domain:"2", topic:"2.1", set:"B",
 prompt:"Solve the inequality $|x-3|\\leq4$ and express the solution as an interval.",
 options:[
   "$[-1,7]$",
   "$(-\\infty,-1]\\cup[7,\\infty)$",
   "$[-7,1]$",
   "$[1,7]$"
 ],
 answerIndex:0,
 explanation:"$|x-3|\\leq4$ means $-4\\leq x-3\\leq4$. Add 3 throughout: $-1\\leq x\\leq7$, or $[-1,7]$. Geometrically, this is all $x$ within 4 units of 3 on the number line."},

{id:"m_21015_C", subject:"math", standard:"2.1.15", domain:"2", topic:"2.1", set:"C",
 prompt:"For what values of $x$ is $|2x+1|>5$?",
 options:[
   "$x>2$ or $x<-3$",
   "$-3<x<2$",
   "$x>3$ or $x<-2$",
   "$x>2$ only"
 ],
 answerIndex:0,
 explanation:"$|2x+1|>5$ gives two cases: $2x+1>5\\Rightarrow x>2$, or $2x+1<-5\\Rightarrow x<-3$. The solution is $x>2$ or $x<-3$, i.e., $(-\\infty,-3)\\cup(2,\\infty)$. Check $x=3$: $|7|=7>5$ ✓. Check $x=-4$: $|-7|=7>5$ ✓."},

// ── 2.1.16 ──
{id:"m_21016_A", subject:"math", standard:"2.1.16", domain:"2", topic:"2.1", set:"A",
 prompt:"Solve the system by substitution: $\\begin{cases}2x+y=7\\\\x-y=2\\end{cases}$",
 options:[
   "$x=2,\;y=3$",
   "$x=1,\;y=5$",
   "$x=4,\;y=-1$",
   "$x=3,\;y=1$"
 ],
 answerIndex:3,
 explanation:"From the second equation: $x=y+2$. Substitute into the first: $2(y+2)+y=7\\Rightarrow3y+4=7\\Rightarrow y=1$. Then $x=1+2=3$. Check: $2(3)+1=7$ ✓, $3-1=2$ ✓."},

{id:"m_21016_B", subject:"math", standard:"2.1.16", domain:"2", topic:"2.1", set:"B",
 prompt:"Use matrix methods to solve $\\begin{cases}x+2y=5\\\\3x-y=1\\end{cases}$. What is the solution?",
 options:[
   "$x=3,\;y=1$",
   "$x=1,\;y=-2$",
   "$x=2,\;y=1$",
   "$x=1,\;y=2$"
 ],
 answerIndex:3,
 explanation:"The augmented matrix $\\begin{bmatrix}1&2&|&5\\\\3&-1&|&1\\end{bmatrix}$. Row 2 $\\leftarrow$ R2$-$3R1: $\\begin{bmatrix}1&2&|&5\\\\0&-7&|&-14\\end{bmatrix}$. So $y=2$, then $x=5-4=1$. Check: $1+4=5$ ✓, $3-2=1$ ✓."},

{id:"m_21016_C", subject:"math", standard:"2.1.16", domain:"2", topic:"2.1", set:"C",
 prompt:"A system of 3 equations in 3 unknowns is solved by elimination and reduces to $0=5$. What does this indicate?",
 options:[
   "The system has infinitely many solutions.",
   "The system has a unique solution at the origin.",
   "The system is inconsistent — no solution exists.",
   "A computational error was made."
 ],
 answerIndex:2,
 explanation:"A contradiction like $0=5$ (a false statement) arising from valid algebraic steps means the system is inconsistent — there is no set of values satisfying all equations simultaneously. Geometrically, the planes do not share a common point (or line)."},

// ── 2.1.17 ──
{id:"m_21017_A", subject:"math", standard:"2.1.17", domain:"2", topic:"2.1", set:"A",
 prompt:"Divide $x^2+3x+2$ by $x+1$ using polynomial long division.",
 options:[
   "Quotient: $x+2$, remainder: $0$",
   "Quotient: $x+1$, remainder: $1$",
   "Quotient: $x+3$, remainder: $-1$",
   "Quotient: $x+2$, remainder: $1$"
 ],
 answerIndex:0,
 explanation:"$x^2+3x+2=(x+1)(x+2)+0$. Long division: $x^2\\div x=x$; multiply back: $x(x+1)=x^2+x$; subtract: $2x+2$; $2x\\div x=2$; multiply: $2(x+1)=2x+2$; subtract: remainder $0$. So quotient $=x+2$."},

{id:"m_21017_B", subject:"math", standard:"2.1.17", domain:"2", topic:"2.1", set:"B",
 prompt:"What is $(3x^2-2x+1)+(4x^2+5x-3)$?",
 options:[
   "$7x^2+3x+2$",
   "$7x^2-3x+2$",
   "$7x^2+3x-2$",
   "$12x^4+3x-2$"
 ],
 answerIndex:2,
 explanation:"Add like terms: $(3+4)x^2=7x^2$; $(-2+5)x=3x$; $(1-3)=-2$. Result: $7x^2+3x-2$."},

{id:"m_21017_C", subject:"math", standard:"2.1.17", domain:"2", topic:"2.1", set:"C",
 prompt:"When $x^3-2x+5$ is divided by $x-2$, the remainder theorem states the remainder equals $f(2)$. What is the remainder?",
 options:[
   "$5$",
   "$9$",
   "$3$",
   "$13$"
 ],
 answerIndex:1,
 explanation:"$f(2)=2^3-2(2)+5=8-4+5=9$. The Remainder Theorem: when $p(x)$ is divided by $(x-c)$, the remainder is $p(c)$. So the remainder here is $9$."},

// ── 2.1.18 ──
{id:"m_21018_A", subject:"math", standard:"2.1.18", domain:"2", topic:"2.1", set:"A",
 prompt:"Factor completely: $x^3-8$.",
 options:[
   "$(x-2)^3$",
   "$(x-2)(x^2+2x+4)$",
   "$(x-2)(x^2-2x+4)$",
   "$(x+2)(x^2-2x+4)$"
 ],
 answerIndex:1,
 explanation:"Difference of cubes: $a^3-b^3=(a-b)(a^2+ab+b^2)$. Here $a=x,\\;b=2$: $x^3-8=(x-2)(x^2+2x+4)$. The second factor has $+2x$ (positive middle term). The quadratic factor is irreducible over the reals."},

{id:"m_21018_B", subject:"math", standard:"2.1.18", domain:"2", topic:"2.1", set:"B",
 prompt:"Which factoring pattern applies to $4x^2-20x+25$?",
 options:[
   "Difference of squares",
   "Sum of cubes",
   "Perfect square trinomial: $(2x-5)^2$",
   "It cannot be factored."
 ],
 answerIndex:2,
 explanation:"Check: $\\sqrt{4x^2}=2x$, $\\sqrt{25}=5$, and $2(2x)(5)=20x$. ✓ So $4x^2-20x+25=(2x-5)^2$. The pattern for a perfect square trinomial is $a^2-2ab+b^2=(a-b)^2$."},

{id:"m_21018_C", subject:"math", standard:"2.1.18", domain:"2", topic:"2.1", set:"C",
 prompt:"Factor $9x^2-16$.",
 options:[
   "$(3x-4)^2$",
   "$(9x-16)(x+1)$",
   "$(3x-4)(3x+4)$",
   "$(3x+4)^2$"
 ],
 answerIndex:2,
 explanation:"Difference of squares: $a^2-b^2=(a-b)(a+b)$ with $a=3x,\\;b=4$. So $9x^2-16=(3x-4)(3x+4)$. Check: $(3x)^2=9x^2$, $(4)^2=16$, cross terms $+12x-12x=0$. ✓"},

// ── 2.1.19 ──
{id:"m_21019_A", subject:"math", standard:"2.1.19", domain:"2", topic:"2.1", set:"A",
 prompt:"Simplify $\\dfrac{x^2-9}{x+3}$ (for $x\\neq-3$).",
 options:[
   "$x-3$",
   "$x+3$",
   "$x^2-3$",
   "$\\dfrac{1}{x-3}$"
 ],
 answerIndex:0,
 explanation:"Factor the numerator: $x^2-9=(x-3)(x+3)$. Cancel the common factor $(x+3)$: $\\dfrac{(x-3)(x+3)}{x+3}=x-3$, valid for $x\\neq-3$."},

{id:"m_21019_B", subject:"math", standard:"2.1.19", domain:"2", topic:"2.1", set:"B",
 prompt:"Simplify $\\dfrac{2x^2+4x}{x^2-x-6}$.",
 options:[
   "$\\dfrac{2x}{x-3}$",
   "$\\dfrac{2x}{x+2}$",
   "$\\dfrac{2}{x-3}$",
   "$\\dfrac{2x(x+2)}{(x-3)(x+2)}$"
 ],
 answerIndex:0,
 explanation:"Numerator: $2x^2+4x=2x(x+2)$. Denominator: $x^2-x-6=(x-3)(x+2)$. Cancel $(x+2)$: $\\dfrac{2x(x+2)}{(x-3)(x+2)}=\\dfrac{2x}{x-3}$, valid for $x\\neq3$ and $x\\neq-2$."},

{id:"m_21019_C", subject:"math", standard:"2.1.19", domain:"2", topic:"2.1", set:"C",
 prompt:"Why must we state restrictions when simplifying rational expressions by canceling factors?",
 options:[
   "Because the simplified expression may be defined at values where the original was not.",
   "Because canceling changes the degree of the polynomial.",
   "Because the original expression is undefined at zeros of the canceled factor, even though the simplified form is defined there.",
   "Because it changes the domain from real to complex numbers."
 ],
 answerIndex:2,
 explanation:"When we cancel $(x+3)$ from $\\dfrac{(x-3)(x+3)}{x+3}$, the original expression is undefined at $x=-3$ (division by zero). But the simplified form $x-3$ is defined at $x=-3$. Without the restriction '$x\\neq-3$', the simplified expression misrepresents the original domain."},

// ── 2.1.20 ──
{id:"m_21020_A", subject:"math", standard:"2.1.20", domain:"2", topic:"2.1", set:"A",
 prompt:"Add: $\\dfrac{2}{x}+\\dfrac{3}{x+1}$.",
 options:[
   "$\\dfrac{5}{2x+1}$",
   "$\\dfrac{5x+2}{x(x+1)}$",
   "$\\dfrac{6}{x(x+1)}$",
   "$\\dfrac{5x}{x^2+x}$"
 ],
 answerIndex:1,
 explanation:"LCD $=x(x+1)$. $\\dfrac{2(x+1)+3x}{x(x+1)}=\\dfrac{2x+2+3x}{x(x+1)}=\\dfrac{5x+2}{x(x+1)}$."},

{id:"m_21020_B", subject:"math", standard:"2.1.20", domain:"2", topic:"2.1", set:"B",
 prompt:"Multiply and simplify: $\\dfrac{x^2-1}{x+2}\\cdot\\dfrac{x+2}{x-1}$.",
 options:[
   "$x-1$",
   "$x+1$",
   "$\\dfrac{x^2-1}{x-1}$",
   "$1$"
 ],
 answerIndex:1,
 explanation:"$\\dfrac{x^2-1}{x+2}\\cdot\\dfrac{x+2}{x-1}=\\dfrac{(x-1)(x+1)}{x+2}\\cdot\\dfrac{x+2}{x-1}$. Cancel $(x+2)$ and $(x-1)$: result $=x+1$, valid for $x\\neq-2$ and $x\\neq1$."},

{id:"m_21020_C", subject:"math", standard:"2.1.20", domain:"2", topic:"2.1", set:"C",
 prompt:"Divide: $\\dfrac{x^2-4}{x}\\div\\dfrac{x-2}{x^2}$.",
 options:[
   "$\\dfrac{x^2-4}{x-2}$",
   "$x(x+2)$",
   "$\\dfrac{(x-2)^2}{x}$",
   "$\\dfrac{x+2}{x}$"
 ],
 answerIndex:1,
 explanation:"Division: multiply by the reciprocal. $\\dfrac{x^2-4}{x}\\cdot\\dfrac{x^2}{x-2}=\\dfrac{(x-2)(x+2)}{x}\\cdot\\dfrac{x^2}{x-2}=\\dfrac{(x+2)\\cdot x^2}{x\\cdot 1}=(x+2)\\cdot x=x(x+2)$."},

// ── 2.1.21 ──
{id:"m_21021_A", subject:"math", standard:"2.1.21", domain:"2", topic:"2.1", set:"A",
 prompt:"Solve by factoring: $x^2-5x+6=0$.",
 options:[
   "$x=-2$ or $x=-3$",
   "$x=2$ or $x=3$",
   "$x=1$ or $x=6$",
   "$x=5$ or $x=1$"
 ],
 answerIndex:1,
 explanation:"Find two numbers that multiply to 6 and add to $-5$: those are $-2$ and $-3$. So $x^2-5x+6=(x-2)(x-3)=0$, giving $x=2$ or $x=3$."},

{id:"m_21021_B", subject:"math", standard:"2.1.21", domain:"2", topic:"2.1", set:"B",
 prompt:"Solve by completing the square: $x^2-6x+5=0$.",
 options:[
   "$x=4$ or $x=2$",
   "$x=3\\pm\\sqrt{5}$",
   "$x=3\\pm2$, i.e., $x=5$ or $x=1$",
   "$x=6$ or $x=0$"
 ],
 answerIndex:2,
 explanation:"$x^2-6x=-5$. Complete the square: add $(6/2)^2=9$ to both sides: $x^2-6x+9=4$, so $(x-3)^2=4$. Take square roots: $x-3=\\pm2$, giving $x=5$ or $x=1$. Verify: $(5-1)(5-5)$... factor check: $(x-1)(x-5)=x^2-6x+5$ ✓. Option B ($3\\pm\\sqrt{5}$) is wrong — $\\sqrt{4}=2$, not $\\sqrt{5}$."},

{id:"m_21021_C", subject:"math", standard:"2.1.21", domain:"2", topic:"2.1", set:"C",
 prompt:"Use the quadratic formula to solve $2x^2-3x-2=0$.",
 options:[
   "$x=2$ or $x=-\\dfrac{1}{2}$",
   "$x=1$ or $x=-2$",
   "$x=\\dfrac{3}{4}\\pm\\dfrac{\\sqrt{25}}{4}$",
   "$x=3$ or $x=-\\dfrac{1}{3}$"
 ],
 answerIndex:0,
 explanation:"$a=2,b=-3,c=-2$. Discriminant: $9+16=25$. $x=\\dfrac{3\\pm5}{4}$. Case +: $x=\\frac{8}{4}=2$. Case $-$: $x=\\frac{-2}{4}=-\\frac{1}{2}$. Check: $2(4)-6-2=0$ ✓; $2(\\frac{1}{4})+\\frac{3}{2}-2=\\frac{1}{2}+\\frac{3}{2}-2=0$ ✓."},

// ── 2.1.22 ──
{id:"m_21022_A", subject:"math", standard:"2.1.22", domain:"2", topic:"2.1", set:"A",
 prompt:"A ball is launched upward from a height of 80 ft with initial velocity 64 ft/s. Its height is $h(t)=-16t^2+64t+80$. When does it hit the ground, and what is its maximum height?",
 options:[
   "Hits ground at $t=4$; max height 144 ft",
   "Hits ground at $t=5$; max height 144 ft",
   "Hits ground at $t=5$; max height 128 ft",
   "Hits ground at $t=3$; max height 96 ft"
 ],
 answerIndex:1,
 explanation:"Ground: $-16t^2+64t+80=0\\Rightarrow t^2-4t-5=0\\Rightarrow(t-5)(t+1)=0$. Taking $t>0$: $t=5$ s. Max: vertex at $t=-\\frac{64}{2(-16)}=2$; $h(2)=-16(4)+128+80=144$ ft."},

{id:"m_21022_B", subject:"math", standard:"2.1.22", domain:"2", topic:"2.1", set:"B",
 prompt:"A rectangular garden has perimeter 40 m. Its area is maximized when it is a square. Write the area as a function of width $w$, and find the maximum area.",
 options:[
   "$A(w)=w(20-w)$; max area $=100$ m²",
   "$A(w)=2w(40-w)$; max area $=200$ m²",
   "$A(w)=w(40-2w)$; max area $=200$ m²",
   "$A(w)=w^2$; max area $=400$ m²"
 ],
 answerIndex:0,
 explanation:"Perimeter: $2w+2\\ell=40\\Rightarrow\\ell=20-w$. Area: $A(w)=w(20-w)=20w-w^2$. Vertex at $w=-\\frac{20}{2(-1)}=10$; $A(10)=10(10)=100$ m². The optimal rectangle is a $10\\times10$ square."},

{id:"m_21022_C", subject:"math", standard:"2.1.22", domain:"2", topic:"2.1", set:"C",
 prompt:"The product of two consecutive positive integers is 72. Set up and solve a quadratic equation to find them.",
 options:[
   "8 and 9",
   "7 and 10",
   "9 and 10",
   "6 and 12"
 ],
 answerIndex:0,
 explanation:"Let the integers be $n$ and $n+1$. Then $n(n+1)=72\\Rightarrow n^2+n-72=0$. Discriminant: $1+288=289=17^2$. $n=\\frac{-1+17}{2}=8$. So the integers are 8 and 9. Check: $8\\times9=72$. ✓"},

// ── 2.1.23 ──
{id:"m_21023_A", subject:"math", standard:"2.1.23", domain:"2", topic:"2.1", set:"A",
 prompt:"Evaluate the binomial coefficient $\\binom{5}{2}$.",
 options:[
   "$5$",
   "$10$",
   "$20$",
   "$15$"
 ],
 answerIndex:1,
 explanation:"$\\binom{5}{2}=\\dfrac{5!}{2!\\cdot3!}=\\dfrac{120}{2\\cdot6}=10$. This counts the number of ways to choose 2 items from 5, and is the coefficient of $a^3b^2$ in $(a+b)^5$."},

{id:"m_21023_B", subject:"math", standard:"2.1.23", domain:"2", topic:"2.1", set:"B",
 prompt:"What is the coefficient of $x^2y^2$ in the expansion of $(x+y)^4$?",
 options:[
   "$4$",
   "$8$",
   "$6$",
   "$12$"
 ],
 answerIndex:2,
 explanation:"By the Binomial Theorem, the general term of $(x+y)^4$ is $\\binom{4}{k}x^{4-k}y^k$. For $x^2y^2$, need $k=2$: coefficient $=\\binom{4}{2}=6$."},

{id:"m_21023_C", subject:"math", standard:"2.1.23", domain:"2", topic:"2.1", set:"C",
 prompt:"Expand $(x-2)^3$ using the Binomial Theorem.",
 options:[
   "$x^3-6x^2+12x-8$",
   "$x^3-8$",
   "$x^3-3x^2+4x-8$",
   "$x^3+6x^2+12x+8$"
 ],
 answerIndex:0,
 explanation:"$(x-2)^3=\\binom{3}{0}x^3+\\binom{3}{1}x^2(-2)+\\binom{3}{2}x(-2)^2+\\binom{3}{3}(-2)^3=x^3-6x^2+12x-8$."},

// ── 2.1.24 ──
{id:"m_21024_A", subject:"math", standard:"2.1.24", domain:"2", topic:"2.1", set:"A",
 prompt:"For $f(x)=x^2-4x+3$, find the vertex, axis of symmetry, and zeros.",
 options:[
   "Vertex $(2,-1)$, axis $x=2$, zeros $x=1,3$",

   "Vertex $(2,3)$, axis $x=2$, zeros $x=1,3$",
   "Vertex $(4,-1)$, axis $x=4$, zeros $x=1,3$"
 ],
 answerIndex:0,
 explanation:"Vertex: $x=-\\frac{-4}{2(1)}=2$; $f(2)=4-8+3=-1$. Axis of symmetry: $x=2$. Zeros: $x^2-4x+3=(x-1)(x-3)=0$, so $x=1$ and $x=3$."},

{id:"m_21024_B", subject:"math", standard:"2.1.24", domain:"2", topic:"2.1", set:"B",
 prompt:"The vertex of a parabola is at $(3,-5)$ and it opens upward. At which $x$-values (other than the vertex) does the parabola achieve $y=0$ if the coefficient $a=1$?",
 options:[
   "$x=3\\pm5$",
   "$x=3\\pm\\sqrt{5}$",
   "$x=3\\pm2$",
   "The parabola does not cross the $x$-axis."
 ],
 answerIndex:1,
 explanation:"Vertex form: $y=(x-3)^2-5$. Set $y=0$: $(x-3)^2=5\\Rightarrow x-3=\\pm\\sqrt{5}\\Rightarrow x=3\\pm\\sqrt{5}\\approx3\\pm2.24$."},

{id:"m_21024_C", subject:"math", standard:"2.1.24", domain:"2", topic:"2.1", set:"C",
 prompt:"How does the sign of the leading coefficient $a$ in $f(x)=ax^2+bx+c$ determine whether the vertex is a maximum or minimum?",
 options:[
   "If $a>0$ the parabola opens upward, making the vertex a minimum. If $a<0$ it opens downward, making the vertex a maximum.",
   "If $a>0$ the parabola opens downward, making the vertex a maximum.",
   "The sign of $c$ determines whether the vertex is a max or min.",
   "The vertex is always a minimum regardless of $a$."
 ],
 answerIndex:0,
 explanation:"When $a>0$, the parabola opens upward (like a bowl) — the vertex is the lowest point (minimum). When $a<0$, it opens downward (like a dome) — the vertex is the highest point (maximum). This directly determines whether the function has a minimum or maximum value."},

// ── 2.1.25 ──
{id:"m_21025_A", subject:"math", standard:"2.1.25", domain:"2", topic:"2.1", set:"A",
 prompt:"In $y=a(x-b)^2+c$, what happens to the graph of the parabola when $c$ is increased by 3?",
 options:[
   "The parabola shifts right by 3 units.",
   "The parabola shifts upward by 3 units.",
   "The parabola becomes narrower.",
   "The parabola's $x$-intercepts shift right by 3."
 ],
 answerIndex:1,
 explanation:"In vertex form $y=a(x-b)^2+c$, the parameter $c$ sets the vertical position of the vertex at $(b,c)$. Increasing $c$ by 3 translates the entire graph upward by 3 units without changing its shape or horizontal position."},

{id:"m_21025_B", subject:"math", standard:"2.1.25", domain:"2", topic:"2.1", set:"B",
 prompt:"Compare $y=2(x-1)^2+3$ and $y=\\frac{1}{2}(x-1)^2+3$. How do their graphs differ?",
 options:[
   "The first is narrower (steeper), the second is wider (flatter). Both have the same vertex.",
   "They are identical.",
   "The first opens downward, the second upward.",
   "The first has vertex $(1,3)$; the second has vertex $(1,\\frac{3}{2})$."
 ],
 answerIndex:0,
 explanation:"Both parabolas have vertex $(1,3)$ (same $b=1$, same $c=3$) and open upward (positive $a$). The coefficient $|a|$ controls width: larger $|a|$ gives a narrower (steeper) parabola. So $a=2$ is narrower than $a=\\frac{1}{2}$."},

{id:"m_21025_C", subject:"math", standard:"2.1.25", domain:"2", topic:"2.1", set:"C",
 prompt:"How does changing $b$ in $y=a(x-b)^2+c$ affect the graph?",
 options:[
   "It changes the width of the parabola.",
   "It changes the vertical position of the vertex.",
   "It shifts the vertex (and the parabola) horizontally.",
   "It reflects the parabola across the $x$-axis."
 ],
 answerIndex:2,
 explanation:"The vertex of $y=a(x-b)^2+c$ is at $(b,c)$. Changing $b$ moves the vertex left or right — a horizontal translation of the entire parabola. The shape (controlled by $a$) and vertical position (controlled by $c$) are unaffected."},

// ── 2.1.26 ──
{id:"m_21026_A", subject:"math", standard:"2.1.26", domain:"2", topic:"2.1", set:"A",
 prompt:"Rewrite $x^2+y^2-4x+6y+9=0$ in standard form and identify the conic.",
 options:[
   "$(x-2)^2+(y+3)^2=16$; circle with center $(2,-3)$, radius 4",
   "$(x-2)^2+(y+3)^2=4$; circle with center $(2,-3)$, radius 2",
   "$(x+2)^2+(y-3)^2=4$; circle with center $(-2,3)$, radius 2",
   "$(x-2)^2+(y+3)^2=0$; degenerate conic (a single point)"
 ],
 answerIndex:1,
 explanation:"Complete the square: $(x^2-4x+4)+(y^2+6y+9)=−9+4+9=4$. So $(x-2)^2+(y+3)^2=4$: circle with center $(2,-3)$ and radius 2."},

{id:"m_21026_B", subject:"math", standard:"2.1.26", domain:"2", topic:"2.1", set:"B",
 prompt:"Classify the conic given by $\\dfrac{x^2}{9}+\\dfrac{y^2}{4}=1$.",
 options:[
   "Circle with radius 3",
   "Ellipse with semi-major axis 3 along $x$ and semi-minor axis 2 along $y$",
   "Hyperbola",
   "Parabola"
 ],
 answerIndex:1,
 explanation:"The equation $\\dfrac{x^2}{a^2}+\\dfrac{y^2}{b^2}=1$ with $a^2\\neq b^2$ is an ellipse. Here $a^2=9,\\;b^2=4$, so $a=3,\\;b=2$. The longer axis (semi-major axis, $a=3$) is along the $x$-axis."},

{id:"m_21026_C", subject:"math", standard:"2.1.26", domain:"2", topic:"2.1", set:"C",
 prompt:"Complete the square to identify the conic $x^2-4y^2-2x+8y-7=0$.",
 options:[
   "Circle: $(x-1)^2+(y-1)^2=12$",
   "Ellipse: $\\dfrac{(x-1)^2}{12}+\\dfrac{(y-1)^2}{3}=1$",
   "Hyperbola: $\\dfrac{(x-1)^2}{12}-\\dfrac{(y-1)^2}{3}=1$",
   "Parabola with vertex at $(1,1)$"
 ],
 answerIndex:2,
 explanation:"Group: $(x^2-2x)-(4y^2-8y)=7$. Complete squares: $(x-1)^2-1-4[(y-1)^2-1]=7\\Rightarrow(x-1)^2-4(y-1)^2=7+1-4=4$. Divide by 4: $\\dfrac{(x-1)^2}{4}-\\dfrac{(y-1)^2}{1}=1$... actually wait — let me recheck: $7+1-4=4$, divide by 4: LHS$=\\frac{(x-1)^2}{4}-\\frac{4(y-1)^2}{4}=\\frac{(x-1)^2}{4}-(y-1)^2=1$. This is a hyperbola. The coefficient of the $y^2$ term is negative (after moving to standard form), confirming a hyperbola."},

// ── 2.1.27 ──
{id:"m_21027_A", subject:"math", standard:"2.1.27", domain:"2", topic:"2.1", set:"A",
 prompt:"In the ellipse $\\dfrac{x^2}{a^2}+\\dfrac{y^2}{b^2}=1$ with $a>b>0$, how does increasing $a$ while keeping $b$ fixed affect the shape?",
 options:[
   "The ellipse becomes more circular.",
   "The ellipse becomes more elongated along the $x$-axis.",
   "The ellipse shifts to the right.",
   "The size of the minor axis increases."
 ],
 answerIndex:1,
 explanation:"The semi-major axis along $x$ has length $a$; the semi-minor axis along $y$ has length $b$. Increasing $a$ while keeping $b$ fixed stretches the ellipse horizontally — it becomes more elongated (less circular, more oval-like) along the $x$-axis."},

{id:"m_21027_B", subject:"math", standard:"2.1.27", domain:"2", topic:"2.1", set:"B",
 prompt:"For the hyperbola $\\dfrac{x^2}{a^2}-\\dfrac{y^2}{b^2}=1$, what are the equations of the asymptotes?",
 options:[
   "$y=\\pm\\dfrac{a}{b}x$",
   "$y=\\pm\\dfrac{b}{a}x$",
   "$y=\\pm abx$",
   "$x=\\pm a$"
 ],
 answerIndex:1,
 explanation:"The asymptotes of $\\dfrac{x^2}{a^2}-\\dfrac{y^2}{b^2}=1$ are found by setting the right side to 0: $\\dfrac{x^2}{a^2}-\\dfrac{y^2}{b^2}=0\\Rightarrow y=\\pm\\dfrac{b}{a}x$. As $x\\to\\pm\\infty$, the hyperbola approaches these lines."},

{id:"m_21027_C", subject:"math", standard:"2.1.27", domain:"2", topic:"2.1", set:"C",
 prompt:"What distinguishes a parabola from an ellipse and hyperbola in terms of the general conic equation $Ax^2+Cy^2+Dx+Ey+F=0$?",
 options:[
   "A parabola has $A=C$; an ellipse has $AC>0$; a hyperbola has $AC<0$.",
   "A parabola has $A=0$ or $C=0$ (but not both); an ellipse has $AC>0$; a hyperbola has $AC<0$.",
   "A parabola has $AC=1$; an ellipse has $AC<0$.",
   "A parabola has $A=C=0$."
 ],
 answerIndex:1,
 explanation:"In the general form (no $xy$ term): if exactly one of $A,C$ is zero (one squared term missing), the conic is a parabola. If $AC>0$ (both squared terms have the same sign), it's an ellipse (or circle if $A=C$). If $AC<0$ (squared terms have opposite signs), it's a hyperbola. This classification assumes a non-degenerate conic."},

// ── 2.1.28 ──
{id:"m_21028_A", subject:"math", standard:"2.1.28", domain:"2", topic:"2.1", set:"A",
 prompt:"Evaluate $8^{2/3}$.",
 options:[
   "$2$",
   "$4$",
   "$16$",
   "$\\dfrac{2}{3}$"
 ],
 answerIndex:1,
 explanation:"$8^{2/3}=(8^{1/3})^2=(\\sqrt[3]{8})^2=2^2=4$. The rule $a^{m/n}=(a^{1/n})^m$ — take the $n$th root first, then raise to the $m$th power."},

{id:"m_21028_B", subject:"math", standard:"2.1.28", domain:"2", topic:"2.1", set:"B",
 prompt:"Simplify $\\dfrac{x^{3/4}}{x^{1/4}}$.",
 options:[
   "$x^3$",
   "$x^{1/2}$",
   "$x^{4/3}$",
   "$x$"
 ],
 answerIndex:1,
 explanation:"Using the quotient law: $x^{3/4}\\div x^{1/4}=x^{3/4-1/4}=x^{2/4}=x^{1/2}=\\sqrt{x}$. This follows from extending the integral exponent law $\\frac{x^m}{x^n}=x^{m-n}$ to fractional exponents."},

{id:"m_21028_C", subject:"math", standard:"2.1.28", domain:"2", topic:"2.1", set:"C",
 prompt:"Why is $(-8)^{1/2}$ not a real number, while $(-8)^{1/3}=-2$?",
 options:[
   "Because $\\frac{1}{2}$ is smaller than $\\frac{1}{3}$.",
   "Because square roots of negative numbers are not real, but cube roots of negative numbers are (since an odd power of a negative is negative).",
   "Both should be real numbers.",
   "Because $-8$ is negative, no fractional exponent gives a real result."
 ],
 answerIndex:1,
 explanation:"$(-8)^{1/3}=\\sqrt[3]{-8}=-2$ because $(-2)^3=-8$ — a real cube root exists. But $(-8)^{1/2}=\\sqrt{-8}$ has no real solution, because no real number squared gives $-8$. Even roots of negatives require complex numbers; odd roots of negatives are always real."},

// ── 2.1.29 ──
{id:"m_21029_A", subject:"math", standard:"2.1.29", domain:"2", topic:"2.1", set:"A",
 prompt:"A bacterial culture doubles every 5 hours. Starting with 100 bacteria, the model is $N(t)=100\\cdot2^{t/5}$. How many bacteria are there after 15 hours?",
 options:[
   "$300$",
   "$600$",
   "$800$",
   "$1000$"
 ],
 answerIndex:2,
 explanation:"$N(15)=100\\cdot2^{15/5}=100\\cdot2^3=100\\cdot8=800$."},

{id:"m_21029_B", subject:"math", standard:"2.1.29", domain:"2", topic:"2.1", set:"B",
 prompt:"Radioactive decay is modeled by $A(t)=A_0\\cdot e^{-kt}$. If a substance has a half-life of 10 years, what is $k$?",
 options:[
   "$k=10$",
   "$k=\\dfrac{\\ln 2}{10}$",
   "$k=\\dfrac{10}{\\ln 2}$",
   "$k=\\dfrac{1}{10}$"
 ],
 answerIndex:1,
 explanation:"At $t=10$: $\\frac{A_0}{2}=A_0 e^{-10k}\\Rightarrow\\frac{1}{2}=e^{-10k}\\Rightarrow\\ln\\frac{1}{2}=-10k\\Rightarrow k=\\frac{\\ln2}{10}\\approx0.0693$."},

{id:"m_21029_C", subject:"math", standard:"2.1.29", domain:"2", topic:"2.1", set:"C",
 prompt:"The exponential function $f(x)=2^x$ and the exponential function $g(x)=(\\frac{1}{2})^x$ are related how?",
 options:[
   "They are inverses of each other.",
   "$g(x)=2^{-x}=f(-x)$ — they are reflections across the $y$-axis.",
   "$g(x)=f(x)-1$ — $g$ is a vertical shift of $f$.",
   "They are identical functions."
 ],
 answerIndex:1,
 explanation:"$(\\frac{1}{2})^x=2^{-x}=f(-x)$. Replacing $x$ with $-x$ reflects a function across the $y$-axis. So $g$ is the mirror image of $f$ across the $y$-axis: $f$ grows exponentially as $x$ increases, while $g$ decays."},

// ── 2.1.30 ──
{id:"m_21030_A", subject:"math", standard:"2.1.30", domain:"2", topic:"2.1", set:"A",
 prompt:"Solve $x^2+2x+5=0$ in the complex number system.",
 options:[
   "$x=-1\\pm2i$",
   "$x=1\\pm2i$",
   "$x=-2\\pm i$",
   "$x=2\\pm i$"
 ],
 answerIndex:0,
 explanation:"Discriminant: $4-20=-16<0$. $x=\\dfrac{-2\\pm\\sqrt{-16}}{2}=\\dfrac{-2\\pm4i}{2}=-1\\pm2i$. Both roots are non-real complex conjugates."},

{id:"m_21030_B", subject:"math", standard:"2.1.30", domain:"2", topic:"2.1", set:"B",
 prompt:"Which statement correctly describes the complex roots of a quadratic with real coefficients when the discriminant is negative?",
 options:[
   "There is one real root and one complex root.",
   "The two complex roots are complex conjugates of each other.",
   "Both roots are purely imaginary (no real part).",
   "The roots are both irrational real numbers."
 ],
 answerIndex:1,
 explanation:"When a quadratic $ax^2+bx+c=0$ has real coefficients and a negative discriminant, the quadratic formula gives $x=\\frac{-b\\pm\\sqrt{\\Delta}}{2a}$ with $\\sqrt{\\Delta}$ imaginary. The two roots are $\\frac{-b}{2a}+ki$ and $\\frac{-b}{2a}-ki$ — complex conjugates. They always come in conjugate pairs when coefficients are real."},

{id:"m_21030_C", subject:"math", standard:"2.1.30", domain:"2", topic:"2.1", set:"C",
 prompt:"What is $(3+2i)(3-2i)$?",
 options:[
   "$9-4i^2=13$",
   "$6$",
   "$9+4i$",
   "$13+0i=13$"
 ],
 answerIndex:3,
 explanation:"$(3+2i)(3-2i)=9-6i+6i-4i^2=9-4(-1)=9+4=13$. This is the product of a complex conjugate pair, always real: $(a+bi)(a-bi)=a^2+b^2$."},

// ── 2.1.31 ──
{id:"m_21031_A", subject:"math", standard:"2.1.31", domain:"2", topic:"2.1", set:"A",
 prompt:"The Fundamental Theorem of Algebra states that every polynomial of degree $n\\geq1$ with complex coefficients has exactly $n$ complex roots (counting multiplicity). How many roots does $p(x)=x^4-1$ have in the complex number system?",
 options:[
   "$2$",
   "$3$",
   "$4$",
   "Infinitely many"
 ],
 answerIndex:2,
 explanation:"By the FTA, a degree-4 polynomial has exactly 4 complex roots (counting multiplicity). For $x^4-1=0$: $x^4=1$, giving $x=1,-1,i,-i$ — all four roots in $\\mathbb{C}$."},

{id:"m_21031_B", subject:"math", standard:"2.1.31", domain:"2", topic:"2.1", set:"B",
 prompt:"A polynomial $p(x)$ of degree 3 with real coefficients has two complex (non-real) roots. What can be said about its third root?",
 options:[
   "It must also be non-real complex.",
   "It must be a real number.",
   "It must be zero.",
   "It can be anything — real or complex."
 ],
 answerIndex:1,
 explanation:"Complex roots of polynomials with real coefficients always come in conjugate pairs. If $a+bi$ (with $b\\neq0$) is a root, then $a-bi$ must also be a root. With degree 3 and two non-real complex roots already accounting for a conjugate pair, the third root must be real."},

{id:"m_21031_C", subject:"math", standard:"2.1.31", domain:"2", topic:"2.1", set:"C",
 prompt:"The Fundamental Theorem of Algebra guarantees that $p(x)=x^3-3x^2+3x-1$ can be written as a product of three linear factors over $\\mathbb{C}$. What are they?",
 options:[
   "$(x-1)(x^2-2x+1)$",
   "$(x-1)^3$",
   "$(x+1)^3$",
   "$(x-1)(x+1)(x-1)$"
 ],
 answerIndex:1,
 explanation:"$x^3-3x^2+3x-1=(x-1)^3$ (perfect cube). This has a triple root at $x=1$ — one root with multiplicity 3. The three linear factors are all $(x-1)$. Multiplicity 3 counts as 3 roots, consistent with the FTA."},
