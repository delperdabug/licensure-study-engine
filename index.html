   prompt:"A math student tentatively says 'negative two?' when asked for the vertex x-coordinate of a parabola. The answer is correct. The teacher responds, 'Yes — can you tell me what you used to get that?' The student says she 'sort of guessed' because the parabola looked symmetric around x = −2. The teacher uses this to re-explain the algebraic vertex formula. What is the value of this exchange even though the answer was correct?",
   options:[
     "No value — the answer was correct, so no further instruction was needed.",
     "The exchange lets the teacher spot that the student's correct answer came from visual estimation rather than an algebraic method — a productive strategy, but one that won't scale to problems where visual inspection is difficult, pointing to a gap in her toolkit.",
     "The value is social: asking the student to explain boosts her confidence.",
     "The value is only in re-explaining the formula, which would have been useful regardless of the student's answer."],
   answerIndex:1,
   explanation:"Visual estimation of symmetry is a legitimate strategy, but it is bounded — it works for clear graphs and simple cases, not for problems without visual aids or with less obvious symmetry. The teacher's clarifying question revealed which reasoning the student used, exposing a toolset gap: she has the intuitive approach but may not have the algebraic one. Re-teaching the formula addresses that gap. Without the clarifying question, the teacher would have moved on believing the student understood both methods."},

  // ---- 3.3.04  Gives immediate corrective feedback matched to type of mistake ----
  // A: match feedback to mistake type | B: mismatched feedback | C(math): correct a math mistake by type
  {id:"p_3304_A", subject:"ptk", standard:"3.3.04", domain:"3", topic:"3.3", set:"A",
   prompt:"A student gives an incorrect answer. The teacher quickly identifies the error as a conceptual misunderstanding — the student has the right facts but has applied a rule in the wrong context. The teacher's response: 'You have the right information, but this rule applies when X is true — in this case Y is true, so we use a different rule. Let me show you the distinction.' What is the teacher doing?",
   options:[
     "Providing corrective feedback matched to the type of mistake — a conceptual error requires explaining the conceptual distinction, not simply providing the correct answer or drilling the fact again.",
     "Punishing the student for making a mistake during class.",
     "Delaying correction to avoid embarrassing the student during the lesson.",
     "Re-teaching the entire unit from the beginning to address the misconception comprehensively."],
   answerIndex:0,
   explanation:"This standard calls for corrective feedback calibrated to the type of mistake. The three named types are factual (wrong fact), conceptual (misapplication of a rule or idea), and rule errors. A conceptual error — applying a valid rule in the wrong context — requires a conceptual correction: explaining when the rule applies and when it doesn't. Simply providing the right answer (fact correction) or drilling the fact again wouldn't address the conceptual gap."},

  {id:"p_3304_B", subject:"ptk", standard:"3.3.04", domain:"3", topic:"3.3", set:"B",
   prompt:"A student states an incorrect fact. The teacher, believing the problem is conceptual, launches into a lengthy explanation of the underlying principle, but the student actually misread the question and used the wrong vocabulary term — a simple factual mix-up. The explanation doesn't help and the student is now more confused. What went wrong?",
   options:["The teacher's explanation was too long, which is always counterproductive.",
     "Factual errors should always be corrected by peers, not teachers.",
     "The student should have asked for clarification rather than waiting for the explanation.",
     "The teacher misdiagnosed the type of mistake: a factual error (wrong term, misread question) requires a quick factual correction, not a conceptual explanation — mismatching the correction to the error type wastes time and may deepen confusion."],
   answerIndex:3,
   explanation:"The standard's core insight is that effective corrective feedback requires first diagnosing what type of mistake was made. A factual error (wrong term, wrong number, misread prompt) is best corrected with a clear, quick factual correction: 'the term is X, not Y.' Applying a conceptual explanation to a factual error is like prescribing the wrong treatment: the correction doesn't match what's actually wrong, so it doesn't help."},

  {id:"p_3304_C", subject:"ptk", standard:"3.3.04", domain:"3", topic:"3.3", set:"C",
   prompt:"During a lesson on exponential functions, a student incorrectly states that $2^3 \\cdot 2^4 = 2^{12}$. The teacher recognizes this as a rule error — the student is multiplying exponents instead of adding them. The teacher responds: 'Not quite — when we multiply same-base powers, we add exponents, not multiply. So $2^3 \\cdot 2^4 = 2^7$. Can you say back to me why we add?' What type of corrective feedback is this and why is it well-matched?",
   options:[
     "It is a fact-correction because the student stated a wrong number.",
     "It is a hint — the teacher is providing part of the answer without completing it.",
     "It is a rule-correction matched to a rule error: the student has the wrong procedure applied to the right structure, so the correction states the correct rule, applies it, and then asks the student to articulate it — targeting exactly the error type without over- or under-correcting.",
     "It is a conceptual correction because exponential rules are conceptual by nature."],
   answerIndex:2,
   explanation:"The student applied the wrong rule (multiplication rather than addition of exponents) to a correctly identified situation (same-base multiplication) — this is a rule error. The teacher's correction names the correct rule, demonstrates it, and asks the student to restate it, which are the appropriate techniques for a rule error. A factual correction (just saying '7') wouldn't address why the student multiplied; a conceptual explanation would be over-correction for what is essentially a procedural substitution."},

  // ---- 3.3.05  Provides consequences on homework that help students assess progress ----
  // A: purpose of homework feedback | B: evaluate no-feedback homework | C(math): meaningful homework return
  {id:"p_3305_A", subject:"ptk", standard:"3.3.05", domain:"3", topic:"3.3", set:"A",
   prompt:"A teacher returns homework with written comments that identify where each student's reasoning went wrong, note which errors appear to be one-time slips versus recurring patterns, and suggest what the student should review before the upcoming assessment. A colleague says this level of feedback is excessive — homework should just get a completion grade. What is the strongest argument for the teacher's approach?",
   options:["Detailed homework feedback is required by most state education codes.",
     "The argument is purely about teacher effort; there is no instructional benefit beyond completion grades.",
     "Detailed feedback is only appropriate for high-stakes assessments, not routine homework.",
     "Homework feedback that helps students identify what they've learned and not learned, and correct errors and misconceptions, serves a genuine formative purpose — it converts an assignment into a diagnostic tool the student can act on."],
   answerIndex:3,
   explanation:"This standard identifies two specific purposes for homework consequences: helping students assess their progress toward goals, and helping them understand and correct errors or misconceptions. A completion grade does neither — it confirms the student did the work but says nothing about quality or correctness. Feedback that identifies patterns, errors, and review targets transforms homework into a formative tool aligned to learning rather than just a monitoring mechanism."},

  {id:"p_3305_B", subject:"ptk", standard:"3.3.05", domain:"3", topic:"3.3", set:"B",
   prompt:"A teacher collects homework every day but returns it three weeks later with only a checkmark for completion — no indication of what was right or wrong. Students cannot remember what they were thinking when they did the work. A student asks, 'How do I know if I actually understand this?' What is the teacher's practice failing to do?",
   options:[
     "The teacher is failing to use a rubric, which is the only valid form of homework assessment.",
     "Returning homework at all is unnecessary; oral discussion in class is sufficient.",
     "The practice is failing because checkmarks are not weighted grades.",
     "The teacher's delayed, content-free feedback provides no mechanism for students to assess their progress or identify and correct their errors — by the time feedback arrives, it has lost its connection to the student's learning process."],
   answerIndex:3,
   explanation:"Delayed content-free feedback is doubly ineffective: the delay breaks the connection between the work and the feedback (the student can't remember their thinking), and the absence of content-specific information means students can't use the feedback to assess their progress or correct misconceptions. The student's question — 'how do I know if I understand?' — is a precise articulation of what this standard's homework consequences are supposed to answer."},

  {id:"p_3305_C", subject:"ptk", standard:"3.3.05", domain:"3", topic:"3.3", set:"C",
   prompt:"A math teacher returns homework on quadratic equations with a brief written note for each student: which problems reflect solid understanding, which errors appear to be calculation slips versus conceptual confusion about the quadratic formula, and one specific thing to re-examine before the quiz. What makes this homework return practice educationally valuable beyond recording a grade?",
   options:[
     "The notes reduce the amount of review students need to do because the teacher has done the analysis for them.",
     "It helps students understand what the teacher expects, which reduces test anxiety.",
     "The feedback equips students to assess where they stand and target their errors — distinguishing slips from conceptual gaps, and identifying specific review tasks — turning homework return into a productive self-directed learning moment rather than a grade notification.",
     "Writing individual notes is valuable primarily because it demonstrates teacher effort and dedication."],
   answerIndex:2,
   explanation:"The value of this practice is that it converts homework return from an administrative act (grade recording) into a formative learning event. By distinguishing calculation slips from conceptual confusion, the teacher gives students the specific diagnostic information they need to direct their review productively. 'Re-examine X before the quiz' gives them an actionable next step. These are the two outcomes this standard names: help students assess their progress, and help them understand and correct their errors."},

  // ---- 3.3.06  Informs students of what they need to do to earn recognition or rewards ----
  // A: clarity of criteria for recognition | B: opaque reward systems | C(math): transparent math recognition criteria
  {id:"p_3306_A", subject:"ptk", standard:"3.3.06", domain:"3", topic:"3.3", set:"A",
   prompt:"A teacher tells her class at the start of a unit: 'If you score 90% or higher on the unit test and show all required work, you will be exempt from that unit's homework review worksheet. Here is exactly what showing required work means...' and provides a clear example. What is the instructional purpose of this level of specificity?",
   options:["Telling students exactly how to earn recognition removes the motivational value of the reward.",
     "Specific criteria are only necessary when the reward is academic credit; non-academic rewards don't need criteria.",
     "This approach only motivates high achievers; lower-performing students are not affected by reward criteria.",
     "When students know in advance exactly what behaviors or outcomes earn recognition, they can direct their effort strategically — the criteria become a behavioral target rather than a mystery, which is more motivating and fair than opaque reward systems."],
   answerIndex:3,
   explanation:"Transparency about recognition criteria serves as a behavioral guide: students know what they are working toward and can make informed decisions about effort allocation. An opaque reward system — where students don't know what earns recognition — doesn't serve this function because students can't strategically aim for the target. Clear criteria also ensure the system is perceived as fair, which is a prerequisite for it to motivate."},

  {id:"p_3306_B", subject:"ptk", standard:"3.3.06", domain:"3", topic:"3.3", set:"B",
   prompt:"A teacher awards 'student of the week' recognition without explaining what criteria determine the selection. Students suspect it is based on favoritism. After several weeks, most students have stopped trying to earn the recognition because they believe the selection is arbitrary. What does this pattern illustrate about recognition systems?",
   options:["When the criteria for earning recognition are unknown, students cannot direct their effort toward them — and when selection appears arbitrary, the recognition loses its motivational function and may damage classroom trust.",
     "Recognition systems always produce jealousy and should be avoided.",
     "Student of the week awards are inherently problematic and should be replaced with grade-based recognition.",
     "The problem is the weekly frequency, not the criteria — monthly recognition would be more effective."],
   answerIndex:0,
   explanation:"A recognition system's motivational value depends on students believing they have a genuine, knowable path to earning it. When criteria are opaque, students face a binary choice: try to earn something unpredictable, or disengage. Most students rationally disengage. The perception of favoritism — however inaccurate — destroys the system's motivational function because it signals that effort doesn't determine outcomes. Stating criteria clearly is the solution."},

  {id:"p_3306_C", subject:"ptk", standard:"3.3.06", domain:"3", topic:"3.3", set:"C",
   prompt:"A math teacher tells students at the start of each unit: 'Any student who earns 85 or above on the unit assessment and who can explain two problems from the assessment to a peer will have the option to skip the unit review packet. Here is the rubric for the explanation.' What is the instructional benefit of stating these criteria upfront and specifically?",
   options:[
     "The criteria create an unfair advantage for strong students who would pass regardless.",
     "Stating criteria upfront eliminates any element of surprise, which reduces motivation.",
     "The benefit is administrative: pre-stated criteria reduce teacher grading time.",
     "Students can now work toward a specific, transparent target — they know exactly what level of performance and understanding earns them the recognition (exemption from review), so they can direct effort accordingly and track their own progress toward the goal."],
   answerIndex:3,
   explanation:"Pre-stating specific criteria transforms the recognition from a surprise outcome into an achievable, knowable target. Students know the performance threshold (85%), the demonstration requirement (explain two problems), and the rubric for judging the explanation — everything they need to work strategically toward the goal. This is the motivational mechanism this standard targets: when students know what earns recognition, they can aim for it deliberately rather than hoping they happen to qualify."},

  // ---- 3.3.07  Provides incentives to students ----
  // A: purpose of incentives | B: evaluate incentive erosion | C(math): math-class incentive
  {id:"p_3307_A", subject:"ptk", standard:"3.3.07", domain:"3", topic:"3.3", set:"A",
   prompt:"A teacher uses a range of incentives to maintain student engagement throughout a long unit: verbal recognition for improvement, occasional small privileges (first-to-choose a partner), and a class celebration when the group meets a collective goal. What is the instructional rationale for using incentives in this way?",
   options:["Incentives replace intrinsic motivation and should only be used with students who can't self-motivate.",
     "Incentives are effective only if they are tangible (candy, prizes); recognition and privileges have no motivational value.",
     "Incentives are primarily a classroom management tool and have no connection to learning.",
     "Incentives — when varied, meaningful to students, and tied to genuine achievement — provide structured encouragement that helps sustain effort across tasks and timeframes where intrinsic motivation may flag, without replacing it."],
   answerIndex:3,
   explanation:"Incentives serve as effort-sustaining mechanisms, particularly for extended or difficult tasks where motivation naturally wanes. Varied incentives (recognition, privilege, collective goals) prevent habituation to any single reward and serve different student motivational profiles. The key is tying incentives to genuine achievement — improvement, goal-meeting — rather than just participation, so they reinforce the behaviors that produce learning rather than just compliance."},

  {id:"p_3307_B", subject:"ptk", standard:"3.3.07", domain:"3", topic:"3.3", set:"B",
   prompt:"A teacher offers the same incentive — extra free time at the end of Friday's class — every week regardless of class performance. After a few weeks, students stop working harder to earn it because they expect to get it anyway. What has gone wrong with this incentive system?",
   options:[
     "Free time is never an appropriate academic incentive and should be replaced with academic rewards.",
     "The incentive is offered too frequently — once a month would be more effective.",
     "When an incentive is given regardless of performance, it becomes an entitlement rather than a motivator — it loses its ability to drive effort because students learn that the outcome is disconnected from their behavior.",
     "The incentive should have been individual, not class-wide."],
   answerIndex:2,
   explanation:"The effectiveness of an incentive depends on the contingency between behavior and reward. When students receive the reward regardless of performance, the contingency is broken — the reward provides no additional reason to work hard. What was designed as an incentive becomes an expectation, and withholding it later feels punitive rather than natural. Incentives must remain contingent on the behaviors or outcomes they are designed to reinforce."},

  {id:"p_3307_C", subject:"ptk", standard:"3.3.07", domain:"3", topic:"3.3", set:"C",
   prompt:"A math teacher notices that engagement drops significantly during the practice phase of lessons. She introduces an incentive: any class that completes at least 80% of practice problems with complete shown work gets to choose the warm-up problem format for the following day. Engagement during practice improves. What makes this incentive well-designed for a math classroom?",
   options:[
     "The incentive is tied to a meaningful academic behavior (completing practice with shown work) rather than to compliance, and the reward (choice of warm-up format) is low-cost to the teacher but valued by students — making it a sustainable and instructionally coherent motivator.",
     "It is well-designed because it involves the whole class, which is always more effective than individual incentives.",
     "The incentive is well-designed because it is given daily, which maximizes motivational frequency.",
     "The incentive works because choosing warm-up format is a high-status activity in math class."],
   answerIndex:0,
   explanation:"This incentive has two features that make it well-designed: the contingency is tied to a target behavior with genuine academic value (complete practice with shown work, not just being quiet), and the reward is meaningful to students without being tangible or costly. The choice of warm-up format is an autonomy-based reward — students value having input — which tends to reinforce engagement more sustainably than tangible rewards that habituate quickly."},

  // ---- 3.3.08  Provides feedback that is meaningful (specific, accurate, important) ----
  // A: three qualities of meaningful feedback | B: importance criterion | C(math): meaningful math proof feedback
  {id:"p_3308_A", subject:"ptk", standard:"3.3.08", domain:"3", topic:"3.3", set:"A",
   prompt:"A teacher returns a student essay with the comment: 'Good effort.' A mentor reviewing the feedback notes that while it is positive, it is not meaningful. What would meaningful feedback on the same essay look like?",
   options:[
     "A numerical score — numbers are more specific than words.",
     "A longer comment — length is the primary indicator of feedback quality.",
     "Feedback that is specific (names what the student did and where), accurate (reflects what is actually in the work), and important (addresses what most needs attention) — for example: 'Your thesis is arguable and specific; your evidence in paragraph three doesn't connect back to that thesis — that's the most important gap to fix.'",
     "Feedback comparing the student's work to peer performance."],
   answerIndex:2,
   explanation:"Meaningful feedback has three named qualities: specific (it names what, where, and how — not just 'good'), accurate (it describes what is actually there, not a generic impression), and important (it addresses what most matters for learning in this piece of work). 'Good effort' fails all three: it says nothing about what was done, may not reflect the work's actual quality, and identifies no prioritized learning target."},

  {id:"p_3308_B", subject:"ptk", standard:"3.3.08", domain:"3", topic:"3.3", set:"B",
   prompt:"A teacher writes detailed feedback on every minor grammatical error in a student's research paper but makes no comment on the paper's argument, evidence, or structure — which are the actual targets of the assignment. The student fixes all grammar errors and considers the paper revised. What has the feedback failed to do?",
   options:[
     "The feedback was too long — shorter feedback would have been more effective.",
     "Grammar is not a legitimate focus of academic feedback; only content should be addressed.",
     "The feedback failed the importance criterion: it addressed peripheral issues (grammar) rather than the aspects of the work that most matter for the learning objective — leaving the student without guidance on what actually needed to change.",
     "The feedback should have been given orally to be more effective."],
   answerIndex:2,
   explanation:"The third quality of meaningful feedback is importance: it addresses what matters most for learning, not what is easiest to identify or comment on. Grammar errors are concrete and commentable, but for a research paper, argument and evidence are the primary targets. Feedback that focuses on low-importance surface features while leaving high-importance conceptual issues unaddressed actually misdirects the student's revision effort, producing surface improvement and leaving the core work unchanged."},

  {id:"p_3308_C", subject:"ptk", standard:"3.3.08", domain:"3", topic:"3.3", set:"C",
   prompt:"A math teacher marks a student's proof with a red X on the final line where the conclusion is wrong, but makes no comment on where in the proof the logic broke down — which is three steps earlier, where the student made an unjustified leap. The student re-examines the conclusion line without finding the error. What aspect of meaningful feedback is the teacher's marking failing to provide?",
   options:[
     "The feedback is not specific enough — it identifies that something is wrong but not where the error actually occurred or why, so the student cannot use it to locate or understand the flaw.",
     "The feedback is not positive enough — all feedback should acknowledge what the student did correctly before noting errors.",
     "The feedback should have been given during class, not on returned work.",
     "The feedback is inaccurate — the conclusion line is not actually wrong given the student's steps."],
   answerIndex:0,
   explanation:"Specificity is one of the three named qualities of meaningful feedback. A red X on the conclusion line is accurate (the conclusion is wrong) but not specific (it doesn't locate where the reasoning broke down or why). The result is exactly what the scenario describes: the student examines the wrong line and can't find the error. Meaningful feedback in a proof context would identify the specific step where the logic failed and explain what unjustified claim was made — giving the student a precise, actionable target."},

  // ---- 3.3.09  Avoids embarrassing, insulting, or demeaning students when providing feedback ----
  // A: dignity in feedback | B: demeaning feedback suppresses participation | C(math): errors in math class
  {id:"p_3309_A", subject:"ptk", standard:"3.3.09", domain:"3", topic:"3.3", set:"A",
   prompt:"A student gives an incorrect answer during whole-class discussion. The teacher responds: 'Not quite — that's a common place to get confused. Let me show you the part that trips people up.' The student remains engaged and tries the next question. What aspect of this response preserves the student's willingness to participate?",
   options:[
     "By normalizing the error and redirecting to the concept rather than the student's ability, the teacher corrects without demeaning — preserving the student's dignity and signaling that errors are a safe, expected part of learning.",
     "The teacher used a gentle tone, which is always more effective than a direct tone.",
     "The teacher avoided giving corrective information, which protects the student's feelings.",
     "The teacher praised the student for being wrong, which increases participation."],
   answerIndex:0,
   explanation:"Normalizing the error and focusing the correction on the concept rather than the student's competence maintains dignity without sacrificing accuracy. The student receives real corrective information without being made to feel foolish for having misunderstood. This matters because students who are embarrassed by corrections quickly learn not to volunteer answers — the class loses a valuable diagnostic opportunity and a norm of intellectual risk-taking."},

  {id:"p_3309_B", subject:"ptk", standard:"3.3.09", domain:"3", topic:"3.3", set:"B",
   prompt:"A teacher responds to an incorrect student answer by saying, 'No. That's not even close. Were you paying attention?' Other students exchange glances and several stop raising their hands for the rest of the period. What are the instructional consequences of this type of feedback?",
   options:[
     "The response is honest and students benefit from knowing when answers are significantly wrong.",
     "The consequences are minimal if the teacher apologizes in the next class period.",
     "Demeaning corrective feedback suppresses future participation — students calculate that the risk of public humiliation outweighs the benefit of answering. The teacher loses access to the whole-class diagnostic information that questioning is designed to generate.",
     "Only the student who was corrected is affected; other students are not impacted by witnessing demeaning feedback."],
   answerIndex:2,
   explanation:"Students don't just register the feedback they receive — they observe the feedback others receive and adjust their behavior accordingly. When a peer is publicly humiliated for an incorrect answer, the rational response is to stop volunteering. The teacher loses the entire class's willingness to participate in public questioning, which is one of the highest-leverage instructional formats. Demeaning feedback is not just unkind — it is instructionally self-defeating."},

  {id:"p_3309_C", subject:"ptk", standard:"3.3.09", domain:"3", topic:"3.3", set:"C",
   prompt:"During board work, a student makes an algebraic error in front of the class. One teacher says, 'Nice try — let's find where it went sideways,' and works through the error with the student as a class example. A different teacher says 'Sit down, that's completely wrong' when a student makes the same type of error. Compare the likely effect on classroom climate for mathematical learning.",
   options:[
     "The first teacher's approach is less rigorous because it softens the feedback.",
     "Both approaches are equivalent in their effect on mathematical understanding.",
     "The first teacher's approach maintains a climate where errors are safe to make publicly, which is essential for mathematical learning — students who fear being dismissed for errors stop taking the cognitive risks where most mathematical growth happens.",
     "The second teacher's approach is more effective because immediate blunt correction prevents the error from being reinforced."],
   answerIndex:2,
   explanation:"Mathematical learning requires cognitive risk-taking — attempting problems, conjecturing, testing approaches that may be wrong. A classroom climate where errors result in public dismissal suppresses exactly the risk-taking that mathematical development requires. The first teacher's approach corrects the error while maintaining a climate where errors are treated as learning events, not indictments of ability. Over time, this difference in climate produces measurable differences in which students are willing to think publicly in math class."},

  // =====================================================================
  // PTK · Domain 3 · Topic 3.4 — Expects Students to Learn
  // Standards 3.4.01–3.4.06 (6 standards × 3 sets = 18 questions)
  // A/B subject-neutral; C secondary-math context
  // =====================================================================

  // ---- 3.4.01  Holds high achievement expectations for student learning ----
  // A: high expectations in practice | B: evaluate lowered expectations | C(math): high expectations in math
  {id:"p_3401_A", subject:"ptk", standard:"3.4.01", domain:"3", topic:"3.4", set:"A",
   prompt:"A teacher refuses to accept 'I don't get it' as a final answer. When a student says this, she responds with a targeted question to identify where the confusion begins, then guides the student from that point rather than telling them the answer or moving on. She does this for all students regardless of their prior performance. What principle does this reflect?",
   options:["The teacher is being inflexible; sometimes students genuinely cannot understand a topic and need to be given the answer.",
     "This approach only works for high-performing students; lower-performing students need simpler tasks.",
     "Asking follow-up questions is primarily a questioning technique, not an expression of expectations.",
     "High expectations in practice mean refusing to accept intellectual disengagement as the endpoint — instead responding to confusion by finding the accessible entry point for each student and expecting they can get there with appropriate support."],
   answerIndex:3,
   explanation:"High expectations are not about demanding correct answers — they are about refusing to accept that a student has reached their learning ceiling. The teacher's practice operationalizes this: every 'I don't get it' is treated as a diagnostic opportunity rather than a stopping point. By finding where understanding breaks down and working from there, she communicates that getting to understanding is the expected outcome for this student — and then acts on that belief."},

  {id:"p_3401_B", subject:"ptk", standard:"3.4.01", domain:"3", topic:"3.4", set:"B",
   prompt:"A teacher has informally sorted students into 'can-do' and 'can't-do' groups based on early performance. She asks easy, low-cognitive-demand questions of the 'can't-do' group to keep them engaged without frustration, and reserves challenging questions for the 'can-do' group. What is the primary problem with this approach?",
   options:[
     "The approach is fair because it differentiates instruction to meet each group's needs.",
     "The problem is only the sorting — once the groups are visible to students, they should receive the same level of questioning.",
     "By consistently routing low-demand tasks and questions to the 'can't-do' group, the teacher communicates and enacts low expectations for those students — research consistently shows this depresses their achievement, as students rise or fail to rise to meet the expectations set for them.",
     "Low-cognitive-demand questions are appropriate for all students during early instruction; the problem only arises on assessments."],
   answerIndex:2,
   explanation:"This is the classic operationalization of low expectations: teachers who believe students can't perform give them tasks and questions that don't require high-level performance, which denies those students access to the cognitive challenge that produces growth. The 'can't-do' students never get the opportunity to demonstrate higher-order thinking because they're never asked for it. Research on the Pygmalion effect consistently shows that teacher expectations shape student performance through the instruction students receive."},

  {id:"p_3401_C", subject:"ptk", standard:"3.4.01", domain:"3", topic:"3.4", set:"C",
   prompt:"A math teacher assigns every student the same challenging problem set, including students with a history of struggling. For students who need it, she provides scaffolding (a worked example to study first), but the core problem-level is the same for all. When a colleague suggests giving struggling students an easier version, she declines. What is her strongest argument?",
   options:[
     "Assigning differentiated problem sets creates logistical complications that aren't worth the benefit.",
     "Holding all students to challenging work — while adjusting support, not the ceiling — communicates that the expectation of rigorous mathematical achievement applies to everyone. Lowering the problem level for some students preemptively limits what those students are given the chance to demonstrate.",
     "Scaffolding and differentiated tasks are identical strategies; the teacher's position is incoherent.",
     "High expectations only matter for students who are already motivated; unmotivated students require different criteria."],
   answerIndex:1,
   explanation:"The distinction the teacher is drawing is between adjusting support (scaffolding, worked examples) and adjusting the ceiling (easier problems). The former maintains high expectations while making them accessible; the latter lowers the expectation itself. Giving struggling students an easier version communicates — often implicitly — that the teacher doesn't believe they can access the harder work, which becomes a self-fulfilling prediction. Providing scaffolding to reach the same challenge communicates the opposite."},

  // ---- 3.4.02  Communicates measurements and criteria for attaining learning objectives ----
  // A: criteria transparency | B: absent criteria | C(math): math success criteria
  {id:"p_3402_A", subject:"ptk", standard:"3.4.02", domain:"3", topic:"3.4", set:"A",
   prompt:"Before beginning a unit, a teacher shares with students: the learning objectives, how each will be assessed, what a strong performance looks like (with an annotated example), and what specifically students need to do to demonstrate mastery. A colleague says this gives away too much before the assessment. What is the strongest argument against the colleague's concern?",
   options:["Students can't 'game' assessments if the criteria are genuinely measuring learning — transparency about what mastery looks like is not cheating, it's communicating the target so students can direct their effort toward it.",
     "Sharing assessment criteria is legally required before any graded assignment.",
     "The concern is valid; some mystery about expectations motivates students more than clarity.",
     "Sharing criteria only benefits high-achieving students; lower-performing students don't use the information."],
   answerIndex:0,
   explanation:"The logic of communicating criteria is that students should know what they're working toward. Assessment criteria define the target; sharing them doesn't compromise the assessment's validity — it aligns student effort with the actual learning goal. If students can 'game' the assessment by knowing the criteria, the assessment was measuring something other than the intended learning. Transparency about success criteria is an equity issue as much as a motivation issue."},

  {id:"p_3402_B", subject:"ptk", standard:"3.4.02", domain:"3", topic:"3.4", set:"B",
   prompt:"A teacher assigns a major project without explaining how it will be graded or what distinguishes excellent from adequate work. Students submit widely varying products. When students ask why they received the grades they did, the teacher explains the criteria post-hoc. What is the primary problem with this sequence?",
   options:[
     "The problem is the variation in student work; with better students the approach would work.",
     "Criteria explained only after the work is submitted cannot guide the work — students had no opportunity to direct their effort toward meeting the criteria, which makes the assessment measure students' ability to guess the teacher's expectations rather than their learning.",
     "Post-hoc explanation of criteria is a standard practice in project-based learning.",
     "The problem is that the teacher gave individual explanations instead of class-wide criteria."],
   answerIndex:1,
   explanation:"Success criteria serve two functions: they guide effort before and during work (formative function) and they make evaluation transparent after (summative function). When criteria are revealed only after submission, the formative function is eliminated — students cannot use criteria to guide their work if they don't know them. The resulting variation in products reflects variation in students' ability to intuit unstated expectations, which is not what the assignment was designed to measure."},

  {id:"p_3402_C", subject:"ptk", standard:"3.4.02", domain:"3", topic:"3.4", set:"C",
   prompt:"Before assigning a unit test on systems of equations, a math teacher tells students: 'The test has three sections. For the algebraic section, you earn full credit by showing each step and stating the operation performed. For the application section, full credit requires setting up the system correctly, solving it, and interpreting the solution in context. For the graphing section, the graph must be labeled and the intersection clearly marked.' What is the instructional value of communicating these specific criteria before the test?",
   options:[
     "The criteria tell students exactly which problems will appear, which reduces the validity of the assessment.",
     "Students can now direct their preparation specifically toward the standards that will be assessed — they know what demonstrating mastery means in each section, so they can self-evaluate their readiness and close specific gaps before the test.",
     "The criteria are too detailed and will confuse students who are not strong test-takers.",
     "Communicating criteria is only valuable for writing assessments; math tests are objective and don't need criteria."],
   answerIndex:1,
   explanation:"For each section, the teacher has communicated what demonstrating mastery looks like: showing steps and operations, correct setup plus contextual interpretation, labeled graph with marked intersection. This lets students self-assess: 'Can I show each step? Can I interpret the solution in context?' Students who can answer 'no' to any of these know exactly what to practice before the test. This transforms pre-test preparation from vague review into targeted gap-closing — which is the entire value of communicating success criteria."},

  // ---- 3.4.03  Sets goals for meeting standards, gains in learning, or both ----
  // A: value of explicit goal-setting | B: coverage goals vs. learning goals | C(math): math goal-setting
  {id:"p_3403_A", subject:"ptk", standard:"3.4.03", domain:"3", topic:"3.4", set:"A",
   prompt:"A teacher sets two types of explicit goals with her class at the start of each unit: a standards goal ('By the end of this unit, everyone will be able to...') and a personal growth goal for each student ('Your goal this unit is to improve your score from last time by at least X points'). Why are both types of goals instructionally valuable?",
   options:["Only standards goals are instructionally valid; personal growth goals are a motivational tool with no academic value.",
     "Goals are only effective if they are set by students themselves, not by the teacher.",
     "Setting two types of goals creates confusion; one clear goal per unit is always more effective.",
     "Standards goals and growth goals serve different functions: the standards goal communicates the learning target everyone is working toward; the growth goal personalizes accountability and makes achievement meaningful for students who may be far from the standards threshold."],
   answerIndex:3,
   explanation:"Standards goals and growth goals address different dimensions of achievement motivation. A standards goal gives everyone a shared target and communicates expectations clearly. A growth goal gives each student an individually meaningful benchmark — particularly important for students whose current performance is far below the standard, who might disengage from a goal they see as unreachable. Growth goals make improvement itself an achievement, which maintains effort across the full range of the class."},

  {id:"p_3403_B", subject:"ptk", standard:"3.4.03", domain:"3", topic:"3.4", set:"B",
   prompt:"A teacher sets unit goals only in terms of curriculum coverage ('We will cover chapters 3 and 4 this unit') rather than in terms of student learning ('Students will be able to do X'). Students have no clear sense of what they are expected to know or be able to do by the end of the unit. What has the teacher failed to establish?",
   options:[
     "A pacing guide — coverage goals are acceptable as long as the teacher moves quickly enough.",
     "Coverage goals describe what the teacher will do, not what students will learn — the teacher has failed to establish learning goals that give students a target for their own performance, which is what allows students to self-monitor progress and understand what mastery means.",
     "Coverage goals are the correct type of goal at the unit level; learning goals only apply to individual lessons.",
     "The problem is that the goals were stated verbally rather than in writing."],
   answerIndex:1,
   explanation:"Coverage goals ('we will cover chapters 3 and 4') describe the teacher's instructional journey, not the student's learning destination. Students cannot self-monitor progress toward 'chapter 4 covered' because it gives them no information about what they are expected to know or be able to do. Learning goals give students a reference point for self-assessment and effort direction."},

  {id:"p_3403_C", subject:"ptk", standard:"3.4.03", domain:"3", topic:"3.4", set:"C",
   prompt:"At the start of a calculus unit on integration, a math teacher sets two explicit goals: (1) a standards goal — all students will be able to evaluate definite integrals using the fundamental theorem of calculus by the unit test; and (2) individual growth goals — each student identifies one specific integration technique they struggled with last unit and sets a goal to demonstrate mastery of it by unit's end. What does each type of goal contribute to student learning?",
   options:[
     "The standards goal is instructionally valid; the individual growth goal is a motivational technique with no academic content.",
     "The standards goal establishes the shared learning target; the individual growth goal creates personal accountability for a specific gap — each student has a concrete, self-identified improvement target that makes learning personally meaningful beyond the class-wide standard.",
     "Setting both goals simultaneously will confuse students about which one matters more.",
     "Growth goals are only appropriate for students who have already met the standards goal."],
   answerIndex:1,
   explanation:"The standards goal tells every student what they are working toward as a class community. The individual growth goal personalizes accountability: by identifying a specific prior weakness to address, each student has a concrete, self-chosen target that is meaningful to their specific learning history. The combination is more motivationally complete than either alone: the standards goal prevents relativism ('I improved, so I'm done') while the growth goal prevents disengagement ('I'll never reach that standard, so why try')."},

  // ---- 3.4.04  Holds all students accountable for participating and attaining goals ----
  // A: universal participation accountability | B: opt-out erosion | C(math): accountability for all in math
  {id:"p_3404_A", subject:"ptk", standard:"3.4.04", domain:"3", topic:"3.4", set:"A",
   prompt:"During class discussion, a teacher uses a random name-selection strategy — she draws from a set of cards with every student's name — rather than waiting for volunteers. She also tracks which students have been called on and ensures all students participate before any student is called twice. What accountability function does this practice serve?",
   options:["By making participation unpredictable and universal, the teacher communicates that engagement is expected from everyone — not just willing volunteers — and creates a structure where all students must maintain readiness rather than opting out by staying quiet.",
     "Random selection is only useful for assigning seats, not for academic accountability.",
     "The practice is unfair because it may call on students who don't know the answer.",
     "Tracking participation is an administrative burden that reduces instructional time."],
   answerIndex:0,
   explanation:"Volunteer-based discussion creates a structural accountability gap: students who don't volunteer are not held to any participation expectation, and the teacher receives information only from the willing subset. Random selection closes this gap — every student is accountable for readiness because any student might be called. The equity dimension is also significant: voluntary participation systematically underrepresents quieter students and overstates the class's overall understanding."},

  {id:"p_3404_B", subject:"ptk", standard:"3.4.04", domain:"3", topic:"3.4", set:"B",
   prompt:"A teacher regularly excuses students from participation in activities if they claim not to feel like it or say they're having a bad day. Over time, the same five students consistently opt out of most activities, and their performance lags significantly. What accountability principle has the teacher failed to apply?",
   options:[
     "The teacher is appropriately supporting student well-being by not forcing participation.",
     "Accountability for participation means holding all students to the expectation that they engage with learning activities — accommodating consistent opt-outs for non-clinical reasons removes the structure that supports learning and disproportionately affects the students who most need engagement to make progress.",
     "Only students with behavioral issues should face participation requirements; other students can opt out.",
     "The consequences for missing participation should be purely grade-based, not structural."],
   answerIndex:1,
   explanation:"Participation accountability isn't about being unkind to students who are having hard days — appropriate sensitivity to genuine distress is different from systematically allowing opt-outs without reason. The key phrase is 'all students': accountability for participation means no student has a permanent opt-out from the expectation of engagement. The pattern described — consistent opt-outs by the same students who also perform poorly — is the predictable outcome when participation is treated as optional for those who most need it."},

  {id:"p_3404_C", subject:"ptk", standard:"3.4.04", domain:"3", topic:"3.4", set:"C",
   prompt:"A math teacher requires every student to attempt every practice problem and show their work, including students who already know the procedure. When a strong student says she doesn't need to show steps because she can do the problem in her head, the teacher responds: 'I understand — but in this class, showing work is how we all demonstrate thinking, and that applies to everyone.' What principle is the teacher enforcing?",
   options:[
     "Holding all students accountable for the same academic behaviors — including strong students — reinforces that participation expectations are universal, not achievement-contingent. It also preserves the diagnostic function of shown work for the teacher's ongoing assessment.",
     "The teacher is being unnecessarily rigid; strong students should be exempt from requirements that don't serve their learning.",
     "The rule about showing work applies only to tests and homework, not class practice.",
     "The teacher should have offered the student an alternative way to demonstrate understanding."],
   answerIndex:0,
   explanation:"The teacher is applying the principle of universal accountability: the expectation applies to all students, not just those who are struggling. There are also genuine instructional reasons to require strong students to show work — it develops communication skills, allows error-checking, and provides the teacher diagnostic access to that student's reasoning. Selective application of expectations based on current performance level undermines the norm that everyone is held to the same standards."},

  // ---- 3.4.05  Holds all students accountable for completing high quality work ----
  // A: quality vs. completion | B: completion-only norm erosion | C(math): quality standard in math
  {id:"p_3405_A", subject:"ptk", standard:"3.4.05", domain:"3", topic:"3.4", set:"A",
   prompt:"A teacher returns student work that meets completion requirements but is sloppily done — key steps are missing, reasoning is unexplained, and errors are uncorrected. She writes 'Please redo with care — completed is not the same as quality work' and requires the student to resubmit before accepting it as finished. What principle is she applying?",
   options:[
     "The teacher is being punitive by requiring additional work beyond the original assignment.",
     "Requiring resubmission is only appropriate for major assessments, not routine work.",
     "The teacher should have given partial credit for the incomplete effort rather than requiring resubmission.",
     "The distinction between completion and quality is central to this accountability standard — students are responsible not just for turning in work but for turning in work that meets a standard of care, accuracy, and thoroughness."],
   answerIndex:3,
   explanation:"Completion accountability ('did you turn it in?') and quality accountability ('does it meet the standard?') are different standards. Accepting completion without quality communicates that showing up — not actual learning — is what's being measured. The teacher's practice draws a clear distinction: submission is the floor, not the ceiling. Requiring quality work consistently communicates that learning outcomes matter, not just the act of doing the assignment."},

  {id:"p_3405_B", subject:"ptk", standard:"3.4.05", domain:"3", topic:"3.4", set:"B",
   prompt:"A teacher accepts all homework as long as it is submitted, regardless of quality — students receive full credit for any submission, including work that is mostly blank or clearly rushed. Over the semester, homework quality declines steadily across the class. What accountability norm has the teacher communicated?",
   options:[
     "The norm communicated is that effort matters more than accuracy, which is a valid pedagogical choice.",
     "By accepting any submission for full credit, the teacher has communicated that completion is the only expectation — quality, accuracy, and effort are not actually required, and students respond rationally by producing the minimum to meet the actual standard.",
     "The decline in quality is driven by student motivation, not by the teacher's acceptance policy.",
     "Homework quality is not a reliable indicator of learning and therefore should not be a factor in acceptance."],
   answerIndex:1,
   explanation:"Students respond to the actual expectations enforced, not the stated ones. When full credit follows any submission regardless of quality, students correctly conclude that quality is not actually expected — completing the submission is the whole task. The steady decline in quality is the rational response to this signal. To raise quality, the teacher must make quality an enforced criterion, not just an aspirational one."},

  {id:"p_3405_C", subject:"ptk", standard:"3.4.05", domain:"3", topic:"3.4", set:"C",
   prompt:"A math teacher requires that homework answers always include the setup, the work, the answer with units, and a check step. She returns work missing any of these components for revision, even if the final answer is correct. A student argues that getting the right answer should be sufficient. What is the teacher's best response?",
   options:[
     "The student is right — in mathematics, the correct answer is the standard of quality.",
     "The teacher should negotiate with the student about which components are truly necessary.",
     "High quality mathematical work means more than a correct answer — it means a complete, communicable solution. Showing setup, work, units, and a check demonstrates understanding of the process, not just the outcome, and builds habits that prevent errors in complex problems where the answer alone can't be verified.",
     "The teacher should only enforce these requirements on tests, not on homework."],
   answerIndex:2,
   explanation:"In mathematics, a correct answer with no supporting work is not high quality work — it's a result with no demonstrated understanding. The components the teacher requires (setup, work, units, check) are not bureaucratic hurdles; they are the visible evidence of a complete solution process. Enforcing these components on all work builds the disciplined habits that support accuracy in complex problems. The teacher is holding students to a quality standard that serves their mathematical development, not just a formatting preference."},

  // ---- 3.4.06  Teaches that effort is necessary for success in attaining rigorous standards ----
  // A: communicating effort-outcome relationship | B: fixed-mindset messaging | C(math): effort in math
  {id:"p_3406_A", subject:"ptk", standard:"3.4.06", domain:"3", topic:"3.4", set:"A",
   prompt:"A teacher regularly tells her class: 'Hard work is what separates students who improve from students who don't — not how you did last time, not how math-brained you think you are.' She backs this up by publicly tracking improvement and celebrating effort on difficult tasks. What belief about learning is she communicating?",
   options:[
     "She is communicating that consistent, directed effort is the primary controllable driver of achievement — and she reinforces this belief through the tracking and celebration practices she pairs with the message.",
     "She is communicating that intelligence is irrelevant, which is factually inaccurate.",
     "She is communicating that effort substitutes for skill development, which is misleading.",
     "Communicating beliefs about effort is a motivational technique unrelated to academic standards."],
   answerIndex:0,
   explanation:"Teaching that effort is necessary for success in rigorous work is an evidence-based message: achievement in challenging domains is strongly predicted by sustained, deliberate effort. By tracking improvement and celebrating effort (not just outcomes), the teacher aligns her practices with her message — students see that effort is noticed and connected to progress. This is qualitatively different from telling students 'just try harder' without structural support for the effort."},

  {id:"p_3406_B", subject:"ptk", standard:"3.4.06", domain:"3", topic:"3.4", set:"B",
   prompt:"A teacher frequently makes comments like 'Some of you have the gift for this — others will just have to accept their limitations' and 'Natural talent is what determines your ceiling in this subject.' How does this messaging affect students' approach to rigorous work?",
   options:[
     "The messaging is accurate and students benefit from realistic expectations.",
     "The messaging only affects low-performing students; high-performing students are motivated regardless.",
     "Fixed-talent messaging teaches students that effort is irrelevant because outcomes are determined by innate ability — students who believe they lack the gift disengage from rigorous effort, and students who believe they have it may avoid challenge to protect their gifted identity.",
     "The messaging is negative but has no measurable impact on academic performance."],
   answerIndex:2,
   explanation:"Research on implicit theories of intelligence (Dweck et al.) consistently shows that students who hold fixed-ability beliefs show lower persistence in the face of difficulty, avoid challenge to protect their ability label, and recover more slowly from setbacks than students with growth-oriented beliefs. The teacher's messaging is not neutral — it is actively teaching a theory of learning that undermines both effort and resilience in rigorous academic work."},

  {id:"p_3406_C", subject:"ptk", standard:"3.4.06", domain:"3", topic:"3.4", set:"C",
   prompt:"A student in a pre-calculus class says, 'I'm just not a math person — some people get it and I don't.' The teacher responds: 'Let me show you something. Look at your quiz from four weeks ago versus last week. These two problems — you couldn't set them up in September. Last week you solved both correctly. That's not talent showing up; that's your work showing up.' What is the teacher explicitly teaching?",
   options:[
     "The teacher is teaching the student to compare herself to her past performance, which is harmful.",
     "The teacher is deflecting from the student's legitimate concern about mathematical ability.",
     "The teacher is using the student's own data to demonstrate that effort and practice — not fixed ability — produced the visible improvement, directly countering the fixed-ability belief with concrete evidence specific to this student.",
     "This is a motivational technique unrelated to academic instruction."],
   answerIndex:2,
   explanation:"The teacher's response is particularly effective because it uses the student's own performance data rather than abstract reassurance. Showing a student the gap between what she could do in September and what she can do now is concrete evidence that her belief ('I'm not a math person') is inconsistent with her observable trajectory. The explicit attribution — 'that's your work showing up, not talent' — is the lesson: effort produces the gains that ability-belief dismisses. This is what teaching the effort-success relationship looks like in practice."},

  // =====================================================================
  // PTK · Domain 3 · Topic 3.5 — Involves Parents and Guardians
  // Standards 3.5.01–3.5.03 (3 standards × 3 sets = 9 questions)
  // A/B subject-neutral; C secondary-math context
  // =====================================================================

  // ---- 3.5.01  Involves parents/guardians in monitoring academic progress and homework ----
  // A: strategies for parent monitoring | B: reactive-only communication | C(math): math homework monitoring
  {id:"p_3501_A", subject:"ptk", standard:"3.5.01", domain:"3", topic:"3.5", set:"A",
   prompt:"A teacher sends home a weekly one-page summary showing each student's quiz scores, missing assignments, and one specific thing the parent can ask their child about that week's learning. Parents report feeling informed and able to have productive conversations about schoolwork. What purpose does this practice serve beyond communication?",
   options:["The summaries are primarily for legal documentation purposes.",
     "Regular summaries reduce the number of parent-teacher conferences required by administrators.",
     "The practice is effective only for elementary students; secondary parents don't need or use this information.",
     "The summaries involve parents as active participants in monitoring their child's progress — giving them the specific information and conversation starter they need to reinforce academic accountability at home, extending the school's influence into the learning environment outside class."],
   answerIndex:3,
   explanation:"The weekly summary does more than inform parents — it equips them to participate in their child's learning. The specific conversation starter ('ask your child about...') bridges the home-school gap: parents who don't understand the content can still ask meaningful questions that prompt the student to retrieve and explain their learning. This is parent involvement as a monitoring and reinforcement mechanism, not just a communication gesture."},

  {id:"p_3501_B", subject:"ptk", standard:"3.5.01", domain:"3", topic:"3.5", set:"B",
   prompt:"A teacher contacts parents only when a student has a serious behavioral or academic crisis. Parents report feeling blindsided by problems that had apparently been building for weeks. What opportunity has the teacher missed?",
   options:[
     "Crisis-only contact is efficient and appropriate; parents don't need routine updates.",
     "The teacher should have contacted parents more frequently about behavioral incidents specifically.",
     "By limiting contact to crises, the teacher has missed the opportunity to involve parents in ongoing monitoring of progress and homework — proactive communication allows parents to partner in catching problems early rather than only hearing about them once they've become crises.",
     "Parent contact for non-crisis issues violates student privacy in most states."],
   answerIndex:2,
   explanation:"Reactive, crisis-only communication creates a pattern where the only parent-teacher contact is negative and urgent — a dynamic that makes the relationship adversarial rather than collaborative. Proactive communication about progress (and not just problems) builds a relationship where parents can partner in monitoring, catch trends early, and support homework completion before it becomes a failing grade. The goal is parents as ongoing partners in monitoring, not just emergency contacts."},

  {id:"p_3501_C", subject:"ptk", standard:"3.5.01", domain:"3", topic:"3.5", set:"C",
   prompt:"A math teacher emails parents a brief monthly update that includes their child's current grade, the current unit topic, and one or two specific questions the parent can ask about homework. For example: 'This month we're working on systems of equations. You can ask your child to explain what it means for two equations to have the same solution.' Why is including the question-to-ask valuable beyond grade reporting?",
   options:[
     "The question helps parents check whether the teacher is covering the correct curriculum.",
     "The question is designed to test whether parents understand algebra themselves.",
     "Providing a specific question equips parents to have a meaningful conversation about the mathematics even if they don't remember the content — it turns the parent into an active participant who can prompt retrieval and explanation from their child, reinforcing learning at home.",
     "The question simplifies the teacher's communication task by reducing the amount of content explanation needed."],
   answerIndex:2,
   explanation:"Grade information tells parents where their child stands; the question-to-ask equips them to actively support learning. A parent who asks 'Can you explain what it means for two equations to have the same solution?' is prompting their child to retrieve and articulate mathematical understanding — a genuine learning event. This is parent involvement as a home-extension of instruction, not just a reporting mechanism."},

  // ---- 3.5.02  Alerts parents and guardians to educational benefits of leisure reading ----
  // A: why communicate reading benefits | B: missed opportunity | C(math): reading beyond math class
  {id:"p_3502_A", subject:"ptk", standard:"3.5.02", domain:"3", topic:"3.5", set:"A",
   prompt:"A teacher sends an early-semester note to families explaining that students who read for pleasure outside school — any genre, any topic — show measurable improvements in vocabulary, reading fluency, and general academic performance. She recommends 20 minutes of reading per day and provides a list of accessible books at various interest levels. What is the teacher doing by sending this communication?",
   options:["The teacher is alerting families to the educational benefits of leisure reading — equipping parents with information they can use to support their child's learning outside school in a way that compounds academic gains.",
     "The teacher is overstepping by recommending activities outside school hours.",
     "Recommending leisure reading is only appropriate if the teacher has assigned required reading first.",
     "This communication is only useful for families of struggling readers; strong readers don't benefit from leisure reading recommendations."],
   answerIndex:0,
   explanation:"Many families are unaware of the research connecting leisure reading to academic outcomes. By communicating this explicitly, the teacher gives parents an accessible, low-cost lever for supporting their child's development — even outside the specific subject content. This is a form of parent involvement that extends learning time without adding formal homework."},

  {id:"p_3502_B", subject:"ptk", standard:"3.5.02", domain:"3", topic:"3.5", set:"B",
   prompt:"A teacher never mentions reading outside of required class assignments. At a parent conference, a parent asks what they can do at home to support their child's academic performance beyond helping with homework. The teacher has no suggestions beyond 'make sure they complete their assignments.' What opportunity has the teacher missed?",
   options:[
     "The teacher missed the opportunity to recommend paid tutoring services.",
     "The teacher has nothing to add — homework completion is the only home-based academic support teachers can legitimately recommend.",
     "The teacher missed the opportunity to inform the parent about the academic benefits of leisure reading — one of the most accessible and research-supported home activities for supporting academic growth across subjects.",
     "The teacher should have recommended a specific reading app rather than books."],
   answerIndex:2,
   explanation:"Leisure reading is one of the most widely accessible and research-supported home activities for supporting academic development — it builds vocabulary, reading fluency, background knowledge, and writing ability. Many parents genuinely don't know this, or assume reading only matters in English class. A teacher who never communicates this leaves parents without a valuable, easy tool for home support. This standard recognizes that informing parents about reading's benefits is part of involving them in the instructional program."},

  {id:"p_3502_C", subject:"ptk", standard:"3.5.02", domain:"3", topic:"3.5", set:"C",
   prompt:"A math teacher includes a note in the first-week family letter: 'Students who read regularly — even for pleasure, even non-math topics — tend to be stronger at word problems and mathematical reasoning because they develop stronger language comprehension and attention. Encouraging 15–20 minutes of reading per night can benefit your child's math learning.' Why is this communication appropriate for a math teacher to make?",
   options:[
     "Reading comprehension and mathematical reasoning share underlying cognitive skills. A math teacher who understands this connection serves families by pointing out that reading isn't just for English class — it's a cross-disciplinary academic support directly relevant to mathematical success.",
     "It is not appropriate — math teachers should only communicate about mathematical topics.",
     "The communication is appropriate but only if the school's reading specialist approves it.",
     "Math teachers are not qualified to comment on reading; this guidance belongs to language arts teachers only."],
   answerIndex:0,
   explanation:"Word problems and mathematical communication require reading comprehension, and the background knowledge built through reading supports mathematical sense-making. A math teacher who communicates this to families is sharing accurate, relevant information about how reading benefits mathematical learning — and involving parents in a home practice that supports their child's success in math specifically. This is within any teacher's professional scope when the information is accurate and relevant to student success in their course."},

  // ---- 3.5.03  Involves parents and stakeholders to gather pertinent information about student success ----
  // A: parents as information source | B: one-way communication | C(math): gather info for math support
  {id:"p_3503_A", subject:"ptk", standard:"3.5.03", domain:"3", topic:"3.5", set:"A",
   prompt:"Before the school year begins, a teacher sends families a brief survey: What does your child enjoy? What has made school hard in the past? Are there things we should know about your child's learning or circumstances? She reads responses and uses them to inform how she structures early instruction and relationships. What role are parents playing in this practice?",
   options:[
     "Parents are serving as information sources — providing knowledge about their child that the teacher cannot acquire through observation alone, which informs more responsive and effective instruction.",
     "Parents are serving as teacher evaluators, providing feedback on instructional quality.",
     "The survey is a legal compliance measure; the information doesn't affect instruction.",
     "Only parents of students with IEPs should be surveyed; other parents don't have relevant information."],
   answerIndex:0,
   explanation:"Parents know their children in ways teachers cannot access through classroom observation alone — prior academic struggles, learning preferences, circumstances at home, anxieties, interests, and history with school. Surveying families before or at the start of the year treats parents as valuable information sources rather than passive recipients of school communication. The information gathered can meaningfully inform how the teacher approaches individual students and structures the early classroom environment."},

  {id:"p_3503_B", subject:"ptk", standard:"3.5.03", domain:"3", topic:"3.5", set:"B",
   prompt:"A teacher communicates frequently with parents about grades and assignments but never asks them for information about their child. When a student struggles mid-year, the teacher has no context about the student's learning history, home situation, or what has worked in the past. A meeting with the parent reveals that the student has a known anxiety around timed tests — information that would have changed how the teacher administered early assessments. What does this scenario illustrate?",
   options:[
     "The teacher was right not to gather personal information earlier; it would have created bias.",
     "Parent communication should be bidirectional — parents are not just recipients of school information but sources of knowledge about their children that can significantly inform teaching decisions.",
     "The scenario illustrates a special education issue requiring a formal evaluation process.",
     "The student should have disclosed the anxiety themselves; it is not the teacher's responsibility to ask."],
   answerIndex:1,
   explanation:"One-directional communication (school → home) misses the information parents hold about their child's learning history, known challenges, and what has worked previously. The timed-test anxiety that would have changed assessment practices was known to the parent all along but was never solicited. Bidirectional communication — where teachers actively seek parent input — surfaces this kind of student-success-relevant information before it becomes a crisis."},

  {id:"p_3503_C", subject:"ptk", standard:"3.5.03", domain:"3", topic:"3.5", set:"C",
   prompt:"A math teacher contacts the parents of a student who has been inconsistently performing and asks: 'Has your child mentioned anything about the material being confusing? Are there times of day or week when studying is harder? Have you noticed anything that seems to help or hinder their math work at home?' The parent shares that the student has been skipping dinner to finish homework and is exhausted by math by evening. The teacher adjusts when and how much homework she assigns. What is the teacher doing?",
   options:[
     "The teacher is gathering medical information she is not qualified to use.",
     "This type of conversation should only happen in a formal parent-teacher conference.",
     "The teacher is enabling the student to avoid homework by making it easier.",
     "The teacher is involving a parent as an information source to gather pertinent, actionable data about a specific student's situation — using that information to adjust instruction in ways that directly support the student's success."],
   answerIndex:3,
   explanation:"The teacher's questions treated the parent as an expert on their child's situation — which parents genuinely are. The information retrieved (exhaustion, evening timing) was directly relevant to an instructional decision (homework timing and volume) that the teacher was in a position to adjust. This is parent involvement as information-gathering in service of student success, not just communication for its own sake."},,


  // =====================================================================
  // PTK · Domain 4 · Topic 4.1 — Monitors Student Progress
  // Standards 4.1.01–4.1.05 (5 standards × 3 sets = 15 questions)
  // A/B subject-neutral; C secondary-math context
  // =====================================================================

  // ---- 4.1.01  Aligns assessments to taught objectives and lesson content ----
  // A: alignment principle | B: misaligned assessment | C(math): alignment in math assessment
  {id:"p_4101_A", subject:"ptk", standard:"4.1.01", domain:"4", topic:"4.1", set:"A",
   prompt:"A teacher finishes a unit on comparing primary and secondary sources. Her end-of-unit assessment asks students to read two passages and write a paragraph explaining which is a primary source and why. A colleague suggests adding a section on footnote formatting, which was not taught. What is the strongest reason to reject the addition?",
   options:[
     "Assessments should always be as short as possible to reduce student anxiety.",
     "Footnote formatting is a skill students should already know from previous grades.",
     "The assessment should only contain multiple-choice questions, not paragraph writing.",
     "Adding footnote formatting would misalign the assessment to content that was not taught — assessments measure what was actually taught, so including untaught material makes results uninterpretable as evidence of learning."],
   answerIndex:3,
   explanation:"Assessment alignment means that what is measured matches what was taught. An assessment that includes content not covered in instruction cannot validly measure student learning of that unit — it conflates lack of prior exposure with lack of understanding. Results from misaligned assessments cannot reliably guide instructional decisions because poor performance may reflect the untaught content rather than the instructional objectives."},

  {id:"p_4101_B", subject:"ptk", standard:"4.1.01", domain:"4", topic:"4.1", set:"B",
   prompt:"A teacher spends three weeks teaching students to analyze persuasive techniques in advertising. The unit test asks students to define literary devices from a list — content the teacher never addressed in this unit. Many students fail. What is the most significant problem with this assessment?",
   options:[
     "The test is too long; shorter assessments produce more accurate results.",
     "Defining literary devices is not appropriate for the students' grade level.",
     "The assessment is misaligned — it measures content that was not taught rather than the unit's actual learning objectives. Failure on this test cannot be interpreted as failure to learn persuasive analysis.",
     "The teacher should have curved the grades to compensate for difficulty."],
   answerIndex:2,
   explanation:"Assessment validity depends on alignment: the assessment must measure what was taught and intended to be learned. When an assessment covers untaught content, the results reflect prior knowledge or lack thereof rather than the effectiveness of instruction. This teacher cannot use the results to determine whether students understood persuasive techniques — the data is about something else entirely."},

  {id:"p_4101_C", subject:"ptk", standard:"4.1.01", domain:"4", topic:"4.1", set:"C",
   prompt:"A math teacher spends two weeks teaching students to graph linear equations from slope-intercept form. Her quiz includes four graphing problems (directly aligned) and two problems requiring students to solve quadratic equations (from the previous unit, not reviewed). She plans to use quiz results to inform her next lesson. Why is the misalignment a problem for this purpose?",
   options:[
     "Including prior-unit content is never appropriate on a quiz.",
     "The quadratic problems will lower the overall quiz average, making results look worse than they are.",
     "Because the quiz blends taught and untaught content, results cannot cleanly indicate whether students have mastered linear graphing — the data is contaminated, making it unreliable for guiding the next instructional step.",
     "Students should always be tested on cumulative content; single-unit assessments are not valid."],
   answerIndex:2,
   explanation:"If the teacher's goal is to use quiz results to inform instruction on linear graphing, the assessment must measure linear graphing specifically. Including quadratic problems from a prior unit without re-teaching blurs the signal: a low score might reflect the unreinforced quadratic content rather than a gap in linear graphing. Clean instructional decisions require clean assessment alignment."},

  // ---- 4.1.02  Uses ongoing assessment to monitor and guide student learning ----
  // A: formative assessment as a monitoring tool | B: evaluate absence of ongoing assessment | C(math): exit ticket monitoring
