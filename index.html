   explanation:"Pairing a clear definition with examples, non-examples, and authentic use builds a flexible, usable concept \u2014 not just a memorized phrase. Copying definitions and spelling tests address surface features; a single mention doesn't establish the meaning at all."},
  {id:"p_2206_C", subject:"ptk", standard:"2.2.06", domain:"2", topic:"2.2", set:"C",
   prompt:"Students keep calling $3x + 5$ an \"equation\" (though it has no $=$ sign), and describe the graph of $y = x^2$ as \"a positive parabola\" when they mean it \"opens upward.\" From a focused-instruction standpoint, why does precise mathematical vocabulary matter here?",
   options:[
     "Because correct vocabulary makes the class sound more advanced to observers.",
     "Because imprecise terms hide conceptual confusion and block clear reasoning about the math itself.",
     "Because students should be penalized for informal language.",
     "Because vocabulary is the only thing assessed on standardized tests."],
   answerIndex:1,
   explanation:"Distinguishing an expression like $3x+5$ from an equation, or saying a parabola \"opens upward\" rather than \"is positive,\" ties language to the underlying concepts; loose terms often signal and reinforce conceptual gaps. The goal is clear reasoning, not impressing observers, test-gaming, or punishing students."},

  // ---- 2.2.07 Presents sufficient, varied examples AND non-examples ----
  // A: recognize varied examples | B: examples+non-examples | C(math): non-example fixes overgeneralization
  {id:"p_2207_A", subject:"ptk", standard:"2.2.07", domain:"2", topic:"2.2", set:"A",
   prompt:"To help students master a concept, a teacher provides many examples that look different on the surface but all share the concept's defining features. Why use varied examples rather than near-identical ones?",
   options:[
     "Variety mainly serves to entertain students.",
     "Varied examples make the lesson take longer, which aids memory.",
     "Identical examples are required for fair assessment.",
     "Surface variety helps students focus on the defining features and generalize the concept beyond one format."],
   answerIndex:3,
   explanation:"Examples that differ on the surface but share the essential features push students to abstract the concept itself rather than a superficial template, supporting transfer. Length, assessment fairness, and entertainment aren't the reason."},
  {id:"p_2207_B", subject:"ptk", standard:"2.2.07", domain:"2", topic:"2.2", set:"B",
   prompt:"Besides positive examples of a concept, why deliberately include non-examples (cases that are NOT instances of the concept)?",
   options:[
     "To make the concept seem harder than it is.",
     "To mark the boundaries of the concept so students learn what does and does not count.",
     "To fill time when there aren't enough real examples.",
     "Because non-examples replace the need for practice."],
   answerIndex:1,
   explanation:"Non-examples define the edges of a concept, helping students discriminate true instances from look-alikes and avoid overgeneralizing. They aren't filler, aren't there to inflate difficulty, and don't substitute for practice."},
  {id:"p_2207_C", subject:"ptk", standard:"2.2.07", domain:"2", topic:"2.2", set:"C",
   prompt:"After being shown only examples like $2x$ and $5x^2$, students start believing that 'a polynomial term must have a variable,' and reject $7$ as a term. Which move best uses examples and non-examples to fix this?",
   options:[
     "Contrast examples that include a constant term (like $7$) with non-examples such as $\\frac{1}{x}$ or $\\sqrt{x}$, highlighting the defining features.",
     "Tell students they are simply wrong and restate the definition.",
     "Show more terms that all contain variables until the idea sticks.",
     "Move on, since most students can handle terms with variables."],
   answerIndex:0,
   explanation:"The misconception is an overgeneralization from too-narrow examples; pairing constant-term examples with genuine non-examples redraws the concept's boundary. More variable-only examples reinforce the error, a flat correction doesn't build discrimination, and moving on leaves the misconception intact."},


  // ---- 2.2.08 Determines mastery before introducing a new idea ----
  // A: recognize the gate | B: premature-advance trap | C(math): gate on mastery
  {id:"p_2208_A", subject:"ptk", standard:"2.2.08", domain:"2", topic:"2.2", set:"A",
   prompt:"A teacher finishes presenting a new idea and, before moving on to the next idea that builds on it, gives a quick check and reviews the results. Most students aren't there yet, so the teacher reteaches rather than advancing. What principle is the teacher following?",
   options:[
     "Teaching the vocabulary needed for the subject.",
     "Confirming students have mastered the current material before introducing the next idea.",
     "Previewing the major ideas of the upcoming lesson.",
     "Withdrawing support as students become proficient."],
   answerIndex:1,
   explanation:"Checking for mastery and only advancing once it's reached is the gate this standard describes; building new ideas on unmastered ones causes the new learning to collapse. Fading support (2.2.10), previewing (2.1.03), and vocabulary (2.2.06) are different moves."},
  {id:"p_2208_B", subject:"ptk", standard:"2.2.08", domain:"2", topic:"2.2", set:"B",
   prompt:"A pacing guide says to start the next topic today, but a quick check shows only about a third of the class has mastered today's idea, which the next topic depends on. What is the most defensible instructional decision?",
   options:[
     "Move to the next topic on schedule; the calendar takes priority.",
     "Move on only with the third who mastered it and let the rest self-study.",
     "Reteach and recheck the current idea before advancing, since the next topic builds on it.",
     "Move on, but assign the struggling two-thirds extra homework on the old idea."],
   answerIndex:2,
   explanation:"When the next topic depends on the current one, advancing before mastery sets most of the class up to fail; the standard calls for securing mastery first. Prioritizing the calendar, offloading to homework, or splitting the class abandons the dependency rather than addressing it."},
  {id:"p_2208_C", subject:"ptk", standard:"2.2.08", domain:"2", topic:"2.2", set:"C",
   prompt:"A teacher plans to move from one-step equations to two-step equations like $2x + 3 = 11$. A quick check shows many students still can't reliably solve one-step equations such as $x + 3 = 11$. What does this standard suggest?",
   options:[
     "Secure mastery of one-step equations first, because two-step solving is built directly on it.",
     "Introduce two-step equations anyway, since they're on the schedule.",
     "Skip ahead to equations with variables on both sides to challenge the strong students.",
     "Give a graded quiz on two-step equations to motivate the class."],
   answerIndex:0,
   explanation:"Two-step solving is one-step solving applied twice; without the prerequisite secured, the new skill won't hold. The standard is about confirming mastery before introducing the dependent idea. Advancing on schedule, jumping further ahead, or grading unlearned material all ignore the dependency."},

  // ---- 2.2.09 Identifies mistake patterns or knowledge gaps ----
  // A: pattern vs one-off | B: diagnose misconception type | C(math): read a systematic error
  {id:"p_2209_A", subject:"ptk", standard:"2.2.09", domain:"2", topic:"2.2", set:"A",
   prompt:"Looking over a set of student responses, a teacher notices that the same kind of error shows up repeatedly across many students, not just random slips. Why is noticing this pattern instructionally valuable?",
   options:[
     "It proves the assessment was too difficult.",
     "A recurring error usually points to a shared underlying misconception the teacher can target.",
     "It shows the teacher should move on to the next topic.",
     "It tells the teacher which students to give lower grades."],
   answerIndex:1,
   explanation:"A systematic, repeated error signals a common misconception or gap that can be addressed directly, which is far more useful than treating each wrong answer as a one-off. It isn't about grading, isn't proof the test was too hard, and isn't a cue to move on \u2014 it's diagnostic information to act on."},
  {id:"p_2209_B", subject:"ptk", standard:"2.2.09", domain:"2", topic:"2.2", set:"B",
   prompt:"Several students consistently get a certain type of item wrong in exactly the same way. What is the most useful first step in responding?",
   options:[
     "Analyze the wrong answers to figure out the specific misunderstanding driving them.",
     "Assume the students simply weren't paying attention.",
     "Mark them wrong and return the work without comment.",
     "Re-explain the entire unit from the beginning."],
   answerIndex:0,
   explanation:"Diagnosing the specific misconception behind a consistent error lets the teacher target the reteach precisely. Returning work without comment wastes the signal; reteaching everything is inefficient; and assuming inattention dismisses the diagnostic information the pattern provides."},
  {id:"p_2209_C", subject:"ptk", standard:"2.2.09", domain:"2", topic:"2.2", set:"C",
   prompt:"On a quiz, many students simplify $-3^2$ as $9$ and $-4^2$ as $16$. Reading this as a pattern rather than scattered mistakes, what is the likely underlying misconception?",
   options:[
     "Students don't know their multiplication facts.",
     "Students need more time on the quiz.",
     "Students are guessing randomly on these items.",
     "Students think the negative sign is part of the base being squared, rather than applying the exponent before the negation."],
   answerIndex:3,
   explanation:"The consistent result (treating $-3^2$ as $(-3)^2$) reveals a specific order-of-operations misconception about whether the negative is inside the base. That is exactly the diagnostic read this standard calls for. The other options ignore the systematic nature of the error."},

  // ---- 2.2.10 Systematically reduces/withdraws assistance as students become proficient ----
  // A: recognize fading | B: pacing the withdrawal | C(math): gradual release on a procedure
  {id:"p_2210_A", subject:"ptk", standard:"2.2.10", domain:"2", topic:"2.2", set:"A",
   prompt:"As students get better at a new skill, a teacher deliberately offers less and less help \u2014 moving from heavily guided examples, to prompts and hints, to independent work. What is this gradual approach called?",
   options:[
     "Assessing prior knowledge to place instruction.",
     "Presenting content in small steps.",
     "Providing closure to the lesson.",
     "Systematically withdrawing assistance as proficiency grows (gradual release)."],
   answerIndex:3,
   explanation:"Steadily fading support as competence increases is the gradual-release principle this standard names, building independence. Small steps (2.2.03) is about chunking new content; prior-knowledge assessment (2.2.01) and lesson closure (2.2.17) are different moves."},
  {id:"p_2210_B", subject:"ptk", standard:"2.2.10", domain:"2", topic:"2.2", set:"B",
   prompt:"A teacher moves students straight from one fully guided example to independent practice with no help at all, and many flounder. With respect to withdrawing assistance, what went wrong?",
   options:[
     "The teacher failed to teach the vocabulary.",
     "The teacher faded support too abruptly, skipping the intermediate stage of prompts and partial guidance.",
     "The teacher should never let students work independently.",
     "The teacher digressed from the objective."],
   answerIndex:1,
   explanation:"Withdrawing assistance should be gradual; jumping from full support to none skips the middle stage where students try with hints before going solo. The goal is still independence, so 'never work independently' is wrong, and the failure here is pacing of support \u2014 not digression or vocabulary."},
  {id:"p_2210_C", subject:"ptk", standard:"2.2.10", domain:"2", topic:"2.2", set:"C",
   prompt:"A teacher is helping students become independent at factoring quadratics. Which sequence best reflects systematically withdrawing assistance?",
   options:[
     "Factor every example for students all week so they see many correct solutions.",
     "Have students memorize the factored forms of common quadratics.",
     "Model a worked example, then factor some together as a class, then have students do some in pairs, then independently.",
     "Assign 20 quadratics to factor independently on day one and grade them."],
   answerIndex:2,
   explanation:"Moving from teacher modeling \u2192 shared practice \u2192 paired work \u2192 independent work is gradual release, transferring responsibility as proficiency grows. Immediate independent work withdraws support too fast; always factoring for them never withdraws it; memorizing forms sidesteps the skill entirely."},

  // ---- 2.2.11 Utilizes metaphors and analogies ----
  // A: recognize a useful analogy | B: an analogy's limits | C(math): analogy for a math idea
  {id:"p_2211_A", subject:"ptk", standard:"2.2.11", domain:"2", topic:"2.2", set:"A",
   prompt:"To make an abstract new idea easier to grasp, a teacher compares it to something familiar from students' everyday experience. Used well, why can an analogy help learning?",
   options:[
     "It links new, abstract content to familiar prior knowledge, giving students a mental foothold.",
     "It makes the lesson longer and therefore more memorable.",
     "It guarantees students will never form a misconception.",
     "It replaces the need for students to ever learn the precise concept."],
   answerIndex:0,
   explanation:"A good analogy connects the unfamiliar to something students already understand, easing initial comprehension. It doesn't replace learning the actual concept, doesn't guarantee against misconceptions (analogies can mislead if overextended), and value isn't about length."},
  {id:"p_2211_B", subject:"ptk", standard:"2.2.11", domain:"2", topic:"2.2", set:"B",
   prompt:"A teacher uses a helpful analogy for a new concept but notices some students taking it too literally and drawing wrong conclusions where the analogy breaks down. What is the best practice when using analogies?",
   options:[
     "Use the analogy, but explicitly point out where it holds and where it stops applying.",
     "Insist the analogy is perfect to avoid confusing students.",
     "Switch to a completely different analogy every few minutes.",
     "Avoid analogies entirely since they can mislead."],
   answerIndex:0,
   explanation:"Every analogy has limits; naming where it breaks down prevents students from overextending it into misconceptions while keeping its benefit. Abandoning analogies forfeits a useful tool, pretending it's perfect invites error, and rapid-fire switching adds confusion."},
  {id:"p_2211_C", subject:"ptk", standard:"2.2.11", domain:"2", topic:"2.2", set:"C",
   prompt:"A teacher wants an analogy to help students understand solving an equation while keeping it balanced. Which use of analogy is strongest, including attention to its limits?",
   options:[
     "Call an equation a 'balance scale' \u2014 whatever you do to one side you must do to the other \u2014 while noting the scale image is about equality, not about, say, negative quantities.",
     "Avoid any comparison and just state the rule to do the same thing to both sides.",
     "Tell students an equation is exactly like a sentence in English, with no further explanation.",
     "Say the equation is 'like magic' so students find it interesting."],
   answerIndex:0,
   explanation:"The balance-scale analogy maps directly onto the key idea (operations must preserve equality) and is even stronger when its limits are flagged, matching this standard. A vague 'like a sentence' comparison doesn't illuminate the math, stating the bare rule uses no analogy, and 'like magic' conveys no structure."},

  // ---- 2.2.12 Frequent and varied practice opportunities ----
  // A: varied vs monotonous | B: why interleaving helps | C(math): vary practice formats
  {id:"p_2212_A", subject:"ptk", standard:"2.2.12", domain:"2", topic:"2.2", set:"A",
   prompt:"When designing practice for a newly taught skill, a teacher includes a variety of problem types and formats rather than many copies of the same exercise. What is the main benefit of varied practice?",
   options:[
     "It ensures the practice takes the entire class period.",
     "It lets the teacher avoid grading altogether.",
     "It removes the need for any feedback.",
     "It helps students apply the skill flexibly across different situations, not just one familiar format."],
   answerIndex:3,
   explanation:"Frequent, varied practice builds flexible, transferable skill use rather than a brittle response to one format \u2014 the point of this standard. It isn't about avoiding grading, filling time, or eliminating feedback."},
  {id:"p_2212_B", subject:"ptk", standard:"2.2.12", domain:"2", topic:"2.2", set:"B",
   prompt:"Two practice sets cover the same skills. Set 1 groups all problems of one type together, then all of the next type. Set 2 mixes the types throughout. Once students have the basics, why might the mixed (interleaved) set support stronger learning?",
   options:[
     "Mixing guarantees higher scores on the practice set itself.",
     "Mixing problems makes the set shorter.",
     "Mixing removes the need to teach the skills first.",
     "Mixing forces students to choose which approach fits each problem, strengthening discrimination and retention."],
   answerIndex:3,
   explanation:"Interleaving makes students decide which method applies, which builds the judgment they'll need later and aids retention, even if it feels harder in the moment. It doesn't shorten the set, often lowers practice-set scores while improving real learning, and doesn't replace initial instruction."},
  {id:"p_2212_C", subject:"ptk", standard:"2.2.12", domain:"2", topic:"2.2", set:"C",
   prompt:"After teaching slope, a teacher wants varied practice. Which set of activities best reflects 'frequent and varied opportunities' rather than monotonous repetition?",
   options:[
     "Twenty problems that all ask students to compute slope from two given points.",
     "Copy the slope formula ten times to memorize it.",
     "Find slope from two points, from a graph, from a table, and from a real-world rate-of-change scenario.",
     "Watch the teacher compute slope repeatedly without trying any."],
   answerIndex:2,
   explanation:"Practicing slope across points, graphs, tables, and real contexts builds flexible understanding of the concept, which is varied practice. Twenty identical computations is monotonous, copying the formula is rote, and watching without doing isn't practice at all."},

  // ---- 2.2.13 Ample opportunities to solve similar problems ----
  // A: purpose of similar practice | B: enough reps before moving | C(math): massed similar problems
  {id:"p_2213_A", subject:"ptk", standard:"2.2.13", domain:"2", topic:"2.2", set:"A",
   prompt:"Right after introducing a brand-new procedure, a teacher gives several closely similar problems for students to work through. What is the purpose of these similar-problem reps at this early stage?",
   options:[
     "To trick students into making mistakes.",
     "To assign final grades for the unit.",
     "To let students solidify the new procedure through repeated, low-variation practice before facing harder variations.",
     "To fill time until the bell rings."],
   answerIndex:2,
   explanation:"Ample practice on similar problems lets students consolidate a freshly learned procedure before complexity is added \u2014 the role this standard describes. It's not about tricking students, filling time, or grading; it's early consolidation. (Note this complements varied practice, which comes as proficiency grows.)"},
  {id:"p_2213_B", subject:"ptk", standard:"2.2.13", domain:"2", topic:"2.2", set:"B",
   prompt:"A teacher demonstrates a new procedure, has students do exactly one problem, then immediately moves to the next topic. With respect to providing ample practice, what is the concern?",
   options:[
     "The teacher should not have demonstrated the procedure first.",
     "The teacher digressed from the objective.",
     "Students likely had too few opportunities to solidify the procedure before moving on.",
     "The teacher provided too much practice."],
   answerIndex:2,
   explanation:"A single problem rarely consolidates a new procedure; this standard calls for ample opportunities to practice similar problems before advancing. The issue is too little practice, not too much; demonstrating first was appropriate; and nothing here indicates a digression."},
  {id:"p_2213_C", subject:"ptk", standard:"2.2.13", domain:"2", topic:"2.2", set:"C",
   prompt:"Students have just learned to solve two-step equations. Before introducing harder variations, which approach best provides 'ample opportunities to solve similar problems'?",
   options:[
     "Show students the answers to two-step equations so they can read through them.",
     "Move directly to word problems requiring students to set up their own equations.",
     "Assign one two-step equation, then jump to equations with variables on both sides.",
     "Have students work several two-step equations of the same structure, e.g. $2x+3=11$, $5x-4=16$, $3x+7=22$, until the method is secure."],
   answerIndex:3,
   explanation:"Several same-structure two-step equations give the repetition needed to make the new method automatic before adding complexity, which is exactly this standard. One problem then a jump is too little practice; word problems and reading answers both add or skip steps rather than consolidating the core method."},

  // ---- 2.2.14 Uses examples AND non-examples so students INDUCE defining features ----
  // (distinct from 2.2.07: here the emphasis is students inducing the rule themselves)
  // A: inductive purpose | B: students induce the rule | C(math): induce from cases
  {id:"p_2214_A", subject:"ptk", standard:"2.2.14", domain:"2", topic:"2.2", set:"A",
   prompt:"Rather than stating a concept's definition outright, a teacher shows a carefully chosen set of examples and non-examples and asks students to figure out what distinguishes them. What is the instructional aim of this inductive approach?",
   options:[
     "To have students discover the concept's defining features themselves by comparing cases.",
     "To test students before any instruction has occurred.",
     "To save the teacher from having to plan the lesson.",
     "To make sure students never see a correct definition."],
   answerIndex:0,
   explanation:"Pairing examples with non-examples so students induce the defining features is a deliberate inductive strategy that builds deeper understanding through discovery. It isn't about avoiding planning (this takes careful design), withholding the definition forever, or testing cold."},
  {id:"p_2214_B", subject:"ptk", standard:"2.2.14", domain:"2", topic:"2.2", set:"B",
   prompt:"A teacher wants students to induce the defining features of a concept from cases. Which set of cases is best designed for that?",
   options:[
     "Examples and non-examples chosen so that comparing them isolates exactly the defining feature.",
     "Only examples, all very similar to one another.",
     "Only non-examples, so students rule things out.",
     "A random assortment of cases with no particular contrast."],
   answerIndex:0,
   explanation:"Carefully contrasted examples and non-examples let students see which feature actually matters by varying it against a constant background. Examples-only can't reveal boundaries, non-examples-only give nothing to generalize from, and a random set provides no clean contrast to reason from."},
  {id:"p_2214_C", subject:"ptk", standard:"2.2.14", domain:"2", topic:"2.2", set:"C",
   prompt:"A teacher wants students to induce what makes a function (vs. a non-function) by examining cases. Which set best lets students discover the defining feature themselves?",
   options:[
     "Show graphs that pass the vertical-line test alongside ones that fail it, and ask students what differs, guiding them to the one-output-per-input idea.",
     "Show a random mix of equations without indicating which are functions.",
     "Give the formal definition of a function first, then no examples.",
     "Show only graphs that are functions and state 'these are functions.'"],
   answerIndex:0,
   explanation:"Contrasting functions with non-functions and asking what differs lets students induce the defining feature (each input has exactly one output), the inductive use of examples and non-examples this standard calls for. Functions-only hides the boundary, definition-first isn't inductive, and an unlabeled random mix gives no contrast to reason from."},


  // ---- 2.2.15 Provides opportunities to actively participate / relate to life ----
  // A: recognize active participation | B: passive vs active | C(math): connect to life outside school
  {id:"p_2215_A", subject:"ptk", standard:"2.2.15", domain:"2", topic:"2.2", set:"A",
   prompt:"During a lesson, a teacher repeatedly invites students to pose questions, share related experiences, and compare their views on what's being learned. What is the instructional value of building in this active participation?",
   options:[
     "It replaces the need for the teacher to present any content.",
     "It guarantees the class will stay perfectly quiet.",
     "It fills time the teacher would otherwise have to plan for.",
     "It deepens engagement and understanding by having students process and connect the content rather than passively receive it."],
   answerIndex:3,
   explanation:"Active participation \u2014 questioning, sharing experiences, comparing views \u2014 has students process the material and tie it to what they know, which strengthens engagement and understanding. It isn't filler, isn't about silence, and complements rather than replaces presentation."},
  {id:"p_2215_B", subject:"ptk", standard:"2.2.15", domain:"2", topic:"2.2", set:"B",
   prompt:"Two lessons cover the same content. In one, students listen and take notes the whole time. In the other, students also discuss, raise questions, and relate the ideas to their own lives. Why might the second better serve learning?",
   options:[
     "Because it lets the teacher avoid preparing the content.",
     "Because talking is always better than listening in every situation.",
     "Because it ensures every student reaches the same conclusion.",
     "Because actively processing and connecting content to their own experience helps students build durable understanding."],
   answerIndex:3,
   explanation:"The benefit is the active processing and personal connection, which aid retention and meaning \u2014 not a blanket claim that talking beats listening, nor avoiding prep, nor enforcing uniform conclusions."},
  {id:"p_2215_C", subject:"ptk", standard:"2.2.15", domain:"2", topic:"2.2", set:"C",
   prompt:"A teacher finishes presenting how to calculate percent change. Which move best provides active participation that relates the math to students' lives outside school?",
   options:[
     "Assign the odd problems from the textbook for homework without discussion.",
     "Ask students to silently copy three worked examples from the board.",
     "Lecture for ten more minutes on additional percent-change formulas.",
     "Have students find a real price change they've seen (a sale, a paycheck, a phone plan) and compute and discuss its percent change."],
   answerIndex:3,
   explanation:"Bringing in a real price change students have encountered, then computing and discussing it, makes them active participants and links the math to their lives \u2014 exactly this standard. Copying examples and silent homework are passive, and more lecture adds no participation."},

  // ---- 2.2.16 Students explain in their own words how elements connect + to prior knowledge ----
  // A: recognize the move | B: why student-generated explanation | C(math): explain connections
  {id:"p_2216_A", subject:"ptk", standard:"2.2.16", domain:"2", topic:"2.2", set:"A",
   prompt:"A teacher regularly asks students to explain, in their own words, how the new ideas fit together and how they relate to what the class already learned. What learning purpose does this serve?",
   options:[
     "It removes the need for any examples.",
     "It ensures students memorize the teacher's exact wording.",
     "It pushes students to build connected understanding and integrate new content with prior knowledge, rather than holding facts in isolation.",
     "It checks handwriting and spelling."],
   answerIndex:2,
   explanation:"Having students articulate the connections in their own words builds an integrated knowledge network and ties new learning to prior knowledge \u2014 the heart of this standard. It's not about handwriting, not about parroting the teacher's words, and not a substitute for examples."},
  {id:"p_2216_B", subject:"ptk", standard:"2.2.16", domain:"2", topic:"2.2", set:"B",
   prompt:"Why ask students to explain connections in their OWN words rather than simply restating the teacher's summary?",
   options:[
     "It is a faster way to end the lesson.",
     "Generating their own explanation reveals and strengthens genuine understanding, whereas restating can be done without comprehension.",
     "Student wording is always more accurate than the teacher's.",
     "It saves the teacher from giving any summary at all."],
   answerIndex:1,
   explanation:"Producing an explanation forces students to actually organize the ideas, exposing gaps and deepening understanding; verbatim restatement can be hollow. The point isn't that student wording is inherently more accurate, nor about saving time."},
  {id:"p_2216_C", subject:"ptk", standard:"2.2.16", domain:"2", topic:"2.2", set:"C",
   prompt:"After a unit touching slope, rate of change, and linear equations, which task best has students explain in their own words how the elements connect and link to prior knowledge?",
   options:[
     "Ask students to restate the definition of slope word-for-word from the textbook.",
     "Give a timed quiz computing slope from pairs of points.",
     "Have students copy the slope-intercept form five times.",
     "Ask students to explain in their own words how slope, rate of change, and the equation $y = mx + b$ describe the same underlying idea and relate to ratios they learned earlier."],
   answerIndex:3,
   explanation:"Explaining how slope, rate of change, and $y=mx+b$ express one idea \u2014 and connecting it to earlier work on ratios \u2014 builds the integrated, prior-knowledge-linked understanding this standard targets. Verbatim definitions, a computation quiz, and copying don't surface the connections."},

  // ---- 2.2.17 Provides closure to the lesson ----
  // A: recognize closure | B: closure vs just stopping | C(math): effective closure
  {id:"p_2217_A", subject:"ptk", standard:"2.2.17", domain:"2", topic:"2.2", set:"A",
   prompt:"In the final few minutes of a lesson, a teacher reviews the main points, restates the key concept, and briefly previews where tomorrow's lesson will go. What is this end-of-lesson move?",
   options:[
     "Assessing prior knowledge to place instruction.",
     "Teaching the vocabulary of the subject.",
     "Withdrawing assistance as students gain proficiency.",
     "Providing closure to the lesson."],
   answerIndex:3,
   explanation:"Reviewing main points, emphasizing the key concept, and previewing what's next is lesson closure, which consolidates learning and signals where it's heading. The other options name unrelated instructional moves."},
  {id:"p_2217_B", subject:"ptk", standard:"2.2.17", domain:"2", topic:"2.2", set:"B",
   prompt:"The bell is about to ring and a teacher is mid-sentence, so the lesson simply stops with no wrap-up. Compared with deliberate closure, what is lost?",
   options:[
     "Only the chance to assign more homework.",
     "Nothing \u2014 stopping and providing closure are the same thing.",
     "The chance to consolidate the main points, reinforce the key idea, and connect the lesson to what comes next.",
     "The opportunity to take attendance."],
   answerIndex:2,
   explanation:"Closure does real work \u2014 consolidating main points, reinforcing the central idea, bridging to the next lesson \u2014 which an abrupt stop forfeits. It is not the same as merely running out of time, and it's about more than homework or attendance."},
  {id:"p_2217_C", subject:"ptk", standard:"2.2.17", domain:"2", topic:"2.2", set:"C",
   prompt:"A lesson on the Pythagorean theorem is wrapping up. Which ending best provides closure?",
   options:[
     "Assign 30 practice problems and dismiss the class.",
     "Start a brand-new topic in the last two minutes.",
     "Have students summarize when and why $a^2 + b^2 = c^2$ applies, restate that it's for right triangles, and note that tomorrow extends it to the distance formula.",
     "Stop talking when the bell rings, mid-example."],
   answerIndex:2,
   explanation:"Summarizing the theorem's use, restating the right-triangle condition, and previewing the distance formula consolidates the lesson and bridges to the next \u2014 effective closure. Stopping mid-example, dumping problems, or opening a new topic all fail to close the lesson."},

  // ---- 2.2.18 Knows purposes of instructional methods and when to use them ----
  // A: match method to purpose | B: misused method | C(math): pick the method for the goal
  {id:"p_2218_A", subject:"ptk", standard:"2.2.18", domain:"2", topic:"2.2", set:"A",
   prompt:"A skilled teacher chooses among whole-class instruction, cooperative groups, small groups, and one-on-one tutoring depending on the goal. What does this standard mainly require of the teacher?",
   options:[
     "Understanding the distinct purposes of each instructional method and knowing when and how to use each.",
     "Letting students choose the method each day.",
     "Avoiding whole-class instruction entirely.",
     "Using cooperative groups for every lesson regardless of goal."],
   answerIndex:0,
   explanation:"The standard is about knowing what each method is good for and matching it to the instructional goal \u2014 not defaulting to one format or outsourcing the choice. No single method fits every purpose."},
  {id:"p_2218_B", subject:"ptk", standard:"2.2.18", domain:"2", topic:"2.2", set:"B",
   prompt:"A teacher wants every student to practice a basic skill to automaticity and get immediate corrective feedback, but assigns a loosely structured open-group discussion instead. What is the mismatch?",
   options:[
     "The teacher digressed from the objective.",
     "Group discussion is never an acceptable method.",
     "The method chosen doesn't fit the goal; drilling a basic skill to fluency calls for a more structured, individually accountable format.",
     "The teacher should have previewed the vocabulary first."],
   answerIndex:2,
   explanation:"Method should match purpose: building individual fluency with feedback needs structured, individually accountable practice, not an open discussion that may leave some students unengaged. Discussion isn't always wrong \u2014 it's wrong for this goal. Vocabulary and digression aren't the issue."},
  {id:"p_2218_C", subject:"ptk", standard:"2.2.18", domain:"2", topic:"2.2", set:"C",
   prompt:"A math teacher's goal is for students to debate multiple valid strategies for solving a rich, open-ended problem and learn from each other's reasoning. Which method best fits that goal?",
   options:[
     "Silent independent seatwork with no interaction.",
     "Cooperative small groups where students compare and defend different solution strategies, then share out.",
     "A timed individual quiz on the problem.",
     "A lecture in which the teacher presents one correct method."],
   answerIndex:1,
   explanation:"When the goal is comparing and defending multiple strategies, cooperative groups that surface and discuss different approaches fit best. A single-method lecture, silent seatwork, and a timed quiz all suppress the very interaction the goal requires \u2014 matching method to purpose."},

  // ---- 2.2.19 Whole-class instruction design principles (multi-bullet; rotate sub-points) ----
  // A: seating so all see/hear | B: monitoring attention | C(math): ground whole-class choice in objective
  {id:"p_2219_A", subject:"ptk", standard:"2.2.19", domain:"2", topic:"2.2", set:"A",
   prompt:"A teacher plans a whole-class demonstration. Which arrangement best reflects a sound design principle for whole-class instruction?",
   options:[
     "Spread students as far apart as possible regardless of sightlines.",
     "Arrange seating so every student can clearly see and hear the instruction.",
     "Seat students wherever they like, even if some can't see the board.",
     "Face all desks toward the windows to maximize natural light."],
   answerIndex:1,
   explanation:"A core whole-class design principle is ensuring all students can see and hear the instruction; otherwise the format fails for some. Lighting and arbitrary spacing don't address access to instruction, and free seating may leave students unable to follow."},
  {id:"p_2219_B", subject:"ptk", standard:"2.2.19", domain:"2", topic:"2.2", set:"B",
   prompt:"While leading whole-class instruction, what practice best reflects the design principle of monitoring student attention?",
   options:[
     "Use eye contact, move around the room (proximity), and pose questions to gauge and maintain attention.",
     "Face the board the entire time and avoid looking at students.",
     "Lecture without pausing so as not to lose momentum.",
     "Assume all students are following as long as no one interrupts."],
   answerIndex:0,
   explanation:"Monitoring attention \u2014 via eye contact, proximity, and questioning \u2014 lets the teacher detect and recover disengagement during whole-class instruction. Facing away, assuming engagement from silence, or never pausing all forfeit that monitoring."},
  {id:"p_2219_C", subject:"ptk", standard:"2.2.19", domain:"2", topic:"2.2", set:"C",
   prompt:"A math teacher decides to teach a particular segment through whole-class instruction. Which choice best reflects basing that decision on the lesson objective?",
   options:[
     "Use whole-class instruction because the objective \u2014 introducing a new definition and notation all students need at once \u2014 fits a shared, simultaneous presentation.",
     "Use whole-class instruction because it's the teacher's habit every day.",
     "Use whole-class instruction because the room is too small for groups.",
     "Use whole-class instruction to avoid the effort of organizing groups."],
   answerIndex:0,
   explanation:"Whole-class instruction is well chosen when the objective genuinely calls for it \u2014 e.g., introducing shared new notation everyone needs simultaneously. Habit, convenience, and room size aren't objective-based reasons, which is the design principle in focus."},

  // ---- 2.2.20 Small-group design principles (multi-bullet; rotate sub-points) ----
  // A: diagnostic placement | B: don't neglect rest of class | C(math): regroup when ready
  {id:"p_2220_A", subject:"ptk", standard:"2.2.20", domain:"2", topic:"2.2", set:"A",
   prompt:"A teacher forms small groups for a short-term learning activity. Which basis for grouping reflects a sound small-group design principle?",
   options:[
     "Group students alphabetically by last name every time.",
     "Group students purely by who is sitting near whom.",
     "Put all the fastest workers together permanently for the year.",
     "Group students using diagnostic information relevant to the activity's objective."],
   answerIndex:3,
   explanation:"Effective small grouping is based on diagnostic information tied to the learning objective, so groups serve the activity's purpose. Proximity and alphabetical order ignore learning needs, and permanent fixed grouping contradicts forming groups for specific short-term aims."},
  {id:"p_2220_B", subject:"ptk", standard:"2.2.20", domain:"2", topic:"2.2", set:"B",
   prompt:"While a teacher works intensively with one small group, what design principle protects the rest of the class?",
   options:[
     "Make sure the rest of the class has meaningful work and isn't neglected while the teacher is with the group.",
     "Let the other students do whatever they want unsupervised.",
     "Cancel all other activities until the group is finished.",
     "Spend the whole period with the one group; the others will manage."],
   answerIndex:0,
   explanation:"A small-group design principle is not spending excessive time away from the rest of the class \u2014 the others need meaningful, managed work. Devoting the whole period to one group, halting everything, or leaving students aimless all neglect the larger class."},
  {id:"p_2220_C", subject:"ptk", standard:"2.2.20", domain:"2", topic:"2.2", set:"C",
   prompt:"A math teacher grouped students by readiness for a unit on factoring. Midway, a diagnostic check shows several students in the 'still developing' group have caught up. What does sound small-group design call for?",
   options:[
     "Disband all groups and return to whole-class instruction permanently.",
     "Keep the original groups fixed to avoid disruption.",
     "Regroup the students who are now ready, since groups should shift as students' readiness changes.",
     "Move every student up a group regardless of the check."],
   answerIndex:2,
   explanation:"Groups should be fluid: regrouping students when they're ready keeps the grouping aligned with current readiness, a key small-group principle. Freezing groups ignores progress, blanket promotion ignores the data, and permanently abandoning groups overcorrects."},

  // ---- 2.2.21 Individual accountability in group work ----
  // A: recognize the need | B: free-rider problem | C(math): ensure individual accountability
  {id:"p_2221_A", subject:"ptk", standard:"2.2.21", domain:"2", topic:"2.2", set:"A",
   prompt:"In cooperative group work, a teacher ensures that each member is individually responsible for their own learning and contribution, not just the group's final product. Why does this matter?",
   options:[
     "It makes group work identical to individual work.",
     "It prevents some students from coasting while others do the work, ensuring every student actually learns.",
     "It lets the teacher avoid assessing the group at all.",
     "It guarantees all groups finish at the same time."],
   answerIndex:1,
   explanation:"Individual accountability ensures each student engages and learns rather than relying on teammates, which is the purpose this standard names. It doesn't eliminate assessment, control timing, or erase the collaborative element."},
  {id:"p_2221_B", subject:"ptk", standard:"2.2.21", domain:"2", topic:"2.2", set:"B",
   prompt:"A teacher notices that in group projects, one or two students do nearly all the work while others contribute little but receive the same group grade. Which adjustment best addresses this through individual accountability?",
   options:[
     "Give the whole group a lower grade.",
     "Give up on group work entirely.",
     "Build in individual components or checks (e.g., each member responsible for a part and assessed on it) so every student is accountable.",
     "Let the hardworking students choose their own groupmates next time."],
   answerIndex:2,
   explanation:"Adding individual responsibility and assessment within the group work directly targets free-riding while preserving collaboration \u2014 the heart of this standard. Abandoning group work forfeits its benefits, penalizing the whole group is unfair, and reshuffling groups doesn't build accountability."},
  {id:"p_2221_C", subject:"ptk", standard:"2.2.21", domain:"2", topic:"2.2", set:"C",
   prompt:"A math teacher assigns groups to solve a multi-part problem set on systems of equations. Which design best holds each member individually responsible for performance?",
   options:[
     "Grade only the neatest paper from each group.",
     "Assign each member specific problems to solve and explain, then have any member be able to explain any solution when called on.",
     "Let students divide the work however they like with no individual check.",
     "Have the group submit one set of solutions with no names beyond the group's."],
   answerIndex:1,
   explanation:"Assigning individual responsibility for parts and requiring any member to explain any solution ensures each student engages with the math \u2014 individual accountability. A single unattributed submission, unchecked self-division, and grading one paper all let students coast."},


  // =====================================================================
  // PTK · Domain 2 · Topic 2.2 — BATCH 4: standards 2.2.22–2.2.26
  // A/B subject-neutral; C secondary-math context
  // =====================================================================

  // ---- 2.2.22  Historical figures of both genders to contextualize content ----
  // A: recognize purpose | B: evaluate choice | C(math): math-history context
  {id:"p_2222_A", subject:"ptk", standard:"2.2.22", domain:"2", topic:"2.2", set:"A",
   prompt:"A teacher regularly introduces the historical figures — of various genders and backgrounds — who shaped the concepts students are studying. What is the primary instructional purpose of this practice?",
   options:["To replace direct instruction with biographical anecdotes.", "To meet a district word-count requirement for lesson plans.", "To help students see how cultural context and human contributions shaped the development of disciplinary ideas.", "To test students on names and dates of historical contributors."],
   answerIndex:2,
   explanation:"Connecting content to the real people who developed it — across genders and cultures — provides context for understanding how concepts, processes, and theories evolved within their disciplines. It is not a substitution for instruction, a paperwork requirement, or a test of biographical trivia."},

  {id:"p_2222_B", subject:"ptk", standard:"2.2.22", domain:"2", topic:"2.2", set:"B",
   prompt:"Two teachers both want to provide historical context for a unit. Teacher A names only the most famous figure (always the same demographic) each time. Teacher B deliberately selects figures of different genders and cultural backgrounds relevant to the content. Which approach better serves this standard, and why?",
   options:[
     "Teacher A, because focusing on the most famous figure keeps lessons efficient.",
     "Teacher B, because intentionally including diverse historical contributors gives students a richer, more accurate picture of how the discipline developed.",
     "Teacher A, because students find famous names easier to remember.",
     "Teacher B, because variety is entertaining regardless of academic purpose."],
   answerIndex:1,
   explanation:"Deliberately drawing on historical figures of both genders across cultural contexts reflects what the standard asks: using history to show how culture, gender, and human diversity all contributed to the development of concepts and theories. Defaulting to one demographic narrows that picture without instructional justification."},

  {id:"p_2222_C", subject:"ptk", standard:"2.2.22", domain:"2", topic:"2.2", set:"C",
   prompt:"A math teacher opens a unit on conic sections by briefly discussing the work of both ancient Greek geometers and Islamic scholars — including women contributors where documented — who formalized these curves. How does this serve the instruction?",
   options:[
     "It wastes class time that could be spent on problem sets.",
     "It gives students historical context for understanding how conic sections developed as a body of knowledge across cultures, grounding the abstract content in human discovery.",
     "It proves the teacher has completed professional development.",
     "It allows the teacher to skip the formal definition of a parabola."],
   answerIndex:1,
   explanation:"Connecting mathematical content to the diverse historical figures who developed it — across genders and cultures — contextualizes abstract ideas within human discovery, which is the purpose of this standard. It complements, not replaces, rigorous content instruction."},

  // ---- 2.2.23  Differentiate instruction based on learner readiness ----
  // A: recognize DI principle | B: evaluate a scenario | C(math): DI in math
  {id:"p_2223_A", subject:"ptk", standard:"2.2.23", domain:"2", topic:"2.2", set:"A",
   prompt:"A teacher designs three versions of the same task — one with scaffolding for students still building foundational skills, one at grade level, and one with extensions for students who have already mastered the core — and assigns students based on recent evidence of their readiness. What principle does this exemplify?",
   options:["Grouping students to minimize grading time.", "Giving advanced students more work as a reward.", "Avoiding the need to teach the whole class at once.", "Differentiating instruction based on learner readiness to promote generative learning."],
   answerIndex:3,
   explanation:"Designing tiered tasks based on evidence of each student's current readiness is the definition of readiness-based differentiation. The goal is generative learning — active engagement at each student's zone — not workload management or convenience."},

  {id:"p_2223_B", subject:"ptk", standard:"2.2.23", domain:"2", topic:"2.2", set:"B",
   prompt:"A teacher notices that after a lesson on persuasive writing, half the class can structure an argument independently while the other half still confuses claim and evidence. The teacher delivers the same follow-up lesson to everyone. What is the most significant missed opportunity here?",
   options:["The teacher should have given a pop quiz before the lesson.", "The teacher should have assigned homework instead.", "The teacher missed the chance to differentiate based on readiness — meeting students where they are to advance each learner's development.", "The teacher should have split the class by overall GPA."],
   answerIndex:2,
   explanation:"When the teacher already has evidence of differing readiness levels, delivering identical follow-up instruction for everyone ignores that evidence. Differentiated instruction calls for adjusting what students do based on current readiness, so each group can grow from where they actually are."},

  {id:"p_2223_C", subject:"ptk", standard:"2.2.23", domain:"2", topic:"2.2", set:"C",
   prompt:"Before a lesson on solving quadratic equations by factoring, a math teacher's exit-ticket data shows: Group 1 cannot yet factor simple trinomials; Group 2 factors fluently but hasn't connected it to solving equations; Group 3 has already solved equations by factoring. What does readiness-based differentiation call for?",
   options:["Design tasks matched to each group's current level — foundational factoring for Group 1, the factoring-to-solving connection for Group 2, and extending problem types or proof for Group 3.", "Teach the same whole-class lesson to all three groups and let them self-select extra practice.", "Send Group 3 to the library and teach Groups 1 and 2 the same lesson.", "Combine Groups 1 and 2 into one class and give Group 3 a different teacher."],
   answerIndex:0,
   explanation:"Readiness-based differentiation means designing instruction that meets each learner at their current point of development. Group 1 needs prerequisite skill work, Group 2 needs the conceptual bridge, and Group 3 needs extension — a single uniform lesson cannot advance all three simultaneously."},

  // ---- 2.2.24  Develops culturally relevant instruction ----
  // A: recognize CRI | B: evaluate a lesson design | C(math): CRI in math context
  {id:"p_2224_A", subject:"ptk", standard:"2.2.24", domain:"2", topic:"2.2", set:"A",
   prompt:"A teacher consistently designs lessons whose contexts, examples, and tasks draw on the cultural backgrounds present in the classroom, so students see their own experiences reflected in academic content. What best describes this approach?",
   options:[
     "Culturally relevant instruction — using students' cultural frames as a resource for learning.",
     "Multicultural decoration — adding cultural references as surface-level add-ons.",
     "Ability grouping based on cultural familiarity with content.",
     "Community outreach rather than instructional design."],
   answerIndex:0,
   explanation:"Culturally relevant instruction systematically weaves students' cultural contexts into academic content — making learning accessible and meaningful by connecting it to students' lived frames of reference. Surface decoration or community relations work are different things; ability grouping is unrelated."},

  {id:"p_2224_B", subject:"ptk", standard:"2.2.24", domain:"2", topic:"2.2", set:"B",
   prompt:"A teacher in a diverse classroom adds a one-day 'cultural awareness' poster project at the end of a unit but doesn't change any instruction during the unit itself. A colleague redesigns the unit's examples, word problems, and discussion prompts to reflect the cultural contexts of the students throughout. Which teacher is implementing culturally relevant instruction?",
   options:[
     "The first teacher, because the poster project addresses cultural awareness explicitly.",
     "The second teacher, because culturally relevant instruction is embedded in the actual design and delivery of content, not added on at the end.",
     "Both equally — any acknowledgment of culture qualifies.",
     "Neither — culturally relevant instruction requires a specific published curriculum."],
   answerIndex:1,
   explanation:"Culturally relevant instruction is about developing lessons whose core design — examples, tasks, framing — connects to students' cultural backgrounds. A bolt-on project at the end does not change instruction; only the second teacher is actually redesigning teaching through a cultural lens."},

  {id:"p_2224_C", subject:"ptk", standard:"2.2.24", domain:"2", topic:"2.2", set:"C",
   prompt:"A math teacher notices that most word problems in the textbook use contexts unfamiliar to her students (e.g., skiing trips, yacht purchases). She rewrites key problems using contexts drawn from students' communities and family experiences. What does this most directly accomplish?",
   options:[
     "It lowers the rigor of the math problems.",
     "It develops culturally relevant instruction by grounding mathematical tasks in students' own cultural and community contexts, making the math more accessible and meaningful.",
     "It satisfies a legal equity requirement but has no instructional effect.",
     "It eliminates the need to teach abstract mathematical reasoning."],
   answerIndex:1,
   explanation:"Rewriting tasks to use culturally familiar contexts is a concrete example of developing culturally relevant instruction — the math itself is unchanged in rigor, but the cultural framing makes it more accessible. Familiarity with context reduces cognitive load on language and setting, freeing attention for the mathematics."},

  // ---- 2.2.25  Values individuals' experiences and perspectives ----
  // A: recognize the principle | B: evaluate a teacher response | C(math): math discussion
  {id:"p_2225_A", subject:"ptk", standard:"2.2.25", domain:"2", topic:"2.2", set:"A",
   prompt:"A teacher routinely invites students to share how their own experiences and viewpoints connect to the content, and treats those contributions as legitimate resources for constructing understanding — not just as icebreakers. What view of knowledge does this reflect?",
   options:[
     "Knowledge is constructed solely by experts and transmitted to students.",
     "Students' experiences and perspectives are resources that influence how individuals construct knowledge.",
     "Personal anecdotes are irrelevant to academic content.",
     "Students should filter out personal experience to achieve objective understanding."],
   answerIndex:1,
   explanation:"This standard rests on a constructivist insight: individuals construct knowledge through the lens of their own experiences and perspectives. Valuing students' contributions acknowledges that lens as real and influential, not as noise to be filtered out or merely a social warm-up."},

  {id:"p_2225_B", subject:"ptk", standard:"2.2.25", domain:"2", topic:"2.2", set:"B",
   prompt:"During a class discussion, a student offers an interpretation of a concept that is shaped by their cultural experience and differs from the textbook framing. The teacher responds: \"That's an interesting personal opinion, but let's stay focused on what the text says.\" What is the main instructional concern with this response?",
   options:[
     "The teacher spoke too briefly.",
     "The teacher dismissed an opportunity to value the student's experiential perspective as a legitimate way of constructing understanding, which this standard calls for explicitly.",
     "The teacher should have graded the student's comment.",
     "The teacher correctly redirected to the authoritative source; there is no concern."],
   answerIndex:1,
   explanation:"The standard requires instruction that values individuals' experiences and perspectives as genuine influences on how knowledge is constructed. Brushing off the student's experientially-grounded interpretation as mere 'personal opinion' signals that only the text's framing counts — the opposite of this standard's intent."},

  {id:"p_2225_C", subject:"ptk", standard:"2.2.25", domain:"2", topic:"2.2", set:"C",
   prompt:"During a discussion about whether a mathematical procedure makes intuitive sense, a student says, \"The way we count change at my family's store actually follows the same steps.\" The teacher uses this to bridge to the formal subtraction algorithm. What does this teacher move accomplish?",
   options:["It distracts from the formal curriculum.", "It shows the teacher doesn't know the material well enough to stay on topic.", "It replaces the math with a social exercise.", "It validates the student's real-world experience as a legitimate lens through which mathematical understanding is constructed, connecting lived knowledge to academic content."],
   answerIndex:3,
   explanation:"Using the student's store-counting experience as a bridge to the formal algorithm demonstrates that the teacher values individuals' experiences as real vehicles for constructing knowledge — this is the standard in action. The math is still taught; the experience becomes the on-ramp."},

  // ---- 2.2.26  Values cultural heritages of ethnic groups ----
  // A: distinguish from CRI | B: recognize the dual-purpose framing | C(math): math curriculum
  {id:"p_2226_A", subject:"ptk", standard:"2.2.26", domain:"2", topic:"2.2", set:"A",
   prompt:"A teacher designs instruction that treats the cultural heritages of different ethnic groups both as forces that have shaped students' dispositions and approaches to learning AND as content worthy of inclusion in the formal curriculum. What does treating cultural heritage in both ways reflect?",
   options:["Only the first use matters — heritages affect mindset but don't belong in the curriculum.", "Only the second use matters — heritages are content topics but don't affect how students learn.", "Cultural heritage is irrelevant to classroom instruction.", "Both uses are legitimate: cultural heritage shapes how students engage with learning and is itself worthy academic content."],
   answerIndex:3,
   explanation:"This standard explicitly recognizes cultural heritage as doing double duty: it shapes students' dispositions, attitudes, and approaches to learning (an influence on HOW students learn) and it constitutes worthy content to be taught in the formal curriculum (WHAT is taught). Recognizing only one dimension misses the standard's full scope."},

  {id:"p_2226_B", subject:"ptk", standard:"2.2.26", domain:"2", topic:"2.2", set:"B",
   prompt:"A teacher is planning a unit and asks: 'Are there contributions from different ethnic groups' cultural traditions that are actually part of what I'm supposed to teach, not just a warm cultural backdrop?' This question reflects awareness of which instructional obligation?",
   options:["That cultural content must appear only in elective courses.", "That ethnic heritage must be tested on standardized exams to have instructional value.", "That the cultural heritages of ethnic groups are worth teaching as formal curriculum content, not merely as context or decoration.", "That cultural content is only relevant in social studies classes."],
   answerIndex:2,
   explanation:"The standard says cultural heritages of ethnic groups are 'worthy content to be taught in the formal curriculum' — not relegated to elective, bonus, or background material. The teacher's question shows exactly this awareness: that heritage can and should appear as substantive academic content."},

  {id:"p_2226_C", subject:"ptk", standard:"2.2.26", domain:"2", topic:"2.2", set:"C",
   prompt:"A math teacher includes a lesson segment on contributions to algebra and geometry from medieval Islamic scholars and ancient African civilizations, framing this as core mathematical history — not an optional enrichment sidebar. Why does this framing matter?",
   options:["It doesn't matter; the math content is identical either way.", "It matters only because it fills a required diversity checklist.", "Treating these contributions as core curriculum content signals that the cultural heritages of diverse ethnic groups are worthy of formal academic study, not merely decorative acknowledgment.", "The teacher should avoid such content to stay focused on state standards."],
   answerIndex:2,
   explanation:"The distinction between core content and a sidebar matters: presenting diverse cultural contributions as part of the formal mathematical curriculum — not an add-on — reflects the standard's requirement to value ethnic cultural heritages as worthy curriculum content. The framing communicates what the teacher treats as academically serious."},


  // =====================================================================
  // PTK · Domain 2 · Topic 2.2 — BATCH 5: standards 2.2.27–2.2.31
  // A/B subject-neutral; C secondary-math context
  // =====================================================================

  // ---- 2.2.27  Bridges home↔school and abstraction↔reality ----
  // A: recognize the two bridges | B: evaluate a missed bridge | C(math): abstract-to-real
  {id:"p_2227_A", subject:"ptk", standard:"2.2.27", domain:"2", topic:"2.2", set:"A",
   prompt:"A teacher intentionally designs activities that (a) connect what students experience at home to classroom learning and (b) connect abstract academic ideas to concrete, real-world situations. What dual purpose do these design choices serve?",
   options:["They replace homework by bringing home tasks into school.", "They reduce the need for formal assessment.", "They satisfy administrative requirements for community engagement.", "They build meaningfulness by bridging home and school experiences and by anchoring abstractions in reality, helping students find personal and practical relevance in what they learn."],
   answerIndex:3,
   explanation:"This standard calls for two bridges: the home-to-school bridge (connecting students' out-of-school lives to academic content) and the abstraction-to-reality bridge (grounding abstract concepts in concrete, real-world situations). Together these increase meaningfulness and accessibility — not paperwork compliance or homework replacement."},

  {id:"p_2227_B", subject:"ptk", standard:"2.2.27", domain:"2", topic:"2.2", set:"B",
   prompt:"A teacher teaches an abstract concept entirely through formal definitions and decontextualized practice problems, never connecting the idea to anything students encounter outside school or to tangible real-world examples. Which instructional opportunity is most clearly missed?",
   options:["The teacher missed building bridges of meaningfulness — connecting academic abstraction to reality and to students' lives outside school.", "The teacher missed a chance to give more homework.", "The teacher failed to use cooperative learning structures.", "The teacher should have used more technology."],
   answerIndex:0,
   explanation:"Teaching only through abstract, decontextualized presentation fails to build the bridges this standard requires: neither the home-to-school connection nor the abstraction-to-concrete connection is made. Without these, students may struggle to find meaning or relevance in the content."},

  {id:"p_2227_C", subject:"ptk", standard:"2.2.27", domain:"2", topic:"2.2", set:"C",
   prompt:"After introducing the abstract concept of exponential growth, a math teacher shows a graph of a real local phenomenon (e.g., a community's observed data trend) and then asks students, \"Where have you seen something grow like this in your own neighborhood or family?\" What two instructional bridges does this sequence create?",
   options:[
     "A bridge from lecture to independent practice, and a bridge from easy to hard problems.",
     "A bridge from abstraction to real-world context (the local graph), and a bridge from school to students' home and community experiences (the follow-up question).",
     "A bridge from one math topic to another, and a bridge from teacher talk to student talk.",
     "A bridge from formative to summative assessment, and a bridge from individual to group work."],
   answerIndex:1,
   explanation:"The graph connects the abstract mathematical pattern to a concrete real-world situation (abstraction-to-reality bridge); the question connects academic content to students' own lives and communities (home-to-school bridge). Both bridges — specified in this standard — are present in this two-move sequence."},

  // ---- 2.2.28  Effective instruction and assessment for ELLs (WIDA) ----
  // A: recognize WIDA alignment | B: evaluate ELL accommodation | C(math): ELL in math class
  {id:"p_2228_A", subject:"ptk", standard:"2.2.28", domain:"2", topic:"2.2", set:"A",
   prompt:"A teacher providing instruction to English language learners aligns her language demands, scaffolds, and assessment formats to the students' current English proficiency levels, consistent with WIDA instructional standards. Why is this alignment important?",
   options:["It exempts ELL students from academic content standards.", "It replaces content instruction with English grammar lessons.", "It ensures that language barriers do not prevent ELL students from demonstrating content knowledge, and that instruction and assessment are calibrated to where students actually are in English development.", "It ensures ELL students always work in their native language only."],
   answerIndex:2,
   explanation:"WIDA-aligned instruction ensures that language demands are appropriate for students' proficiency level — so students can access academic content and demonstrate what they know without being blocked by language demands that exceed their current English development. It is not about exemption from content, replacing content with grammar, or mandating native-language-only instruction."},

  {id:"p_2228_B", subject:"ptk", standard:"2.2.28", domain:"2", topic:"2.2", set:"B",
   prompt:"A teacher with several ELL students gives all students the same text-heavy written test with no language supports, reasoning that accommodations would be 'unfair to native speakers.' What is most problematic about this reasoning?",
   options:["The teacher conflates equality (same treatment) with equity: without appropriate language supports, the test measures English proficiency more than content knowledge for ELL students, which is neither fair nor aligned with effective ELL assessment practice.", "The teacher is correct — identical tests ensure equal treatment.", "The teacher should give ELL students an entirely different content standard.", "The teacher should only assess ELL students orally, never in writing."],
   answerIndex:0,
   explanation:"Providing appropriate language scaffolds for ELL students is equitable practice — it levels the playing field so content knowledge can be measured, not English language proficiency alone. The 'unfair to native speakers' reasoning misunderstands the purpose: supports are designed to reveal what ELL students know, not to confer an advantage."},

  {id:"p_2228_C", subject:"ptk", standard:"2.2.28", domain:"2", topic:"2.2", set:"C",
   prompt:"A math teacher has three ELL students at beginning English proficiency. On a unit test covering solving linear equations, she provides a bilingual glossary of math terms and allows students to show their solution steps symbolically without requiring English written explanations. What does this approach best reflect?",
   options:["Lowering the mathematical expectations for ELL students.", "Violating standardized testing rules.", "Providing effective assessment for ELLs consistent with WIDA standards — removing language barriers that would obscure the students' mathematical knowledge while maintaining the mathematical rigor of the task.", "Replacing assessment with a social-emotional support strategy."],
   answerIndex:2,
   explanation:"Providing a math-term glossary and allowing symbolic work reduces the English language barrier without reducing the mathematical demand — students are still assessed on solving linear equations. This is effective ELL assessment practice: distinguish what you're measuring (math) from what you're not (English writing proficiency)."},

  // ---- 2.2.29  Instructional technology for generative learning (+ compliance) ----
  // A: recognize generative learning tech | B: compliance dimension | C(math): tech in math
  {id:"p_2229_A", subject:"ptk", standard:"2.2.29", domain:"2", topic:"2.2", set:"A",
   prompt:"A teacher selects instructional technology tools based on whether they require students to actively generate understanding — creating, manipulating, problem-solving, or producing — rather than passively receive information. What principle is guiding this selection?",
   options:["That technology is valuable mainly for classroom management and attendance.", "That any technology tool is equally effective as long as students enjoy it.", "That technology must replace the teacher's direct instruction entirely.", "That relevant instructional technology should promote generative learning — active construction of understanding — not just digital delivery of passive content."],
   answerIndex:3,
   explanation:"This standard calls for technology that promotes generative learning — students actively constructing knowledge through the technology, not just watching or clicking through content. The selection criterion is pedagogical purpose (does it require generation?), not student enjoyment or administrative function."},

  {id:"p_2229_B", subject:"ptk", standard:"2.2.29", domain:"2", topic:"2.2", set:"B",
   prompt:"A teacher wants to use an online platform that collects and stores student work. Before deploying it, she checks whether the platform complies with state student-data privacy laws and district technology use policies. A colleague says this step is bureaucratic overkill. Who is correct?",
   options:["The teacher — verifying compliance with state education law and ethics policies is part of responsible technology-based instruction, not an optional extra step.", "The colleague — legal compliance is IT's responsibility, not the classroom teacher's.", "The colleague — as long as students consent, no further compliance check is needed.", "The teacher, but only for platforms used with students under age 13."],
   answerIndex:0,
   explanation:"This standard explicitly includes compliance with state education and ethics policies and legal requirements as part of using instructional technology. The teacher is correct: a classroom teacher deploying a data-collecting platform shares responsibility for verifying its compliance — it is not solely IT's concern, nor age-limited."},

  {id:"p_2229_C", subject:"ptk", standard:"2.2.29", domain:"2", topic:"2.2", set:"C",
   prompt:"A math teacher uses dynamic graphing software (e.g., Desmos) where students manipulate parameters of a function and predict what the graph will do before executing it, then explain why the change occurred. Compared to a teacher who just projects graphs for students to copy, what does the first teacher's use of technology better accomplish?",
   options:["It is faster and requires less preparation.", "It is better only because it is more visually appealing.", "It eliminates the need to assess students on graphing.", "It promotes generative learning — students actively construct understanding of function behavior by manipulating and predicting, rather than passively receiving a teacher-generated image."],
   answerIndex:3,
   explanation:"Having students manipulate parameters, predict outcomes, and explain results is generative — they construct understanding through active engagement with the tool. Projecting for passive copying is receptive. The difference maps directly onto the standard: instructional technology should promote generative, not merely presentational, learning."},

  // ---- 2.2.30  Interdisciplinary themes → meaningful learning experiences ----
  // A: recognize purpose | B: evaluate integration depth | C(math): math × another discipline
  {id:"p_2230_A", subject:"ptk", standard:"2.2.30", domain:"2", topic:"2.2", set:"A",
   prompt:"A teacher designs a unit that explicitly connects the content of her course to themes that run across multiple disciplines, helping students understand how the same concept, question, or issue appears in different fields. What is the primary instructional rationale?",
   options:["To help students see meaningful connections across subject areas, deepening understanding by showing how disciplinary ideas relate to broader themes.", "To reduce the amount of new content that needs to be taught.", "To satisfy a graduation requirement for interdisciplinary coursework.", "To let students skip content they've seen in another class."],
   answerIndex:0,
   explanation:"Connecting content to interdisciplinary themes builds richer understanding by showing students how ideas are not isolated to one subject — they recur, interrelate, and deepen across disciplines. This is the pedagogical rationale, not a shortcut to coverage reduction or a graduation checkbox."},

  {id:"p_2230_B", subject:"ptk", standard:"2.2.30", domain:"2", topic:"2.2", set:"B",
   prompt:"Teacher A mentions briefly that 'this topic also comes up in science class' and moves on. Teacher B builds a multi-day learning experience around an interdisciplinary theme, having students explore the concept from multiple disciplinary angles and explicitly draw the connections. Which teacher is developing the interdisciplinary theme into a meaningful learning experience?",
   options:[
     "Teacher A — even a brief mention honors the connection.",
     "Teacher B — developing the theme into a meaningful experience requires more than an offhand reference; it requires intentional design that actually explores the cross-disciplinary connections.",
     "Both equally — any mention of another discipline qualifies.",
     "Neither — true interdisciplinary work requires a team-taught course."],
   answerIndex:1,
   explanation:"The standard calls for developing interdisciplinary themes into meaningful learning experiences, not merely noting that connections exist. Teacher B's intentional multi-day design that has students actively explore connections exemplifies this; Teacher A's offhand comment does not."},

  {id:"p_2230_C", subject:"ptk", standard:"2.2.30", domain:"2", topic:"2.2", set:"C",
   prompt:"A math teacher co-designs a project with the science teacher: students use regression and statistical modeling to analyze real environmental data collected in science class, then present findings that address both mathematical and scientific questions. What does this project most clearly exemplify?",
   options:["Replacing the math curriculum with a science curriculum.", "A fun activity with no academic purpose.", "An example of instructional technology use, not interdisciplinary instruction.", "Developing an interdisciplinary theme — data analysis and modeling — into a meaningful learning experience that spans math and science, helping students understand how the disciplines genuinely connect."],
   answerIndex:3,
   explanation:"The project intentionally develops an interdisciplinary theme (quantitative reasoning / modeling) across mathematics and science, with students doing real cross-disciplinary work. This is exactly what the standard calls for: understanding how themes connect core subjects and designing experiences that make those connections meaningful and academic."},

  // ---- 2.2.31  Evidence-based instructional strategies ----
  // A: recognize evidence-based selection | B: evaluate an unsupported practice | C(math): apply EBP
  {id:"p_2231_A", subject:"ptk", standard:"2.2.31", domain:"2", topic:"2.2", set:"A",
   prompt:"When selecting instructional strategies, a teacher consistently asks: 'Is there a research base showing this approach actually advances student learning?' and chooses among strategies based on that evidence. What distinguishes this approach from simply trying popular or familiar methods?",
   options:["Evidence-based selection requires that strategy choices be grounded in a demonstrated research record of advancing learning, not just familiarity, trend, or personal preference.", "Popular methods are always based on research, so there is no distinction.", "Evidence-based practice means using only strategies more than 20 years old.", "The distinction is only about documenting strategy names for administrative review."],
   answerIndex:0,
   explanation:"Evidence-based instructional strategies are chosen because research demonstrates they advance learning — not because they are fashionable, familiar, or intuitively appealing. The distinction matters because many popular instructional trends lack a robust research base, while some less-glamorous strategies have strong evidence behind them."},

  {id:"p_2231_B", subject:"ptk", standard:"2.2.31", domain:"2", topic:"2.2", set:"B",
   prompt:"A teacher has used the same set of instructional strategies for years because 'they feel right' and students seem engaged. A coach asks the teacher to examine the research base for those strategies. The teacher resists, saying engagement is evidence enough. What is the coach's most defensible concern?",
   options:["Student engagement indicates motivation but is not the same as evidence that the strategy advances learning. Evidence-based practice requires grounding strategy selection in research on actual learning outcomes, not engagement alone.", "Student engagement is the strongest possible evidence that a strategy works, so the coach has no defensible concern.", "The coach is concerned only because the strategies are old.", "The teacher should switch strategies monthly to stay current with trends."],
   answerIndex:0,
