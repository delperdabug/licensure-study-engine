     "The student is incorrect; a parallelogram has exactly one line of symmetry through its center."
   ],
   answerIndex:2,
   explanation:"A general (non-rectangular, non-rhombus) parallelogram has no lines of symmetry. Its diagonals are NOT lines of symmetry — reflecting across either diagonal does not produce the same figure. It does have point symmetry (180° rotational symmetry about its center), but no reflective symmetry."},

  // 3.1.02 — Classify 2D and 3D objects by geometric attributes
  {id:"m_31002_A", subject:"math", standard:"3.1.02", domain:"3", topic:"3.1", set:"A",
   prompt:"A student is sorting three-dimensional solids and places a cylinder with the prisms because \"it has two parallel, congruent bases.\" Which is the most mathematically precise response?",
   options:[
     "The student is correct; a cylinder satisfies the definition of a prism.",
     "The student's reasoning is valid, but a cylinder is technically not a prism because its bases are circular, not polygonal.",
     "The student is incorrect; prisms must have triangular bases.",
     "The student is incorrect; a cylinder has only one base and one lateral face."
   ],
   answerIndex:1,
   explanation:"A prism is defined as a polyhedron with two parallel, congruent polygonal bases connected by rectangular lateral faces. A cylinder has two parallel congruent circular bases — but circles are not polygons, so a cylinder is not a prism. The student's intuition about parallel congruent bases is a good start, but the polygon requirement is the key distinction."},

  {id:"m_31002_B", subject:"math", standard:"3.1.02", domain:"3", topic:"3.1", set:"B",
   prompt:"Which pair of attributes, taken together, uniquely identifies a rhombus within the class of quadrilaterals?",
   options:[
     "All four angles are equal; opposite sides are parallel.",
     "All four sides are equal; at least one right angle.",
     "Opposite sides are equal; diagonals bisect each other.",
     "All four sides are equal; opposite angles are equal."
   ],
   answerIndex:3,
   explanation:"A rhombus is defined as a quadrilateral with all four sides equal and opposite angles equal (which also forces opposite sides to be parallel). Option A describes a rectangle (or square). Option B describes a square specifically. Option C describes a parallelogram generally. Option D correctly captures rhombus attributes."},

  {id:"m_31002_C", subject:"math", standard:"3.1.02", domain:"3", topic:"3.1", set:"C",
   prompt:"A geometry class is building a hierarchy of quadrilaterals. A student asks: 'Is every square a rectangle?' Which explanation is most mathematically complete?",
   options:[
     "No, because squares have equal sides while rectangles do not require equal sides.",
     "Yes, but only if the square's side length equals its diagonal length.",
     "No, because the definitions of square and rectangle are mutually exclusive.",
     "Yes, because a square satisfies all the defining properties of a rectangle: four right angles and two pairs of parallel sides."
   ],
   answerIndex:3,
   explanation:"A rectangle is defined as a quadrilateral with four right angles (and consequently two pairs of parallel, congruent opposite sides). A square has four right angles AND four equal sides, so it satisfies every condition of a rectangle. The relationship is one of inclusion: squares ⊂ rectangles. The fact that squares have an additional property (equal sides) doesn't exclude them from being rectangles."},

  // 3.1.03 — 2D projections and perspective drawings of 3D objects
  {id:"m_31003_A", subject:"math", standard:"3.1.03", domain:"3", topic:"3.1", set:"A",
   prompt:"The top view (plan view), front view, and side view of a solid are all squares of the same size. Which solid is most consistent with all three views?",
   options:[
     "A square pyramid",
     "A rectangular prism that is taller than it is wide",
     "A cube",
     "A triangular prism"
   ],
   answerIndex:2,
   explanation:"A cube has identical square profiles from all three orthogonal directions (top, front, side). A rectangular prism with unequal dimensions would give different-sized rectangles from different views. A square pyramid's top view is a square, but its front and side views are triangles. A triangular prism's views vary by direction."},

  {id:"m_31003_B", subject:"math", standard:"3.1.03", domain:"3", topic:"3.1", set:"B",
   prompt:"An isometric drawing of a three-dimensional object uses three axes separated by 120° angles. What is a key advantage of isometric drawings over standard perspective drawings for a mathematics classroom?",
   options:[
     "Isometric drawings show objects exactly as the human eye sees them, including vanishing points.",
     "Isometric drawings eliminate the need for understanding of scale.",
     "Isometric drawings can only represent rectangular prisms, simplifying student work.",
     "Isometric drawings preserve the relative lengths of edges in all three directions, making measurements more reliable."
   ],
   answerIndex:3,
   explanation:"In an isometric drawing, all three axes are equally foreshortened, so edges along all three directions are drawn at their true relative lengths. This makes it easier to reason about dimensions compared to perspective drawings, where parallel lines converge at vanishing points and lengths are distorted. Isometric drawings do NOT show objects as the eye sees them (that's perspective), and they can represent many solid types, not only prisms."},

  {id:"m_31003_C", subject:"math", standard:"3.1.03", domain:"3", topic:"3.1", set:"C",
   prompt:"Students are given a front view, side view, and top view of a solid, each showing an identical circle. Which solid do these three orthographic views most likely represent?",
   options:[
     "A cone",
     "A sphere",
     "A cylinder",
     "A hemisphere"
   ],
   answerIndex:1,
   explanation:"A sphere looks circular from every direction — top, front, side, and any other angle. A cylinder's top view is a circle, but its front and side views are rectangles. A cone's top view is a circle, but its front/side views are triangles. A hemisphere's views vary by direction. Only a sphere yields a circle from all three standard orthographic views."},

  // 3.1.04 — Congruence conditions; transversal angle relationships; triangle angle sum
  {id:"m_31004_A", subject:"math", standard:"3.1.04", domain:"3", topic:"3.1", set:"A",
   prompt:"Two triangles share the property that two sides and the included angle of one are congruent to the corresponding parts of the other. Which congruence condition applies, and what additional information (if any) is required?",
   options:[
     "SAS; no additional information is needed.",
     "ASA; no additional information is needed.",
     "SSS; the third pair of sides must also be shown congruent.",
     "AAS; one more pair of angles must be confirmed."
   ],
   answerIndex:0,
   explanation:"Two sides and the included angle (the angle between those two sides) congruent is exactly the SAS (Side-Angle-Side) congruence condition, which is sufficient by itself — no additional information is required. ASA requires two angles and the included side; SSS requires all three sides; AAS requires two angles and a non-included side."},

  {id:"m_31004_B", subject:"math", standard:"3.1.04", domain:"3", topic:"3.1", set:"B",
   prompt:"A transversal crosses two parallel lines. One of the co-interior (same-side interior) angles measures $65°$. What is the measure of the other co-interior angle, and what theorem justifies this?",
   options:[
     "$65°$; co-interior angles are congruent when lines are parallel.",
     "$115°$; co-interior angles are supplementary when lines are parallel.",
     "$25°$; co-interior angles are complementary when lines are parallel.",
     "$130°$; co-interior angles double when lines are parallel."
   ],
   answerIndex:1,
   explanation:"Co-interior angles (also called consecutive interior or same-side interior angles) are supplementary when the lines are parallel, summing to 180°. So $180° - 65° = 115°$. This is the Co-interior Angles theorem (a consequence of the Parallel Postulate). Do not confuse with alternate interior angles, which are congruent."},

  {id:"m_31004_C", subject:"math", standard:"3.1.04", domain:"3", topic:"3.1", set:"C",
   prompt:"In a triangle, one angle measures $47°$ and another measures $68°$. A student claims the exterior angle at the third vertex equals $115°$. Is the student correct?",
   options:[
     "No; the exterior angle equals the sum of the two non-adjacent interior angles: $47° + 68° = 115°$, but the third interior angle is $65°$, so the exterior angle is $115°$. Both methods agree — the student is correct.",
     "Yes; the exterior angle equals $180°$ minus the third interior angle, and the third interior angle is $65°$, giving an exterior angle of $115°$.",
     "No; the exterior angle is always greater than $90°$, so it must be $180° - 47° = 133°$.",
     "No; the exterior angle equals $360°$ divided by the number of vertices, giving $120°$."
   ],
   answerIndex:0,
   explanation:"The triangle angle sum is $180°$, so the third interior angle is $180° - 47° - 68° = 65°$. The exterior angle at that vertex is $180° - 65° = 115°$. The Exterior Angle Theorem also states that an exterior angle equals the sum of the two remote interior angles: $47° + 68° = 115°$. Both methods confirm the student is correct."},

  // 3.1.05 — Three parallels cut by two transversals: proportional segments
  {id:"m_31005_A", subject:"math", standard:"3.1.05", domain:"3", topic:"3.1", set:"A",
   prompt:"Three parallel lines cut transversal $p$ into segments of length $6$ and $9$ (from top to bottom). The same three parallels cut transversal $q$ into a segment of length $4$ at the top and an unknown segment $x$ at the bottom. What is $x$?",
   options:[
     "$x = 6$",
     "$x = 4$",
     "$x = 8$",
     "$x = 9$"
   ],
   answerIndex:0,
   explanation:"By the Three Parallels theorem, the ratio of segments on one transversal equals the ratio on the other: $\\\\frac{6}{9} = \\\\frac{4}{x}$. Solving: $6x = 36$, so $x = 6$."},

  {id:"m_31005_B", subject:"math", standard:"3.1.05", domain:"3", topic:"3.1", set:"B",
   prompt:"Three parallel lines divide transversal $m$ into two equal segments of length $5$. Transversal $n$ is divided into segments of length $3$ and $y$. What is $y$?",
   options:[
     "$y = 2$",
     "$y = 3$",
     "$y = 5$",
     "$y = 6$"
   ],
   answerIndex:1,
   explanation:"Since the two segments on transversal $m$ are equal ($5$ and $5$), the ratio is $1:1$. By the Three Parallels theorem, transversal $n$ is also divided in ratio $1:1$, so both segments equal $3$. Thus $y = 3$."},

  {id:"m_31005_C", subject:"math", standard:"3.1.05", domain:"3", topic:"3.1", set:"C",
   prompt:"A teacher draws three parallel horizontal lines and two transversals on the board. She marks segment lengths $8$ and $12$ on the left transversal. On the right transversal the lower segment is labeled $9$ and the upper segment is unknown. A student sets up the proportion $\\\\frac{8}{12} = \\\\frac{k}{9}$. What is $k$ and is the proportion set up correctly?",
   options:[
     "$k = 6$; the proportion is correct because corresponding segments must be in the same ratio.",
     "$k = 12$; the proportion is incorrect because segments on the same transversal cannot be compared.",
     "$k = 9$; the proportion is set up backwards.",
     "$k = 6$; but the proportion should be $\\\\frac{8}{k} = \\\\frac{12}{9}$ to be technically correct."
   ],
   answerIndex:0,
   explanation:"The Three Parallels theorem states that the ratio of the segments cut on one transversal equals the ratio of the corresponding segments on the other. The proportion $\\\\frac{8}{12} = \\\\frac{k}{9}$ correctly pairs corresponding segments (both upper-to-lower), giving $12k = 72$, so $k = 6$. The proportion in option D gives the same value but is just a rearrangement — option A is the most direct and correct statement."},

  // 3.1.06 — Ratio and similarity for rectilinear figures; numerical proportions
  {id:"m_31006_A", subject:"math", standard:"3.1.06", domain:"3", topic:"3.1", set:"A",
   prompt:"Two similar rectangles have a scale factor of $3:5$. The shorter rectangle has a length of $9$ cm. What is the length of the corresponding side of the larger rectangle?",
   options:[
     "$12$ cm",
     "$25$ cm",
     "$18$ cm",
     "$15$ cm"
   ],
   answerIndex:3,
   explanation:"Scale factor $3:5$ means corresponding lengths are in ratio $3:5$. If the shorter side is $9$, then $\\\\frac{3}{5} = \\\\frac{9}{L}$, giving $3L = 45$, so $L = 15$ cm."},

  {id:"m_31006_B", subject:"math", standard:"3.1.06", domain:"3", topic:"3.1", set:"B",
   prompt:"Two similar triangles have corresponding sides in ratio $2:7$. The area of the smaller triangle is $8$ cm². What is the area of the larger triangle?",
   options:[
     "$28$ cm²",
     "$56$ cm²",
     "$98$ cm²",
     "$112$ cm²"
   ],
   answerIndex:2,
   explanation:"When two figures are similar with linear scale factor $k$, their areas are in ratio $k^2$. Here $k = \\\\frac{7}{2}$, so the area ratio is $\\\\left(\\\\frac{7}{2}\\\\right)^2 = \\\\frac{49}{4}$. Larger area $= 8 \\\\times \\\\frac{49}{4} = 98$ cm²."},

  {id:"m_31006_C", subject:"math", standard:"3.1.06", domain:"3", topic:"3.1", set:"C",
   prompt:"A student is told that two polygons are similar with a scale factor of $4:6$. She writes the proportion $\\\\frac{4}{6} = \\\\frac{x}{15}$ to find an unknown side. What is $x$ and what assumption is she making?",
   options:[
     "$x = 10$; she is assuming the side of length $15$ is on the larger figure and $x$ is the corresponding side on the smaller figure.",
     "$x = 10$; she is assuming the side of length $15$ is on the smaller figure.",
     "$x = 22.5$; she is assuming $15$ is on the smaller figure.",
     "$x = 12$; she is equating the scale factor to the ratio of perimeters."
   ],
   answerIndex:0,
   explanation:"From $\\\\frac{4}{6} = \\\\frac{x}{15}$: $6x = 60$, so $x = 10$. Because $\\\\frac{4}{6}$ is less than 1, and $\\\\frac{x}{15}$ must equal it, $x < 15$. She is treating the $15$ as the side on the larger figure (corresponding to scale factor $6$) and finding the corresponding side $x$ on the smaller figure (corresponding to scale factor $4$). The assumption is correct."},

  // 3.1.07 — Compass and straightedge constructions
  {id:"m_31007_A", subject:"math", standard:"3.1.07", domain:"3", topic:"3.1", set:"A",
   prompt:"To construct the perpendicular bisector of segment $\\\\overline{AB}$ using only compass and straightedge, which sequence of steps is correct?",
   options:[
     "Draw arcs from $A$ and $B$ with equal radii greater than half of $AB$; connect the two intersection points of the arcs.",
     "Draw arcs from $A$ and $B$ with radius $AB$; connect the two intersection points of the arcs.",
     "Find the midpoint by measuring with the straightedge, then draw a perpendicular through it.",
     "Draw a circle centered at the midpoint of $AB$ with radius equal to $AB$; the diameter is the perpendicular bisector."
   ],
   answerIndex:0,
   explanation:"The standard construction: set the compass to any radius greater than half of $AB$. Draw arcs centered at $A$ and at $B$ (same radius). The arcs intersect at two points; connecting those two points gives the perpendicular bisector of $\\\\overline{AB}$. Option A uses radius $AB$ specifically (which works, but the general requirement is 'greater than half'), and option C uses measurement (not allowed in pure compass-and-straightedge construction)."},

  {id:"m_31007_B", subject:"math", standard:"3.1.07", domain:"3", topic:"3.1", set:"B",
   prompt:"A student wants to bisect angle $\\\\angle BAC$ using compass and straightedge. She places the compass at vertex $A$, draws an arc intersecting both rays, then places the compass at one intersection point and draws a small arc inside the angle. What must she do next?",
   options:[
     "Connect vertex $A$ to the first intersection point on either ray.",
     "Draw a line through the two intersection points on the rays.",
     "Measure the angle with the straightedge and mark the midpoint.",
     "Place the compass at the other intersection point with the same radius and draw another arc; connect $A$ to where the two small arcs meet."
   ],
   answerIndex:3,
   explanation:"Angle bisector construction: after drawing arcs from vertex $A$ to get two points on the rays, place the compass (with the same radius) at each of those two points and draw arcs that intersect inside the angle. The intersection of those two arcs is equidistant from both rays of the angle. Connecting vertex $A$ to this intersection gives the angle bisector."},

  {id:"m_31007_C", subject:"math", standard:"3.1.07", domain:"3", topic:"3.1", set:"C",
   prompt:"To construct a line through point $P$ parallel to line $\\\\ell$ using compass and straightedge, a student draws a transversal through $P$ intersecting $\\\\ell$, then uses a compass to copy an angle at $P$. What principle justifies why this construction works?",
   options:[
     "Corresponding angles formed by a transversal with parallel lines are supplementary.",
     "Any two lines cut by the same transversal must be parallel.",
     "Alternate interior angles are always congruent regardless of whether the lines are parallel.",
     "If two lines are cut by a transversal such that corresponding angles are congruent, then the lines are parallel."
   ],
   answerIndex:3,
   explanation:"The parallel line construction works by copying the angle that the transversal makes with line $\\\\ell$ at the point $P$. By the converse of the Corresponding Angles theorem: if a transversal cuts two lines so that corresponding angles are congruent, then the two lines are parallel. This justifies the construction — making the angles congruent guarantees the new line is parallel to $\\\\ell$."},

  // 3.1.08 — Skew lines in space
  {id:"m_31008_A", subject:"math", standard:"3.1.08", domain:"3", topic:"3.1", set:"A",
   prompt:"Which statement correctly distinguishes skew lines from parallel lines?",
   options:[
     "Skew lines do not lie in the same plane and never intersect; parallel lines lie in the same plane and never intersect.",
     "Skew lines lie in the same plane and never intersect; parallel lines may intersect at exactly one point.",
     "Skew lines intersect at exactly one point but are not perpendicular; parallel lines never intersect.",
     "Skew lines and parallel lines are equivalent terms used in different countries."
   ],
   answerIndex:0,
   explanation:"Parallel lines are coplanar (they share a plane) and never intersect. Skew lines are non-coplanar — they do not share any plane — and therefore never intersect. The key distinction is coplanarity, not just the absence of intersection."},

  {id:"m_31008_B", subject:"math", standard:"3.1.08", domain:"3", topic:"3.1", set:"B",
   prompt:"In a rectangular prism (box), which pair of edges is an example of skew lines?",
   options:[
     "Two edges that share a common vertex",
     "Two edges on the same face that do not intersect",
     "A bottom edge and the top edge directly above it on the opposite face",
     "A front-bottom edge and a right-side vertical edge that do not share a vertex and are not parallel"
   ],
   answerIndex:3,
   explanation:"Skew lines are non-intersecting and non-parallel lines in 3D space. In a rectangular box, a front-bottom edge runs horizontally front-to-back, and a right-side vertical edge runs vertically — they neither intersect nor are parallel, and no single plane contains both. This is a classic example of skew lines. Option B gives edges on the same face (coplanar, so parallel or intersecting). Option C gives parallel edges (top and bottom of the same face)."},

  {id:"m_31008_C", subject:"math", standard:"3.1.08", domain:"3", topic:"3.1", set:"C",
   prompt:"A teacher asks students to draw a figure illustrating two skew lines. Student A draws two straight lines crossing at an angle on the paper. Student B draws one line on a flat surface and another line going into the page (3D), with a small gap between them. Whose drawing better illustrates skew lines and why?",
   options:[
     "Student A, because skew lines must appear to cross in any projection.",
     "Neither; skew lines must be drawn on separate sheets of paper to be properly illustrated.",
     "Both are equally valid because both show lines that do not share a point.",
     "Student B, because skew lines must exist in three-dimensional space and cannot be coplanar."
   ],
   answerIndex:3,
   explanation:"Skew lines require three-dimensional space — they are lines that neither intersect nor are parallel, and crucially, no single plane contains both. Student A's drawing shows two intersecting lines in a plane (coplanar), which cannot be skew. Student B's drawing (one line in the plane of the page, one going into/out of the page with a gap) correctly depicts the 3D nature of skew lines."},

  // 3.1.09 — Convex polygons: similarity/congruence; angle sums; special quadrilaterals
  {id:"m_31009_A", subject:"math", standard:"3.1.09", domain:"3", topic:"3.1", set:"A",
   prompt:"What is the sum of the interior angles of a convex pentagon?",
   options:[
     "$360°$",
     "$450°$",
     "$540°$",
     "$720°$"
   ],
   answerIndex:2,
   explanation:"The sum of interior angles of a convex polygon with $n$ sides is $(n-2) \\\\times 180°$. For a pentagon ($n = 5$): $(5-2) \\\\times 180° = 3 \\\\times 180° = 540°$."},

  {id:"m_31009_B", subject:"math", standard:"3.1.09", domain:"3", topic:"3.1", set:"B",
   prompt:"Each exterior angle of a regular polygon measures $24°$. How many sides does the polygon have?",
   options:[
     "$12$",
     "$20$",
     "$18$",
     "$15$"
   ],
   answerIndex:3,
   explanation:"The sum of all exterior angles of any convex polygon is $360°$. For a regular polygon, each exterior angle is equal, so the number of sides $= \\\\frac{360°}{24°} = 15$."},

  {id:"m_31009_C", subject:"math", standard:"3.1.09", domain:"3", topic:"3.1", set:"C",
   prompt:"In a geometry lesson on special quadrilaterals, a student says: 'A trapezoid has exactly one pair of parallel sides, so a parallelogram cannot be a trapezoid.' Which response best addresses the mathematical issue?",
   options:[
     "The student is correct; the standard definition of trapezoid requires exactly one pair of parallel sides.",
     "The student is incorrect; a trapezoid has no parallel sides by definition.",
     "The definition depends on convention: the exclusive definition requires exactly one pair, while the inclusive definition requires at least one pair. Under the inclusive definition, parallelograms are trapezoids.",
     "The student is correct, but only in non-Euclidean geometry."
   ],
   answerIndex:2,
   explanation:"There are two valid conventions. The exclusive definition of trapezoid (exactly one pair of parallel sides) excludes parallelograms. The inclusive definition (at least one pair of parallel sides) makes parallelograms a special case of trapezoids. Both are mathematically consistent; most current U.S. curriculum materials use the inclusive definition, though this is worth clarifying in instruction."},

  // 3.1.10 — Special triangle vocabulary; altitude, median, angle bisector; area formulas
  {id:"m_31010_A", subject:"math", standard:"3.1.10", domain:"3", topic:"3.1", set:"A",
   prompt:"In triangle $\\\\triangle ABC$, segment $\\\\overline{BD}$ is drawn from vertex $B$ to side $\\\\overline{AC}$ such that $\\\\overline{BD} \\\\perp \\\\overline{AC}$. What is the correct term for $\\\\overline{BD}$?",
   options:[
     "Median",
     "Angle bisector",
     "Altitude",
     "Perpendicular bisector"
   ],
   answerIndex:2,
   explanation:"An altitude of a triangle is a segment from a vertex perpendicular to the opposite side (or its extension). Since $\\\\overline{BD} \\\\perp \\\\overline{AC}$, it is the altitude from $B$. A median connects a vertex to the midpoint of the opposite side. An angle bisector divides a vertex angle into two equal parts. A perpendicular bisector passes through the midpoint and is perpendicular, but need not pass through a vertex."},

  {id:"m_31010_B", subject:"math", standard:"3.1.10", domain:"3", topic:"3.1", set:"B",
   prompt:"An equilateral triangle has side length $6$. What is its area?",
   options:[
     "$9$",
     "$9\\\\sqrt{2}$",
     "$9\\\\sqrt{3}$",
     "$18\\\\sqrt{3}$"
   ],
   answerIndex:2,
   explanation:"The area of an equilateral triangle with side $s$ is $\\\\frac{\\\\sqrt{3}}{4}s^2$. With $s = 6$: area $= \\\\frac{\\\\sqrt{3}}{4}(36) = 9\\\\sqrt{3}$."},

  {id:"m_31010_C", subject:"math", standard:"3.1.10", domain:"3", topic:"3.1", set:"C",
   prompt:"Students are exploring why the area formula for a triangle is $\\\\frac{1}{2}bh$. A teacher draws a triangle inside a rectangle with the same base and height. Which explanation best connects the formula to this visual?",
   options:[
     "The triangle covers exactly $\\\\frac{1}{4}$ of the rectangle, so dividing $bh$ by $4$ gives the area.",
     "Any triangle can be partitioned into two right triangles, each of which is exactly half of a smaller rectangle, so together they total $\\\\frac{1}{2}bh$.",
     "The formula only applies to right triangles; for other triangles, it must be derived differently.",
     "The $\\\\frac{1}{2}$ factor comes from averaging the base and the height."
   ],
   answerIndex:1,
   explanation:"The standard derivation: drop an altitude to split any triangle into two right triangles. Each right triangle is exactly half of the rectangle formed by its base and height segments. Together they make up half the total rectangle with base $b$ and height $h$, giving area $= \\\\frac{1}{2}bh$. This works for all triangles (acute, right, and obtuse), not just right triangles."},

  // 3.1.11 — Circle theorems: arcs, chords, radii, secants, tangents
  {id:"m_31011_A", subject:"math", standard:"3.1.11", domain:"3", topic:"3.1", set:"A",
   prompt:"An inscribed angle in a circle intercepts an arc of $110°$. What is the measure of the inscribed angle?",
   options:[
     "$55°$",
     "$110°$",
     "$220°$",
     "$70°$"
   ],
   answerIndex:0,
   explanation:"The Inscribed Angle Theorem states that an inscribed angle is half the central angle that intercepts the same arc (equivalently, half the arc measure). So the inscribed angle $= \\\\frac{110°}{2} = 55°$."},

  {id:"m_31011_B", subject:"math", standard:"3.1.11", domain:"3", topic:"3.1", set:"B",
   prompt:"A tangent and a secant are drawn from an external point $P$ to a circle. The tangent touches the circle at $T$. The secant passes through the circle at points $A$ (nearer) and $B$ (farther). Which relationship holds?",
   options:[
     "$PT = PA + PB$",
     "$PT^2 = PA^2 + PB^2$",
     "$PT = \\\\frac{PA + PB}{2}$",
     "$PT^2 = PA \\\\cdot PB$"
   ],
   answerIndex:3,
   explanation:"The Power of a Point theorem for a tangent-secant from external point $P$: $PT^2 = PA \\\\cdot PB$, where $PT$ is the tangent length, and $PA$, $PB$ are the distances from $P$ to the near and far intersection points of the secant with the circle. This is the tangent-secant form of the power of a point."},

  {id:"m_31011_C", subject:"math", standard:"3.1.11", domain:"3", topic:"3.1", set:"C",
   prompt:"A chord $\\\\overline{AB}$ is drawn in a circle. A radius to the midpoint of $\\\\overline{AB}$ is drawn. What is true about this radius?",
   options:[
     "It bisects the arc $AB$ but is not necessarily perpendicular to the chord.",
     "It is perpendicular to chord $\\\\overline{AB}$.",
     "It equals the chord in length.",
     "It bisects the angle at the center only if the chord is a diameter."
   ],
   answerIndex:1,
   explanation:"Theorem: A radius drawn to the midpoint of a chord is perpendicular to that chord (and conversely, a radius perpendicular to a chord bisects it). This follows from the symmetry of the circle — the perpendicular from the center to any chord bisects the chord, so the radius to the midpoint IS the perpendicular from the center to the chord."},

  // 3.1.12 — Prove the Pythagorean theorem and its converse
  {id:"m_31012_A", subject:"math", standard:"3.1.12", domain:"3", topic:"3.1", set:"A",
   prompt:"In triangle $\\\\triangle ABC$ with sides $a = 5$, $b = 12$, and $c = 13$, which statement is correct based on the converse of the Pythagorean theorem?",
   options:[
     "The triangle is acute because $5^2 + 12^2 > 13^2$.",
     "The theorem cannot be applied because the side lengths are integers.",
     "The triangle is obtuse because $13^2 > 5^2 + 12^2$.",
     "The triangle is right because $5^2 + 12^2 = 13^2$."
   ],
   answerIndex:3,
   explanation:"$5^2 + 12^2 = 25 + 144 = 169 = 13^2$. The converse of the Pythagorean theorem states: if $a^2 + b^2 = c^2$, then the triangle is a right triangle with the right angle opposite the longest side $c$. So $\\\\triangle ABC$ is a right triangle."},

  {id:"m_31012_B", subject:"math", standard:"3.1.12", domain:"3", topic:"3.1", set:"B",
   prompt:"Which of the following describes the key idea in the 'square-within-a-square' (Bhaskara-style) proof of the Pythagorean theorem?",
   options:[
     "Four congruent right triangles are arranged inside a square of side $c$, leaving a smaller square of side $a - b$ in the center; equating areas gives $a^2 + b^2 = c^2$.",
     "A right triangle is reflected across its hypotenuse to form a larger similar triangle.",
     "The legs of the right triangle are used as diameters of two semicircles whose areas sum to the semicircle on the hypotenuse.",
     "Coordinate geometry is used to show the distance between two points satisfies the theorem."
   ],
   answerIndex:0,
   explanation:"In the classic 'square-within-a-square' proof: arrange four congruent right triangles (legs $a$ and $b$, hypotenuse $c$) inside a square of side $c$. The four triangles have total area $4 \\\\cdot \\\\frac{1}{2}ab = 2ab$. The inner quadrilateral has side $a - b$ (or $b - a$) and is a square with area $(a-b)^2$. The large square: $c^2 = 2ab + (a-b)^2 = 2ab + a^2 - 2ab + b^2 = a^2 + b^2$."},

  {id:"m_31012_C", subject:"math", standard:"3.1.12", domain:"3", topic:"3.1", set:"C",
   prompt:"A student wants to determine whether a triangle with sides $7$, $9$, and $11$ is acute, right, or obtuse. She computes $7^2 + 9^2 = 49 + 81 = 130$ and $11^2 = 121$. What conclusion follows and what theorem supports it?",
   options:[
     "The triangle is acute because $a^2 + b^2 > c^2$ implies all angles are less than $90°$.",
     "The triangle is right because $130$ is close to $121$.",
     "The triangle is obtuse because $c^2 > a^2 + b^2$ when the largest side is $11$.",
     "No conclusion can be drawn without knowing the angles directly."
   ],
   answerIndex:0,
   explanation:"The generalized Pythagorean theorem: if $a^2 + b^2 > c^2$ (where $c$ is the longest side), the triangle is acute. If $a^2 + b^2 = c^2$, it's right. If $a^2 + b^2 < c^2$, it's obtuse. Here $130 > 121$, so the triangle is acute. (Note: $11$ is the longest side, so $c = 11$ in the comparison.)"},

  // 3.1.13 — Equation of a circle; center and radius
  {id:"m_31013_A", subject:"math", standard:"3.1.13", domain:"3", topic:"3.1", set:"A",
   prompt:"What is the equation of the circle with center $(-3, 4)$ and radius $7$?",
   options:[
     "$(x+3)^2 + (y-4)^2 = 7$",
     "$(x-3)^2 + (y+4)^2 = 49$",
     "$(x+3)^2 + (y-4)^2 = 49$",
     "$(x-3)^2 + (y-4)^2 = 49$"
   ],
   answerIndex:2,
   explanation:"The standard form of a circle with center $(h, k)$ and radius $r$ is $(x-h)^2 + (y-k)^2 = r^2$. With center $(-3, 4)$ and $r = 7$: $(x-(-3))^2 + (y-4)^2 = 49$, which simplifies to $(x+3)^2 + (y-4)^2 = 49$."},

  {id:"m_31013_B", subject:"math", standard:"3.1.13", domain:"3", topic:"3.1", set:"B",
   prompt:"Find the center and radius of the circle given by $x^2 + y^2 - 6x + 8y - 11 = 0$.",
   options:[
     "Center $(3, -4)$, radius $\\\\sqrt{36}= 6$",
     "Center $(3, -4)$, radius $\\\\sqrt{24}$",
     "Center $(-3, 4)$, radius $6$",
     "Center $(3, -4)$, radius $\\\\sqrt{24} = 2\\\\sqrt{6}$"
   ],
   answerIndex:0,
   explanation:"Complete the square: $x^2 - 6x + y^2 + 8y = 11$. For $x$: add $(3)^2 = 9$; for $y$: add $(4)^2 = 16$. $(x-3)^2 + (y+4)^2 = 11 + 9 + 16 = 36$. So center is $(3, -4)$ and radius is $\\\\sqrt{36} = 6$."},

  {id:"m_31013_C", subject:"math", standard:"3.1.13", domain:"3", topic:"3.1", set:"C",
   prompt:"A student is given the equation $x^2 + y^2 + 4x - 10y + 20 = 0$ and must find the center and radius. She groups as $(x^2 + 4x) + (y^2 - 10y) = -20$ and completes the square. Which result is correct?",
   options:[
     "Center $(-2, 5)$, radius $3$",
     "Center $(2, -5)$, radius $3$",
     "Center $(-2, 5)$, radius $9$",
     "Center $(-2, 5)$, radius $\\\\sqrt{-20}$ — no real circle exists."
   ],
   answerIndex:0,
   explanation:"Complete the square: $(x^2+4x+4) + (y^2-10y+25) = -20+4+25 = 9$. So $(x+2)^2 + (y-5)^2 = 9$. Center is $(-2, 5)$ and radius $= \\\\sqrt{9} = 3$. The right side $9 > 0$, confirming a real circle exists."},

  // 3.1.14 — Prove Euclidean theorems using coordinate geometry and algebra
  {id:"m_31014_A", subject:"math", standard:"3.1.14", domain:"3", topic:"3.1", set:"A",
   prompt:"Using coordinates, a student wants to prove that the diagonals of a rectangle bisect each other. She places the rectangle with vertices at $A(0,0)$, $B(a,0)$, $C(a,b)$, $D(0,b)$. What is the correct next step?",
   options:[
     "Compute the slopes of both diagonals and show they are equal.",
     "Show that each diagonal is perpendicular to the sides of the rectangle.",
     "Show that the diagonals have the same length using the distance formula.",
     "Compute the midpoints of diagonals $\\\\overline{AC}$ and $\\\\overline{BD}$ and show they are the same point."
   ],
   answerIndex:3,
   explanation:"To prove the diagonals bisect each other, you must show they share the same midpoint. Midpoint of $\\\\overline{AC}$: $\\\\left(\\\\frac{0+a}{2}, \\\\frac{0+b}{2}\\\\right) = \\\\left(\\\\frac{a}{2}, \\\\frac{b}{2}\\\\right)$. Midpoint of $\\\\overline{BD}$: $\\\\left(\\\\frac{a+0}{2}, \\\\frac{0+b}{2}\\\\right) = \\\\left(\\\\frac{a}{2}, \\\\frac{b}{2}\\\\right)$. They match, proving bisection. Showing equal slopes proves parallelism, not bisection."},

  {id:"m_31014_B", subject:"math", standard:"3.1.14", domain:"3", topic:"3.1", set:"B",
   prompt:"To prove that the segment connecting the midpoints of two sides of a triangle is parallel to the third side and half its length, a coordinate proof places the triangle at $A(0,0)$, $B(2b,0)$, $C(2c,2d)$. The midpoints are $M = (c, d)$ and $N = (b+c, d)$. What does the fact that $M$ and $N$ have the same $y$-coordinate prove?",
   options:[
     "Segment $\\\\overline{MN}$ has the same length as the base.",
     "Segment $\\\\overline{MN}$ is parallel to the base $\\\\overline{AB}$ because both are horizontal (slope $= 0$).",
     "Segment $\\\\overline{MN}$ bisects the altitude of the triangle.",
     "The triangle is isosceles."
   ],
   answerIndex:1,
   explanation:"Both $M$ and $N$ have $y$-coordinate $d$, so $\\\\overline{MN}$ is a horizontal segment. The base $\\\\overline{AB}$ lies on the $x$-axis (both endpoints have $y = 0$), also horizontal. Two horizontal lines are parallel. Furthermore, $|MN| = |(b+c) - c| = b$, and $|AB| = 2b$, so $|MN| = \\\\frac{1}{2}|AB|$, completing the Midsegment Theorem proof."},

  {id:"m_31014_C", subject:"math", standard:"3.1.14", domain:"3", topic:"3.1", set:"C",
   prompt:"A teacher asks students to prove that the three medians of a triangle are concurrent using coordinates. Student A uses a general triangle with vertices $(0,0)$, $(6,0)$, $(3,6)$ and computes all three median equations. Which approach demonstrates the strongest mathematical reasoning?",
   options:[
     "Verify numerically for this specific triangle only; this is sufficient proof.",
     "Use an equilateral triangle since the result is obvious there.",
     "Use the general triangle $(0,0)$, $(2a,0)$, $(2b,2c)$ so the result holds for all triangles with arbitrary $a, b, c$.",
     "Use the specific triangle and then argue by symmetry that all triangles work the same way."
   ],
   answerIndex:2,
   explanation:"A proof must hold in general, not just for one specific case. Using a general triangle with parameters $a, b, c$ allows the algebra to establish the result for all triangles simultaneously. A specific numerical example is only a verification, not a proof. Arguing 'by symmetry' without rigorous justification is not mathematically acceptable for a proof."},

  // ── Domain 3 · Topic 3.2 — Measurement ────────────────────────────────────

  // 3.2.01 — Unit conversion: US customary ↔ metric; composite measures
  {id:"m_32001_A", subject:"math", standard:"3.2.01", domain:"3", topic:"3.2", set:"A",
   prompt:"A runner's pace is $8$ minutes per mile. What is this pace approximately in minutes per kilometer? (Use $1$ mile $\\\\approx 1.609$ km.)",
   options:[
     "Approximately $4.97$ min/km",
     "Approximately $12.87$ min/km",
     "Approximately $6.44$ min/km",
     "Approximately $9.61$ min/km"
   ],
   answerIndex:0,
   explanation:"$8$ min/mile $\\\\times \\\\frac{1 \\\\text{ mile}}{1.609 \\\\text{ km}} \\\\approx \\\\frac{8}{1.609} \\\\approx 4.97$ min/km. The runner covers each kilometer in about $4$ minutes $58$ seconds."},

  {id:"m_32001_B", subject:"math", standard:"3.2.01", domain:"3", topic:"3.2", set:"B",
   prompt:"A recipe calls for $3.5$ cups of flour. The cook only has a metric scale. Approximately how many grams of flour is this? (Use: $1$ cup of flour $\\\\approx 120$ g.)",
   options:[
     "$350$ g",
     "$525$ g",
     "$490$ g",
     "$420$ g"
   ],
   answerIndex:3,
   explanation:"$3.5 \\\\text{ cups} \\\\times 120 \\\\text{ g/cup} = 420$ g. This is a composite unit conversion: volume (cups) converted using a density relationship to mass (grams)."},

  {id:"m_32001_C", subject:"math", standard:"3.2.01", domain:"3", topic:"3.2", set:"C",
   prompt:"A car travels $60$ miles per hour. Converting to kilometers per hour using $1$ mile $= 1.609$ km gives approximately $96.54$ km/h. A student then wants to convert this to meters per second. What is the correct result?",
   options:[
     "Approximately $26.8$ m/s",
     "Approximately $96.54$ m/s",
     "Approximately $16.7$ m/s",
     "Approximately $0.268$ m/s"
   ],
   answerIndex:0,
   explanation:"$96.54 \\\\text{ km/h} \\\\times \\\\frac{1000 \\\\text{ m}}{1 \\\\text{ km}} \\\\times \\\\frac{1 \\\\text{ h}}{3600 \\\\text{ s}} = \\\\frac{96540}{3600} \\\\approx 26.82$ m/s. This is a two-step composite unit conversion."},

  // 3.2.02 — Composite measures (density, rate, person-hours, etc.)
  {id:"m_32002_A", subject:"math", standard:"3.2.02", domain:"3", topic:"3.2", set:"A",
   prompt:"A substance has a density of $8.5$ g/cm³. What is the mass of a block of this substance with volume $40$ cm³?",
   options:[
     "$4.7$ g",
     "$31.5$ g",
     "$340$ g",
     "$48.5$ g"
   ],
   answerIndex:2,
   explanation:"Density $= \\\\frac{\\\\text{mass}}{\\\\text{volume}}$, so mass $=$ density $\\\\times$ volume $= 8.5 \\\\times 40 = 340$ g."},

  {id:"m_32002_B", subject:"math", standard:"3.2.02", domain:"3", topic:"3.2", set:"B",
   prompt:"A project requires $180$ person-hours of work. If $6$ workers are assigned, how long will the project take?",
   options:[
     "$1080$ hours",
     "$30$ hours",
     "$180$ hours",
     "$24$ hours"
   ],
   answerIndex:1,
   explanation:"Person-hours is a composite measure: total work $=$ (number of workers) $\\\\times$ (hours worked). $180 = 6 \\\\times t$, so $t = 30$ hours. This assumes all workers work simultaneously and at the same rate."},

  {id:"m_32002_C", subject:"math", standard:"3.2.02", domain:"3", topic:"3.2", set:"C",
   prompt:"A fuel efficiency of $35$ miles per gallon means the car uses $1$ gallon for every $35$ miles. If gas costs $\\$4.20$ per gallon, what is the fuel cost per mile, to the nearest cent?",
   options:[
     "$\\$0.08$ per mile",
     "$\\$0.12$ per mile",
     "$\\$0.15$ per mile",
     "$\\$0.18$ per mile"
   ],
   answerIndex:1,
   explanation:"Cost per mile $= \\\\frac{\\$4.20}{35 \\\\text{ miles}} = \\$0.12$ per mile. This chains two rate measures (miles per gallon and dollars per gallon) to produce a new composite rate (dollars per mile)."},

  // 3.2.03 — Areas of triangles and other polygons
  {id:"m_32003_A", subject:"math", standard:"3.2.03", domain:"3", topic:"3.2", set:"A",
   prompt:"A trapezoid has parallel bases of $6$ cm and $10$ cm, and a height of $4$ cm. What is its area?",
   options:[
     "$32$ cm²",
     "$40$ cm²",
     "$48$ cm²",
     "$24$ cm²"
   ],
   answerIndex:0,
   explanation:"Area of a trapezoid $= \\\\frac{1}{2}(b_1 + b_2) \\\\cdot h = \\\\frac{1}{2}(6 + 10)(4) = \\\\frac{1}{2}(16)(4) = 32$ cm²."},

  {id:"m_32003_B", subject:"math", standard:"3.2.03", domain:"3", topic:"3.2", set:"B",
   prompt:"A triangle has a base of $8$ cm and a height of $5$ cm. What is its area?",
   options:[
     "$40$ cm²",
     "$13$ cm²",
     "$20$ cm²",
     "$10$ cm²"
   ],
   answerIndex:2,
   explanation:"Area of a triangle $= \\\\frac{1}{2} \\\\times \\\\text{base} \\\\times \\\\text{height} = \\\\frac{1}{2} \\\\times 8 \\\\times 5 = 20$ cm²."},

  {id:"m_32003_C", subject:"math", standard:"3.2.03", domain:"3", topic:"3.2", set:"C",
   prompt:"A student decomposes a regular hexagon with side length $4$ into 6 equilateral triangles to find its area. Each equilateral triangle has side $4$. Which computation correctly gives the total area?",
   options:[
     "$6 \\\\times 4 = 24$ square units",
     "$6 \\\\times \\\\frac{\\\\sqrt{3}}{4}(16) = 24\\\\sqrt{3}$ square units",
     "$6 \\\\times \\\\frac{1}{2}(4)(4) = 48$ square units",
     "$6 \\\\times \\\\frac{\\\\sqrt{3}}{4}(4) = 6\\\\sqrt{3}$ square units"
   ],
   answerIndex:1,
   explanation:"Each equilateral triangle with side $s = 4$ has area $\\\\frac{\\\\sqrt{3}}{4}s^2 = \\\\frac{\\\\sqrt{3}}{4}(16) = 4\\\\sqrt{3}$. Six such triangles give total area $6 \\\\times 4\\\\sqrt{3} = 24\\\\sqrt{3}$ square units. Option C incorrectly treats each equilateral triangle as a right isosceles triangle with both legs equal to $4$."},

  // 3.2.04 — Perimeter, circumference, area formulas for 2D figures
  {id:"m_32004_A", subject:"math", standard:"3.2.04", domain:"3", topic:"3.2", set:"A",
   prompt:"A circle has a diameter of $10$ cm. What are its circumference and area, respectively?",
   options:[
     "Circumference $= 10\\\\pi$ cm; Area $= 25\\\\pi$ cm²",
     "Circumference $= 20\\\\pi$ cm; Area $= 100\\\\pi$ cm²",
     "Circumference $= 5\\\\pi$ cm; Area $= 25\\\\pi$ cm²",
     "Circumference $= 10\\\\pi$ cm; Area $= 100\\\\pi$ cm²"
   ],
   answerIndex:0,
   explanation:"Radius $r = 5$ cm. Circumference $= 2\\\\pi r = 10\\\\pi$ cm. Area $= \\\\pi r^2 = 25\\\\pi$ cm²."},

  {id:"m_32004_B", subject:"math", standard:"3.2.04", domain:"3", topic:"3.2", set:"B",
   prompt:"A rectangle has length $l$ and width $w$. Which formula gives its perimeter?",
   options:[
     "$P = l \\\\times w$",
     "$P = \\\\frac{l + w}{2}$",
     "$P = l + w$",
     "$P = 2l + 2w$"
   ],
   answerIndex:3,
   explanation:"The perimeter of a rectangle is the total distance around all four sides: $P = l + w + l + w = 2l + 2w = 2(l + w)$. The formula $P = l \\\\times w$ gives the area, not the perimeter."},

  {id:"m_32004_C", subject:"math", standard:"3.2.04", domain:"3", topic:"3.2", set:"C",
   prompt:"A student confuses the circumference and area formulas for a circle, writing Area $= 2\\\\pi r$ and Circumference $= \\\\pi r^2$. In a class discussion, which explanation most clearly addresses both errors?",
   options:[
     "Both formulas are wrong; the correct formulas are Circumference $= \\\\pi d$ and Area $= 4\\\\pi r^2$.",
     "Circumference is a one-dimensional measure (length), so it scales with $r$: $C = 2\\\\pi r$. Area is two-dimensional, so it scales with $r^2$: $A = \\\\pi r^2$. The student swapped these.",
     "The student's formulas are equivalent to the correct ones via substitution, so there is no error.",
     "Circumference uses diameter $d$, so the correct formula is $C = \\\\pi d = \\\\pi r^2$ when $d = r^2$."
   ],
   answerIndex:1,
   explanation:"The dimensional reasoning is the key: circumference is a length (1D), so it is proportional to the first power of $r$: $C = 2\\\\pi r$. Area is a 2D measure, proportional to $r^2$: $A = \\\\pi r^2$. The student transposed the exponents. This dimensional argument also helps students remember which formula is which."},

  // 3.2.05 — Relationships between linear, square, and cubic measures; scaling effects
  {id:"m_32005_A", subject:"math", standard:"3.2.05", domain:"3", topic:"3.2", set:"A",
   prompt:"A square has side length $5$ cm. If its side length is doubled to $10$ cm, by what factor does its area increase?",
   options:[
     "By a factor of $2$",
     "By a factor of $3$",
     "By a factor of $4$",
     "By a factor of $8$"
   ],
   answerIndex:2,
   explanation:"Original area $= 5^2 = 25$ cm². New area $= 10^2 = 100$ cm². Factor $= \\\\frac{100}{25} = 4$. In general, scaling linear dimensions by factor $k$ scales area by $k^2$. Here $k = 2$, so area scales by $2^2 = 4$."},

  {id:"m_32005_B", subject:"math", standard:"3.2.05", domain:"3", topic:"3.2", set:"B",
   prompt:"A cube has side length $3$ cm. If a similar cube has side length $6$ cm, what is the ratio of their volumes?",
   options:[
     "$2:1$",
     "$4:1$",
     "$6:1$",
     "$8:1$"
   ],
   answerIndex:3,
   explanation:"Volume of smaller cube $= 3^3 = 27$ cm³. Volume of larger cube $= 6^3 = 216$ cm³. Ratio $= \\\\frac{216}{27} = 8$. When linear dimensions are scaled by factor $k$, volume scales by $k^3$. Here $k = 2$, so volume scales by $2^3 = 8$."},

  {id:"m_32005_C", subject:"math", standard:"3.2.05", domain:"3", topic:"3.2", set:"C",
   prompt:"A geometry student argues: 'If a shape's dimensions are all multiplied by $3$, then its area triples and its volume triples too.' How should the teacher respond?",
   options:[
     "The student is correct about area but incorrect about volume: area triples, volume increases by a factor of $9$.",
     "The student is correct about volume but incorrect about area: area increases by a factor of $9$, not $3$.",
     "The student is correct about both area and volume.",
     "The student is incorrect about both: area increases by a factor of $9$ and volume increases by a factor of $27$."
   ],
   answerIndex:3,
   explanation:"When all linear dimensions are scaled by factor $k$: area scales by $k^2$ and volume scales by $k^3$. With $k = 3$: area $\\\\times 9$ and volume $\\\\times 27$. The student incorrectly applied the linear scale factor to both area and volume."},

  // 3.2.06 — Volumes and surface areas of prisms, pyramids, cylinders, cones
  {id:"m_32006_A", subject:"math", standard:"3.2.06", domain:"3", topic:"3.2", set:"A",
   prompt:"A cylinder has radius $3$ cm and height $7$ cm. What is its volume?",
   options:[
     "$21\\\\pi$ cm³",
     "$42\\\\pi$ cm³",
     "$63\\\\pi$ cm³",
     "$84\\\\pi$ cm³"
   ],
   answerIndex:2,
   explanation:"Volume of a cylinder $= \\\\pi r^2 h = \\\\pi (3)^2 (7) = 63\\\\pi$ cm³."},

  {id:"m_32006_B", subject:"math", standard:"3.2.06", domain:"3", topic:"3.2", set:"B",
   prompt:"A cone has the same radius and height as a cylinder. What is the ratio of the cone's volume to the cylinder's volume?",
   options:[
     "$1:2$",
     "$1:4$",
     "$2:3$",
     "$1:3$"
   ],
   answerIndex:3,
   explanation:"Volume of cylinder $= \\\\pi r^2 h$. Volume of cone $= \\\\frac{1}{3}\\\\pi r^2 h$. Ratio $= \\\\frac{\\\\frac{1}{3}\\\\pi r^2 h}{\\\\pi r^2 h} = \\\\frac{1}{3}$. A cone is exactly $\\\\frac{1}{3}$ the volume of the cylinder with the same base and height."},

  {id:"m_32006_C", subject:"math", standard:"3.2.06", domain:"3", topic:"3.2", set:"C",
   prompt:"A student computing the surface area of a cylinder with radius $3$ and height $7$ writes: SA $= 2\\\\pi r^2 + 2\\\\pi r h = 2\\\\pi(9) + 2\\\\pi(3)(7) = 18\\\\pi + 42\\\\pi = 60\\\\pi$. Is this correct, and what does each term represent?",
   options:[
     "Incorrect; the lateral surface area should be $\\\\pi r h$, not $2\\\\pi r h$.",
     "Correct; $2\\\\pi r^2$ is the total area of the two circular bases and $2\\\\pi r h$ is the lateral (curved) surface area.",
     "Incorrect; the formula should be SA $= 2\\\\pi r^2 + \\\\pi r^2 h$.",
     "Correct, but only if the cylinder is hollow; the formula is different for a solid cylinder."
   ],
   answerIndex:1,
   explanation:"The surface area of a closed cylinder: the two circular bases each have area $\\\\pi r^2$, totaling $2\\\\pi r^2$. The lateral surface 'unrolls' into a rectangle of width $2\\\\pi r$ (circumference) and height $h$, giving area $2\\\\pi r h$. Total: $2\\\\pi r^2 + 2\\\\pi r h = 18\\\\pi + 42\\\\pi = 60\\\\pi$. The student's work is correct."},

  // 3.2.07 — Arc length and area of sectors
  {id:"m_32007_A", subject:"math", standard:"3.2.07", domain:"3", topic:"3.2", set:"A",
   prompt:"A circle has radius $6$ cm. A sector has a central angle of $60°$. What is the arc length of this sector?",
   options:[
     "$\\\\pi$ cm",
     "$3\\\\pi$ cm",
     "$2\\\\pi$ cm",
     "$6\\\\pi$ cm"
   ],
   answerIndex:2,
   explanation:"Arc length $= \\\\frac{\\\\theta}{360°} \\\\times 2\\\\pi r = \\\\frac{60}{360} \\\\times 2\\\\pi(6) = \\\\frac{1}{6} \\\\times 12\\\\pi = 2\\\\pi$ cm."},

  {id:"m_32007_B", subject:"math", standard:"3.2.07", domain:"3", topic:"3.2", set:"B",
   prompt:"Using the same circle (radius $6$ cm) and $60°$ central angle as above, what is the area of the sector?",
   options:[
     "$3\\\\pi$ cm²",
     "$6\\\\pi$ cm²",
     "$9\\\\pi$ cm²",
     "$12\\\\pi$ cm²"
   ],
   answerIndex:1,
   explanation:"Area of a sector $= \\\\frac{\\\\theta}{360°} \\\\times \\\\pi r^2 = \\\\frac{60}{360} \\\\times \\\\pi(36) = \\\\frac{1}{6} \\\\times 36\\\\pi = 6\\\\pi$ cm²."},

  {id:"m_32007_C", subject:"math", standard:"3.2.07", domain:"3", topic:"3.2", set:"C",
   prompt:"A student writes the arc length formula as $s = r\\\\theta$ where $\\\\theta$ is in radians. For a circle of radius $5$ and central angle $\\\\frac{\\\\pi}{3}$ radians, she computes $s = 5 \\\\cdot \\\\frac{\\\\pi}{3} = \\\\frac{5\\\\pi}{3}$. Is this correct, and how does this relate to the degree-based formula?",
   options:[
     "Incorrect; the formula $s = r\\\\theta$ only applies when $\\\\theta$ is in degrees.",
     "Correct; $s = r\\\\theta$ is valid when $\\\\theta$ is in radians, and gives the same result as $\\\\frac{\\\\theta°}{360°} \\\\times 2\\\\pi r$ when the angle is converted.",
     "Incorrect; the correct formula is $s = \\\\frac{r}{\\\\theta}$.",
     "Correct, but only for angles less than $\\\\pi$ radians."
   ],
   answerIndex:1,
   explanation:"$s = r\\\\theta$ is the radian-based arc length formula, valid for any $\\\\theta$ in radians. $\\\\frac{\\\\pi}{3}$ rad $= 60°$. Checking with the degree formula: $\\\\frac{60}{360} \\\\times 2\\\\pi(5) = \\\\frac{1}{6} \\\\times 10\\\\pi = \\\\frac{5\\\\pi}{3}$. Both formulas agree. The radian formula is simpler and is the standard in calculus and higher math."},

  // 3.2.08 — Scale drawings, maps, and diagrams
  {id:"m_32008_A", subject:"math", standard:"3.2.08", domain:"3", topic:"3.2", set:"A",
   prompt:"A map uses a scale of $1$ inch $= 50$ feet. Two buildings are $3.5$ inches apart on the map. What is the actual distance between them?",
   options:[
     "$53.5$ feet",
     "$143$ feet",
     "$175$ feet",
     "$200$ feet"
   ],
   answerIndex:2,
   explanation:"Actual distance $= 3.5 \\\\text{ in} \\\\times \\\\frac{50 \\\\text{ ft}}{1 \\\\text{ in}} = 175$ feet."},

  {id:"m_32008_B", subject:"math", standard:"3.2.08", domain:"3", topic:"3.2", set:"B",
   prompt:"An architectural drawing has a scale of $\\\\frac{1}{4}$ inch $= 1$ foot. A room on the drawing measures $3$ inches by $4.5$ inches. What are the actual dimensions of the room?",
   options:[
     "$12$ ft by $18$ ft",
     "$6$ ft by $9$ ft",
     "$3$ ft by $4.5$ ft",
     "$0.75$ ft by $1.125$ ft"
   ],
   answerIndex:0,
   explanation:"Scale: $\\\\frac{1}{4}$ in $= 1$ ft, so $1$ in $= 4$ ft. Actual dimensions: $3 \\\\times 4 = 12$ ft and $4.5 \\\\times 4 = 18$ ft."},

  {id:"m_32008_C", subject:"math", standard:"3.2.08", domain:"3", topic:"3.2", set:"C",
   prompt:"A student is given a scale drawing where $2$ cm represents $5$ meters. The area of a room on the drawing is $8$ cm². A student computes the actual area as $8 \\\\times 2.5 = 20$ m². Is this correct?",
   options:[
     "Yes; multiply drawing area by the scale factor.",
     "No; the actual area is $8 \\\\times (2.5)^2 = 50$ m².",
     "No; the actual area is $8 \\\\times 5 = 40$ m².",
     "Yes; area scales linearly just like length."
   ],
   answerIndex:1,
   explanation:"The linear scale factor is $\\\\frac{5 \\\\text{ m}}{2 \\\\text{ cm}} = 2.5$ m/cm. Area scales by the square of the linear scale factor: actual area $= 8 \\\\times (2.5)^2 = 8 \\\\times 6.25 = 50$ m². The student's error was applying the linear scale factor to area, rather than squaring it first."},
