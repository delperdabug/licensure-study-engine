   explanation:"Engagement and enjoyment are not equivalent to learning gains. Evidence-based practice means selecting strategies with a demonstrated research record of advancing learning outcomes. A teacher who relies solely on 'feels right' and engagement signals may be using strategies that feel productive but don't produce the learning the standard aims for."},

  {id:"p_2231_C", subject:"ptk", standard:"2.2.31", domain:"2", topic:"2.2", set:"C",
   prompt:"A math teacher is designing a review unit and chooses interleaved practice (mixing problem types across sessions) over blocked practice (all problems of one type together) because the research literature consistently shows interleaving produces better long-term retention of math procedures. What does this choice illustrate?",
   options:["The teacher is sacrificing student comfort for no instructional gain.", "The teacher is following a personal preference, not a research base.", "The teacher is applying evidence-based instructional strategy selection — choosing a research-supported approach because the evidence shows it advances learning, even when it may feel harder in the short term.", "Interleaving is only evidence-based for reading, not mathematics."],
   answerIndex:2,
   explanation:"Choosing interleaved over blocked practice specifically because the research base supports it as more effective for long-term retention is a clear example of evidence-based strategy selection. The fact that interleaving feels more difficult (desirable difficulty) doesn't disqualify it — the evidence is what guides the choice, which is exactly what this standard requires."},



  // =====================================================================
  // PTK · Domain 2 · Topic 2.3 — Uses Effective Questioning Techniques
  // standards 2.3.01–2.3.07  |  A/B subject-neutral; C secondary-math
  // =====================================================================

  // ---- 2.3.01  Suits questions to students' knowledge and skill ----
  // A: recognize calibration | B: evaluate miscalibration | C(math): math Q calibration
  {id:"p_2301_A", subject:"ptk", standard:"2.3.01", domain:"2", topic:"2.3", set:"A",
   prompt:"A teacher poses questions and notices that students consistently answer without any hesitation or struggle. She begins making her questions more demanding. What principle is she applying?",
   options:[
     "She is punishing students for answering too quickly.",
     "She is calibrating question difficulty to students' current knowledge and skill so questions remain productive challenges.",
     "She is randomly increasing difficulty to keep students anxious.",
     "She is following a script that requires harder questions at the end of a lesson."],
   answerIndex:1,
   explanation:"Effective questioning requires matching question difficulty to where students actually are. When questions are too easy, they don't advance thinking; calibrating upward when students show mastery keeps questioning productive. The motive is instructional, not punitive or scripted."},

  {id:"p_2301_B", subject:"ptk", standard:"2.3.01", domain:"2", topic:"2.3", set:"B",
   prompt:"A teacher uses the same set of questions for every class, regardless of how instruction has progressed or what students have demonstrated they know. What is the main instructional problem with this practice?",
   options:["Questions that don't vary with student knowledge and skill will often be pitched too high or too low, making them less useful for advancing learning.", "Using the same questions saves preparation time, which is the right trade-off.", "Students prefer novelty, so the problem is engagement rather than learning.", "The problem is only that students might share answers with each other."],
   answerIndex:0,
   explanation:"Suiting questions to students' knowledge and skill requires responsiveness to where students are, not a fixed script. A static question set can't account for what students have and haven't yet learned, so it will routinely miss the productive challenge zone for any given class."},

  {id:"p_2301_C", subject:"ptk", standard:"2.3.01", domain:"2", topic:"2.3", set:"C",
   prompt:"Early in a lesson on polynomial division, a math teacher asks: \"What is $12 \\div 4$?\" Students answer instantly. She follows with: \"What does it mean for $(x-2)$ to be a factor of a polynomial?\" Several students hesitate and think. Which question better suits the class's current knowledge and skill for this lesson, and why?",
   options:["The first — simpler questions build confidence and should come last.", "Both equally — any question that gets a response is well-calibrated.", "The second — it sits at the edge of students' current understanding of the topic being taught, making it a productive challenge aligned to where they are in the lesson.", "Neither — teachers should only ask questions students can answer correctly."],
   answerIndex:2,
   explanation:"The second question is calibrated to the lesson's actual learning target and the students' current knowledge frontier. The first is trivially below their level. Effective questioning means pitching questions where they challenge and extend thinking, not where they confirm already-automatic knowledge."},

  // ---- 2.3.02  Factual + higher-order questions to further student learning ----
  // A: recognize the two types | B: evaluate balance | C(math): both types in math
  {id:"p_2302_A", subject:"ptk", standard:"2.3.02", domain:"2", topic:"2.3", set:"A",
   prompt:"A teacher deliberately mixes questions that check students' recall of specific facts with questions that require students to make connections, draw conclusions, or evaluate ideas. What is the instructional rationale for using both types?",
   options:["Factual questions are used only for attendance; higher-order questions are the real instruction.", "Both types are equivalent in difficulty and serve identical purposes.", "Higher-order questions should be avoided unless students have scored 100% on factual recall.", "Using both types serves learning: factual questions establish and check the knowledge base students need, while higher-order questions push them to extend and deepen that knowledge."],
   answerIndex:3,
   explanation:"Factual and higher-order questions serve complementary roles. Factual questions ensure the knowledge foundation is secure; higher-order questions leverage that foundation to push thinking further. Effective questioning uses both, neither relegating facts to mere housekeeping nor reserving challenge for an elite few."},

  {id:"p_2302_B", subject:"ptk", standard:"2.3.02", domain:"2", topic:"2.3", set:"B",
   prompt:"A teacher's questioning pattern consists almost entirely of 'who,' 'what,' and 'when' questions answered with single words. Students can recall facts fluently but struggle on assessments that require explaining, comparing, or applying ideas. What questioning gap does this most likely reflect?",
   options:["The teacher is asking too many questions overall.", "The teacher should stop asking factual questions entirely.", "The teacher's questions stay at the factual recall level and rarely push students toward higher-order thinking, so students never practice the deeper cognitive work the assessments require.", "Students' assessment struggles are unrelated to the type of questions asked in class."],
   answerIndex:2,
   explanation:"A steady diet of only factual-recall questions builds a narrow skill set. When assessments require explanation, comparison, or application, students who haven't practiced those cognitive moves in class will struggle. The gap is the missing higher-order questioning that should accompany factual work."},

  {id:"p_2302_C", subject:"ptk", standard:"2.3.02", domain:"2", topic:"2.3", set:"C",
   prompt:"During a lesson on the Pythagorean theorem, a math teacher asks: \"What does $a^2 + b^2 = c^2$ say about the sides of a right triangle?\" (factual), then follows with: \"If you know only the hypotenuse and one leg of a right triangle, what approach would you use to find the missing side, and why does that approach work?\" (higher-order). How do these two questions work together?",
   options:["The factual question establishes that students have the theorem's meaning, and the higher-order question requires them to apply and reason about it — together they advance learning from recall to understanding.", "They don't work together — the second question makes the first pointless.", "The second question is too easy because students can just plug into a formula.", "Only the second question matters; teachers should skip factual checks."],
   answerIndex:0,
   explanation:"The factual question confirms students have the foundational knowledge (the theorem's meaning). The higher-order question requires them to apply reasoning — choosing a strategy and justifying it — which pushes further. Used together, they build from recall to deeper mathematical understanding, which is exactly the purpose of combining question types."},

  // ---- 2.3.03  Open-ended higher-cognitive questions (apply/analyze/synthesize/evaluate) ----
  // A: recognize open-ended HO | B: rewrite a closed Q | C(math): open-ended in math
  {id:"p_2303_A", subject:"ptk", standard:"2.3.03", domain:"2", topic:"2.3", set:"A",
   prompt:"A teacher asks: \"Given what we've studied, what do you think accounts for this outcome, and what evidence would you need to be more confident in your explanation?\" What distinguishes this from a typical factual question?",
   options:["It is longer, which automatically makes it higher-order.", "It has no correct answer, so it avoids the need for assessment.", "It is open-ended and requires students to apply reasoning, construct an explanation, and evaluate the adequacy of evidence — cognitive work beyond simple recall.", "It is only useful in discussion-based subjects, not in skills-based courses."],
   answerIndex:2,
   explanation:"Open-ended higher-cognitive questions call for applying, analyzing, synthesizing, or evaluating — not retrieving a predetermined answer. This question asks students to construct an explanation and assess evidence quality, both of which require higher-order thinking. Length alone doesn't make a question higher-order, and the question still has better and worse answers even without a single right one."},

  {id:"p_2303_B", subject:"ptk", standard:"2.3.03", domain:"2", topic:"2.3", set:"B",
   prompt:"A teacher wants to shift from \"Did the character make the right choice? (yes/no)\" to a question that requires genuine higher-cognitive engagement. Which revision best achieves this?",
   options:[
     "\"Did the character make the right choice — and explain in one sentence.\"",
     "\"What was the character's choice?\"",
     "\"Evaluate the character's decision: what values or reasoning seems to drive it, and under what different circumstances might a different decision be defensible?\"",
     "\"Which page describes the character's choice?\""],
   answerIndex:2,
   explanation:"The revised question requires students to analyze reasoning, identify underlying values, and synthesize an argument about how context changes defensibility — all higher-cognitive operations. Adding 'explain in one sentence' to the yes/no question still anchors students to a binary and doesn't open the cognitive demand. The other options remain factual or closed."},

  {id:"p_2303_C", subject:"ptk", standard:"2.3.03", domain:"2", topic:"2.3", set:"C",
   prompt:"A math teacher replaces \"What is the slope of this line?\" with \"Two lines have different slopes. What does the difference in slopes tell you about how the lines behave, and how would you use that information to decide which line better models a real dataset?\" What shift has the teacher made?",
   options:[
     "From a useful question to an unnecessarily complicated one.",
     "From a closed factual retrieval question to an open-ended higher-cognitive question that requires students to analyze what slope means and evaluate its use in a modeling context.",
     "From a math question to a reading-comprehension question.",
     "From a whole-class question to one only advanced students can attempt."],
   answerIndex:1,
   explanation:"The original question has a single numerical answer. The revision requires students to analyze what slope communicates about behavior, compare two slopes, and evaluate which model better fits data — apply, analyze, and evaluate, all in one question. This is the open-ended higher-cognitive questioning the standard calls for, and it is accessible to the whole class at varying depths."},

  // ---- 2.3.04  Appropriate wait-time on higher-order questions ----
  // A: recognize why wait-time matters | B: evaluate a teacher who skips it | C(math): wait-time in math
  {id:"p_2304_A", subject:"ptk", standard:"2.3.04", domain:"2", topic:"2.3", set:"A",
   prompt:"After posing a complex, higher-order question, a teacher waits silently for several seconds before calling on anyone. Several students who rarely volunteer begin to raise their hands. What does this wait-time accomplish?",
   options:[
     "It signals to students that the teacher doesn't know the answer.",
     "It gives students time to engage in the thinking the question demands, which increases the quality of responses and broadens participation — particularly for students who need more processing time.",
     "It is wasted instructional time that should be filled with hints.",
     "It works only for factual recall questions where students need to search their memory."],
   answerIndex:1,
   explanation:"Higher-order questions require genuine cognitive work — students need time to construct, not just retrieve, a response. Adequate wait-time lets more students engage meaningfully, improves response quality, and widens participation beyond fast responders. It is especially important for complex questions, not for simple recall."},

  {id:"p_2304_B", subject:"ptk", standard:"2.3.04", domain:"2", topic:"2.3", set:"B",
   prompt:"A teacher poses a challenging analytical question, then calls on the first hand up — usually the same two or three students — within two seconds. The rest of the class disengages. Which adjustment would most directly address this pattern?",
   options:["Call on fewer students overall to keep the pace moving.", "Replace the analytical question with an easier factual question so more students can respond.", "Ask the same two or three students to explain their answers in more detail.", "Provide sufficient wait-time before accepting responses, giving all students time to construct their thinking before the question is 'closed' by a fast responder."],
   answerIndex:3,
   explanation:"The pattern — immediate call on the first hand — rewards rapid responders and effectively shuts out students who need more processing time. Extending wait-time keeps the question 'open' longer, signaling that thinking is expected from everyone, which is the direct fix. Reducing difficulty abandons the higher-order goal; calling on fewer students worsens the problem."},

  {id:"p_2304_C", subject:"ptk", standard:"2.3.04", domain:"2", topic:"2.3", set:"C",
   prompt:"A math teacher asks: \"We've seen two methods for solving this system of equations. Under what conditions would you choose substitution over elimination, and why?\" She then waits 8 seconds before taking responses. A colleague suggests this pause is too long. What is the strongest argument that the wait-time is appropriate?",
   options:["The question requires students to compare methods and construct a reasoned justification — genuine higher-order thinking that takes time to formulate. Cutting the wait short hands the floor to the fastest thinker, not the deepest one.", "Eight seconds is always the correct wait-time regardless of question type.", "The wait-time is appropriate because students need to copy the question from the board.", "Eight seconds is appropriate only when students have not done the homework."],
   answerIndex:0,
   explanation:"Comparing two methods and justifying a preference under varying conditions is analytical work that can't be done in two seconds. The wait-time is calibrated to the cognitive demand of the question. Shortening it doesn't make students think faster — it just hands the question to whoever processes quickest, which isn't the same as who thinks most carefully."},

  // ---- 2.3.05  Promotes discussion on a range of possible correct answers ----
  // A: recognize productive discussion | B: evaluate teacher who shuts down range | C(math): math discussion
  {id:"p_2305_A", subject:"ptk", standard:"2.3.05", domain:"2", topic:"2.3", set:"A",
   prompt:"A teacher poses a question that has several defensible answers and explicitly invites students to share differing responses, treating each as worth examining rather than moving toward a single 'right' answer. What is the pedagogical purpose of this approach?",
   options:["To promote discussion that develops reasoning and exposes students to the range of thinking a genuinely complex question can support.", "To avoid the effort of evaluating student responses.", "To signal to students that accuracy doesn't matter.", "To fill time when a lesson finishes early."],
   answerIndex:0,
   explanation:"Some questions have a range of defensible answers. Inviting students to surface and examine that range develops reasoning, exposes diverse thinking, and models that intellectual engagement doesn't always converge on one answer. This is productive discussion — not avoidance of evaluation or abandonment of rigor."},

  {id:"p_2305_B", subject:"ptk", standard:"2.3.05", domain:"2", topic:"2.3", set:"B",
   prompt:"A teacher asks an open-ended question, receives the first reasonable student answer, says \"Exactly right — moving on,\" and proceeds to the next topic. What opportunity is most clearly lost?",
   options:["The opportunity to give that student a grade for participation.", "The opportunity to ask a factual follow-up question.", "Nothing is lost; confirming a correct answer and moving on is efficient instruction.", "The opportunity to promote discussion across the range of possible answers — other students' valid perspectives and reasoning are never surfaced or examined."],
   answerIndex:3,
   explanation:"\"Exactly right — moving on\" treats the first acceptable answer as the conversation's end. For questions that admit a range of defensible answers, this forecloses the discussion where learning often happens: hearing different reasoning, comparing perspectives, and understanding why multiple responses can be valid. Efficiency at the cost of that discussion is a real instructional loss."},

  {id:"p_2305_C", subject:"ptk", standard:"2.3.05", domain:"2", topic:"2.3", set:"C",
   prompt:"A math teacher asks: \"Is a linear or exponential model a better fit for this dataset? Defend your choice.\" Several students choose linear and several choose exponential, each with reasonable arguments. The teacher facilitates a discussion in which each side presents evidence and critiques the other's reasoning. What does this teacher move accomplish?",
   options:["It promotes discussion across a range of defensible answers, developing students' ability to reason with data and evaluate competing mathematical arguments — skills beyond selecting a formula.", "It shows the class that math has no right answers.", "It wastes time because the teacher should simply reveal the correct model.", "It is only useful if both models are equally good fits."],
   answerIndex:0,
   explanation:"When a dataset genuinely supports more than one reasonable interpretation, facilitating debate across those interpretations develops mathematical reasoning — evaluating evidence, critiquing arguments, defending with data. This is exactly the kind of discussion this standard calls for: not \"anything goes,\" but genuine engagement with a range of defensible positions."},

  // ---- 2.3.06  Requires students to clarify/justify assertions ----
  // A: recognize the move | B: evaluate missed follow-up | C(math): justify in math
  {id:"p_2306_A", subject:"ptk", standard:"2.3.06", domain:"2", topic:"2.3", set:"A",
   prompt:"After a student answers a question, the teacher responds: \"Interesting — can you say more about what you mean by that, and what leads you to that conclusion?\" What is the teacher doing, and why does it matter?",
   options:["The teacher is stalling because she doesn't know if the answer is correct.", "The teacher is penalizing the student for an incorrect answer.", "The teacher is modeling how to ask questions, not improving the student's response.", "The teacher is requiring the student to clarify the assertion and justify the reasoning behind it, which pushes the student to think more rigorously and improves the quality of discourse."],
   answerIndex:3,
   explanation:"Asking a student to say more and explain their reasoning requires clarification and justification — this standard's explicit demand. It improves the quality of the student's thinking, makes implicit reasoning visible to the class, and raises the intellectual bar of classroom discourse. It is not stalling, punishing, or modeling for its own sake."},

  {id:"p_2306_B", subject:"ptk", standard:"2.3.06", domain:"2", topic:"2.3", set:"B",
   prompt:"A student says: \"I think the author did that to make the reader feel sad.\" The teacher nods, says \"Good point,\" and calls on the next student. What does the teacher miss by not pressing further?",
   options:[
     "The teacher misses the chance to correct an incorrect answer.",
     "The teacher misses the opportunity to require the student to clarify what 'that' refers to and justify the claim with textual evidence — moves that would sharpen the student's reasoning and the class's understanding.",
     "The teacher should have asked a different student instead.",
     "Nothing is missed — validating contributions quickly maintains positive classroom climate."],
   answerIndex:1,
   explanation:"\"Good point\" accepts the assertion without requiring clarification (what specifically did the author do?) or justification (what evidence supports the emotional effect?). Following up with those demands is what this standard calls for: pressing students to defend and clarify makes discourse more rigorous and thinking more explicit — it's not about correction, it's about quality."},

  {id:"p_2306_C", subject:"ptk", standard:"2.3.06", domain:"2", topic:"2.3", set:"C",
   prompt:"During a class discussion, a student claims: \"You can always just move the variable to the left side when solving an equation.\" The math teacher responds: \"What do you mean by 'always'? Can you give an example — and can you think of a case where that might not be the best move?\" What does this response accomplish?",
   options:["It requires the student to clarify an imprecise assertion and justify or revise it with a concrete example and counterexample — exactly the kind of reasoning that sharpens mathematical understanding.", "It embarrasses the student for making a careless claim.", "It derails the lesson by introducing unnecessary complications.", "It corrects the student's factual error by supplying the right procedure."],
   answerIndex:0,
   explanation:"The student's \"always\" is an overgeneralized claim. The teacher doesn't simply correct it — she requires the student to clarify (what do you mean exactly?) and justify or test (example + possible counterexample). This is the standard in action: requiring students to clarify and justify assertions improves the quality of mathematical reasoning and discourse."},

  // ---- 2.3.07  Orchestrates choral responses for short-answer recall ----
  // A: recognize appropriate use | B: distinguish from higher-order context | C(math): choral in math
  {id:"p_2307_A", subject:"ptk", standard:"2.3.07", domain:"2", topic:"2.3", set:"A",
   prompt:"A teacher asks the whole class to respond together to a series of quick questions with single, specific correct answers — dates, definitions, vocabulary terms — and uses a clear signal so everyone responds simultaneously. What is the primary instructional benefit of this technique?",
   options:[
     "It prevents students from giving wrong answers since the class guides each other.",
     "It maximizes active participation for questions with short, specific correct answers, giving every student practice retrieving the target response simultaneously.",
     "It is faster than any other questioning technique regardless of question type.",
     "It replaces the need for individual assessment."],
   answerIndex:1,
   explanation:"Choral response is designed for questions with a short, specific, correct answer — vocabulary, facts, pronunciation — where simultaneous group response gives every student active retrieval practice. Its value is universal participation on recall tasks, not error prevention (students can all say the wrong thing together) and not a substitute for individual assessment."},

  {id:"p_2307_B", subject:"ptk", standard:"2.3.07", domain:"2", topic:"2.3", set:"B",
   prompt:"A teacher uses choral response for every question in a lesson, including \"What do you think motivated this historical figure's decision?\" and \"How would you solve this novel problem?\" What is the main problem with this application?",
   options:["Choral response is only permitted during the first five minutes of class.", "The problem is that choral response is too loud for classroom management.", "There is no problem — choral response works equally well for all question types.", "Choral response is suited to questions with a single short correct answer. Using it for questions that require reasoning, analysis, or individual judgment collapses the diversity of thought the question is designed to elicit."],
   answerIndex:3,
   explanation:"Choral response works when there is one short, specific correct answer — students can all say it together meaningfully. For questions that require reasoning or individual judgment, the whole class saying something simultaneously either produces noise or converges artificially on one response, defeating the purpose of asking the higher-order question in the first place."},

  {id:"p_2307_C", subject:"ptk", standard:"2.3.07", domain:"2", topic:"2.3", set:"C",
   prompt:"At the start of a lesson on trigonometric ratios, a math teacher uses a quick choral drill: she holds up a right triangle diagram, points to different sides, and the class calls out \"opposite,\" \"adjacent,\" or \"hypotenuse\" in unison. Later in the same lesson, she asks individuals: \"How would you decide which ratio to use when you know two sides and need an angle?\" Why is the teacher using different questioning strategies for these two moments?",
   options:["She uses choral response for hard questions and individual questions for easy ones.", "She uses choral response only because the class is too large for individual questioning.", "Choral response suits the first moment — short, specific vocabulary recall where every student needs active retrieval practice. The individual question suits the second moment — it requires reasoning that has no single-word answer and benefits from individual articulation.", "The two strategies are interchangeable; the teacher is varying format purely for variety."],
   answerIndex:2,
   explanation:"The vocabulary drill has a specific short correct answer ('opposite,' 'adjacent,' 'hypotenuse') — ideal for choral response, maximizing retrieval practice for everyone. The ratio-selection question requires reasoning and individual judgment — it needs individual articulation, not group recitation. Matching the technique to the question type is the key skill this standard names."},



  // =====================================================================
  // PTK · Domain 2 · Topic 2.4 — Makes Efficient Use of Learning Time
  // standards 2.4.01–2.4.06  |  A/B subject-neutral; C secondary-math
  // =====================================================================

  // ---- 2.4.01  Paces lesson to develop important content in depth ----
  // A: recognize depth-vs-coverage trade-off | B: evaluate poor pacing | C(math): pacing in math
  {id:"p_2401_A", subject:"ptk", standard:"2.4.01", domain:"2", topic:"2.4", set:"A",
   prompt:"During a lesson, a teacher realizes that students are genuinely wrestling with a central concept that underpins everything else in the unit. She slows down, adds another example, and cuts a lower-priority activity planned for later. What pacing principle is she applying?",
   options:[
     "She is falling behind the pacing guide and should speed up regardless.",
     "She is allocating more time to the most important and difficult content, accepting that covering less material in greater depth better serves learning.",
     "She is responding to student complaints rather than instructional priorities.",
     "She is padding the lesson because she ran out of planned activities."],
   answerIndex:1,
   explanation:"Effective pacing means giving priority content — especially difficult or foundational ideas — the time it actually needs, even at the cost of lower-priority activities. Racing through a key concept to hit every planned item leaves students with shallow, unstable understanding of the most important material."},

  {id:"p_2401_B", subject:"ptk", standard:"2.4.01", domain:"2", topic:"2.4", set:"B",
   prompt:"A teacher covers every item on her lesson plan in exactly equal time, regardless of each item's importance or how much students are struggling. At the end of the period, students have been exposed to everything but have mastered little. What pacing error does this reflect?",
   options:[
     "She spent too much time on review and not enough on new material.",
     "She failed to allocate time according to content importance and difficulty — treating all items as equal when they aren't causes critical concepts to get the same shallow treatment as peripheral ones.",
     "She should have assigned the lower-priority items as homework instead.",
     "She paced correctly; mastery is a function of student effort, not teacher pacing."],
   answerIndex:1,
   explanation:"Equal time for unequal content is a pacing failure. Important, difficult concepts warrant more instructional time; peripheral items can be abbreviated or moved to homework. Distributing time uniformly treats the most important content the same as the least important, which is exactly what this standard warns against."},

  {id:"p_2401_C", subject:"ptk", standard:"2.4.01", domain:"2", topic:"2.4", set:"C",
   prompt:"A math teacher has 50 minutes to cover completing the square and introduce the quadratic formula. Students are struggling with completing the square — a foundational step for deriving and understanding the formula. What does sound lesson pacing call for?",
   options:["Spend equal time on both topics to stay on schedule.", "Skip completing the square and go straight to the quadratic formula so students can start practicing it.", "Assign completing the square as independent practice and use class time only for the formula.", "Devote the bulk of the period to completing the square, since it is both the harder concept and the foundation for the formula — and briefly preview the formula or defer it to next lesson."],
   answerIndex:3,
   explanation:"Completing the square is both more difficult and more foundational here — it's what the quadratic formula is derived from. Sound pacing allocates time according to importance and difficulty, which means staying with the harder foundational concept rather than racing to the next item on the list. A shallow introduction to the formula doesn't help students who don't yet have the underpinning."},

  // ---- 2.4.02  Arranges schedule to maximize engagement (teacher-directed / independent / group) ----
  // A: recognize format variety for engagement | B: evaluate single-format lock-in | C(math): schedule design
  {id:"p_2402_A", subject:"ptk", standard:"2.4.02", domain:"2", topic:"2.4", set:"A",
   prompt:"A teacher deliberately varies the instructional format across a class period — opening with teacher-directed explanation, shifting to partner practice, then closing with independent application. What is the primary purpose of this scheduling choice?",
   options:["To maximize student engagement by cycling through formats that each keep a different type of attention active and productive.", "To avoid having to plan a single coherent lesson.", "To meet a district requirement for group work minutes.", "To give the teacher breaks from direct instruction."],
   answerIndex:0,
   explanation:"Varying the schedule between teacher-directed, independent, and group formats keeps engagement active — each mode places different demands on students and prevents the fatigue and disengagement that come from a single format for 50+ minutes. The purpose is maximizing productive engagement time, not box-checking or convenience."},

  {id:"p_2402_B", subject:"ptk", standard:"2.4.02", domain:"2", topic:"2.4", set:"B",
   prompt:"A teacher lectures for the entire class period every day. Students are attentive early but consistently disengage in the second half of class. The teacher attributes this to students' lack of motivation. What scheduling factor is more likely responsible?",
   options:["The lectures are too short and need to be extended.", "Students need to be seated in rows rather than clusters to stay focused.", "Sustained single-format delivery — teacher-directed lecture only — does not maximize student engagement across a full period; varying formats (independent work, group work) would maintain active participation better.", "The problem is definitely the students' motivation and cannot be addressed through scheduling."],
   answerIndex:2,
   explanation:"Engagement naturally fluctuates during extended single-format delivery. Structuring the schedule to alternate teacher-directed, independent, and collaborative formats spreads engagement demands differently across the period and is more likely to keep more students productively active throughout — that's the point of this standard."},

  {id:"p_2402_C", subject:"ptk", standard:"2.4.02", domain:"2", topic:"2.4", set:"C",
   prompt:"A math teacher designs a 50-minute class as: 10 min teacher-modeled examples → 15 min guided partner practice on similar problems → 20 min independent problem-solving → 5 min whole-class debrief. What does this schedule accomplish beyond just organizing time?",
   options:["It sequences instructional formats to maximize engagement — moving students from supported observation to collaborative practice to independent application, keeping each phase appropriately active.", "It guarantees every student will score well on the next quiz.", "It minimizes the teacher's preparation time.", "It satisfies a cooperative learning mandate by including partner work."],
   answerIndex:0,
   explanation:"The schedule moves students through decreasing levels of support (modeled → guided → independent) while keeping each phase actively engaging in a different mode. This is purposeful scheduling to maximize engagement across the period — not a quiz guarantee, a time-saving trick, or mere compliance with a cooperative learning policy."},

  // ---- 2.4.03  Three uses of time: allocated / engaged / time-on-task for key objectives ----
  // A: identify the three types | B: distinguish engaged from time-on-task | C(math): apply the distinction
  {id:"p_2403_A", subject:"ptk", standard:"2.4.03", domain:"2", topic:"2.4", set:"A",
   prompt:"A teacher knows that 50 minutes are scheduled for a lesson (one measure of time), that students are actively doing something for 38 of those minutes (a second measure), and that during 25 of those minutes students are working on the core learning objective rather than peripheral activities (a third measure). What does each figure represent?",
   options:["Planning time, instruction time, and assessment time.", "Bell-to-bell time, on-task time, and homework time.", "Allocated time, student engagement time, and time effectively spent on key learning objectives — three distinct and increasingly precise measures of how time is used.", "Teacher talk time, student talk time, and silent work time."],
   answerIndex:2,
   explanation:"This standard names three distinct time concepts: allocated time (the scheduled period), engaged time (when students are actively participating), and time effectively spent on key objectives (the most precise measure — engaged AND on the most important content). Each is progressively more meaningful as an indicator of productive learning time."},

  {id:"p_2403_B", subject:"ptk", standard:"2.4.03", domain:"2", topic:"2.4", set:"B",
   prompt:"Students in a class are clearly busy and on-task throughout the period — working quietly, completing worksheets, staying in their seats. Yet their end-of-unit scores are disappointing. A coach notes that most of the worksheets practiced peripheral skills, not the unit's key objectives. Which time concept does this scenario reveal?",
   options:["Students were engaged but much of that engagement was not directed at the key learning objectives — high engaged time does not guarantee high time-on-task for what matters most.", "Students had insufficient allocated time — the period was too short.", "The problem is student effort, not how time was used.", "The worksheets were too difficult, causing disengagement."],
   answerIndex:0,
   explanation:"This is the critical distinction between engaged time and time effectively on key objectives. Students were engaged (busy, on-task), but not with the content that mattered most for the unit's goals. Effective use of learning time requires that engagement be directed at key objectives, not just any activity — busyness is not the same as productive learning."},

  {id:"p_2403_C", subject:"ptk", standard:"2.4.03", domain:"2", topic:"2.4", set:"C",
   prompt:"In a 55-minute math class, transition and administrative tasks take 8 minutes (leaving 47 minutes of instruction), but 15 of those instructional minutes are spent on a warm-up review of already-mastered skills unrelated to today's objective on rational expressions. How much time is effectively spent on the key learning objective, and why does the distinction matter?",
   options:["Roughly 32 minutes — only the time directly spent on the key objective (rational expressions) counts as time effectively on the learning goal; the rest is allocated or engaged but not targeted at what matters most.", "55 minutes — all scheduled time counts as learning time.", "47 minutes — as long as students are in instruction, the objective is being served.", "The distinction doesn't matter as long as students are not disruptive."],
   answerIndex:0,
   explanation:"Allocated time = 55 min; engaged/instructional time ≈ 47 min (minus transitions); time on the key objective ≈ 32 min (minus the off-target warm-up). The distinctions matter because a teacher who thinks students have 55 minutes of math learning when only 32 are on the key content will systematically under-teach the most important material. Knowing all three figures lets a teacher make deliberate adjustments."},

  // ---- 2.4.04  Arranges classroom space to monitor all students' engagement ----
  // A: recognize monitoring-through-space | B: evaluate blind-spot seating | C(math): room arrangement
  {id:"p_2404_A", subject:"ptk", standard:"2.4.04", domain:"2", topic:"2.4", set:"A",
   prompt:"Before the school year begins, a teacher arranges desks so that she can see every student's face and work from any position in the room, with clear pathways to circulate. What instructional purpose does this arrangement serve?",
   options:["It enables continuous monitoring of all students' engagement, allowing the teacher to detect and respond to disengagement or confusion in real time.", "It is purely aesthetic — a tidy room looks more professional.", "It ensures students cannot communicate with each other.", "It satisfies a fire-safety code requirement only."],
   answerIndex:0,
   explanation:"Classroom spatial arrangement is an instructional tool, not just décor or compliance. A layout that gives the teacher sightlines to every student and clear circulation paths enables active monitoring of engagement — catching the student who has drifted off, noticing confusion before it compounds, and reinforcing accountability without constant verbal correction."},

  {id:"p_2404_B", subject:"ptk", standard:"2.4.04", domain:"2", topic:"2.4", set:"B",
   prompt:"A teacher notices that students in the back corners of the room are consistently off-task during independent work, but she only realizes this when she walks there — which is rarely. What seating or space issue most likely explains this pattern?",
   options:[
     "Those students are inherently unmotivated and need parent conferences.",
     "The classroom arrangement creates blind spots that prevent the teacher from monitoring those students' engagement without making a special trip — the space is working against active supervision.",
     "The students in the back chose their seats, so the responsibility is theirs.",
     "The room is too small and nothing can be done."],
   answerIndex:1,
   explanation:"If the teacher can only monitor the back corners by specifically walking there, the arrangement has blind spots that undermine continuous engagement monitoring. This standard calls for spatial arrangements that support monitoring all students — meaning the teacher should be able to see and reach any student easily and regularly, not only on deliberate inspection tours."},

  {id:"p_2404_C", subject:"ptk", standard:"2.4.04", domain:"2", topic:"2.4", set:"C",
   prompt:"During independent practice on a set of algebra problems, a math teacher positions herself to circulate through a central aisle while scanning the full room, rather than sitting at her desk or standing at the front. What does this positioning accomplish?",
   options:[
     "It wastes time she could use for grading.",
     "It lets her monitor which students are engaged with the problems and which are stuck or off-task, enabling immediate, targeted intervention — which is the point of arranging space for monitoring.",
     "It intimidates students into working faster.",
     "It is only useful during group work, not independent practice."],
   answerIndex:1,
   explanation:"Active circulation through a well-arranged space keeps all students within the teacher's visual field and reach, enabling real-time monitoring of engagement and comprehension during independent work. Sitting at the desk cedes that monitoring advantage. This is the spatial arrangement principle applied dynamically during instruction."},

  // ---- 2.4.05  Homework relevant to lessons being learned ----
  // A: recognize relevance criterion | B: evaluate irrelevant homework | C(math): math HW relevance
  {id:"p_2405_A", subject:"ptk", standard:"2.4.05", domain:"2", topic:"2.4", set:"A",
   prompt:"A teacher's homework assignments always connect directly to the concepts and skills being developed in current lessons, rather than drawing on unrelated content or generic drill sheets. What principle governs this practice?",
   options:["Homework should entertain students, so any engaging assignment works.", "The only criterion for homework is that it takes less than 30 minutes.", "Homework should always review material from the previous unit, not the current one.", "Homework extends learning time most effectively when it is relevant to what is actively being learned — irrelevant practice fragments rather than reinforces."],
   answerIndex:3,
   explanation:"Homework's purpose in this standard is to extend learning time for the lessons currently being taught. An assignment that isn't connected to current content may keep students busy but doesn't serve that extension function — it spreads attention rather than deepening the ongoing work."},

  {id:"p_2405_B", subject:"ptk", standard:"2.4.05", domain:"2", topic:"2.4", set:"B",
   prompt:"A teacher assigns the same generic worksheet every Friday regardless of what was taught that week, because it keeps students in a routine. A colleague argues this undermines the purpose of homework. What is the colleague's strongest point?",
   options:["Routines are harmful and should be avoided in homework design.", "Friday homework is less effective than homework assigned on other days.", "The colleague is wrong — routine and relevance are equally important criteria.", "Generic, fixed assignments disconnected from current lessons don't extend learning for what students are actively studying — homework should be relevant to the lessons being learned, not just habitual busywork."],
   answerIndex:3,
   explanation:"A routine is not inherently bad, but when the content of the routine assignment is disconnected from current instruction, it fails the relevance criterion. The point of homework as an extension of learning time only holds when the assignment actually extends the current lesson's learning — a fixed sheet that ignores this week's content doesn't do that."},

  {id:"p_2405_C", subject:"ptk", standard:"2.4.05", domain:"2", topic:"2.4", set:"C",
   prompt:"A math class just spent two days developing fluency with the chain rule in calculus. For homework, the teacher assigns a set of problems applying the chain rule to composite functions — the same skill class is currently building. A different teacher assigns the same students a review sheet of basic derivatives from three weeks ago. Which homework better serves the purpose of extending learning time?",
   options:["The review sheet — spaced repetition of older material is always preferable.", "Both equally — any math practice is equivalent.", "The chain rule problems — homework extends learning time most effectively when it reinforces and applies what is actively being learned in current lessons.", "Neither — students should only practice in class where the teacher can supervise."],
   answerIndex:2,
   explanation:"Homework that directly practices the chain rule extends the learning time for the skill currently being developed, compounding class instruction with at-home application. The review sheet may have some value for retention, but it doesn't extend the current lesson's learning — it redirects attention to older content, missing the purpose this standard defines."},

  // ---- 2.4.06  Homework appropriate in length and difficulty ----
  // A: recognize the two criteria | B: evaluate over-loaded homework | C(math): calibrated math HW
  {id:"p_2406_A", subject:"ptk", standard:"2.4.06", domain:"2", topic:"2.4", set:"A",
   prompt:"A teacher designs homework assignments by asking: 'Can my students reasonably complete this without me present, and will it take a realistic amount of time given everything else they have tonight?' What two criteria is she applying?",
   options:["Appropriate difficulty (students can do it independently) and appropriate length (a realistic time commitment) — the two criteria that make homework a genuine extension of learning rather than a source of frustration.", "Alignment to state standards and parental approval.", "Whether the assignment is graded and whether it includes reading.", "Student interest level and whether it requires technology."],
   answerIndex:0,
   explanation:"This standard names two distinct criteria: appropriate length (not so long it crowds out other obligations or becomes punishing) and appropriate difficulty (calibrated so students can succeed working independently, since the teacher isn't present to help). Both matter — long-but-easy, or short-but-impossible, both fail the standard in different ways."},

  {id:"p_2406_B", subject:"ptk", standard:"2.4.06", domain:"2", topic:"2.4", set:"B",
   prompt:"A teacher assigns 40 problems of independent practice the night before a major project is due in another class. The next day, fewer than half the students attempted the work, and most who did show signs of rushing. What homework design failure does this most directly reflect?",
   options:["The problem is that students lack discipline and need stricter consequences.", "The teacher should have made the problems easier so students could rush through them acceptably.", "Homework completion is always a motivation problem, not a design problem.", "The assignment fails both criteria: 40 problems is likely excessive in length, and scheduling it against a competing deadline ignores the realistic demands on students' time — effective homework is appropriate in both length and difficulty relative to students' actual circumstances."],
   answerIndex:3,
   explanation:"Appropriate length means calibrated to what students can realistically accomplish given their total load — not just a time estimate in isolation. Assigning 40 problems against a major competing deadline is a length and context failure. The low completion rate and rushing are predictable outcomes of an assignment that didn't account for students' real circumstances."},

  {id:"p_2406_C", subject:"ptk", standard:"2.4.06", domain:"2", topic:"2.4", set:"C",
   prompt:"A math teacher finishes a lesson on solving systems by substitution. She assigns 5 carefully chosen problems: two straightforward applications, two with a slight wrinkle requiring students to first isolate a variable, and one that extends slightly. She deliberately avoids problems requiring a technique not yet taught. What makes this homework well-designed by the criteria of this standard?",
   options:["It has exactly 5 problems, and five is the recommended number.", "It includes an extension problem, which automatically makes it rigorous.", "It is appropriate in both length (manageable without the teacher present) and difficulty (students can succeed independently because it stays within what has been taught) — it extends learning without creating unnecessary frustration.", "It avoids group work, which is the main criterion for good homework."],
   answerIndex:2,
   explanation:"The assignment is sized so students can complete it independently in reasonable time (appropriate length) and calibrated to skills already taught so students don't hit a wall without teacher support (appropriate difficulty). The deliberate choice to exclude untaught techniques is exactly the difficulty-calibration move this standard calls for."},

  // =====================================================================
  // PTK · Domain 2 · Topic 2.5 — Builds Students' Study Skills
  // standard 2.5.01 only (4 sub-bullets — rotate across A/B/C)
  // A/B subject-neutral; C secondary-math context
  // sub-skill rotation: A=repetition+outline | B=self-monitoring+regulation | C=performance anxiety
  // =====================================================================

  // ---- 2.5.01  Instructs students in study skills (repeat / outline / self-monitor / anxiety) ----
  {id:"p_2501_A", subject:"ptk", standard:"2.5.01", domain:"2", topic:"2.5", set:"A",
   prompt:"A teacher explicitly instructs students on two memory strategies: (1) restating information in their own words multiple times across study sessions, and (2) creating an outline that organizes major ideas and their supporting details before a test. What category of skills is the teacher directly teaching?",
   options:[
     "Test-taking tricks that are only useful for standardized exams.",
     "Study skills — specifically, techniques for encoding and structuring information so it is remembered more effectively.",
     "Higher-order thinking skills such as analysis and synthesis.",
     "Social-emotional skills for managing peer relationships."],
   answerIndex:1,
   explanation:"Repeating material (spaced retrieval) and outlining (organizing structure for memory) are classic study skills: deliberate techniques students can use to encode and retain content. Teaching these explicitly — when and how to use them — is what this standard calls for, not the incidental hope that students will pick them up independently."},

  {id:"p_2501_B", subject:"ptk", standard:"2.5.01", domain:"2", topic:"2.5", set:"B",
   prompt:"A teacher notices that many students lose concentration during long study sessions and become paralyzed by fear of making mistakes when assessments approach. She devotes a lesson segment to teaching students to monitor their own attention ('Am I still focused on this?'), re-engage deliberately when they drift, and reframe mistakes as information rather than failure. Which study skills is she targeting?",
   options:["Outlining and note-taking.", "Collaborative study techniques such as peer tutoring.", "Self-monitoring and self-regulation of attention and task focus, and minimizing performance anxiety and fear of failure — two of the study skills this standard names explicitly.", "Memorization techniques such as mnemonics and repetition."],
   answerIndex:2,
   explanation:"The teacher is targeting two specific sub-skills from this standard: self-monitoring/self-regulating to maintain concentration and task focus, and minimizing performance anxiety and fear of failure. These are the more metacognitive and affective study skills in the standard's list, distinct from the memory/organization techniques (repetition, outlining) covered in other sub-skills."},

  {id:"p_2501_C", subject:"ptk", standard:"2.5.01", domain:"2", topic:"2.5", set:"C",
   prompt:"Before an upcoming unit test on trigonometric identities, a math teacher explicitly coaches students: 'When you're practicing tonight and you get stuck, don't just stare — ask yourself: do I know what this identity says? Can I write an example? That self-check keeps you focused. And if you feel anxious during the test, remind yourself that a wrong step shows you where your thinking broke — it's data, not failure.' What study skills is the teacher directly building?",
   options:["The teacher is reviewing content, not teaching study skills.", "The teacher is teaching test-taking strategies unrelated to study skills.", "The teacher is building outlining and repetition skills.", "The teacher is building self-monitoring and self-regulation (the self-check strategy for maintaining task focus) and minimizing performance anxiety (reframing errors as diagnostic information rather than personal failure)."],
   answerIndex:3,
   explanation:"The self-check prompt ('Do I know what this says? Can I write an example?') is a self-monitoring and self-regulation technique for maintaining concentration and task focus. The reframe of wrong steps as 'data, not failure' directly addresses minimizing performance anxiety and fear of failure. Both are study skills from this standard's list, taught explicitly in a math context."},

  // =====================================================================
  // PTK · Domain 3 · Topic 3.1 — Establishes Smooth, Efficient Classroom Routines
  // Standards 3.1.01–3.1.11 (11 standards × 3 sets = 33 questions)
  // A/B subject-neutral; C secondary-math context
  // =====================================================================

  // ---- 3.1.01  Develops and teaches clear class rules during the first week ----
  // A: why first-week timing matters | B: evaluate delayed-rules approach | C(math): rules in math class
  {id:"p_3101_A", subject:"ptk", standard:"3.1.01", domain:"3", topic:"3.1", set:"A",
   prompt:"A veteran teacher takes the first three days of school to explicitly teach, explain, and have students practice each classroom rule, rather than posting rules and assuming students understand them. Which principle best justifies this approach?",
   options:[
     "Rules taught in the first week take less time than rules taught in the second week, so the timing is purely about efficiency.",
     "Students are most receptive to rules during the first week because they haven't yet formed habits; explicit early teaching establishes the behavioral baseline the rest of the year builds on.",
     "Rules only need to be taught once — after the first week, repeating them is unnecessary and wastes instructional time.",
     "Posting rules on the wall is sufficient; verbal instruction adds nothing to student understanding."],
   answerIndex:1,
   explanation:"The rationale for teaching rules during the first week is that this is when behavioral norms are most malleable — students are forming habits and expectations. Waiting allows counterproductive patterns to take root. Explicit teaching (not just posting) ensures students understand what the rules mean and what complying looks like, creating the behavioral foundation for the year."},

  {id:"p_3101_B", subject:"ptk", standard:"3.1.01", domain:"3", topic:"3.1", set:"B",
   prompt:"A new teacher delays establishing formal classroom rules, reasoning that she wants to 'get to know the students first' before imposing structure. By week three, the class is increasingly disorganized and transitions are chaotic. A mentor observes and offers feedback. What is the mentor's most accurate diagnosis of the core problem?",
   options:[
     "The teacher waited too long — clear rules need to be developed and taught during the first week, before students form habits in the absence of explicit expectations.",
     "The teacher should have asked students to create their own rules; teacher-imposed rules are ineffective.",
     "The problem is the physical layout of the room, not the absence of rules.",
     "Three weeks is still early enough; the teacher just needs to be more patient."],
   answerIndex:0,
   explanation:"The first week is the critical window for establishing behavioral norms. Students are actively forming habits and reading the environment for cues about what is expected. A teacher who delays rule-setting cedes that window, and by week three, patterns of behavior — however chaotic — have already solidified. The mentor's diagnosis correctly pinpoints timing as the core failure."},

  {id:"p_3101_C", subject:"ptk", standard:"3.1.01", domain:"3", topic:"3.1", set:"C",
   prompt:"On the first day of a new algebra class, a math teacher spends 20 minutes explicitly walking students through three class rules: raise your hand before calling out an answer, show all work on assignments, and treat mistakes as learning opportunities. She has students practice each rule in a brief exercise. A colleague questions whether this time would be better spent on content. What is the strongest argument for the teacher's choice?",
   options:[
     "The first day of school has no academic value anyway, so using it for rules costs nothing.",
     "Twenty minutes on rules is the legal minimum required by district policy.",
     "Rules only apply to behavior, not academic work like showing steps, so one of the three rules is misclassified.",
     "The time investment in the first week pays compounding dividends: students who know and have practiced the rules lose far less instructional time to behavioral disruptions across the year than those who do not."],
   answerIndex:3,
   explanation:"Explicit, practiced rule instruction in the first week is a high-return investment. The 20 minutes spent early prevents far more cumulative time loss from disruptions, confusion, and re-direction throughout the year. The rule about showing work is also legitimate — it establishes participation expectations for academic activity, which is part of classroom behavioral norms."},

  // ---- 3.1.02  Enforces rules and re-teaches as necessary ----
  // A: re-teaching vs. punishing | B: consistency in enforcement | C(math): re-teach a math-class rule
  {id:"p_3102_A", subject:"ptk", standard:"3.1.02", domain:"3", topic:"3.1", set:"A",
   prompt:"Several weeks into the semester, a teacher notices that students are regularly calling out answers without raising their hands — a rule she established in week one. Her first response is to pause instruction and reteach the rule: she restates it, explains why it exists, and has students practice the correct behavior before continuing. A colleague suggests she should simply punish violations instead. What is the teacher's strongest rationale for re-teaching rather than only punishing?",
   options:[
     "Punishment is never appropriate for classroom rule violations, so re-teaching is the only legal option.",
     "Re-teaching treats rule drift as a learning gap — students may need the expectation refreshed, not just consequences applied. Punishment without re-teaching addresses behavior in the moment but doesn't restore shared understanding of the norm.",
     "Re-teaching is faster than punishment, so it saves time regardless of effectiveness.",
     "Rules do not need to be enforced once established; re-teaching is redundant."],
   answerIndex:1,
   explanation:"Rule drift often reflects fading clarity, not defiance. Re-teaching restores the shared understanding of the expectation — why it exists and what it looks like — which addresses the root cause rather than just suppressing the behavior temporarily. This is the distinction between enforcement as re-teaching and enforcement as consequence-only: both may be appropriate, but re-teaching preserves the educational relationship and meaning behind the rule."},

  {id:"p_3102_B", subject:"ptk", standard:"3.1.02", domain:"3", topic:"3.1", set:"B",
   prompt:"A teacher enforces a 'no phones during instruction' rule consistently for the first month, but then begins making exceptions when students argue they need the phone for a class task. Within two weeks, phone use becomes frequent even when not task-related. What does this pattern most clearly illustrate?",
   options:[
     "Inconsistent enforcement erodes rules even when the rule itself is sound — students read exceptions as evidence that the rule is negotiable, and behavior adjusts accordingly.",
     "The phone rule was unreasonable and should have been eliminated from the start.",
     "Students in this age group cannot be expected to follow technology rules, so the outcome was inevitable.",
     "The teacher needs more severe consequences, not more consistent enforcement."],
   answerIndex:0,
   explanation:"Consistent enforcement is what gives a rule force. When teachers make frequent exceptions without clear criteria, students rationally conclude the rule is not a firm expectation but a negotiable preference. The pattern shown — rapid norm erosion following inconsistent enforcement — is a textbook consequence of failing to apply rules uniformly. Re-establishing the rule would require both re-teaching it and returning to consistent enforcement."},

  {id:"p_3102_C", subject:"ptk", standard:"3.1.02", domain:"3", topic:"3.1", set:"C",
   prompt:"A geometry teacher established on day one that students must write a brief justification for each proof step. By mid-semester, most students are writing steps without justifications, and the teacher realizes she has stopped correcting this. She dedicates five minutes of the next class to re-teaching the expectation, models a correct proof format, and resumes enforcing the rule. What does this scenario most clearly demonstrate about rule enforcement?",
   options:[
     "Rules in mathematics classes are optional because the content is what matters.",
     "The teacher should have accepted the drift — expectations set in week one cannot be re-established later.",
     "Rules require ongoing enforcement and occasional re-teaching when drift occurs; the teacher's self-correction is an appropriate response to recognizing that an expectation had eroded.",
     "Re-teaching academic expectations (like proof format) is not the same as enforcing classroom rules."],
   answerIndex:2,
   explanation:"Proof-step justifications are a procedural expectation that functions as a classroom rule in a math context. When the teacher recognizes drift and responds with explicit re-teaching and resumed enforcement, she is doing exactly what this standard calls for: rules are not set-and-forget, they require monitoring and re-teaching when they erode. The fact that the expectation is academic rather than purely behavioral doesn't change the principle."},

  // ---- 3.1.03  Designs routines for classroom activities prior to school year start ----
  // A: purpose of pre-designed routines | B: evaluate missing a routine | C(math): math-specific routine
  {id:"p_3103_A", subject:"ptk", standard:"3.1.03", domain:"3", topic:"3.1", set:"A",
   prompt:"A teacher designs explicit procedures for entry, attendance, material distribution, restroom requests, and end-of-class dismissal before the school year begins, and rehearses these with students during the first week. A colleague who improvises these transitions on the fly asks why the advance planning is necessary. What is the most accurate answer?",
   options:[
     "Advance planning of routines is required by administrative policy, not by instructional necessity.",
     "Pre-designed routines eliminate all student misbehavior, making discipline policies unnecessary.",
     "It only matters that routines are established eventually; timing before versus during the year makes no meaningful difference.",
     "Routines designed and taught before habitual confusion takes root convert recurring logistical moments into automatic, low-friction transitions — preserving instructional time and cognitive attention for learning."],
   answerIndex:3,
   explanation:"The value of designing routines prior to the school year is that you can establish them before confusion or improvised habits form. Transitions like entry, attendance, and dismissal recur daily; if handled smoothly they become invisible background procedures. If not designed intentionally, each instance becomes a small instructional interruption. The investment in advance design pays dividends across every class meeting of the year."},

  {id:"p_3103_B", subject:"ptk", standard:"3.1.03", domain:"3", topic:"3.1", set:"B",
   prompt:"A teacher establishes clear procedures for most classroom transitions but never explicitly teaches students how to signal a need to use the restroom. Throughout the semester, different students use different signals — some walk up to the desk, some shout across the room, some just leave. Instruction is regularly interrupted. What does this scenario most directly reflect?",
   options:[
     "Restroom requests are a student responsibility and cannot be managed by teacher routines.",
     "The teacher's other routines are irrelevant if any routine is missing — one gap exposes all routines to collapse.",
     "The solution is a stricter bathroom policy, not a routine.",
     "Even a single unaddressed recurring transition can reliably interrupt instruction; every routine that will recur needs a pre-established procedure, not just the high-visibility ones."],
   answerIndex:3,
   explanation:"This scenario illustrates that routine design needs to be comprehensive. Transitions that seem minor — restroom requests, getting a pencil, handling tardiness — recur throughout the year and, if left without a procedure, create small but cumulative interruptions. The standard calls for designing procedures for the full range of classroom activities before the year begins, precisely to prevent this kind of improvised chaos from eroding instructional time."},

  {id:"p_3103_C", subject:"ptk", standard:"3.1.03", domain:"3", topic:"3.1", set:"C",
   prompt:"Before the school year begins, a math teacher designs explicit procedures for how students will collect and return graphing calculators, how they will organize their notebooks for notes versus homework, and how they will signal when they are ready to discuss a problem during class. She rehearses these with students in the first two days. What is the primary instructional benefit of establishing these subject-specific routines before students arrive?",
   options:[
     "Establishing subject-specific routines before patterns of confusion form converts recurring logistical moments — calculator distribution, notebook use, signaling readiness — into automatic procedures that protect instructional time throughout the year.",
     "Students will score higher on standardized tests because their materials are organized.",
     "The routines signal to students that math class is different from other classes and therefore more important.",
     "Pre-establishing routines is only beneficial if students have never had a math class before."],
   answerIndex:0,
   explanation:"Subject-specific routines (calculator management, notebook organization, discussion signals) address recurring transitions unique to math instruction. Designing and practicing these before habitual confusion takes root means that every future class period can move through these moments efficiently. The pre-year design also ensures the teacher has thought through the logistics rather than improvising, which produces cleaner, more consistent procedures."},

  // ---- 3.1.04  Presents clear expectations concerning classroom behavior ----
  // A: clarity of behavioral expectations | B: vague vs. specific expectations | C(math): math-class behavior expectations
  {id:"p_3104_A", subject:"ptk", standard:"3.1.04", domain:"3", topic:"3.1", set:"A",
   prompt:"A teacher states the following behavioral expectation to her class: 'Be respectful.' A mentor observing the class notes that students interpret 'be respectful' very differently, and that the teacher frequently has to adjudicate disputes about whether a behavior was or wasn't respectful. The mentor recommends the teacher replace it with clearer language. What would a clearer version of this expectation look like?",
   options:[
     "Remove the expectation entirely — abstract values like respect can't be taught through rules.",
     "Add a poster of the word 'respect' so it's always visible.",
     "Tell students that 'respect' means whatever the teacher says it means in the moment.",
     "Break it into observable, specific behaviors: 'Listen without interrupting when someone else is speaking,' 'Use appropriate volume during transitions,' and 'Address disagreements with questions, not insults.'"],
   answerIndex:3,
   explanation:"Behavioral expectations are only actionable when students know what the behavior looks like. 'Be respectful' is too abstract — students can sincerely disagree about whether a behavior meets it, which is why the teacher is spending time arbitrating. Translating the value into specific, observable behaviors (listen without interrupting; use appropriate volume; address disagreements with questions) gives students a concrete, checkable standard to guide their own conduct."},

  {id:"p_3104_B", subject:"ptk", standard:"3.1.04", domain:"3", topic:"3.1", set:"B",
   prompt:"Two teachers establish behavioral expectations on the first day. Teacher A says: 'I expect you to behave yourselves and be mature.' Teacher B says: 'During discussions, one person speaks at a time and others listen. During independent work, your volume should be zero unless you're asking me a question. During transitions, stay in your seat until I give the signal.' Which approach is more effective and why?",
   options:[
     "Teacher B, because specific, situation-linked behavioral expectations give students a clear, actionable standard — they don't have to guess what 'mature' means in each context.",
     "Teacher A, because appealing to student maturity motivates self-regulation better than specific rules.",
     "Both are equally effective; the content of expectations matters less than the tone with which they're delivered.",
     "Teacher A, because fewer rules are always easier to remember than more."],
   answerIndex:0,
   explanation:"Teacher B's expectations are clear because they are specific (one speaker at a time), situation-linked (discussions vs. independent work vs. transitions), and observable (volume = zero; stay in seat until signal). Students don't have to interpret an abstract value; they have a concrete behavioral standard for each context. Teacher A's approach relies on students inferring what 'mature' means, which produces inconsistent compliance and requires more adjudication."},

  {id:"p_3104_C", subject:"ptk", standard:"3.1.04", domain:"3", topic:"3.1", set:"C",
   prompt:"On the first day of a statistics class, the teacher says: 'In this class, when I pose a question for group discussion, you talk with your group quietly before we share out. When I'm demonstrating a problem on the board, pencils are down and eyes are on the board. When you disagree with another student's answer, you ask a question about their reasoning — not a put-down.' What makes these behavioral expectations more instructionally effective than a single rule like 'be engaged'?",
   options:[
     "They are more expectations, and more rules always produce better behavior than fewer.",
     "They are situation-specific and describe observable behaviors, so students know exactly what is expected during each instructional format without having to interpret a vague standard.",
     "Mentioning 'disagreement' specifically teaches students that math has only one right answer.",
     "They only apply to group work, so they are too narrow to constitute genuine behavioral expectations."],
   answerIndex:1,
   explanation:"Each expectation is anchored to a specific instructional context (group discussion, board demonstration, peer disagreement) and describes a concrete, observable behavior (pencils down; eyes on board; ask a question about reasoning). This eliminates interpretive ambiguity: students know precisely what 'engaged' looks like in each moment of the class. Context-specific clarity is what makes behavioral expectations actionable rather than aspirational."},

  // ---- 3.1.05  Presents expectations for participation in lessons and learning activities ----
  // A: distinguish participation expectations from behavioral rules | B: cooperative learning | C(math): independent work
  {id:"p_3105_A", subject:"ptk", standard:"3.1.05", domain:"3", topic:"3.1", set:"A",
   prompt:"A teacher explicitly tells students at the start of a unit: 'During teacher-led instruction, you are expected to take notes, track the examples I work through, and signal confusion with a thumbs down so I can adjust. During independent work, you attempt problems yourself before asking a neighbor. During cooperative tasks, each group member contributes an idea before the group moves to a conclusion.' What kind of expectations is this teacher establishing?",
   options:[
     "Academic content expectations about what students should know by the end of the unit.",
     "Participation expectations for each instructional format — what students are supposed to do as learners during each type of activity.",
     "Grading criteria for the upcoming unit assessment.",
     "Administrative procedures such as attendance and material management."],
   answerIndex:1,
   explanation:"These are participation expectations — they define what active, productive engagement looks like during each learning format (teacher-directed, independent, cooperative). They are distinct from content objectives (what you learn) and administrative procedures (how the room runs). Presenting these explicitly helps students understand what they are supposed to be doing as learners, not just what behavior is permitted."},

  {id:"p_3105_B", subject:"ptk", standard:"3.1.05", domain:"3", topic:"3.1", set:"B",
   prompt:"Students in a cooperative learning activity are off-task: two students let one member do all the work, one member is on their phone, and the product is completed by one person while others chat. The teacher was not surprised — she never explicitly stated what was expected of each group member during cooperative work. What should she have done differently?",
   options:[
     "Established clear participation expectations for cooperative learning — what each member is responsible for doing — before implementing the format, so students know what productive engagement looks like in a group.",
     "Assigned cooperative work less frequently — the format itself causes the problem.",
     "Graded only the final product; the process is not the teacher's concern.",
     "Nothing — students at this age should know inherently how to work in groups."],
   answerIndex:0,
   explanation:"Cooperative learning is a structured instructional format that requires explicit participation expectations to function. Without clarity on each member's role and responsibilities — what does it mean to contribute? — students default to whatever is most comfortable, often a passive or free-riding posture. Stating expectations before the activity ('Each member proposes at least one approach; everyone explains the reasoning in their own words') gives students a behavioral standard for the format."},

  {id:"p_3105_C", subject:"ptk", standard:"3.1.05", domain:"3", topic:"3.1", set:"C",
   prompt:"Before assigning a set of independent practice problems in an Algebra II class, a teacher says: 'Here is what I expect from independent work time: attempt every problem before deciding you're stuck. Show your work for each step — including steps you cross out. If you finish early, check your answers by working backwards. Don't move to the next problem until you understand why you got the previous one right or wrong.' What is the teacher doing by stating these expectations?",
   options:[
     "The teacher is assigning homework, which is governed by different expectations than class work.",
     "The teacher is setting content objectives for the algebra unit.",
     "These are grading rubric items, not participation expectations.",
     "The teacher is presenting clear participation expectations for independent work — defining what productive engagement looks like during that instructional format so students know how to direct their effort."],
   answerIndex:3,
   explanation:"The teacher is defining what it means to participate productively in independent work in her specific subject context: attempt before giving up, show all steps, use checking strategies, understand before moving on. These are not content standards or rubric criteria — they are participation expectations that define the learner behaviors expected during that instructional format. Stating them explicitly aligns student effort with the purpose of the practice activity."},

  // ---- 3.1.06  Enforces expectations about classroom behavior consistently ----
  // A: why consistency matters | B: selective enforcement backfires | C(math): consistent academic expectation
  {id:"p_3106_A", subject:"ptk", standard:"3.1.06", domain:"3", topic:"3.1", set:"A",
   prompt:"A teacher enforces the same rule the same way regardless of which student violates it — the star student and the struggling student receive the same response to the same infraction. Some parents complain this is too rigid. What is the strongest argument for consistent enforcement?",
   options:[
     "Consistent enforcement communicates that expectations apply to everyone equally, builds students' trust in the fairness of the classroom environment, and prevents the norm erosion that follows when students perceive enforcement as arbitrary or preferential.",
     "Consistency is required by law and teachers have no discretion in the matter.",
     "Consistent enforcement is only necessary for major rule violations, not minor infractions.",
