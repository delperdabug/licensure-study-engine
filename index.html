  button{font-family:inherit;}

  .btn-soft{background:transparent;color:var(--muted);border:1.5px solid var(--line);}
  .btn:disabled{opacity:.55;cursor:default;}
  pre{white-space:pre-wrap;}
  .katex{font-size:1.05em;}

  {id:"m_11012_A", subject:"math", standard:"1.1.12", domain:"1", topic:"1.1", set:"A",
   prompt:"A jacket costs $\\$80$. It is on sale for $25\\%$ off, and the local sales tax is $8\\%$. What is the final price?",
   options:[
     "$\\$60.00$",
     "$\\$64.80$",
     "$\\$86.40$",
     "$\\$66.00$"],
   answerIndex:1,
   explanation:"Sale price: $\\$80 \\times 0.75 = \\$60$. After tax: $\\$60 \\times 1.08 = \\$64.80$. Tax is applied to the sale price, not the original."},

  {id:"m_11012_B", subject:"math", standard:"1.1.12", domain:"1", topic:"1.1", set:"B",
   prompt:"An account earns $5\\%$ annual interest compounded annually. What is the balance after $3$ years on an initial deposit of $\\$1{,}000$?",
   options:[
     "$\\$1{,}150.00$",
     "$\\$1{,}125.00$",
     "$\\$1{,}153.00$",
     "$\\$1{,}157.63$"],
   answerIndex:3,
   explanation:"Compound interest formula: $A = P(1 + r)^n = 1000(1.05)^3$. $(1.05)^3 = 1.157625$. So $A = \\$1{,}157.63$ (rounded to cents)."},

  {id:"m_11012_C", subject:"math", standard:"1.1.12", domain:"1", topic:"1.1", set:"C",
   prompt:"A salesperson earns a $7\\%$ commission. If she wants to earn $\\$350$ in commission, what total sales amount is required?",
   options:[
     "$\\$2{,}100$",
     "$\\$4{,}500$",
     "$\\$5{,}000$",
     "$\\$2{,}450$"],
   answerIndex:2,
   explanation:"$0.07 \\times S = 350$, so $S = \\frac{350}{0.07} = 5{,}000$. A sale of $\\$5{,}000$ yields $7\\%$ commission of $\\$350$."},

  // ---- 1.1.13  Associative, distributive, commutative properties to simplify ----

  {id:"m_11013_A", subject:"math", standard:"1.1.13", domain:"1", topic:"1.1", set:"A",
   prompt:"Which property allows you to compute $47 + 38 + 53$ as $(47 + 53) + 38 = 138$?",
   options:[
     "Distributive property",
     "Multiplicative identity",
     "Closure property",
     "Commutative and associative properties of addition"],
   answerIndex:3,
   explanation:"To regroup $47 + 38 + 53$ as $(47 + 53) + 38$, you first use commutativity to reorder the $38$ and $53$, then use associativity to regroup the parentheses. Both properties work together."},

  {id:"m_11013_B", subject:"math", standard:"1.1.13", domain:"1", topic:"1.1", set:"B",
   prompt:"Simplify $18 \\times 5 \\times 2$ using properties of multiplication.",
   options:[
     "$90$",
     "$36$",
     "$180$",
     "$900$"],
   answerIndex:2,
   explanation:"$18 \\times 5 \\times 2$: by commutativity and associativity, regroup as $18 \\times (5 \\times 2) = 18 \\times 10 = 180$. This is easier than computing $18 \\times 5 = 90$ first."},

  {id:"m_11013_C", subject:"math", standard:"1.1.13", domain:"1", topic:"1.1", set:"C",
   prompt:"A student simplifies $7 \\times 99$ by writing $7 \\times (100 - 1) = 700 - 7 = 693$. Which property makes this valid?",
   options:[
     "Commutative property of multiplication",
     "Associative property of multiplication",
     "Distributive property of multiplication over subtraction",
     "Additive inverse property"],
   answerIndex:2,
   explanation:"$7 \\times (100 - 1) = 7 \\times 100 - 7 \\times 1 = 700 - 7 = 693$. This is the distributive property applied to subtraction: $a(b - c) = ab - ac$."},

  // ---- 1.1.14  Approximate irrational numbers in context ----

  {id:"m_11014_A", subject:"math", standard:"1.1.14", domain:"1", topic:"1.1", set:"A",
   prompt:"Between which two consecutive integers does $\\sqrt{50}$ lie?",
   options:[
     "$6$ and $7$",
     "$7$ and $8$",
     "$5$ and $6$",
     "$8$ and $9$"],
   answerIndex:1,
   explanation:"$7^2 = 49$ and $8^2 = 64$. Since $49 < 50 < 64$, we have $7 < \\sqrt{50} < 8$."},

  {id:"m_11014_B", subject:"math", standard:"1.1.14", domain:"1", topic:"1.1", set:"B",
   prompt:"A square room has an area of $20$ square meters. Approximately how long is each side?",
   options:[
     "About $4.0$ m",
     "About $3.5$ m",
     "About $5.0$ m",
     "About $4.5$ m"],
   answerIndex:3,
   explanation:"Side $= \\sqrt{20} = \\sqrt{4 \\times 5} = 2\\sqrt{5}$. Since $\\sqrt{5} \\approx 2.236$, we get $2 \\times 2.236 \\approx 4.47 \\approx 4.5$ m."},

  {id:"m_11014_C", subject:"math", standard:"1.1.14", domain:"1", topic:"1.1", set:"C",
   prompt:"Which best approximates $3\\sqrt{2}$ to the nearest tenth?",
   options:[
     "$3.1$",
     "$4.2$",
     "$4.5$",
     "$6.0$"],
   answerIndex:1,
   explanation:"$\\sqrt{2} \\approx 1.4142$. So $3\\sqrt{2} \\approx 3 \\times 1.4142 = 4.2426 \\approx 4.2$."},

  // ---- 1.1.15  Estimate squares/cubes/roots; nth root concept ----

  {id:"m_11015_A", subject:"math", standard:"1.1.15", domain:"1", topic:"1.1", set:"A",
   prompt:"Which best estimates $\\sqrt[3]{100}$?",
   options:[
     "About $4.6$",
     "About $10$",
     "About $33$",
     "About $3.3$"],
   answerIndex:0,
   explanation:"$4^3 = 64$ and $5^3 = 125$. Since $64 < 100 < 125$, $\\sqrt[3]{100}$ is between $4$ and $5$, closer to $5$. A refined estimate: $4.6^3 = 97.3$, $4.65^3 \\approx 100.5$. So $\\sqrt[3]{100} \\approx 4.64$."},

  {id:"m_11015_B", subject:"math", standard:"1.1.15", domain:"1", topic:"1.1", set:"B",
   prompt:"Which value is the best estimate for $\\sqrt{130}$?",
   options:[
     "$11.0$",
     "$13.0$",
     "$12.0$",
     "$11.4$"],
   answerIndex:3,
   explanation:"$11^2 = 121$, $12^2 = 144$. So $\\sqrt{130}$ is between $11$ and $12$. $11.4^2 = 129.96 \\approx 130$. So $\\sqrt{130} \\approx 11.4$."},

  {id:"m_11015_C", subject:"math", standard:"1.1.15", domain:"1", topic:"1.1", set:"C",
   prompt:"If $x^5 = 32$, what is $x$?",
   options:[
     "$x = 4$",
     "$x = 6.4$",
     "$x = 2$",
     "$x = 3$"],
   answerIndex:2,
   explanation:"$x = \\sqrt[5]{32} = 32^{1/5}$. Since $2^5 = 32$, we have $x = 2$. This is the definition of the $n$th root: $x^n = a \\Rightarrow x = a^{1/n}$."},

  // ---- 1.1.16  Answers to specified degree of accuracy ----

  {id:"m_11016_A", subject:"math", standard:"1.1.16", domain:"1", topic:"1.1", set:"A",
   prompt:"Round $3.7849$ to the nearest hundredth.",
   options:[
     "$3.78$",
     "$3.79$",
     "$3.785$",
     "$3.8$"],
   answerIndex:0,
   explanation:"$3.7849$: tenths = $7$, hundredths = $8$, thousandths = $4$. Round to the nearest hundredth by inspecting the thousandths digit: since $4 < 5$, round down (truncate). Answer: $3.78$."},

  {id:"m_11016_B", subject:"math", standard:"1.1.16", domain:"1", topic:"1.1", set:"B",
   prompt:"A calculator shows $\\pi \\approx 3.14159265$. To four significant figures, $\\pi$ is:",
   options:[
     "$3.141$",
     "$3.1416$",
     "$3.142$",
     "$3.14$"],
   answerIndex:1,
   explanation:"Four significant figures starting from $3$: $3.141$... The fifth significant digit is $5$, so round up the fourth: $3.141\\mathbf{5}... \\rightarrow 3.142$. Wait: $3.14159$ rounded to four sig figs — digits are $3, 1, 4, 1$, next is $5$, so round up to $3.142$. Hmm, let me be careful: $3.14159$. Four sig figs: the fourth digit is the second $1$ (in $3.141$...), and the next digit is $5$. Round up: $3.142$."},

  {id:"m_11016_C", subject:"math", standard:"1.1.16", domain:"1", topic:"1.1", set:"C",
   prompt:"A student measures a length as $7.3$ cm. The instrument has precision to the nearest millimeter ($0.1$ cm). A second measurement gives $7.35$ cm. Which value should be reported?",
   options:[
     "$7.35$ cm, because more decimal places are always more accurate.",
     "Either value is equally valid.",
     "$7.4$ cm, because you must round up.",
     "$7.3$ cm, because the instrument can only reliably measure to one decimal place and the extra digit is not meaningful."],
   answerIndex:3,
   explanation:"Precision is limited by the measuring instrument. If the instrument reliably reads to $0.1$ cm, reporting $7.35$ cm implies a precision the tool cannot provide. The second decimal place is not meaningful data — it should be reported as $7.3$ cm (or $7.4$ cm if that's what the instrument reads). Spurious precision misrepresents measurement accuracy."},

  // ---- 1.1.17  Scientific notation with negative exponents ----

  {id:"m_11017_A", subject:"math", standard:"1.1.17", domain:"1", topic:"1.1", set:"A",
   prompt:"Express $0.00047$ in scientific notation.",
   options:[
     "$4.7 \\times 10^{-3}$",
     "$47 \\times 10^{-5}$",
     "$4.7 \\times 10^{-4}$",
     "$0.47 \\times 10^{-3}$"],
   answerIndex:2,
   explanation:"Move the decimal right until you have a number between $1$ and $10$: $0.00047 \\rightarrow 4.7$. You moved $4$ places right, so multiply by $10^{-4}$: $4.7 \\times 10^{-4}$. Options A and B are incorrect exponents; D has a coefficient not in $[1, 10)$."},

  {id:"m_11017_B", subject:"math", standard:"1.1.17", domain:"1", topic:"1.1", set:"B",
   prompt:"Compute $(3.0 \\times 10^5) \\times (2.5 \\times 10^{-3})$.",
   options:[
     "$7.5 \\times 10^{2}$",
     "$5.5 \\times 10^{2}$",
     "$7.5 \\times 10^{-15}$",
     "$6.0 \\times 10^{3}$"],
   answerIndex:0,
   explanation:"Multiply coefficients: $3.0 \\times 2.5 = 7.5$. Add exponents: $10^5 \\times 10^{-3} = 10^{5+(-3)} = 10^2$. Result: $7.5 \\times 10^2$."},

  {id:"m_11017_C", subject:"math", standard:"1.1.17", domain:"1", topic:"1.1", set:"C",
   prompt:"The mass of a proton is approximately $1.67 \\times 10^{-27}$ kg. The mass of an electron is approximately $9.11 \\times 10^{-31}$ kg. How many times heavier is a proton than an electron?",
   options:[
     "About $1{,}833$",
     "About $183$",
     "About $18{,}330$",
     "About $0.000545$"],
   answerIndex:0,
   explanation:"$\\frac{1.67 \\times 10^{-27}}{9.11 \\times 10^{-31}} = \\frac{1.67}{9.11} \\times 10^{-27-(-31)} = 0.1833 \\times 10^{4} = 1{,}833$. A proton is approximately $1{,}836$ times heavier than an electron (the slight difference is from rounding)."},

  // ---- 1.1.18  Rules of exponents ----

  {id:"m_11018_A", subject:"math", standard:"1.1.18", domain:"1", topic:"1.1", set:"A",
   prompt:"Simplify $\\dfrac{x^5 \\cdot x^{-2}}{x^3}$.",
   options:[
     "$x^6$",
     "$x^0 = 1$",
     "$x^{-6}$",
     "$x$"],
   answerIndex:1,
   explanation:"Numerator: $x^5 \\cdot x^{-2} = x^{5+(-2)} = x^3$. Then $\\frac{x^3}{x^3} = x^{3-3} = x^0 = 1$."},

  {id:"m_11018_B", subject:"math", standard:"1.1.18", domain:"1", topic:"1.1", set:"B",
   prompt:"Which expression equals $(2x^3)^4$?",
   options:[
     "$8x^7$",
     "$2x^{12}$",
     "$16x^{12}$",
     "$16x^7$"],
   answerIndex:2,
   explanation:"$(2x^3)^4 = 2^4 \\cdot (x^3)^4 = 16 \\cdot x^{12} = 16x^{12}$. Apply the power rule to both the coefficient and the variable."},

  {id:"m_11018_C", subject:"math", standard:"1.1.18", domain:"1", topic:"1.1", set:"C",
   prompt:"A student simplifies $\\dfrac{a^6}{a^{-2}}$ as $a^{6 \\div (-2)} = a^{-3}$. What is the correct simplification?",
   options:[
     "$a^{-3}$ — the student is correct.",
     "$a^{8}$ — subtract exponents: $6 - (-2) = 8$.",
     "$a^{4}$ — divide the absolute values of the exponents.",
     "$a^{3}$ — just take the positive result."],
   answerIndex:1,
   explanation:"To divide powers with the same base, subtract exponents: $\\frac{a^6}{a^{-2}} = a^{6-(-2)} = a^{6+2} = a^8$. The student divided exponents instead of subtracting them, which is not a valid rule."},

  // ---- 1.1.19  Inverse relationship between exponents and logarithms ----

  {id:"m_11019_A", subject:"math", standard:"1.1.19", domain:"1", topic:"1.1", set:"A",
   prompt:"Which equation is equivalent to $\\log_2 32 = 5$?",
   options:[
     "$32^5 = 2$",
     "$5^2 = 32$",
     "$2^5 = 32$",
     "$2^{32} = 5$"],
   answerIndex:2,
   explanation:"$\\log_b x = n \\iff b^n = x$. So $\\log_2 32 = 5 \\iff 2^5 = 32$. Verify: $2^5 = 32$ ✓."},

  {id:"m_11019_B", subject:"math", standard:"1.1.19", domain:"1", topic:"1.1", set:"B",
   prompt:"Solve for $x$: $\\log_3 x = -2$.",
   options:[
     "$x = -9$",
     "$x = 9$",
     "$x = \\frac{1}{6}$",
     "$x = \\frac{1}{9}$"],
   answerIndex:3,
   explanation:"$\\log_3 x = -2 \\iff 3^{-2} = x \\iff x = \\frac{1}{3^2} = \\frac{1}{9}$. Logarithms of values less than $1$ are negative; the result must be positive (logarithms are defined for positive arguments)."},

  {id:"m_11019_C", subject:"math", standard:"1.1.19", domain:"1", topic:"1.1", set:"C",
   prompt:"A student graphs $y = 2^x$ and its inverse. What is the equation of the inverse function?",
   options:[
     "$y = \\log_2 x$",
     "$y = x^2$",
     "$y = \\frac{x}{2}$",
     "$y = 2x$"],
   answerIndex:0,
   explanation:"The inverse of an exponential function $y = b^x$ is the logarithm $y = \\log_b x$. To find the inverse, swap $x$ and $y$: $x = 2^y$, then solve for $y$: $y = \\log_2 x$."},

  // ---- 1.1.20  Laws of logarithms ----

  {id:"m_11020_A", subject:"math", standard:"1.1.20", domain:"1", topic:"1.1", set:"A",
   prompt:"Simplify $\\log_b(x^3 y)$ using logarithm laws.",
   options:[
     "$3\\log_b x + \\log_b y$",
     "$3(\\log_b x)(\\log_b y)$",
     "$\\log_b(3x) + \\log_b y$",
     "$3\\log_b(xy)$"],
   answerIndex:0,
   explanation:"$\\log_b(x^3 y) = \\log_b(x^3) + \\log_b y = 3\\log_b x + \\log_b y$. Apply the product rule ($\\log(AB) = \\log A + \\log B$) and the power rule ($\\log(A^n) = n\\log A$)."},

  {id:"m_11020_B", subject:"math", standard:"1.1.20", domain:"1", topic:"1.1", set:"B",
   prompt:"Given $\\log 2 \\approx 0.301$ and $\\log 3 \\approx 0.477$, estimate $\\log 12$.",
   options:[
     "$1.079$",
     "$0.778$",
     "$0.144$",
     "$0.602$"],
   answerIndex:0,
   explanation:"$\\log 12 = \\log(4 \\times 3) = \\log 4 + \\log 3 = 2\\log 2 + \\log 3 \\approx 2(0.301) + 0.477 = 0.602 + 0.477 = 1.079$."},

  {id:"m_11020_C", subject:"math", standard:"1.1.20", domain:"1", topic:"1.1", set:"C",
   prompt:"A student writes $\\log(A + B) = \\log A + \\log B$. Identify the error.",
   options:[
     "No error — the sum rule says $\\log(A+B) = \\log A + \\log B$.",
     "The student confused the product rule with the sum rule. $\\log A + \\log B = \\log(A \\cdot B)$, not $\\log(A + B)$.",
     "The error is minor — it only matters when $A = B$.",
     "The student should use natural log, not common log."],
   answerIndex:1,
   explanation:"The product rule states $\\log(AB) = \\log A + \\log B$. There is no simple logarithm rule for $\\log(A + B)$. This is a very common algebra error. For example, $\\log(1 + 1) = \\log 2 \\approx 0.301$, but $\\log 1 + \\log 1 = 0 + 0 = 0 \\neq 0.301$."},

  // ---- 1.1.21  Change of base; simplify and estimate logarithms ----

  {id:"m_11021_A", subject:"math", standard:"1.1.21", domain:"1", topic:"1.1", set:"A",
   prompt:"Use the change-of-base formula to compute $\\log_5 100$.",
   options:[
     "$\\dfrac{\\ln 5}{\\ln 100}$",
     "$\\dfrac{\\log 100}{\\log 5} = \\dfrac{2}{\\log 5} \\approx 2.86$",
     "$\\dfrac{\\log 5}{\\log 100} \\approx 0.35$",
     "$5 \\times \\log 100$"],
   answerIndex:1,
   explanation:"Change-of-base: $\\log_b a = \\frac{\\log a}{\\log b}$. So $\\log_5 100 = \\frac{\\log 100}{\\log 5} = \\frac{2}{\\log 5}$. Since $\\log 5 = \\log(10/2) = 1 - \\log 2 \\approx 1 - 0.301 = 0.699$, we get $\\frac{2}{0.699} \\approx 2.86$."},

  {id:"m_11021_B", subject:"math", standard:"1.1.21", domain:"1", topic:"1.1", set:"B",
   prompt:"Simplify $\\log_4 8$.",
   options:[
     "$2$",
     "$\\frac{3}{2}$",
     "$\\frac{1}{2}$",
     "$3$"],
   answerIndex:1,
   explanation:"$\\log_4 8 = \\frac{\\log 8}{\\log 4} = \\frac{\\log 2^3}{\\log 2^2} = \\frac{3\\log 2}{2\\log 2} = \\frac{3}{2}$. Or: $4^{3/2} = (2^2)^{3/2} = 2^3 = 8$ ✓."},

  {id:"m_11021_C", subject:"math", standard:"1.1.21", domain:"1", topic:"1.1", set:"C",
   prompt:"Between which two consecutive integers does $\\log_3 50$ lie?",
   options:[
     "$2$ and $3$",
     "$1$ and $2$",
     "$4$ and $5$",
     "$3$ and $4$"],
   answerIndex:3,
   explanation:"$3^3 = 27$ and $3^4 = 81$. Since $27 < 50 < 81$, we have $3 < \\log_3 50 < 4$."},

  // ---- 1.1.22  Operations on polynomials and algebraic fractions ----

  {id:"m_11022_A", subject:"math", standard:"1.1.22", domain:"1", topic:"1.1", set:"A",
   prompt:"Multiply $(2x - 3)(x + 5)$.",
   options:[
     "$2x^2 + 7x - 15$",
     "$2x^2 + 13x - 15$",
     "$2x^2 - 13x + 15$",
     "$2x^2 + 7x + 15$"],
   answerIndex:0,
   explanation:"FOIL: $(2x)(x) + (2x)(5) + (-3)(x) + (-3)(5) = 2x^2 + 10x - 3x - 15 = 2x^2 + 7x - 15$."},

  {id:"m_11022_B", subject:"math", standard:"1.1.22", domain:"1", topic:"1.1", set:"B",
   prompt:"Simplify $\\dfrac{x^2 - 4}{x - 2}$ for $x \\neq 2$.",
   options:[
     "$x - 2$",
     "$x + 2$",
     "$\\frac{x^2}{2}$",
     "$x^2 + 2$"],
   answerIndex:1,
   explanation:"Factor the numerator: $x^2 - 4 = (x-2)(x+2)$. So $\\frac{(x-2)(x+2)}{x-2} = x + 2$ for $x \\neq 2$."},

  {id:"m_11022_C", subject:"math", standard:"1.1.22", domain:"1", topic:"1.1", set:"C",
   prompt:"Add the algebraic fractions: $\\dfrac{3}{x} + \\dfrac{2}{x-1}$.",
   options:[
     "$\\dfrac{5}{2x-1}$",
     "$\\dfrac{5}{x(x-1)}$",
     "$\\dfrac{6}{x(x-1)}$",
     "$\\dfrac{5x - 3}{x(x-1)}$"],
   answerIndex:3,
   explanation:"LCD $= x(x-1)$. Rewrite: $\\frac{3(x-1)}{x(x-1)} + \\frac{2x}{x(x-1)} = \\frac{3x - 3 + 2x}{x(x-1)} = \\frac{5x-3}{x(x-1)}$."},

  // ---- 1.1.23  Field properties; prove or disprove arithmetic/algebraic statements ----

  {id:"m_11023_A", subject:"math", standard:"1.1.23", domain:"1", topic:"1.1", set:"A",
   prompt:"Using field properties of real numbers, which statement is always true?",
   options:[
     "For all real $a$, $a \\div 0 = 0$.",
     "For all real $a$ and $b$, $(a+b)^2 = a^2 + b^2$.",
     "For all real $a$, $a + (-a) = 0$ (additive inverse).",
     "For all real $a$, $a \\times \\frac{1}{a} = 0$."],
   answerIndex:2,
   explanation:"The additive inverse property: for every real $a$, there exists $-a$ such that $a + (-a) = 0$. Option A is undefined (division by zero). Option B is only true when $ab = 0$. Option D confuses multiplicative inverse with additive identity."},

  {id:"m_11023_B", subject:"math", standard:"1.1.23", domain:"1", topic:"1.1", set:"B",
   prompt:"A student claims: 'If $ab = 0$, then $a = 0$.' Is this statement always, sometimes, or never true?",
   options:[
     "Always — the zero product property requires both factors to be zero.",
     "Never — $ab = 0$ has no solution.",
     "Sometimes — $ab = 0$ means $a = 0$ or $b = 0$ (or both), not necessarily $a = 0$ alone.",
     "Always — you can divide both sides by $b$ to get $a = 0$."],
   answerIndex:2,
   explanation:"The zero product property states $ab = 0 \\Rightarrow a = 0$ or $b = 0$. The student's claim is only correct when $b \\neq 0$ (then you can divide). If $b = 0$, $a$ can be any value. The correct statement is '$a = 0$ or $b = 0$.'"},

  {id:"m_11023_C", subject:"math", standard:"1.1.23", domain:"1", topic:"1.1", set:"C",
   prompt:"Prove or disprove: for all integers $m$ and $n$, $(m+n)^2 = m^2 + n^2$.",
   options:[
     "True for all integers — squaring distributes over addition.",
     "True only when $m = n$.",
     "False — the correct expansion is $(m+n)^2 = m^2 + 2mn + n^2$; the middle term $2mn$ is zero only when $m = 0$ or $n = 0$.",
     "True only when $m$ and $n$ are odd."],
   answerIndex:2,
   explanation:"$(m+n)^2 = (m+n)(m+n) = m^2 + mn + mn + n^2 = m^2 + 2mn + n^2$. The claim fails whenever $mn \\neq 0$ — e.g., $m = n = 1$: $(1+1)^2 = 4$ but $1^2 + 1^2 = 2$."},

  // ---- 1.1.24  Real and complex numbers; plot complex numbers ----

  {id:"m_11024_A", subject:"math", standard:"1.1.24", domain:"1", topic:"1.1", set:"A",
   prompt:"The complex number $3 - 4i$ is plotted in the complex plane. In which quadrant does it lie?",
   options:[
     "Quadrant I (positive real, positive imaginary)",
     "Quadrant II (negative real, positive imaginary)",
     "Quadrant III (negative real, negative imaginary)",
     "Quadrant IV (positive real, negative imaginary)"],
   answerIndex:3,
   explanation:"In the complex plane, the real part is the horizontal axis and the imaginary part is the vertical axis. For $3 - 4i$: real part $= 3 > 0$ (right), imaginary part $= -4 < 0$ (below). This is Quadrant IV."},

  {id:"m_11024_B", subject:"math", standard:"1.1.24", domain:"1", topic:"1.1", set:"B",
   prompt:"What is the modulus (absolute value) of the complex number $5 + 12i$?",
   options:[
     "$17$",
     "$7$",
     "$13$",
     "$169$"],
   answerIndex:2,
   explanation:"The modulus of $a + bi$ is $\\sqrt{a^2 + b^2}$. For $5 + 12i$: $\\sqrt{25 + 144} = \\sqrt{169} = 13$."},

  {id:"m_11024_C", subject:"math", standard:"1.1.24", domain:"1", topic:"1.1", set:"C",
   prompt:"Which of the following is a real number?",
   options:[
     "$i^2$",
     "$\\sqrt{-4}$",
     "$2 + 3i$",
     "$i^3$"],
   answerIndex:0,
   explanation:"$i^2 = -1$, which is real. $\\sqrt{-4} = 2i$ (imaginary). $2 + 3i$ is complex with non-zero imaginary part. $i^3 = i^2 \\cdot i = -i$ (imaginary). Only $i^2 = -1$ is real."},

  // ---- 1.1.25  Add, subtract, multiply, divide complex numbers ----

  {id:"m_11025_A", subject:"math", standard:"1.1.25", domain:"1", topic:"1.1", set:"A",
   prompt:"Compute $(3 + 2i) + (1 - 5i)$.",
   options:[
     "$4 - 3i$",
     "$4 + 7i$",
     "$2 + 7i$",
     "$3 - 10i$"],
   answerIndex:0,
   explanation:"Add real parts and imaginary parts separately: $(3+1) + (2-5)i = 4 + (-3)i = 4 - 3i$."},

  {id:"m_11025_B", subject:"math", standard:"1.1.25", domain:"1", topic:"1.1", set:"B",
   prompt:"Compute $(2 + i)(3 - 2i)$.",
   options:[
     "$8 - i$",
     "$6 - i$",
     "$8 + i$",
     "$6 + 5i$"],
   answerIndex:0,
   explanation:"Use FOIL: $(2)(3) + (2)(-2i) + (i)(3) + (i)(-2i) = 6 - 4i + 3i - 2i^2$. Since $i^2 = -1$: $-2i^2 = +2$. Combine: $(6+2) + (-4+3)i = 8 - i$."},

  {id:"m_11025_C", subject:"math", standard:"1.1.25", domain:"1", topic:"1.1", set:"C",
   prompt:"Simplify $\\dfrac{2 + i}{1 - i}$ and express in standard form $a + bi$.",
   options:[
     "$\\dfrac{1}{2} + \\dfrac{3}{2}i$",
     "$2 - i$",
     "$1 + \\dfrac{3}{2}i$",
     "$\\dfrac{3}{2} + \\dfrac{1}{2}i$"],
   answerIndex:0,
   explanation:"Multiply numerator and denominator by the conjugate of the denominator $(1+i)$: $\\frac{(2+i)(1+i)}{(1-i)(1+i)} = \\frac{2 + 2i + i + i^2}{1 - i^2} = \\frac{2 + 3i - 1}{1 + 1} = \\frac{1 + 3i}{2} = \\frac{1}{2} + \\frac{3}{2}i$."},

  // ---- 1.1.01 Writes measurable objectives based on data & subject matter ----
  // A: recognize the measurable one  | B: spot what's missing | C: data-driven targeting
  {id:"p_1101_A", subject:"ptk", standard:"1.1.01", domain:"1", topic:"1.1", set:"A",
   prompt:"A department head asks teachers to rewrite vague aims as measurable objectives. Which revision best meets that bar?",
   options:[
     "The teacher will cover solving equations during the week.",
     "Students will engage deeply with the unit on equations.",
     "Students will become better problem solvers over the semester.",
     "Students will solve two-step linear equations, scoring at least 8 of 10 on the exit ticket."],
   answerIndex:3,
   explanation:"A measurable objective names an observable student behavior and a success criterion. Only option B states what students will do (solve two-step equations) and how success is judged (8/10). The others are vague, unobservable, or describe the teacher's action rather than student performance."},
  {id:"p_1101_B", subject:"ptk", standard:"1.1.01", domain:"1", topic:"1.1", set:"B",
   prompt:"An objective reads: \"Students will understand the Pythagorean theorem.\" What is the primary weakness?",
   options:[
     "\"Understand\" is not directly observable or measurable.",
     "It is written for the class rather than for individuals.",
     "It mentions a specific theorem instead of a broad theme.",
     "It targets content that is too advanced."],
   answerIndex:0,
   explanation:"\"Understand\" describes an internal state you cannot directly see or score. Strong objectives use observable verbs (e.g., \"apply,\" \"calculate,\" \"prove\") paired with a criterion, so mastery can be measured. The content itself is appropriate; the verb is the problem."},
  {id:"p_1101_C", subject:"ptk", standard:"1.1.01", domain:"1", topic:"1.1", set:"C",
   prompt:"A teacher's pre-assessment shows most students already factor simple quadratics but struggle when the leading coefficient is not 1. Using data to write the next objective, the best choice is to:",
   options:[
     "Set an objective targeting factoring quadratics with a leading coefficient other than 1.",
     "Move on to the next unit since most students can factor.",
     "Re-teach factoring of simple quadratics to the whole class.",
     "Write a general objective about \"mastering quadratics.\""],
   answerIndex:0,
   explanation:"Objectives should be grounded in data and subject matter. The evidence pinpoints a specific gap (leading coefficient ≠ 1), so the objective should target that gap precisely—neither re-teaching mastered content nor skipping ahead, and not a vague catch-all."},

  // ---- 1.1.02 Guides curricular planning around instructional goals ----
  // A: alignment principle | B: misalignment detection | C: choosing assessment to match goal
  {id:"p_1102_A", subject:"ptk", standard:"1.1.02", domain:"1", topic:"1.1", set:"A",
   prompt:"When planning a unit, which sequence reflects goal-driven curricular planning?",
   options:[
     "Start from the instructional goals, then choose methods, activities, and assessments that serve them.",
     "Choose the end-of-unit test first, then teach unrelated enrichment.",
     "Select content clusters at random to keep variety high.",
     "Pick fun activities first, then see what students learn from them."],
   answerIndex:0,
   explanation:"Goal-driven (often called \"backward\") planning starts with the instructional goals and lets those goals dictate the methods, learning activities, and assessment tools. Activities chosen for their own sake, or content selected at random, risk drifting away from what students are meant to learn."},
  {id:"p_1102_B", subject:"ptk", standard:"1.1.02", domain:"1", topic:"1.1", set:"B",
   prompt:"A unit goal is for students to construct and defend a mathematical argument, but the only graded task is a 20-item multiple-choice quiz. What is the planning flaw?",
   options:[
     "The assessment does not align with the goal of constructing and defending arguments.",
     "The goal should be simplified to match the quiz.",
     "Multiple-choice items can never assess mathematics.",
     "The assessment is too long for the unit."],
   answerIndex:0,
   explanation:"Curricular planning should align assessment tools with the instructional goal. A goal about constructing and defending arguments calls for a task where students produce reasoning (e.g., a written proof or explanation); a multiple-choice quiz measures recognition, not argument construction. The fix is to align the assessment to the goal, not to lower the goal."},
  {id:"p_1102_C", subject:"ptk", standard:"1.1.02", domain:"1", topic:"1.1", set:"C",
   prompt:"If the instructional goal is for students to apply ratios to real situations, which assessment tool best fits the goal?",
   options:[
     "A vocabulary matching exercise on ratio terms.",
     "A task asking students to scale a recipe and justify their reasoning.",
     "A timed drill of isolated ratio computations.",
     "A reading quiz about the history of ratios."],
   answerIndex:1,
   explanation:"The assessment should mirror the goal. \"Apply ratios to real situations\" is best evidenced by a task that requires applying ratios in context (scaling a recipe with justification). Drills, vocabulary matching, and history quizzes assess adjacent skills, not application."},

  // ---- 1.1.03 Organizes content around central concepts/theories/models ----
  // A: identify the organizing concept | B: contrast with topic-list teaching | C: cross-lesson coherence
  {id:"p_1103_A", subject:"ptk", standard:"1.1.03", domain:"1", topic:"1.1", set:"A",
   prompt:"Organizing a unit \"around a central concept\" most nearly means:",
   options:[
     "Anchoring lessons to a big idea (e.g., equivalence) that recurs and connects the topics.",
     "Letting students choose unrelated topics each day.",
     "Covering as many separate topics as time allows.",
     "Teaching topics in the order they appear in the textbook."],
   answerIndex:0,
   explanation:"Content organized around a central concept uses a recurring big idea to connect otherwise separate topics, giving the unit coherence. A textbook order or a long list of disconnected topics lacks that unifying thread."},
  {id:"p_1103_B", subject:"ptk", standard:"1.1.03", domain:"1", topic:"1.1", set:"B",
   prompt:"Two teachers plan a unit. Teacher X lists \"Monday: slope, Tuesday: intercepts, Wednesday: graphing\" with no stated connections. Teacher Y frames the week around the idea that a line can be described in multiple equivalent forms. Why is Teacher Y's approach stronger for organizing content?",
   options:[
     "It covers fewer topics, which is always better.",
     "It avoids graphing, which confuses students.",
     "It links the day-to-day topics to a unifying idea, helping students see relationships.",
     "It guarantees higher test scores regardless of teaching quality."],
   answerIndex:2,
   explanation:"Teacher Y organizes content around a central idea (equivalent representations of a line), so the separate topics cohere and relationships become visible. Teacher X's list treats topics as isolated. Coverage count and guaranteed scores are not the point, and graphing is still included."},
  {id:"p_1103_C", subject:"ptk", standard:"1.1.03", domain:"1", topic:"1.1", set:"C",
   prompt:"Across a multi-lesson unit on functions, which planning move best reflects organizing content around models?",
   options:[
     "Postpone any conceptual framing until the unit test.",
     "Have students memorize definitions without examples.",
     "Introduce a new, unrelated function type every day with no callbacks.",
     "Return to the input–output model repeatedly, using it to interpret each new function type."],
   answerIndex:3,
   explanation:"Repeatedly returning to a unifying model (input–output) and using it to make sense of each new case organizes the content around a central model and supports transfer across lessons. Disconnected daily topics, delayed framing, or rote definitions do not."},

  // ---- 1.1.04 Selects facts/examples to substantiate or illustrate ideas ----
  // A: purpose of examples | B: choosing a clarifying example | C: too few vs well-chosen
  {id:"p_1104_A", subject:"ptk", standard:"1.1.04", domain:"1", topic:"1.1", set:"A",
   prompt:"A teacher selects specific examples when introducing a concept primarily in order to:",
   options:[
     "Demonstrate the teacher's own expertise.",
     "Substantiate and illustrate the idea so it becomes concrete for students.",
     "Replace the need for any explanation of the concept.",
     "Fill instructional time with extra material."],
   answerIndex:1,
   explanation:"Well-chosen facts and examples substantiate and illustrate the idea, making an abstract concept concrete and accessible. Examples support explanation rather than replacing it, and their purpose is student understanding, not filling time or display."},
  {id:"p_1104_B", subject:"ptk", standard:"1.1.04", domain:"1", topic:"1.1", set:"B",
   prompt:"To illustrate the concept of \"function\" most clearly to beginners, which example set is best?",
   options:[
     "Only counterexamples of relations that are not functions.",
     "A list of definitions with no instances.",
     "A familiar mapping (each student to one assigned locker) plus a simple rule like doubling a number.",
     "A single highly abstract piecewise function with unusual notation."],
   answerIndex:2,
   explanation:"Concrete, familiar examples (one student → one locker; doubling) substantiate the idea and make it accessible before edge cases. A lone abstract case, definitions without instances, or only counterexamples do not first establish what the concept is."},
  {id:"p_1104_C", subject:"ptk", standard:"1.1.04", domain:"1", topic:"1.1", set:"C",
   prompt:"A teacher presents exactly one example of solving an inequality, then assigns varied homework. What is the most likely shortcoming in example selection?",
   options:[
     "Homework should precede any examples.",
     "Examples should never be used when assigning homework.",
     "A single example may not substantiate the range of cases students will face.",
     "One example is always sufficient for any concept."],
   answerIndex:2,
   explanation:"Examples should be selected to substantiate and illustrate the idea across the cases students will encounter. A single example may not represent the variation (e.g., flipping the inequality sign when multiplying by a negative), leaving students unprepared for varied problems."},

  // ---- 1.1.05 Juxtaposes examples: same defining features, different surface ----
  // A: rationale (generalize) | B: rationale (discriminate) | C: design the example pair
  {id:"p_1105_A", subject:"ptk", standard:"1.1.05", domain:"1", topic:"1.1", set:"A",
   prompt:"A teacher shows several examples of \"prime number\" that look very different on the surface (2, 17, 101) but share the defining feature. The main purpose is to help students:",
   options:[
     "Conclude that primes must be large.",
     "Believe that only odd numbers can be prime.",
     "Generalize the concept to new examples by focusing on the defining feature.",
     "Memorize those three specific numbers."],
   answerIndex:2,
   explanation:"Juxtaposing surface-different examples that share the defining feature directs attention to what actually defines the concept, so students can generalize to new cases. (Including 2 also blocks the misconception that primes must be odd or large.)"},
  {id:"p_1105_B", subject:"ptk", standard:"1.1.05", domain:"1", topic:"1.1", set:"B",
   prompt:"Why might a teacher deliberately pair a true example with a near-miss non-example (e.g., a function vs. a relation that fails the one-output rule)?",
   options:[
     "To make the lesson longer.",
     "To help students discriminate same from different when the cases look similar.",
     "Because non-examples are always more important than examples.",
     "To discourage students from asking questions."],
   answerIndex:1,
   explanation:"Pairing an example with a closely matched non-example highlights the defining feature precisely where confusion is likely, helping students discriminate cases that look similar. This complements example sets used for generalization."},
  {id:"p_1105_C", subject:"ptk", standard:"1.1.05", domain:"1", topic:"1.1", set:"C",
   prompt:"Designing examples to teach \"equation\" vs. \"expression,\" which pair best supports both generalizing and discriminating?",
   options:[
     "A single equation repeated three times.",
     "Two equations that look almost identical.",
     "Only expressions, never equations.",
     "Surface-varied equations (e.g., $2x+1=7$ and $\\frac{a}{3}=5$) contrasted with surface-similar expressions (e.g., $2x+1$)."],
   answerIndex:3,
   explanation:"The strongest design varies the surface among true examples (so students generalize \"has an equals sign / states equality\") while contrasting them with close non-examples (expressions) so students discriminate the defining feature. The other options provide neither variation nor contrast."},

  // ---- 1.1.06 Spaces practice of important ideas across occasions ----
  // A: name the principle | B: contrast massed vs spaced | C: apply to a planning decision
  {id:"p_1106_A", subject:"ptk", standard:"1.1.06", domain:"1", topic:"1.1", set:"A",
   prompt:"Revisiting an important skill briefly on several different days, rather than only once for a long block, is best described as:",
   options:[
     "Distributed (spaced) practice.",
     "Differentiation.",
     "Tracking.",
     "Cramming."],
   answerIndex:0,
   explanation:"Practicing a skill on several separated occasions is distributed (spaced) practice, which generally strengthens long-term retention more than a single massed session. The standard calls for studying important ideas \"on several occasions rather than all at once.\""},
  {id:"p_1106_B", subject:"ptk", standard:"1.1.06", domain:"1", topic:"1.1", set:"B",
   prompt:"Two plans cover the same key skill. Plan 1 drills it intensely for one full class then never returns. Plan 2 practices it for ten minutes across five lessons. Research on spacing predicts that Plan 2 will most likely:",
   options:[
     "Produce stronger long-term retention of the skill.",
     "Be impossible to assess.",
     "Produce weaker long-term retention.",
     "Make no difference to retention."],
   answerIndex:0,
   explanation:"Spacing the same total practice across multiple occasions typically yields stronger long-term retention than massing it into one session, which is exactly why the standard recommends distributing important ideas across lessons."},
  {id:"p_1106_C", subject:"ptk", standard:"1.1.06", domain:"1", topic:"1.1", set:"C",
   prompt:"A teacher wants students to retain integer operations all year. Which planning move best applies the spacing principle?",
   options:[
     "Assign one very long integer worksheet and move on.",
     "Wait until the final exam review to revisit integers.",
     "Embed brief integer-operation warm-ups periodically throughout later units.",
     "Teach integers once in September and never revisit them."],
   answerIndex:2,
   explanation:"Periodic brief revisiting (interleaved warm-ups across later units) distributes practice over time, supporting durable retention. Teaching once, cramming at exam time, or a single long worksheet all concentrate practice rather than spacing it."},

  // ---- 1.1.07 Selects content that builds on prior learning ----
  // A: principle | B: diagnosing a gap | C: sequencing decision
  {id:"p_1107_A", subject:"ptk", standard:"1.1.07", domain:"1", topic:"1.1", set:"A",
   prompt:"Choosing lesson content that \"builds on prior learning\" means a teacher should:",
   options:[
     "Assume students remember everything from previous years.",
     "Connect new material to what students already know and can do.",
     "Always start each topic as if students know nothing.",
     "Avoid referencing earlier lessons to prevent confusion."],
   answerIndex:1,
   explanation:"Building on prior learning means deliberately linking new content to students' existing knowledge and skills, which makes the new material easier to assimilate. It neither assumes perfect recall nor ignores prior knowledge entirely."},
  {id:"p_1107_B", subject:"ptk", standard:"1.1.07", domain:"1", topic:"1.1", set:"B",
   prompt:"Before teaching solving systems of equations, a teacher checks that students can solve a single linear equation. This check is most directly intended to:",
   options:[
     "Fill time at the start of the lesson.",
     "Assign grades for participation.",
     "Replace the lesson on systems entirely.",
     "Confirm the prior skill the new content will build on is in place."],
   answerIndex:3,
   explanation:"Verifying the prerequisite skill (solving one linear equation) ensures the foundation exists for the new content (systems), which is the essence of building on prior learning. It is a readiness check, not busywork or a substitute for the lesson."},
  {id:"p_1107_C", subject:"ptk", standard:"1.1.07", domain:"1", topic:"1.1", set:"C",
   prompt:"A diagnostic reveals students are shaky on equivalent fractions. The teacher's upcoming lesson is on adding fractions with unlike denominators. The most appropriate content decision is to:",
   options:[
     "Proceed to unlike denominators without addressing fractions equivalence.",
     "Assign the hardest problems first to challenge students.",
     "Skip fractions and teach decimals instead.",
     "Briefly shore up equivalent fractions first, since the new skill depends on it."],
   answerIndex:3,
   explanation:"Adding unlike-denominator fractions builds directly on equivalence (finding common denominators). Shoring up the prerequisite first respects the build-on-prior-learning principle; ignoring the gap or switching topics does not address the dependency."},

  // ---- 1.1.08 Organizes instruction into clearly defined segments ----
  // A: identify a well-segmented lesson | B: purpose of segmenting | C: choose the missing segment
  {id:"p_1108_A", subject:"ptk", standard:"1.1.08", domain:"1", topic:"1.1", set:"A",
   prompt:"Which lesson structure best reflects organizing instruction into clearly defined segments?",
   options:[
     "A warm-up, focused presentation, guided practice, independent practice, and a review/closure.",
     "Random activities chosen on the spot with no plan.",
     "Students working silently the entire period with no teacher input.",
     "A single 50-minute lecture with no breaks or activities."],
   answerIndex:0,
   explanation:"Clearly defined segments—such as warm-up, presentation, guided and independent practice, and review—give a lesson a recognizable structure that supports pacing and learning. An undifferentiated lecture, unstructured silence, or improvised activities lack that organization."},
  {id:"p_1108_B", subject:"ptk", standard:"1.1.08", domain:"1", topic:"1.1", set:"B",
   prompt:"The main instructional benefit of dividing a lesson into distinct segments (routines, presentation, practice, review) is that it:",
   options:[
     "Eliminates the need for any planning.",
     "Removes the teacher from the learning process.",
     "Guarantees students will earn high grades.",
     "Gives the lesson a clear structure that supports focus, pacing, and transitions."],
   answerIndex:3,
   explanation:"Defined segments provide structure that helps students know what to do, supports pacing, and smooths transitions between phases of the lesson. It does not guarantee grades, remove planning, or remove the teacher."},
  {id:"p_1108_C", subject:"ptk", standard:"1.1.08", domain:"1", topic:"1.1", set:"C",
   prompt:"A lesson moves from warm-up to teacher presentation, then straight to a graded independent quiz. Which segment is most notably missing?",
   options:[
     "An attendance check.",
     "A second warm-up.",
     "Guided practice before students work independently.",
     "A longer lecture."],
   answerIndex:2,
   explanation:"Jumping from presentation to a graded independent task skips guided practice, the segment where students try the skill with support before being assessed alone. Including it follows the principle of clearly defined, appropriately sequenced segments."},

  // ---- 1.1.09 Designs instruction showing relationships & transfer ----
  // A: define transfer | B: design for transfer | C: spot the relationship-revealing move
  {id:"p_1109_A", subject:"ptk", standard:"1.1.09", domain:"1", topic:"1.1", set:"A",
   prompt:"In instruction, \"transfer\" most nearly refers to students':",
   options:[
     "Applying what they learned to new situations or contexts.",
     "Switching to an easier course.",
     "Moving to a different classroom.",
     "Copying notes from the board."],
   answerIndex:0,
   explanation:"Transfer is the application of learning to new and different situations. Designing instruction that highlights relationships among ideas and points out opportunities for transfer helps students use knowledge beyond the original context."},
  {id:"p_1109_B", subject:"ptk", standard:"1.1.09", domain:"1", topic:"1.1", set:"B",
   prompt:"Which teacher move is most likely to promote transfer of a newly learned method?",
   options:[
     "Having students memorize the steps without discussing why they work.",
     "Avoiding any mention of related concepts.",
     "Pointing out how the method connects to a previously learned idea and applying it in a new context.",
     "Restricting practice to problems identical to the worked example."],
   answerIndex:2,
   explanation:"Making relationships explicit and applying a method in a new context cues students to recognize where the idea applies elsewhere, supporting transfer. Identical-only practice or rote memorization tends to limit application to the original context."},
  {id:"p_1109_C", subject:"ptk", standard:"1.1.09", domain:"1", topic:"1.1", set:"C",
   prompt:"A teacher says, \"Notice that finding the area under a rate graph is the same idea as the distance problem we did last week.\" This statement most directly:",
   options:[
     "Reveals a relationship among ideas and signals an opportunity for transfer.",
     "Confuses unrelated topics.",
     "Reduces the lesson's rigor.",
     "Replaces the need for practice."],
   answerIndex:0,
   explanation:"Explicitly linking the new task (area under a rate graph) to a prior idea (distance) reveals the underlying relationship and flags where the concept transfers, which is exactly what designing instruction for relationships and transfer entails."},

  // ---- 1.1.10 Knows ways to organize information (organizers, study/concept guides) ----
  // A: match tool to purpose (relationships) | B: study guide purpose | C: concept guide purpose
  {id:"p_1110_A", subject:"ptk", standard:"1.1.10", domain:"1", topic:"1.1", set:"A",
   prompt:"A teacher wants students to see how superordinate and subordinate concepts relate within a unit. Which tool is best suited?",
   options:[
     "An attendance log.",
     "A graphic organizer that depicts the hierarchy of concepts.",
     "A timed multiple-choice quiz.",
     "A seating chart."],
   answerIndex:1,
   explanation:"Graphic organizers are designed to depict relationships among central, superordinate, subordinate, and coordinate concepts, making conceptual structure visible. Quizzes, seating charts, and logs serve other purposes."},
  {id:"p_1110_B", subject:"ptk", standard:"1.1.10", domain:"1", topic:"1.1", set:"B",
   prompt:"A study guide that \"calls attention to key ideas and addresses literal, interpretive, and applied levels of comprehension\" is most useful for:",
   options:[
     "Recording disciplinary referrals.",
     "Guiding students to focus on important content and think about it at multiple levels.",
     "Replacing the textbook entirely.",
     "Assigning final grades."],
   answerIndex:1,
   explanation:"A study guide of this kind directs students to the key ideas and prompts thinking at literal, interpretive, and applied levels—supporting comprehension across depths. It is a learning aid, not a grading or record-keeping device, and does not replace core materials."},
  {id:"p_1110_C", subject:"ptk", standard:"1.1.10", domain:"1", topic:"1.1", set:"C",
   prompt:"Which tool is specifically intended to link new information to material students previously learned?",
   options:[
     "A grade-weighting policy.",
     "A concept guide.",
     "A hall pass.",
     "A fire-drill checklist."],
   answerIndex:1,
   explanation:"A concept guide is designed to connect new information with previously learned material, helping students integrate the new content. The other options are unrelated to organizing information for learning."},

  // ---- 2.1.01 Sparks interest by linking prior knowledge/experience to larger concepts ----
  {id:"p_2101_A", subject:"ptk", standard:"2.1.01", domain:"2", topic:"2.1", set:"A",
   prompt:"A teacher is about to introduce exponential growth to a class that often tunes out during new units. Which opening is most likely to generate genuine interest in the concept?",
   options:[
     "Reading the textbook definition of an exponential function aloud, then restating it.",
     "Telling students the unit will be hard but important for the test.",
     "Writing the day's three homework problems on the board.",
     "Asking students to imagine folding a paper in half repeatedly and predict its thickness after many folds, then connecting that surprise to repeated multiplication."],
   answerIndex:3,
   explanation:"Interest is sparked when an abstract concept is anchored to something students can picture or have experienced. The paper-folding prediction creates curiosity (the thickness grows shockingly fast) and bridges directly to repeated multiplication. A read-aloud definition, a homework list, or a warning about difficulty do not build that hook into the concept."},
  {id:"p_2101_B", subject:"ptk", standard:"2.1.01", domain:"2", topic:"2.1", set:"B",
   prompt:"Two teachers open a lesson on proportional reasoning. Mr. A says, \"Open to page 112; today is proportions.\" Ms. B says, \"Ever doubled a recipe and had to figure out the new amounts? That's the math we're learning to do precisely today.\" Why is Ms. B's opening the stronger one for engaging students?",
   options:[
     "It is shorter and saves class time.",
     "It connects the new concept to a familiar real experience, giving students a reason to care.",
     "It avoids telling students the topic, keeping them guessing.",
     "It guarantees students will score higher on the unit test."],
   answerIndex:1,
   explanation:"Ms. B grounds proportional reasoning in a recognizable experience (scaling a recipe), which gives the abstract topic relevance and motivates attention. Mr. A names the topic but offers no reason to engage. The strength isn't brevity, mystery, or a score guarantee—it's the meaningful link to students' lives."},
  {id:"p_2101_C", subject:"ptk", standard:"2.1.01", domain:"2", topic:"2.1", set:"C",
   prompt:"A teacher likes to start units with a flashy video, but students enjoy the video and then seem no more invested in the actual math. What change would make the opening genuinely build interest in the concept?",
   options:[
     "Make sure the hook connects explicitly to the concept students are about to learn, so curiosity carries into the content.",
     "Play the video at the end of the unit instead.",
     "Choose an even more entertaining video.",
     "Drop any opening hook and start with notes immediately."],
   answerIndex:0,
   explanation:"A hook only builds interest in the learning if it ties to the concept; otherwise it's entertainment that fades when the math begins. The fix is to bridge the hook to the content (e.g., \"that bridge collapse in the clip is exactly the rate-of-change idea we'll model\"). A flashier video deepens the same disconnect; cutting hooks entirely loses the motivational value."},

  // ---- 2.1.02 Explains how current lesson builds on previously learned knowledge/skills ----
  {id:"p_2102_A", subject:"ptk", standard:"2.1.02", domain:"2", topic:"2.1", set:"A",
   prompt:"Students are about to learn to factor trinomials. They already know how to multiply two binomials. What is the instructional value of explicitly telling students that factoring \"reverses\" the multiplication they already know?",
   options:[
     "It frames the new skill as an extension of something familiar, lowering the sense of difficulty and aiding comprehension.",
     "It proves factoring is easier than multiplying.",
     "It lets the teacher skip demonstrating any factoring.",
     "It eliminates the need for students to practice factoring."],
   answerIndex:0,
   explanation:"Explicitly linking new learning to a mastered skill lets students attach the new procedure to an existing mental structure, which reduces perceived difficulty and supports understanding. It does not remove the need to demonstrate or practice the new skill, nor does it make a claim about relative ease."},
  {id:"p_2102_B", subject:"ptk", standard:"2.1.02", domain:"2", topic:"2.1", set:"B",
   prompt:"A teacher introduces the quadratic formula with: \"Open to page 80; copy this formula.\" Students apply it mechanically but can't say where it comes from or when to choose it. Which revision to the opening best addresses that?",
   options:[
     "Explain that the formula generalizes the completing-the-square method they learned last week, so it's the same idea made general.",
     "Assign more practice problems using the formula.",
     "Tell students they'll understand it eventually.",
     "Have students copy the formula twice for memorization."],
   answerIndex:0,
   explanation:"The students' confusion is rooted in seeing the formula as disconnected. Connecting it to last week's completing-the-square shows where it comes from and grounds it in prior learning, which builds understanding rather than rote use. Extra copying or practice reinforces the mechanical use without the conceptual link."},
  {id:"p_2102_C", subject:"ptk", standard:"2.1.02", domain:"2", topic:"2.1", set:"C",
   prompt:"Before teaching addition of fractions with unlike denominators, a teacher reminds students how they already find equivalent fractions. A colleague asks why bother. What is the best rationale?",
   options:[
     "The new skill depends on the prior one, so surfacing it primes the knowledge students will immediately need.",
     "It fills time before the real lesson starts.",
     "It lets the teacher avoid teaching equivalent fractions ever again.",
     "Students prefer reviewing old material to learning new material."],
   answerIndex:0,
   explanation:"Adding unlike-denominator fractions relies directly on finding equivalent fractions (to reach a common denominator). Surfacing that prerequisite activates the exact knowledge students are about to use, smoothing the new learning. It isn't filler, isn't a substitute for prior teaching, and isn't about student preference."},

  // ---- 2.1.03 Previews major ideas/questions to prime thinking ----
  {id:"p_2103_A", subject:"ptk", standard:"2.1.03", domain:"2", topic:"2.1", set:"A",
   prompt:"At the start of a lesson on linear functions, a teacher posts three guiding questions: \"What makes a function linear? How do you spot it in a table? In a graph?\" How does posting these up front help learning?",
   options:[
     "It replaces the need to actually teach the answers.",
     "It ensures all students learn at the same pace.",
     "It gives students a mental framework that orients their attention to what matters as the lesson unfolds.",
     "It lets students skip the parts they already know."],
   answerIndex:2,
   explanation:"Previewing the major questions acts as an advance organizer: students know what to listen for and can slot incoming information into a ready framework, which improves processing and retention. It doesn't replace instruction, equalize pace, or license skipping content."},
  {id:"p_2103_B", subject:"ptk", standard:"2.1.03", domain:"2", topic:"2.1", set:"B",
   prompt:"A teacher dives straight into worked examples with no framing; students can do each step but later can't say what the lesson was really about. Which adjustment most directly addresses that problem?",
   options:[
     "Open by previewing the big idea and the key questions the examples will help answer.",
     "Add more worked examples.",
     "Give the examples as homework instead.",
     "Speed up the pace to cover more ground."],
   answerIndex:0,
   explanation:"Students who master steps but miss the point usually lack a frame for what the steps add up to. Previewing the big idea and guiding questions gives that frame, so the examples become evidence for a point rather than isolated procedures. More or faster examples deepen the same gap."},
  {id:"p_2103_C", subject:"ptk", standard:"2.1.03", domain:"2", topic:"2.1", set:"C",
   prompt:"Which teacher action genuinely previews a lesson's major ideas, as opposed to just starting the lesson?",
   options:[
     "Asking students to open their books to the correct page.",
     "Briefly naming the central question the lesson will answer and the two or three ideas students should watch for.",
     "Taking attendance and collecting homework.",
     "Working a complete sample problem in full detail before saying what the lesson is about."],
   answerIndex:1,
   explanation:"A genuine preview surfaces the central question and the few key ideas to watch for, priming students before the details arrive. Working a full problem first is instruction, not preview; attendance and page-turning are logistics. Previewing is about orienting thinking ahead of the content."},

  // ---- 2.1.04 States clearly what will be taught (the content/objective) ----
  {id:"p_2104_A", subject:"ptk", standard:"2.1.04", domain:"2", topic:"2.1", set:"A",
   prompt:"A teacher's students often seem unsure what they were supposed to take away from a lesson. Which opening practice most directly reduces that confusion?",
   options:[
     "Letting the activities speak for themselves without comment.",
     "Starting with a timed warm-up unrelated to the day's content.",
     "Beginning each lesson with a clear statement of the concept or strategy students will learn that day.",
     "Waiting until the end of class to reveal the lesson's purpose."],
   answerIndex:2,
   explanation:"Clearly stating what will be taught at the outset tells students what to aim for, so they can organize their attention around it. Unrelated warm-ups, delayed reveals, or unspoken purposes leave students guessing about the intended takeaway."},
  {id:"p_2104_B", subject:"ptk", standard:"2.1.04", domain:"2", topic:"2.1", set:"B",
   prompt:"Which statement of a lesson's focus is most useful to students because it names the actual learning, not just an activity?",
   options:[
     "\"Today we're on page 94.\"",
     "\"Today you'll learn a strategy for solving systems of equations by substitution.\"",
     "\"Today we're doing a worksheet.\"",
     "\"Today we're getting through chapter 5.\""],
   answerIndex:1,
   explanation:"Naming the strategy students will learn (substitution for solving systems) tells them what knowledge they should walk away with. Referring to a worksheet, a page, or \"getting through\" a chapter describes activity or location, not the intended learning, so students can't tell what mastery looks like."},
  {id:"p_2104_C", subject:"ptk", standard:"2.1.04", domain:"2", topic:"2.1", set:"C",
   prompt:"An observer notes a teacher tells students how they should improve (\"work more independently\") but never states what content the lesson actually teaches. Why is that a problem, and what's the fix?",
   options:[
     "The fix is to make the lesson longer.",
     "Students hear a goal for how to work but not what to learn; the fix is to also state the concept or skill being taught.",
     "The fix is to stop stating any goals and just begin the activity.",
     "It isn't a problem; naming desired growth is enough on its own."],
   answerIndex:1,
   explanation:"Telling students how to improve is valuable, but without also naming the content, they don't know what knowledge or skill the lesson targets. Stating the actual concept or skill gives them the substance to focus on. Dropping goals or lengthening the lesson doesn't supply the missing content statement."},

  // ---- 2.1.05 States the kind of change/growth being fostered in students ----
  {id:"p_2105_A", subject:"ptk", standard:"2.1.05", domain:"2", topic:"2.1", set:"A",
   prompt:"Students can already get a type of problem right, but slowly and only with notes. A teacher wants to communicate the day's purpose in a way that targets the right growth. Which statement of purpose best fits?",
   options:[
     "\"Today we're reviewing what you already know.\"",
     "\"Today's topic is the distributive property.\"",
     "\"Today we'll be on page 60.\"",
     "\"Today's goal is to get you solving these accurately without notes and fast enough to use them under time pressure.\""],
   answerIndex:3,
   explanation:"When students already have basic accuracy, the meaningful growth is fluency and independence (speed, no notes). Naming that target tells students what kind of improvement to aim for and self-monitor. Naming only the topic, the page, or \"review\" doesn't communicate the intended change in their performance."},
  {id:"p_2105_B", subject:"ptk", standard:"2.1.05", domain:"2", topic:"2.1", set:"B",
   prompt:"A teacher tells students: \"By Friday you should be able to combine these separate steps into one smooth procedure and use it on problems you haven't seen before.\" What kinds of growth is the teacher asking students to aim for?",
   options:[
     "Fluency (combining steps smoothly) and transfer (applying to new problems).",
     "Memorizing more vocabulary terms.",
     "Neater handwriting on assignments.",
     "Faster attendance routines."],
   answerIndex:0,
   explanation:"\"Combine separate steps into one smooth procedure\" targets fluency, and \"use it on problems you haven't seen before\" targets transfer/generalization. Naming these tells students the specific kind of improvement expected. The other options aren't the learning growth described."},
  {id:"p_2105_C", subject:"ptk", standard:"2.1.05", domain:"2", topic:"2.1", set:"C",
   prompt:"Two teachers state a purpose for the same lesson. One says, \"Today is about quadratics.\" The other says, \"Today's aim is to move you from solving quadratics one careful step at a time to solving them confidently on your own.\" Why might the second framing support learning more?",
   options:[
     "It removes the need to teach quadratics.",
     "It is more impressive to administrators.",
     "It guarantees every student will reach the goal by the end of class.",
     "It tells students what kind of progress to watch for in themselves, turning a topic into a concrete growth target."],
   answerIndex:3,
   explanation:"Naming the intended change (from effortful, step-by-step solving toward confident independence) gives students a concrete target they can monitor their own progress against, which a bare topic name does not. It doesn't replace teaching the content or guarantee uniform results; it clarifies what growth looks like."},

  /* ===================================================================
     PTK · Domain 2 · Topic 2.2 — Provides Clear and Focused Instruction
     BATCH 1: standards 2.2.01–2.2.07, sets A/B/C (21 questions).
     Context rule: A & B subject-neutral; C set in a secondary-math class.
     Difficulty: distractors are tempting *teaching* choices, often drawn
     from adjacent 2.2 standards, forcing fine discrimination.
     =================================================================== */

  // ---- 2.2.01 Assesses students to decide where/how to begin instruction ----
  // A: recognize the move | B: act on the results | C(math): diagnose prerequisite gap
  {id:"p_2201_A", subject:"ptk", standard:"2.2.01", domain:"2", topic:"2.2", set:"A",
   prompt:"It's the first day of a new unit. Before teaching anything new, a teacher gives a short ungraded task covering the skills this unit will build on. What is the main instructional purpose of doing this?",
   options:[
     "To preview the major ideas of the upcoming lesson for students.",
     "To find out what students already know so the teacher can decide where to start.",
     "To keep students busy while attendance is taken.",
     "To assign early grades so the gradebook isn't empty."],
   answerIndex:1,
   explanation:"The defining purpose here is diagnostic: checking prior knowledge and prerequisite skills so instruction begins at the right place. The preview option is a real teaching move (2.1.03) but it's about priming students, not about the teacher gathering data to place instruction. Grades and busywork aren't the instructional purpose."},
  {id:"p_2201_B", subject:"ptk", standard:"2.2.01", domain:"2", topic:"2.2", set:"B",
   prompt:"A pre-unit check shows that most of the class is shaky on a prerequisite skill the new unit assumes. What is the most appropriate response?",
   options:[
     "Briefly reteach or shore up the prerequisite before starting the new content.",
     "Move the whole class to an easier unit instead.",
     "Proceed with the planned first lesson on schedule; they'll catch up.",
     "Reteach the prerequisite only to the few who already had it."],
   answerIndex:0,
   explanation:"The point of the pre-assessment is to act on it: addressing the shared prerequisite gap before building on it keeps the new content learnable. Plowing ahead ignores the data; abandoning the unit overcorrects; and reteaching the students who already have the skill targets the wrong group."},
  {id:"p_2201_C", subject:"ptk", standard:"2.2.01", domain:"2", topic:"2.2", set:"C",
   prompt:"A teacher is about to start a unit on solving multi-step equations like $3x - 7 = 2x + 5$. On a warm-up, many students mishandle signed arithmetic and incorrectly simplify $5x - 2x$ as $3$ instead of $3x$. How should this shape where instruction begins?",
   options:[
     "Spend the first day previewing the real-world applications of linear equations.",
     "Start the equations unit as planned, since these skills were covered last year.",
     "First solidify integer operations and combining like terms, since solving the equations depends on them.",
     "Skip the warm-up results and assign equations with variables on both sides to push ahead."],
   answerIndex:2,
   explanation:"The diagnostic data exposes prerequisite gaps (signed arithmetic, combining like terms) that the target skill is built on, so instruction should start by closing them. The \"covered last year\" option ignores what the data shows now. Pushing ahead to harder equations or previewing applications both skip past the missing foundation."},

  // ---- 2.2.02 Presents material in a logical sequence ----
  // A: recognize good sequence | B: spot the broken sequence | C(math): order a progression
  {id:"p_2202_A", subject:"ptk", standard:"2.2.02", domain:"2", topic:"2.2", set:"A",
   prompt:"A teacher is planning the order in which to present the parts of a new skill. Which sequencing principle best reflects logical presentation?",
   options:[
     "Order the parts so each one builds on what students have already been shown.",
     "Start with the hardest application so students see where they're headed.",
     "Cover the parts in order of how interesting each one is.",
     "Present the parts in whatever order the textbook happens to list them."],
   answerIndex:0,
   explanation:"Logical sequencing means each step rests on prior steps, so understanding accumulates. Textbook order, difficulty-first, and interest-first may occasionally coincide with that, but none of them is the organizing principle; building on what came before is."},
  {id:"p_2202_B", subject:"ptk", standard:"2.2.02", domain:"2", topic:"2.2", set:"B",
   prompt:"A lesson goes: definition of the new idea, then a hard multi-step application, then \u2014 after students are confused \u2014 the simple building-block sub-skills the application needed. What is the main sequencing problem?",
   options:[
     "The teacher digressed from the learning objective.",
     "Prerequisite sub-skills were presented after the task that required them, instead of before.",
     "The definition should never come first.",
     "The lesson included too many examples."],
   answerIndex:1,
   explanation:"The sequence is out of order: the building blocks needed for the application came after it, so students hit the hard task without the pieces. The flaw isn't the number of examples or the definition's placement. Digressing (2.2.05) is a different failure \u2014 here the content is on-topic but mis-ordered."},
  {id:"p_2202_C", subject:"ptk", standard:"2.2.02", domain:"2", topic:"2.2", set:"C",
   prompt:"A teacher is sequencing a short progression on exponents. Which order presents the material most logically?",
   options:[
     "Meaning of $x^3=x\\cdot x\\cdot x$ \u2192 product rule ($x^a x^b=x^{a+b}$) \u2192 zero and negative exponents ($x^0=1$, $x^{-2}=\\frac{1}{x^2}$).",
     "Negative exponents ($x^{-2}=\\frac{1}{x^2}$) \u2192 zero exponent ($x^0=1$) \u2192 meaning of $x^3=x\\cdot x\\cdot x$.",
     "Product rule ($x^a x^b=x^{a+b}$) \u2192 meaning of $x^3=x\\cdot x\\cdot x$ \u2192 negative exponents.",
     "Negative exponents ($x^{-2}=\\frac{1}{x^2}$) \u2192 product rule ($x^a x^b=x^{a+b}$) \u2192 meaning of $x^3=x\\cdot x\\cdot x$."],
   answerIndex:0,
   explanation:"The meaning of a positive integer exponent ($x^3=x\\cdot x\\cdot x$) is the foundation; the product rule builds on it; zero and negative exponents are best understood as extensions of those patterns. The other orders introduce rules or special cases before the idea they depend on, which is exactly the sequencing flaw to avoid."},

  // ---- 2.2.03 Presents new content in small steps ----
  // A: recognize chunking | B: choose chunk size | C(math): break a multi-step procedure
  {id:"p_2203_A", subject:"ptk", standard:"2.2.03", domain:"2", topic:"2.2", set:"A",
   prompt:"A complex new procedure has many steps. A teacher introduces one or two steps, has students try them, then adds the next step or two, and so on. What instructional principle is the teacher applying?",
   options:[
     "Withdrawing support as students become proficient.",
     "Connecting the lesson to students' prior experiences.",
     "Teaching the vocabulary needed for the subject.",
     "Presenting new content in small, manageable steps."],
   answerIndex:3,
   explanation:"Breaking a complex procedure into small, sequenced increments with practice between them is presenting content in small steps, which limits cognitive overload. Gradually withdrawing support (2.2.10) is a related but distinct move about fading help; vocabulary and prior-experience connections aren't what's happening here."},
  {id:"p_2203_B", subject:"ptk", standard:"2.2.03", domain:"2", topic:"2.2", set:"B",
   prompt:"A teacher demonstrates an entire seven-step process start to finish in one continuous explanation, then asks students to do the whole thing. Many can't get past step two. What adjustment best fits the principle of small steps?",
   options:[
     "Demonstrate the full seven steps again, but more slowly.",
     "Give students the answer key so they can check the final result.",
     "Move on, since most students grasped the introduction.",
     "Teach and have students practice a couple of steps at a time before chaining them together."],
   answerIndex:3,
   explanation:"The failure is that too much was introduced at once; the fix is to chunk \u2014 practice a few steps before adding more. Repeating the whole demonstration just re-presents the overload. An answer key checks products, not the learning of each step, and moving on abandons the goal."},
  {id:"p_2203_C", subject:"ptk", standard:"2.2.03", domain:"2", topic:"2.2", set:"C",
   prompt:"Students are learning to solve a two-step equation such as $3x + 5 = 20$ and keep making errors when shown the full solution at once. Which approach best reflects presenting content in small steps?",
   options:[
     "Give a printed list of all the rules for solving equations to memorize.",
     "Work several complete two-step solutions quickly so students see many examples.",
     "Move straight to equations with variables on both sides to build stamina.",
     "First have students master undoing the addition, then separately master undoing the multiplication, then combine the two."],
   answerIndex:3,
   explanation:"Isolating each operation, practicing it, then chaining them is the small-steps approach and it targets exactly where students stumble. Rapid full examples re-introduce the whole load at once; jumping to harder equations and handing over a rules list both skip the incremental practice."},

  // ---- 2.2.04 Demonstrates steps for defining concepts, applying rules, solving problems ----
  // A: recognize modeling | B: model vs. tell | C(math): think-aloud worked example
  {id:"p_2204_A", subject:"ptk", standard:"2.2.04", domain:"2", topic:"2.2", set:"A",
   prompt:"While introducing how to solve a new type of problem, a teacher works an example aloud, showing each decision and step as she goes, before students attempt their own. What is this teaching move?",
   options:[
     "Assessing prior knowledge to place instruction.",
     "Checking that students mastered the material before moving on.",
     "Demonstrating (modeling) the steps of the procedure for students.",
     "Withdrawing assistance as students gain proficiency."],
   answerIndex:2,
   explanation:"Walking through the steps and reasoning of a worked example is demonstration/modeling \u2014 making an expert process visible. Placing instruction (2.2.01), fading support (2.2.10), and confirming mastery before advancing (2.2.08) are all different stages of instruction, not what's described here."},
  {id:"p_2204_B", subject:"ptk", standard:"2.2.04", domain:"2", topic:"2.2", set:"B",
   prompt:"Two teachers introduce the same new procedure. Teacher A states the rule and lists the steps on a slide. Teacher B states the rule and then works a problem aloud, narrating each choice. Why might Teacher B's approach support learning more for a brand-new procedure?",
   options:[
     "It avoids the need for students to practice afterward.",
     "Seeing the steps enacted, with the reasoning made visible, shows students how to actually carry out the procedure, not just what it is.",
     "It guarantees no student will make an error later.",
     "It removes the need to define the concept at all."],
   answerIndex:1,
   explanation:"Demonstration makes the hidden decision-making of a procedure observable, which a static list of steps does not. It doesn't replace later practice, doesn't guarantee error-free performance, and doesn't eliminate the need to define the concept \u2014 it complements those."},
  {id:"p_2204_C", subject:"ptk", standard:"2.2.04", domain:"2", topic:"2.2", set:"C",
   prompt:"A math teacher wants to demonstrate factoring a trinomial like $x^2 + 7x + 12$. Which approach best fits 'demonstrating the steps' rather than merely stating them?",
   options:[
     "Think aloud while factoring: 'I need two numbers that multiply to 12 and add to 7 \u2014 let me test pairs \u2026', showing each decision.",
     "Hand out a worksheet of trinomials and circulate to help.",
     "Ask students what they already remember about factoring from last year.",
     "Project the final factored form $(x+3)(x+4)$ and tell students to memorize the pattern."],
   answerIndex:0,
   explanation:"Narrating the reasoning while working the example shows students how to think through the procedure, which is the heart of demonstration. Showing only the answer hides the process; the worksheet is practice, not modeling; and asking what they recall is prior-knowledge assessment (2.2.01), a different move."},

  // ---- 2.2.05 Focuses on objectives without digressing ----
  // A: recognize a digression | B: redirect to objective | C(math): handle a tangent
  {id:"p_2205_A", subject:"ptk", standard:"2.2.05", domain:"2", topic:"2.2", set:"A",
   prompt:"Midway through a lesson with a clear objective, a student's comment leads the teacher into a long, entertaining personal story unrelated to the objective, and the class runs out of time for guided practice. With respect to focused instruction, what went wrong?",
   options:[
     "The teacher failed to assess prior knowledge.",
     "The teacher modeled the procedure too thoroughly.",
     "The teacher digressed from the objective, sacrificing continuity and time on the actual goal.",
     "The teacher presented content in steps that were too small."],
   answerIndex:2,
   explanation:"An extended off-objective tangent that crowds out the planned learning is a digression that breaks continuity \u2014 the specific risk this standard guards against. The other options name unrelated moves; the problem here is loss of focus on the objective, not step size, assessment, or modeling."},
  {id:"p_2205_B", subject:"ptk", standard:"2.2.05", domain:"2", topic:"2.2", set:"B",
   prompt:"A student raises an interesting but off-topic question that could derail the lesson's objective. Which response best keeps instruction focused without dismissing the student?",
   options:[
     "Ignore the question and continue as if it weren't asked.",
     "Drop the lesson plan and explore the tangent fully now.",
     "Tell the student that off-topic questions aren't allowed.",
     "Acknowledge it, note it for later (e.g., 'great question \u2014 let's take it up after we finish today's goal'), and return to the objective."],
   answerIndex:3,
   explanation:"Parking the tangent honors the student while protecting continuity toward the objective \u2014 the balance this standard calls for. Fully exploring it now sacrifices focus; shutting the student down or ignoring them protects focus at the cost of engagement and respect."},
  {id:"p_2205_C", subject:"ptk", standard:"2.2.05", domain:"2", topic:"2.2", set:"C",
   prompt:"During a lesson whose objective is solving systems of equations by substitution, a student asks, out of the blue, why you can't divide by zero. It's a genuine, interesting math question, and the teacher is tempted to dive into a full explanation. What best preserves focused instruction?",
   options:[
     "Briefly affirm the question, offer to take it up once the substitution objective is met or in a future lesson, and steer back.",
     "Tell the student that real math is only what's on the test.",
     "Pretend not to hear and keep working the substitution example.",
     "Spend the rest of the period exploring division by zero, since curiosity is valuable."],
   answerIndex:0,
   explanation:"Valuing the curiosity while deferring it keeps the lesson on its substitution objective without crushing engagement. Even a legitimate math tangent becomes a digression when it derails the planned objective. Dismissing math beyond the test or ignoring the student both damage the classroom climate."},

  // ---- 2.2.06 Teaches vocabulary required for mastery ----
  // A: recognize the need | B: teach term in context | C(math): precise vs loose language
  {id:"p_2206_A", subject:"ptk", standard:"2.2.06", domain:"2", topic:"2.2", set:"A",
   prompt:"Students keep misunderstanding a reading because several key technical terms in it have meanings they don't know. What does focused instruction call for?",
   options:[
     "Tell students to look every unfamiliar word up at home.",
     "Replace the reading with an easier one that has no technical terms.",
     "Assume students will infer the terms from context over time.",
     "Explicitly teach the essential vocabulary students need to access the content."],
   answerIndex:3,
   explanation:"When specific terms gate understanding of the content, teaching that vocabulary directly is what mastery requires. Hoping for inference is unreliable for gatekeeping terms; swapping in a term-free text avoids rather than builds the needed vocabulary; and offloading it entirely to homework abandons the instructional responsibility."},
  {id:"p_2206_B", subject:"ptk", standard:"2.2.06", domain:"2", topic:"2.2", set:"B",
   prompt:"Which approach to teaching a key subject-area term is most likely to build usable understanding?",
   options:[
     "Define the term, connect it to examples and non-examples, and have students use it in the context of the content.",
     "Test students on the spelling of the term.",
     "Have students copy the dictionary definition verbatim.",
     "Mention the term once and assume it's learned."],
   answerIndex:0,
